<!DOCTYPE html>

<body>
<div class="phone-outer">
<div class="phone-frame">
  <div class="frame-wallpaper" id="frame-wallpaper" aria-hidden="true"></div>
  <div class="dynamic-island"><div class="island-camera"></div></div>
  <div class="status-bar">
    <span id="status-time">12:00</span>
    <div class="status-right">
      <span class="status-icon">✦</span>
      <span class="status-icon">⚡</span>
    </div>
  </div>
  <div class="screen" id="screen">
    <div class="home-screen" id="home-screen">
      <div class="wallpaper" id="wallpaper">
        <div class="wallpaper-gradient" id="wallpaper-gradient"></div>
      </div>
      <div class="home-content" id="home-content">
        <div class="home-pages" id="home-pages">
          <div class="home-page">
            <div class="home-shell">
              <div class="media-panel">
                <div class="hero-wrap">
                  <div class="widget widget-clock">
                    <div class="clock-time" id="clock-display">12:00</div>
                    <div class="clock-meta">
                      <div class="clock-date" id="date-display">Wed, Mar 4</div>
                      <button class="clock-loc-bubble" id="clock-loc-bubble" type="button" onclick="openClockLocationEditor(event)">
                        <span class="clock-loc-icon">📍</span>
                        <span id="clock-loc-text">圣诞岛</span>
                      </button>
                    </div>
                </div>
                <button class="slot-picker slot-circle" type="button" data-slot="top" onclick="onTopSlotTap(event)">
                  <span class="slot-plus">+</span>
                </button>
              </div>

                <div class="widget widget-character" id="widget-character" onclick="openApp('characters')">
                  <button class="char-note-bubble" id="char-note-bubble" type="button" onclick="openCharNoteEditor(event)">Tap note</button>
                  <div class="char-avatar-wrap">
                    <div class="char-avatar" id="wgt-avatar">✿</div>
                  </div>
                  <div class="char-details">
                    <div class="char-name" id="wgt-name">No companion yet</div>
                    <div class="char-sub" id="wgt-sub">Tap to import a character card!</div>
                  </div>
                </div>

                <div class="slots-wrap">
                  <button class="slot-picker slot-tall" type="button" data-slot="1" onclick="pickHomeSlot('1')"><span class="slot-plus">+</span><span class="live-overlay live-variant-1"><span class="live-danmaku danmaku-a">啊啊啊太可爱了</span><span class="live-danmaku danmaku-b">宝宝上线了</span><span class="live-danmaku danmaku-c">今天状态好好</span><span class="live-like like-a">♥</span><span class="live-like like-b">♥</span><span class="live-like like-c">♥</span></span></button>
                  <button class="slot-picker slot-tall" type="button" data-slot="2" onclick="pickHomeSlot('2')"><span class="slot-plus">+</span><span class="live-overlay live-variant-2"><span class="live-danmaku danmaku-a">蹲到你了</span><span class="live-danmaku danmaku-b">这张也太甜</span><span class="live-danmaku danmaku-c">晚安打卡</span><span class="live-like like-a">♥</span><span class="live-like like-b">♥</span><span class="live-like like-c">♥</span></span></button>
                  <button class="slot-picker slot-tall" type="button" data-slot="3" onclick="pickHomeSlot('3')"><span class="slot-plus">+</span><span class="live-overlay live-variant-3"><span class="live-danmaku danmaku-a">今日份心动</span><span class="live-danmaku danmaku-b">镜头感满分</span><span class="live-danmaku danmaku-c">路过被可爱到</span><span class="live-like like-a">♥</span><span class="live-like like-b">♥</span><span class="live-like like-c">♥</span></span></button>
                </div>
              </div>
            </div>
          </div>
          <div class="home-page-gap" aria-hidden="true"></div>
          <div class="home-page home-page-secondary">
            <div class="page-two-shell">
              <section class="bond-widget">
                <button class="bond-days-pill" type="button" onclick="openBondDaysEditor(event)">
                  <span id="bond-days-number">0615</span>
                  <span>天</span>
                </button>
                <div class="bond-widget-inner">
                  <div class="bond-avatars-row">
                    <div class="bond-person">
                      <button class="bond-avatar" type="button" data-bond-avatar="char" onclick="onBondAvatarTap(event, 'char')">
                        <span id="bond-char-avatar">✿</span>
                      </button>
                      <button class="bond-name-tag" type="button" onclick="onBondNameTap(event, 'char')">
                        <span id="bond-char-name">CHAR</span>
                      </button>
                    </div>
                    <div class="bond-heart-wrap" aria-hidden="true">
                      <div class="bond-heart-glow"></div>
                      <div class="bond-heart">❤</div>
                    </div>
                    <div class="bond-person">
                      <button class="bond-avatar" type="button" data-bond-avatar="user" onclick="onBondAvatarTap(event, 'user')">
                        <span id="bond-user-avatar">你</span>
                      </button>
                      <button class="bond-name-tag" type="button" onclick="onBondNameTap(event, 'user')">
                        <span id="bond-user-name">USER</span>
                      </button>
                    </div>
                  </div>
                  <div class="bond-lower-row">
                    <button class="bond-mini-app" type="button" onclick="openPlaceholderMiniApp(1)">
                      <span class="home-app-icon-wrap bond-mini-icon">
                        <span class="home-app-fallback-text">占位1</span>
                      </span>
                      <span class="home-app-label">占位1</span>
                    </button>
                    <div class="bond-center-links" aria-hidden="true">
                      <div class="bond-center-title">愿望写下来就会成真！</div>
                      <div class="bond-link-row">
                        <span class="bond-link-line"></span>
                        <input class="bond-link-input" id="bond-link-input-1" type="text" maxlength="12" placeholder="输入文字">
                        <span class="bond-link-line"></span>
                      </div>
                      <div class="bond-link-row">
                        <span class="bond-link-line"></span>
                        <input class="bond-link-input" id="bond-link-input-2" type="text" maxlength="12" placeholder="输入文字">
                        <span class="bond-link-line"></span>
                      </div>
                    </div>
                    <button class="bond-mini-app" type="button" onclick="openPlaceholderMiniApp(2)">
                      <span class="home-app-icon-wrap bond-mini-icon">
                        <span class="home-app-fallback-text">占位2</span>
                      </span>
                      <span class="home-app-label">占位2</span>
                    </button>
                  </div>
                </div>
              </section>
              <section class="page-two-lower">
                <div class="page-two-feature-row">
                  <div class="music-player-wrap">
                    <div class="music-player-widget" aria-hidden="true">
                      <span class="music-player-platter"></span>
                      <span class="music-player-ring"></span>
                      <span class="music-player-note music-player-note-a">♪</span>
                      <span class="music-player-note music-player-note-b">♫</span>
                      <span class="music-player-note music-player-note-c">♩</span>
                      <span class="music-player-note music-player-note-d">♪</span>
                      <span class="music-player-note music-player-note-e">♬</span>
                      <button class="slot-picker music-player-disc" type="button" data-slot="musicAlbum" onclick="pickHomeSlot('musicAlbum')">
                        <span class="slot-plus">+</span>
                      </button>
                      <span class="music-player-arm"></span>
                    </div>
                    <button class="page-two-mini-note" type="button" onclick="openPageTwoMiniNoteEditor(event)">
                      <span id="page-two-mini-note-text">贴贴</span>
                    </button>
                  </div>
                  <div class="photo-stack">
                    <button class="slot-picker slot-photo-card photo-card-back" type="button" data-slot="photo1" onclick="pickHomeSlot('photo1')">
                      <span class="slot-plus">+</span>
                    </button>
                    <button class="slot-picker slot-photo-card photo-card-front" type="button" data-slot="photo2" onclick="pickHomeSlot('photo2')">
                      <span class="slot-plus">+</span>
                    </button>
                  </div>
                </div>
                <div class="page-two-app-row app-grid page-two-app-grid">
                  <button class="bond-mini-app page-two-mini-app" type="button" onclick="openPlaceholderMiniApp(3)">
                    <span class="home-app-icon-wrap bond-mini-icon">
                      <span class="home-app-fallback-text">占位3</span>
                    </span>
                    <span class="home-app-label">占位3</span>
                  </button>
                  <button class="bond-mini-app page-two-mini-app" type="button" onclick="openPlaceholderMiniApp(4)">
                    <span class="home-app-icon-wrap bond-mini-icon">
                      <span class="home-app-fallback-text">占位4</span>
                    </span>
                    <span class="home-app-label">占位4</span>
                  </button>
                  <button class="bond-mini-app page-two-mini-app" type="button" onclick="openPlaceholderMiniApp(5)">
                    <span class="home-app-icon-wrap bond-mini-icon">
                      <span class="home-app-fallback-text">占位5</span>
                    </span>
                    <span class="home-app-label">占位5</span>
                  </button>
                  <button class="bond-mini-app page-two-mini-app" type="button" onclick="openPlaceholderMiniApp(6)">
                    <span class="home-app-icon-wrap bond-mini-icon">
                      <span class="home-app-fallback-text">占位6</span>
                    </span>
                    <span class="home-app-label">占位6</span>
                  </button>
                </div>
              </section>
            </div>
          </div>
        </div>
        <div class="home-page-indicator" id="home-page-indicator" aria-hidden="true">
          <span class="home-page-dot active"></span>
          <span class="home-page-dot"></span>
        </div>
        <div class="app-grid app-grid-dock" id="app-grid">
          <button class="home-app-btn" type="button" data-app="qq" onclick="openApp('qq')">
            <span class="home-app-label">QQ</span>
          </button>
          <button class="home-app-btn" type="button" data-app="settings" onclick="openApp('settings')">
            <span class="home-app-label">设置</span>
          </button>
          <button class="home-app-btn" type="button" data-app="customize" onclick="openApp('customize')">
            <span class="home-app-label">外观</span>
          </button>
          <button class="home-app-btn" type="button" data-app="worldbook" onclick="openApp('worldbook')">
            <span class="home-app-label">世界书</span>
          </button>
        </div>
      </div>
      <input id="home-slot-file" type="file" accept="image/*,.png,.jpg,.jpeg,.webp,.gif,.bmp,.svg" style="display:none">
      <div class="home-toast" id="home-toast">更换成功</div>
      <div class="char-note-editor" id="char-note-editor">
        <div class="char-note-card">
          <div class="char-note-title">Text Bubble</div>
          <textarea id="char-note-input" maxlength="80" placeholder="输入想显示的小文字..."></textarea>
          <div class="char-note-actions">
            <button class="char-note-btn" type="button" onclick="closeCharNoteEditor()">取消</button>
            <button class="char-note-btn primary" type="button" onclick="saveCharNote()">保存</button>
          </div>
        </div>
      </div>
      <div class="char-note-editor" id="clock-loc-editor">
        <div class="char-note-card">
          <div class="char-note-title">城市定位</div>
          <textarea id="clock-loc-input" maxlength="24" placeholder="输入城市名..."></textarea>
          <div class="char-note-actions">
            <button class="char-note-btn" type="button" onclick="closeClockLocationEditor()">取消</button>
            <button class="char-note-btn primary" type="button" onclick="saveClockLocation()">保存</button>
          </div>
        </div>
      </div>
      <div class="char-note-editor" id="bond-days-editor">
        <div class="char-note-card bond-edit-card">
          <div class="char-note-title">纪念天数</div>
          <input class="bond-edit-input" id="bond-days-input" maxlength="6" placeholder="输入数字，例如 0615">
          <div class="char-note-actions">
            <button class="char-note-btn" type="button" onclick="closeBondDaysEditor()">取消</button>
            <button class="char-note-btn primary" type="button" onclick="saveBondDays()">保存</button>
          </div>
        </div>
      </div>
      <div class="char-note-editor" id="bond-bubble-editor">
        <div class="char-note-card">
          <div class="char-note-title" id="bond-bubble-title">文字泡泡</div>
          <textarea id="bond-bubble-input" maxlength="60" placeholder="输入想显示的小文字..."></textarea>
          <div class="char-note-actions">
            <button class="char-note-btn" type="button" onclick="closeBondBubbleEditor()">取消</button>
            <button class="char-note-btn primary" type="button" onclick="saveBondBubble()">保存</button>
          </div>
        </div>
      </div>
      <div class="char-note-editor" id="page-two-mini-note-editor">
        <div class="char-note-card">
          <div class="char-note-title">竖版文字卡</div>
          <textarea id="page-two-mini-note-input" maxlength="24" placeholder="输入想显示的小文字..."></textarea>
          <div class="char-note-actions">
            <button class="char-note-btn" type="button" onclick="closePageTwoMiniNoteEditor()">取消</button>
            <button class="char-note-btn primary" type="button" onclick="savePageTwoMiniNote()">保存</button>
          </div>
        </div>
      </div>
    </div>
      <div class="app-container" id="app-container">
      <div class="app-topbar">
        <button class="back-btn" onclick="handleBack()"><span class="back-arrow">‹</span> Back</button>
        <span class="app-title-label" id="app-title-label">App</span>
        <span style="width:60px"></span>
      </div>
      <iframe id="app-iframe" src="" frameborder="0" allowfullscreen></iframe>
    </div>

  <div class="home-bar" onclick="closeApp()"></div>
</div>
</div>
<div class="ios-safe-area-cover" aria-hidden="true"></div>
<div class="update-toast-card" id="update-toast-card" hidden>
  <div class="update-toast-inner">
    <div class="update-toast-title">更新了哦</div>
    <div class="update-toast-copy">请点击刷新，就会切到最新版本啦</div>
    <div class="update-toast-meta" id="update-toast-meta">当前版本：2026-03-20T02:00:46Z<br>远端版本：未读到<br>检查状态：等待检查</div>
    <button class="update-toast-btn" type="button" onclick="refreshInstalledApp(event)">刷新</button>
  </div>
</div>
