<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Characters</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
button{-webkit-appearance:none;appearance:none;-webkit-touch-callout:none;color:inherit;-webkit-text-fill-color:currentColor}
:root{--b:#0a0a0a;--w:#fff;--off:#f7f7f7;--g:#888;--pale:#eee;--bd:2px solid #0a0a0a;--sh:2px 2px 0 #0a0a0a;--r:16px;--font:'Quicksand',sans-serif;--fontd:'Nunito',sans-serif}
body{font-family:var(--font);background:var(--off);color:var(--b);height:100vh;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--w);padding:8px 16px 6px;flex-shrink:0}
.topbar-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.topbar h2{font-family:var(--fontd);font-size:18px;font-weight:900}
.topbar .sub{font-size:11px;color:var(--g);margin-top:2px}
.import-btn{font-family:var(--fontd);font-weight:800;border:var(--bd);border-radius:10px;padding:7px 14px;font-size:12px;cursor:pointer;box-shadow:var(--sh);background:var(--b);color:var(--w);transition:transform .12s,box-shadow .12s;flex-shrink:0}
.import-btn:active{transform:translate(2px,2px);box-shadow:0 0 0}
.search-wrap{padding:6px 16px 8px;background:var(--w);border-bottom:var(--bd)}
.search-in{width:100%;font-family:var(--font);font-size:13px;font-weight:600;background:var(--off);border:var(--bd);border-radius:24px;padding:8px 16px;outline:none;transition:box-shadow .15s;-webkit-text-fill-color:currentColor;font-variant-emoji:text}
.search-in:focus{box-shadow:3px 3px 0 var(--b)}
.search-in::placeholder{color:#bbb}
.contact-list{flex:1;overflow-y:auto;scrollbar-width:none;padding-bottom:20px}
.contact-list::-webkit-scrollbar{display:none}
.letter-header{padding:7px 16px 4px;font-family:var(--fontd);font-size:10px;font-weight:900;color:var(--g);text-transform:uppercase;letter-spacing:.1em;background:var(--off)}
.contact-row{display:flex;align-items:center;gap:12px;padding:11px 16px;background:var(--w);border-bottom:1.5px solid var(--pale);cursor:pointer;transition:background .1s}
.contact-row:active{background:var(--pale)}
.contact-row.is-active{background:#f0f0f0}
.c-avatar{width:48px;height:48px;border-radius:14px;border:var(--bd);background:var(--pale);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;overflow:hidden;box-shadow:var(--sh)}
.c-avatar img{width:100%;height:100%;object-fit:cover}
.c-info{flex:1;min-width:0}
.c-name{font-family:var(--fontd);font-size:14px;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.c-sub{font-size:11px;color:var(--g);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.c-badge{font-size:9px;font-weight:800;padding:2px 8px;border-radius:8px;border:var(--bd);background:var(--b);color:var(--w);flex-shrink:0;margin-left:auto}
.c-arrow{font-size:20px;color:var(--g);flex-shrink:0;font-weight:300;margin-left:4px}
.empty{text-align:center;padding:60px 20px;color:var(--g)}
.empty-icon{font-size:52px;margin-bottom:12px}
.empty-title{font-family:var(--fontd);font-size:15px;font-weight:900;color:var(--b);margin-bottom:6px}
.empty-sub{font-size:12px;line-height:1.7}
/* Drop overlay */
.drop-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.drop-overlay.active{opacity:1;pointer-events:all}
.drop-box{border:3px dashed rgba(255,255,255,.7);border-radius:24px;padding:44px 32px;text-align:center;color:#fff}
.drop-icon{font-size:56px;margin-bottom:14px}
.drop-title{font-family:var(--fontd);font-size:20px;font-weight:900}
.drop-sub{font-size:13px;opacity:.7;margin-top:6px}
/* Detail panel */
.detail-panel{position:fixed;inset:0;background:var(--w);z-index:100;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
.detail-panel.open{transform:translateX(0)}
.dp-topbar{background:var(--w);border-bottom:var(--bd);padding:12px 16px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.dp-back{background:none;border:none;font-size:28px;font-weight:300;color:var(--b);cursor:pointer;line-height:1;flex-shrink:0}
.dp-title{font-family:var(--fontd);font-size:16px;font-weight:900;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dp-actions{display:flex;gap:6px;flex-shrink:0}
.act-btn{font-family:var(--fontd);font-weight:800;border:var(--bd);border-radius:10px;padding:7px 11px;font-size:12px;cursor:pointer;box-shadow:var(--sh);transition:transform .12s,box-shadow .12s;white-space:nowrap}
.act-btn:active{transform:translate(2px,2px);box-shadow:0 0 0}
.a-black{background:var(--b);color:var(--w)}
.a-white{background:var(--w);color:var(--b)}
.a-red{background:var(--w);color:#c00;border-color:#c00;box-shadow:2px 2px 0 #c00}
.dp-body{flex:1;overflow-y:auto;padding:14px;scrollbar-width:none}
.dp-body::-webkit-scrollbar{display:none}
/* Detail sections */
.dp-hero{display:flex;gap:16px;align-items:flex-start;background:var(--off);border:var(--bd);border-radius:var(--r);padding:16px;margin-bottom:12px;box-shadow:var(--sh)}
.dp-hero-av{width:80px;height:80px;border-radius:18px;border:var(--bd);background:var(--pale);display:flex;align-items:center;justify-content:center;font-size:36px;overflow:hidden;flex-shrink:0;box-shadow:var(--sh)}
.dp-hero-av img{width:100%;height:100%;object-fit:cover}
.dp-hero-info{flex:1;min-width:0}
.dp-hero-name{font-family:var(--fontd);font-size:20px;font-weight:900}
.dp-hero-spec{font-size:11px;color:var(--g);margin-top:3px;font-weight:700}
.dp-hero-desc{font-size:12px;color:var(--b);margin-top:6px;line-height:1.6;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}
.dp-sec{background:var(--w);border:var(--bd);border-radius:var(--r);box-shadow:var(--sh);margin-bottom:12px;overflow:hidden}
.dp-sec-hd{padding:12px 16px;font-family:var(--fontd);font-size:13px;font-weight:900;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;border-bottom:var(--bd)}
.dp-sec.collapsed .dp-sec-hd{border-bottom:none}
.dp-sec-ti{font-size:14px;color:var(--g);transition:transform .2s}
.dp-sec.collapsed .dp-sec-ti{transform:rotate(-90deg)}
.dp-sec-body{padding:14px 16px;display:flex;flex-direction:column;gap:9px}
.dp-sec.collapsed .dp-sec-body{display:none}
.field-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--g);margin-bottom:2px}
.field-val{font-size:12px;font-weight:600;line-height:1.65;color:var(--b);white-space:pre-wrap}
.field-val.mono{font-family:monospace;font-size:11px;background:var(--off);border-radius:8px;padding:8px 10px;max-height:140px;overflow-y:auto;white-space:pre-wrap;word-break:break-all}
/* Greeting items */
.g-item{display:flex;gap:8px;padding:9px 11px;border:var(--bd);border-radius:12px;cursor:default;box-shadow:1px 1px 0 var(--b);transition:background .1s}
.g-item.sel{background:var(--b);color:var(--w);box-shadow:none}
.g-num{font-family:var(--fontd);font-size:12px;font-weight:900;width:22px;flex-shrink:0}
.g-text{font-size:12px;font-weight:600;line-height:1.5;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;flex:1}
.g-text.expanded{-webkit-line-clamp:unset;max-height:none;white-space:pre-wrap}
.g-expand{background:none;border:var(--bd);border-radius:8px;padding:2px 6px;font-size:11px;font-weight:900;cursor:pointer;align-self:flex-start;flex-shrink:0;box-shadow:1px 1px 0 var(--b);line-height:1}
.g-item.sel .g-expand{background:var(--w);color:var(--b);box-shadow:none}
.export-card-preview{background:linear-gradient(180deg,#ffffff 0%,#f6f6f6 100%);border:none;border-radius:22px;padding:16px;box-shadow:0 12px 24px rgba(0,0,0,.08);display:flex;flex-direction:column;gap:12px}
.export-card-preview .preview-head{display:flex;align-items:center;justify-content:space-between;gap:10px}
.export-card-preview .preview-title{font-family:var(--fontd);font-size:14px;font-weight:900}
.export-card-preview .preview-sub{font-size:11px;color:var(--g);font-weight:700;line-height:1.5}
.export-card-preview .preview-badge{border:none;border-radius:999px;padding:5px 10px;background:#111;color:#fff;font-size:10px;font-weight:900;box-shadow:none}
.export-card-preview .preview-actions{display:flex;gap:8px}
.export-card-preview .preview-actions .btn{flex:1}
/* Import log */
.import-log{position:fixed;bottom:0;left:0;right:0;background:var(--b);color:var(--w);padding:10px 16px;font-size:12px;font-weight:700;text-align:center;transform:translateY(100%);transition:transform .3s;z-index:999}
.import-log.show{transform:translateY(0)}
#file-input{display:none}
.modal-mask{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:300}
.modal{background:var(--w);border:var(--bd);box-shadow:var(--sh);border-radius:16px;padding:18px;width:320px;max-width:90%}
.modal h3{font-family:var(--fontd);font-size:16px;font-weight:900;margin-bottom:10px}
.modal label{font-size:11px;font-weight:700;color:var(--g);display:block;margin-top:10px;margin-bottom:4px}
.modal input,.modal textarea{width:100%;border:var(--bd);border-radius:10px;padding:9px 10px;font-family:var(--font);font-size:13px;font-weight:600;background:var(--off);outline:none;-webkit-text-fill-color:currentColor;font-variant-emoji:text}
.modal textarea{resize:none;min-height:80px}
.modal .row{display:flex;gap:10px;margin-top:12px}
.modal .btn{flex:1;border:var(--bd);border-radius:10px;padding:10px 0;font-family:var(--fontd);font-weight:900;font-size:13px;cursor:pointer;box-shadow:var(--sh);background:var(--w)}
.modal .btn.primary{background:var(--b);color:var(--w)}
.modal .avatar-box{width:80px;height:80px;border-radius:16px;border:var(--bd);background:var(--pale);display:flex;align-items:center;justify-content:center;font-size:28px;cursor:pointer;overflow:hidden;box-shadow:var(--sh);margin-bottom:10px}
.modal .avatar-box img{width:100%;height:100%;object-fit:cover}
.export-mask{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:340;padding:18px}
.export-shell{width:min(360px,100%);background:transparent;border:none;box-shadow:none;display:flex;flex-direction:column;align-items:center;gap:14px;overflow:visible}
.export-top{display:none}
.export-body{padding:0;display:flex;flex-direction:column;gap:0;overflow:visible;width:100%}
.export-note{display:none}
.export-preview-wrap{display:flex;align-items:center;justify-content:center;min-height:422px;padding:0;background:none;border:none;box-shadow:none;overflow:visible}
.export-preview-img{display:none}
.export-preview-card{display:flex;align-items:center;justify-content:center;width:100%}
.share-card-polaroid{width:272px;display:flex;flex-direction:column;align-items:stretch;border:2px solid #111;border-radius:0;background:#fff;box-shadow:5px 6px 0 rgba(0,0,0,.88);transform:rotate(-1.6deg);overflow:hidden;position:relative}
.share-card-polaroid::before{content:'';position:absolute;left:50%;top:10px;width:34px;height:10px;border:2px solid #111;border-radius:999px;background:#111;transform:translateX(-50%);z-index:3}
.share-card-photo{height:284px;background:linear-gradient(180deg,#f8f8f8 0%,#e9e9e9 100%);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.share-card-photo img{width:100%;height:100%;object-fit:cover;display:block}
.share-card-photo-fallback{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--fontd);font-size:42px;font-weight:900;color:#111;background:linear-gradient(180deg,#f8f8f8 0%,#ececec 100%)}
.share-card-cap{padding:12px 12px 14px;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:10px;min-height:108px}
.share-card-name{width:100%;text-align:center;font-family:'Times New Roman',Times,serif;font-size:23px;font-weight:900;line-height:1.08;color:#111;word-break:break-word}
.share-card-actions{width:100%;display:flex;gap:10px;justify-content:center;margin-top:auto}
.share-card-action-btn{flex:1;min-height:34px;border:2px solid #111;border-radius:999px;background:#fff;font-family:var(--fontd);font-size:12px;font-weight:900;color:#111;box-shadow:2px 2px 0 rgba(0,0,0,.85);cursor:pointer}
.share-card-action-btn:active{transform:translate(1px,1px);box-shadow:0 0 0}
</style>
<script src="../assetStore.js"></script>
<script src="../accountManager.js"></script>
<script src="../chatStorage.js"></script>
<script src="../metadataStore.js"></script>
</head>
<body>

<div class="topbar">
  <div class="topbar-row">
    <div>
      <h2>联系人</h2>
      <div class="sub" id="charCount">加载中...</div>
    </div>
    <div style="display:flex;gap:8px;">
      <button class="import-btn" onclick="document.getElementById('file-input').click()">+ 导入</button>
      <button class="import-btn" onclick="openCreate()">+ 创建</button>
    </div>
  </div>
</div>

<div class="search-wrap">
  <input class="search-in" id="searchIn" type="text" placeholder="搜索角色..." oninput="renderList(this.value)">
</div>

<div class="contact-list" id="contactList"></div>

<div class="drop-overlay" id="dropOverlay">
  <div class="drop-box">
    <div class="drop-icon">🃏</div>
    <div class="drop-title">拖放角色卡</div>
    <div class="drop-sub">支持 .png (SillyTavern) 或 .json</div>
  </div>
</div>

<!-- Detail panel -->
<div class="detail-panel" id="dp">
  <div class="dp-topbar">
    <button class="dp-back" onclick="closeDetail()">‹</button>
    <span class="dp-title" id="dpTitle">角色</span>
    <div class="dp-actions">
      <button class="act-btn a-black" onclick="startChat()">💬 聊天</button>
      <button class="act-btn a-white" onclick="openExportCardPreview()">🖼 导出</button>
      <button class="act-btn a-white" onclick="openWB()">🌍 档案</button>
      <button class="act-btn a-red" onclick="deleteChar()">删除</button>
    </div>
  </div>
  <div class="dp-body" id="dpBody"></div>
</div>

<!-- Accepts PNG and JSON; no .jpg since those are plain art files -->
<input type="file" id="file-input" accept=".png,.json,application/json,image/png" multiple onchange="onFiles(this.files)">
<div class="import-log" id="importLog"></div>

<!-- Create Character Modal -->
<div class="modal-mask" id="createMask">
  <div class="modal">
    <h3>创建角色</h3>
    <div class="avatar-box" onclick="document.getElementById('cr-avatar-file').click()" id="cr-avatar-box">+</div>
    <input id="cr-avatar-file" type="file" accept="image/*" style="display:none" onchange="onAvatarFile(this.files[0])">
    <label>姓名</label>
    <input id="cr-name" placeholder="必填">
    <label>昵称</label>
    <input id="cr-nick" placeholder="可选">
    <label>头像符号/Emoji</label>
    <input id="cr-avatar" placeholder="例如 🌸">
    <label>人物介绍</label>
    <textarea id="cr-desc" placeholder="角色设定 / 简介"></textarea>
    <div class="row">
      <button class="btn" onclick="closeCreate()">取消</button>
      <button class="btn primary" onclick="createChar()">+ 创建</button>
    </div>
  </div>
</div>

<div class="modal-mask" id="friendReqMask" style="z-index:320">
  <div class="modal">
    <h3>是否发送好友申请？</h3>
    <div style="font-size:12px;line-height:1.6;color:#666;font-weight:700">当前账号是小号，对方会以陌生人视角决定是否通过。</div>
    <label>申请附言</label>
    <textarea id="friendReqIntro" placeholder="介绍一下你是谁，为什么想加好友（可提升通过率）"></textarea>
    <div class="row">
      <button class="btn" onclick="cancelFriendReq()">取消</button>
      <button class="btn primary" onclick="confirmFriendReq()">确认</button>
    </div>
  </div>
</div>
<div class="modal-mask" id="friendWaitMask" style="z-index:321">
  <div class="modal">
    <h3>等待通过中...</h3>
    <div style="font-size:12px;line-height:1.6;color:#666;font-weight:700">正在发送好友申请</div>
  </div>
</div>
<div class="modal-mask" id="friendRejectMask" style="z-index:322">
  <div class="modal">
    <h3>你被拒绝了哦</h3>
    <div class="row">
      <button class="btn primary" onclick="closeFriendReject()">知道了</button>
    </div>
  </div>
</div>

<div class="export-mask" id="exportMask">
  <div class="export-shell">
    <div class="export-body">
      <div class="export-preview-wrap">
        <div class="export-preview-card">
          <div class="share-card-polaroid" id="exportSharePolaroid">
            <div class="share-card-photo" id="exportSharePhoto">
              <img id="exportShareImg" alt="角色卡预览">
              <div class="share-card-photo-fallback" id="exportShareFallback">AI</div>
            </div>
            <div class="share-card-cap">
              <div class="share-card-name" id="exportShareName">CHAR</div>
              <div class="share-card-actions" data-preview-ui="1">
                <button class="share-card-action-btn" type="button" onclick="closeExportPreview()">取消</button>
                <button class="share-card-action-btn" type="button" id="exportConfirmBtn" onclick="confirmExportCharacterCard()">确认</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
var chars = [];
var curChar = null;
var activeCharId = '';
var PINYIN_INITIAL_BOUNDARIES = [
  { initial:'A', marker:'阿' },
  { initial:'B', marker:'芭' },
  { initial:'C', marker:'擦' },
  { initial:'D', marker:'搭' },
  { initial:'E', marker:'蛾' },
  { initial:'F', marker:'发' },
  { initial:'G', marker:'噶' },
  { initial:'H', marker:'哈' },
  { initial:'J', marker:'击' },
  { initial:'K', marker:'喀' },
  { initial:'L', marker:'垃' },
  { initial:'M', marker:'妈' },
  { initial:'N', marker:'拿' },
  { initial:'O', marker:'哦' },
  { initial:'P', marker:'啪' },
  { initial:'Q', marker:'期' },
  { initial:'R', marker:'然' },
  { initial:'S', marker:'撒' },
  { initial:'T', marker:'塌' },
  { initial:'W', marker:'挖' },
  { initial:'X', marker:'昔' },
  { initial:'Y', marker:'压' },
  { initial:'Z', marker:'匝' }
];
var pinyinCollator = null;
try {
  pinyinCollator = new Intl.Collator('zh-Hans-CN-u-co-pinyin', { sensitivity:'base' });
} catch(e) {
  pinyinCollator = null;
}
var avatarAssetCache = {};
var pendingFriendCharId = '';
var pendingFriendResolve = null;
var pendingFriendReject = null;
var exportPreviewState = null;

function normalizeNameLite(v){
  return String(v || '').toLowerCase().replace(/[^a-z0-9\u4e00-\u9fa5]/g,'');
}

function calcNameSimilarity(a, b){
  var x = normalizeNameLite(a);
  var y = normalizeNameLite(b);
  if(!x || !y) return 0;
  if(x === y) return 1;
  if(x.indexOf(y) !== -1 || y.indexOf(x) !== -1){
    return Math.min(x.length, y.length) / Math.max(x.length, y.length);
  }
  var setX = new Set(x.split(''));
  var setY = new Set(y.split(''));
  var inter = 0;
  setX.forEach(function(ch){ if(setY.has(ch)) inter++; });
  return inter / Math.max(setX.size, setY.size, 1);
}

function getDefaultAccountName(){
  if(!window.AccountManager) return '';
  var accounts = window.AccountManager.ensure();
  var did = window.AccountManager.getDefaultId();
  var d = (accounts || []).find(function(a){ return a.id === did; });
  return d ? (d.name || '') : '';
}

function getMainPersonaNameForChar(charId){
  if(!window.AccountManager || !charId) return '';
  var did = window.AccountManager.getDefaultId();
  if(!did) return '';
  return String(localStorage.getItem('user_name_' + charId + '__acct_' + did) || '').trim();
}

function getMainMomentsName(){
  if(!window.AccountManager) return '';
  var did = window.AccountManager.getDefaultId();
  if(!did) return '';
  return String(localStorage.getItem('qq_moments_bubble_name__acct_' + did) || '').trim();
}
function pendingFirstUserTurnKey(charId){
  if(window.AccountManager) return window.AccountManager.scopedKey('friend_first_user_turn_' + charId);
  return 'friend_first_user_turn_' + charId;
}
function chatStorageKeyForChar(charId){
  if(window.AccountManager) return window.AccountManager.scopedKey('chat_' + charId);
  return 'chat_' + charId;
}
function getGreetingStorageKey(charId){
  if(window.AccountManager) return window.AccountManager.scopedKey('greeting_idx_' + charId);
  return 'greeting_idx_' + charId;
}
function appendFriendIntroToChat(charId, intro){
  var text = String(intro || '').trim();
  if(!charId || !text) return;
  try{
    var key = chatStorageKeyForChar(charId);

// Downscale dataURL to keep storage usage low (<=256px, ~200KB target)
function shrinkDataUrl(dataUrl, maxDim){ 
  maxDim = maxDim || 256;
  return new Promise(function(res){
    try{
      if(/^data:image\/gif/i.test(dataUrl)){ res(dataUrl); return; }
      var img = new Image();
      img.onload = function(){
        var w = img.width, h = img.height;
        if(!w || !h){ res(dataUrl); return; }
        var scale = Math.min(1, maxDim / Math.max(w, h));
        if(scale >= 1 && dataUrl.length <= 200000){ res(dataUrl); return; }
        var canvas = document.createElement('canvas');
        canvas.width = Math.round(w * scale);
        canvas.height = Math.round(h * scale);
        var ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        var out = canvas.toDataURL('image/jpeg', 0.82);
        res(out || dataUrl);
      };
      img.onerror = function(){ res(dataUrl); };
      img.src = dataUrl;
    }catch(e){ res(dataUrl); }
  });
}

    try{ await window.MetadataStore.loadCharacters(true); }catch(err){}
  }
  var list = getStoredCharactersSnapshot();
  if(!Array.isArray(list)) return fallback || null;
  var activeAcctId = '';
  try{
    if(window.AccountManager){
      var acct = window.AccountManager.getActive();
      activeAcctId = String((acct && acct.id) || '').trim();
    }
  }catch(err){}
  var hit = list.find(function(c){

  }

function safeSet(key, val) {
  try { localStorage.setItem(key, val); return true; }

async function saveCharsWithFallback(lastCard) {
  var fullChars = Array.isArray(chars) ? chars.slice() : [];
  var storedChars = fullChars.map(makeStoredCharacterCard);
  if(window.MetadataStore && typeof window.MetadataStore.saveCharacters === 'function'){
    try{
      await window.MetadataStore.saveCharacters(fullChars);
      return true;
    }catch(err){}
  }
  if (safeSet('characters', JSON.stringify(storedChars))) return true;
  // Fallback 1: drop large fields on the newest card then retry
  var changed = false;
  if (lastCard && lastCard.id) {
    storedChars = storedChars.map(function(item){
      if(!item || item.id !== lastCard.id) return item;
      var slim = Object.assign({}, item);
      if (slim.imageData) { slim.imageData = ''; changed = true; }
      if (slim.character_book) { delete slim.character_book; changed = true; }
      if (slim.world_info) { delete slim.world_info; changed = true; }
      if (slim.description && slim.description.length > 4000) {
        slim.description = slim.description.slice(0, 4000); changed = true;
      }
      return slim;
    });
  }
  if (changed && safeSet('characters', JSON.stringify(storedChars))) {
    log('存储空间不足，已仅对旧 localStorage 回退副本做瘦身；角色完整数据仍保留在新存储里');
    return true;
  }
  log('存储空间超限，未能保存角色；请删除旧角色或使用更小的卡');
  return false;
}

  }
  async function removeStoredAssetKeys(keys){
    await Promise.all((Array.isArray(keys) ? keys : []).map(async function(key){
      var safeKey = String(key || '').trim();
      if(!safeKey) return;
      try{
        if(window.assetStore && typeof window.assetStore.remove === 'function'){
          await window.assetStore.remove(safeKey);

          localStorage.removeItem(safeKey);
        }

  var worldbooks = getStoredWorldbooksSnapshot();

  unique.forEach(function(id){
    if(worldbooks && typeof worldbooks === 'object' && Object.prototype.hasOwnProperty.call(worldbooks, id)){

    if(window.MetadataStore && typeof window.MetadataStore.saveWorldbooks === 'function'){

      scopedKey('user_name_', id),
      'user_name_' + id,
      scopedKey('char_bg_activity_enabled_', id),
      'char_bg_activity_enabled_' + id,
      scopedKey('char_moments_freq_', id),
      'char_moments_freq_' + id,
      scopedKey('avatar_vision_enabled_', id),
      'avatar_vision_enabled_' + id,
      scopedKey('char_avatar_auto_enabled_', id),
      'char_avatar_auto_enabled_' + id,
      scopedKey('char_avatar_auto_last_action_', id),
      'char_avatar_auto_last_action_' + id,
      scopedKey('presence_nudge_', id),
      'presence_nudge_' + id
    ];
    var largeStoreKeys = [
      scopedKey('chat_settings_patch_', id),
      scopedKey('chat_global_theme_css_', id),
      scopedKey('chat_bubble_theme_css_', id),
      scopedKey('chat_theme_css_', id),
      scopedKey('avatar_library_', id),
      scopedKey('avatar_vision_summary_', id),
      scopedKey('moments_social_state_', id),
      scopedKey('chat_block_state_', id)
    ];
    var assetKeys = [
      scopedKey('chat_bg_asset_', id),
      scopedKey('chat_header_bg_asset_', id),
      'char_avatar_' + id
    ];
    try{
      if(window.PhoneStorage && typeof window.PhoneStorage.remove === 'function'){
        await window.PhoneStorage.remove('chats', scopedChatKey);
        await window.PhoneStorage.remove('chats', legacyChatKey);
      }

      localStorage.removeItem(legacyChatKey);

      localStorage.removeItem(firstTurnKey);

function comparePinyin(a, b) {
  if (pinyinCollator) return pinyinCollator.compare(a, b);
  return String(a || '').localeCompare(String(b || ''), 'zh-Hans-CN');
}
function getNameInitial(name) {
  var text = String(name || '').trim();
  if (!text) return '#';
  var first = text.charAt(0).toUpperCase();
  if (/[A-Z]/.test(first)) return first;
  if (/[0-9]/.test(first)) return '#';
  for (var i = PINYIN_INITIAL_BOUNDARIES.length - 1; i >= 0; i--) {
    if (comparePinyin(text.charAt(0), PINYIN_INITIAL_BOUNDARIES[i].marker) >= 0) {
      return PINYIN_INITIAL_BOUNDARIES[i].initial;
    }
  }
  return '#';
}
function getSortKey(c) {
  var name = String((c && c.name) || '').trim();
  return {
    initial: getNameInitial(name),
    name: name
  };
}

function renderList(filter) {
  var list = document.getElementById('contactList');
  var srcChars = getVisibleChars();
  if (!srcChars.length) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">🃏</div><div class="empty-title">还没有角色</div><div class="empty-sub">点击「导入角色卡」添加<br>SillyTavern .png 或 .json 角色卡<br>也可以直接拖放到这里</div></div>';
    return;
  }
  var q = (filter || '').toLowerCase();
  var filtered = srcChars.filter(function(c){ return !q || c.name.toLowerCase().includes(q); });
  if (!filtered.length) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><div class="empty-title">没有找到</div></div>';
    return;
  }
  var sorted = filtered.slice().sort(function(a,b){
    var ak = getSortKey(a);
    var bk = getSortKey(b);
    if (ak.initial === '#' && bk.initial !== '#') return 1;
    if (ak.initial !== '#' && bk.initial === '#') return -1;
    if (ak.initial !== bk.initial) return ak.initial.localeCompare(bk.initial, 'en');
    return comparePinyin(ak.name, bk.name);
  });
  list.innerHTML = '';
  var lastLetter = '';
  sorted.forEach(function(c) {
    var letter = getNameInitial(c.name);
    if (letter !== lastLetter) {
      var lh = document.createElement('div');
      lh.className = 'letter-header'; lh.textContent = letter === '#' ? '其他' : letter;
      list.appendChild(lh); lastLetter = letter;
    }
    var row = document.createElement('div');
    row.className = 'contact-row' + (c.id === activeCharId ? ' is-active' : '');
    row.onclick = function(){ openDetail(c); };
    var avSrc = getAvatarSrc(c);
    var avHtml = avSrc ? '<img src="'+avSrc+'">' : '<span>'+(c.avatar||'🌸')+'</span>';
    row.innerHTML =
      '<div class="c-avatar">' + avHtml + '</div>' +
      '<div class="c-info">' +
        '<div class="c-name">' + esc(c.name) + '</div>' +
        '<div class="c-sub">' + esc((c.description||c.personality||'暂无描述').replace(/\n/g,' ').substring(0,55)) + '</div>' +
      '</div>' +
      (c.id === activeCharId ? '<span class="c-badge">使用中</span>' : '') +
      '<div class="c-arrow">›</div>';
    list.appendChild(row);
  });
}

function evaluateFriendAcceptanceByChar(charId, introText){
  var c = chars.find(function(x){ return x.id === charId; });
  var corpus = [
    c && c.personality ? c.personality : '',
    c && c.description ? c.description : '',
    c && c.scenario ? c.scenario : '',
    c && c.system_prompt ? c.system_prompt : ''
  ].join('\n').toLowerCase();
  var strictReject = /(冷漠|厌世|疑心|偏执|占有|病娇|危险|暴躁|孤僻|不信任|陌生人勿扰|stranger|hostile|paranoid|possessive)/.test(corpus);
  var prob = strictReject ? 0.36 : 0.62;

  var intro = String(introText || '').trim();
  var activeName = '';
  try{
    var acct = window.AccountManager.getActive();
    activeName = (acct && acct.name) || '';
  }catch(e){}
  var defaultName = getDefaultAccountName();
  var mainPersonaName = getMainPersonaNameForChar(charId);
  var mainMomentsName = getMainMomentsName();
  var similarity = Math.max(
    calcNameSimilarity(activeName, defaultName),
    calcNameSimilarity(activeName, mainPersonaName),
    calcNameSimilarity(activeName, mainMomentsName)
  );
  var normalizedActive = normalizeNameLite(activeName);
  var looksLikeMain = [defaultName, mainPersonaName, mainMomentsName].some(function(name){
    var norm = normalizeNameLite(name);
    return !!(normalizedActive && norm && (normalizedActive.indexOf(norm) !== -1 || norm.indexOf(normalizedActive) !== -1));
  });
  if(looksLikeMain) prob += 0.24;
  if(similarity >= 0.72) prob += 0.14;
  if(similarity >= 0.85) prob += 0.12;
  if(similarity >= 0.93) prob += 0.08;

  if(intro.length >= 6) prob += 0.08;
  if(intro.length >= 14) prob += 0.06;
  if(/(你好|打扰了|谢谢|麻烦|希望|请|可以|想和你聊|很喜欢|久仰)/.test(intro)) prob += 0.07;
  if(/(我就是|其实是我|你猜我是谁|小号|马甲|另一个号|是我呀|是我啊)/i.test(intro)) prob += 0.14;
  if(c && /(熟悉|记得|认出来|妹妹|旧识|老朋友|认识很久)/.test(String(c.personality||'') + String(c.description||''))) prob += 0.04;

  prob = Math.max(0.08, Math.min(0.97, prob));
  return { accepted: Math.random() < prob, similarity: similarity };
}

function getCharacterWorldbookExport(charId, charName) {
  var list = [];
  var seen = {};
  try{
    var buckets = getStoredWorldbooksSnapshot();
    Object.keys(buckets).forEach(function(bucketKey){
      var bucket = Array.isArray(buckets[bucketKey]) ? buckets[bucketKey] : [];
      bucket.forEach(function(wb){
        if(!wb || !Array.isArray(wb.entries) || !wb.entries.length) return;
        var isRelevant = bucketKey === charId || !!wb.global;
        if(!isRelevant) return;
        wb.entries.forEach(function(entry, idx){
          if(!entry || entry.enabled === false) return;
          var content = String(entry.content || '').trim();
          if(!content) return;
          var keys = String(entry.keywords || '').split(',').map(function(k){ return k.trim(); }).filter(Boolean);
          var dedupeKey = [String(entry.title || ''), content, keys.join('|')].join('::');
          if(seen[dedupeKey]) return;
          seen[dedupeKey] = true;
          list.push({
            keys: keys,
            content: content,
            enabled: true,
            insertion_order: Number(entry.order || idx) || idx,
            position: entry.position === 'before' ? 'before_char' : (entry.position === 'mid' ? 'author_note' : 'after_char'),
            comment: String(entry.title || '档案条目')
          });
        });
      });
    });
  }catch(e){}
  if(!list.length) return null;
  return {
    name: (charName || '角色') + ' 档案',
    entries: list
  };
}

function utf8ToB64(str){
  var bytes = new TextEncoder().encode(String(str || ''));
  var bin = '';
  for(var i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
  return btoa(bin);
}

var crc32Table = null;
function getCrc32Table(){
  if(crc32Table) return crc32Table;
  crc32Table = [];
  for(var n = 0; n < 256; n++){
    var c = n;
    for(var k = 0; k < 8; k++) c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
    crc32Table[n] = c >>> 0;
  }
  return crc32Table;
}

function crc32(bytes){
  var table = getCrc32Table();
  var crc = 0 ^ (-1);
  for(var i = 0; i < bytes.length; i++) crc = (crc >>> 8) ^ table[(crc ^ bytes[i]) & 0xFF];
  return (crc ^ (-1)) >>> 0;
}

function makePngChunk(type, data){
  var typeBytes = new TextEncoder().encode(type);
  var len = data.length >>> 0;
  var out = new Uint8Array(12 + len);
  out[0] = (len >>> 24) & 255;
  out[1] = (len >>> 16) & 255;
  out[2] = (len >>> 8) & 255;
  out[3] = len & 255;
  out.set(typeBytes, 4);
  out.set(data, 8);
  var crcBytes = new Uint8Array(typeBytes.length + data.length);
  crcBytes.set(typeBytes, 0);
  crcBytes.set(data, typeBytes.length);
  var crc = crc32(crcBytes);
  var base = 8 + len;
  out[base] = (crc >>> 24) & 255;
  out[base + 1] = (crc >>> 16) & 255;
  out[base + 2] = (crc >>> 8) & 255;
  out[base + 3] = crc & 255;
  return out;
}

function embedCharaChunkIntoPng(buffer, jsonText){
  var src = new Uint8Array(buffer);
  if(src.length < 12) throw new Error('PNG 数据无效');
  var insertAt = src.length;
  var pos = 8;
  while(pos + 12 <= src.length){
    var len = ((src[pos] << 24) | (src[pos + 1] << 16) | (src[pos + 2] << 8) | src[pos + 3]) >>> 0;
    var type = String.fromCharCode(src[pos + 4], src[pos + 5], src[pos + 6], src[pos + 7]);
    if(type === 'IEND'){
      insertAt = pos;
      break;
    }
    pos += 12 + len;
  }
  var textData = new TextEncoder().encode('chara\0' + utf8ToB64(jsonText));
  var chunk = makePngChunk('tEXt', textData);
  var out = new Uint8Array(src.length + chunk.length);
  out.set(src.slice(0, insertAt), 0);
  out.set(chunk, insertAt);
  out.set(src.slice(insertAt), insertAt + chunk.length);
  return out;
}

function wrapCanvasText(ctx, text, x, y, maxWidth, lineHeight, maxLines){
  var source = String(text || '').replace(/\r/g, '');
  var paragraphs = source.split('\n');
  var lines = [];
  paragraphs.forEach(function(paragraph){
    var tokens = /\s/.test(paragraph) ? paragraph.split(/\s+/).filter(Boolean) : paragraph.split('');
    var line = '';
    if(!tokens.length){
      lines.push('');
      return;
    }
    tokens.forEach(function(token, idx){
      var spacer = (!/\s/.test(paragraph) || !line || idx === 0) ? '' : ' ';
      var test = line ? (line + spacer + token) : token;
      if(ctx.measureText(test).width > maxWidth && line){
        lines.push(line);
        line = token;
      }else{
        line = test;
      }
    });
    if(line) lines.push(line);
  });
  if(!lines.length) lines = [''];
  var visible = typeof maxLines === 'number' ? lines.slice(0, maxLines) : lines;
  if(maxLines && lines.length > maxLines){
    var last = visible[visible.length - 1];
    while(last && ctx.measureText(last + '…').width > maxWidth) last = last.slice(0, -1);
    visible[visible.length - 1] = (last || '').trim() + '…';
  }
  visible.forEach(function(item, idx){
    ctx.fillText(item, x, y + idx * lineHeight);
  });
  return visible.length;
}

function fitCanvasText(ctx, text, maxWidth, startSize, minSize, weight, family){
  var size = startSize;
  var safeText = String(text || '');
  while(size > minSize){
    ctx.font = (weight || '900') + ' ' + size + 'px ' + (family || 'Nunito');
    if(ctx.measureText(safeText).width <= maxWidth) break;
    size -= 2;
  }
  ctx.font = (weight || '900') + ' ' + size + 'px ' + (family || 'Nunito');
  return size;
}

function roundedRect(ctx, x, y, w, h, r){
  var radius = Math.max(0, Math.min(r, Math.min(w, h) / 2));
  ctx.beginPath();
  ctx.moveTo(x + radius, y);
  ctx.arcTo(x + w, y, x + w, y + h, radius);
  ctx.arcTo(x + w, y + h, x, y + h, radius);
  ctx.arcTo(x, y + h, x, y, radius);
  ctx.arcTo(x, y, x + w, y, radius);
  ctx.closePath();
}

function extractCharacterPersonaBasicInfo(persona){
  var rawPersona = String(persona || '');
  var txt = rawPersona.trim();
  if(!txt) return ['性别：未设置', '年龄：未设置', '生日：未设置'];
  txt = txt
    .replace(/\r/g, '\n')
    .replace(/：/g, ':')
    .replace(/（/g, '(')
    .replace(/）/g, ')')
    .replace(/，/g, ',')
    .replace(/。/g, '.');
  var lower = txt.toLowerCase();
  var lines = txt.split(/\n+/).map(function(line){ return line.trim(); }).filter(Boolean);
  function firstLineByKeywords(keys){
    for(var i = 0; i < lines.length; i++){
      var row = lines[i].toLowerCase();
      for(var j = 0; j < keys.length; j++){
        if(row.indexOf(keys[j]) !== -1) return lines[i];
      }
    }
    return '';
  }
  function extractFromKV(source, keyPatterns){
    var body = String(source || '');
    var key = '(?:' + keyPatterns.join('|') + ')';
    var reg1 = new RegExp("(?:^|[\\n\\r,;|])\\s*(?:[-*]\\s*)?(?:\\\"|\\')?" + key + "(?:\\\"|\\')?\\s*[:=]\\s*(?:\\\"|\\')?([^\\n\\r,;|\\\"\\']+)", 'i');
    var m1 = body.match(reg1);
    if(m1 && m1[1]) return m1[1].trim();
    var reg2 = new RegExp(key + '\\s*[:=]\\s*([^\\n\\r,;|]+)', 'i');
    var m2 = body.match(reg2);
    if(m2 && m2[1]) return m2[1].trim();
    return '';
  }
  function pick(patterns, source){
    var from = source || txt;
    for(var i = 0; i < patterns.length; i++){
      var m = from.match(patterns[i]);
      if(m && m[1]) return String(m[1]).trim();
    }
    return '';
  }
  function normalizeGender(value){
    var v = String(value || '').toLowerCase();
    if(!v) return '未设置';
    if(/(female|girl|woman|she|her|女士|女生|女性|女的|女)/.test(v)) return '女性';
    if(/(male|boy|man|he|him|先生|男生|男性|男的|男)/.test(v)) return '男性';
    return '未设置';
  }
  function normalizeAge(value){
    var v = String(value || '');
    var m = v.match(/(\d{1,3})(?:\s*岁|\s*yo|\s*y\/o)?/i);
    if(!m) return '未设置';
    var age = Number(m[1]);
    if(!Number.isFinite(age) || age <= 0 || age > 130) return '未设置';
    return age + '岁';
  }
  function normalizeBirthday(value){
    var v = String(value || '');
    v = v.replace(/(白羊|金牛|双子|巨蟹|狮子|处女|天秤|天蝎|射手|摩羯|水瓶|双鱼)座?/g, '').trim();
    var m1 = v.match(/(\d{1,2})\s*月\s*(\d{1,2})\s*[日号]?/);
    if(m1) return Number(m1[1]) + '月' + Number(m1[2]) + '日';
    var m2 = v.match(/\d{4}\D+(\d{1,2})\D+(\d{1,2})/);
    if(m2) return Number(m2[1]) + '月' + Number(m2[2]) + '日';
    var m3 = v.match(/(\d{1,2})[\/.\-](\d{1,2})(?:[\/.\-]\d{2,4})?/);
    if(m3) return Number(m3[1]) + '月' + Number(m3[2]) + '日';
    return '未设置';
  }
  var birthdayLine = firstLineByKeywords(['birthday','birth date','dob','born','生日']);
  var genderLine = firstLineByKeywords(['gender','sex','性别','男','女','male','female','he/him','she/her']);
  var ageLine = firstLineByKeywords(['age','年龄','years old','yo','y/o','岁']);

  var birthdayRaw = extractFromKV(birthdayLine || txt, ['birthday','birth\\s*date','dob','born','生日','出生日期']);
  if(!birthdayRaw) birthdayRaw = pick([
    /(\d{4}年\d{1,2}月\d{1,2}日?)/,
    /(\d{1,2}月\d{1,2}日?)/,
    /(\d{4}[\/.\-]\d{1,2}[\/.\-]\d{1,2})/,
    /(\d{1,2}[\/.\-]\d{1,2}(?:[\/.\-]\d{2,4})?)/
  ], birthdayLine || lower);

  var genderRaw = extractFromKV(genderLine || txt, ['gender','sex','性别']);
  if(!genderRaw) genderRaw = pick([
    /(男的|女的|男|女|male|female|boy|girl|man|woman)/i,
    /\b(he\/him|she\/her)\b/i
  ], genderLine || lower);

  var ageRaw = extractFromKV(ageLine || txt, ['age','年龄']);
  if(!ageRaw) ageRaw = pick([
    /(\d{1,3}\s*(?:岁|yo|y\/o|years?\s*old|yrs?\s*old))/i,
    /\b(?:i am|i'm)\s+(\d{1,3})\b/i
  ], ageLine || lower);

  return [
    '性别：' + normalizeGender(genderRaw),
    '年龄：' + normalizeAge(ageRaw),
    '生日：' + normalizeBirthday(birthdayRaw)
  ];
}

async function renderCharacterIdentityCardCanvasFallback(cardEl, c){
  if(!cardEl) throw new Error('missing identity card');
  var canvas = document.createElement('canvas');
  canvas.width = 1120;
  canvas.height = 860;
  var ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.scale(2, 2);
  ctx.translate(280, 215);

function cloneNodeWithInlineStyles(sourceNode){
  if(!sourceNode) return null;
  if(sourceNode.nodeType === Node.TEXT_NODE) return document.createTextNode(sourceNode.textContent || '');
  if(sourceNode.nodeType !== Node.ELEMENT_NODE) return sourceNode.cloneNode(false);
  var clone = sourceNode.cloneNode(false);
  var computed = window.getComputedStyle(sourceNode);
  var styleText = '';
  for(var i = 0; i < computed.length; i++){
    var prop = computed[i];
    styleText += prop + ':' + computed.getPropertyValue(prop) + ';';
  }
  clone.setAttribute('style', styleText);
  if(clone instanceof HTMLImageElement){
    var src = String(sourceNode.getAttribute('src') || sourceNode.src || '').trim();
    if(src) clone.setAttribute('src', new URL(src, window.location.href).toString());
  }
  Array.prototype.forEach.call(sourceNode.childNodes, function(child){
    clone.appendChild(cloneNodeWithInlineStyles(child));
  });
  return clone;
}

function waitForNodeImages(node){
  var imgs = Array.prototype.filter.call((node && node.querySelectorAll) ? node.querySelectorAll('img') : [], function(img){
    return !!String(img.getAttribute('src') || img.src || '').trim();
  });
  if(!imgs.length) return Promise.resolve();
  return Promise.all(imgs.map(function(img){
    if(img.complete && img.naturalWidth > 0) return Promise.resolve();
    return new Promise(function(resolve){
      img.addEventListener('load', resolve, { once:true });
      img.addEventListener('error', resolve, { once:true });
    });
  }));
}

//  IMPORT — Robust PNG chunk parser
// ════════════════════════════════════════════
async function onFiles(files) {
  for (const f of Array.from(files)) {
    if (f.name.toLowerCase().endsWith('.json')) await importJson(f);
    else await importPng(f); // try as png regardless of extension
  }
}

async function importJson(file) {
  return new Promise(function(resolve){
    var r = new FileReader();
    r.onload = async function(e) { await handleCard(e.target.result, null, file.name); resolve(); };
    r.onerror = function() { log('读取失败: '+file.name); resolve(); };
    r.readAsText(file);
  });
}

async function importPng(file) {
  return new Promise(function(resolve){
    var rBuf = new FileReader();
    var rImg = new FileReader();
    var imgDataUrl = null;
    var bufDone = false, imgDone = false;
    var bufResult = null;

    function tryParse() {
      if (!bufDone || !imgDone) return;
      extractCharaChunk(bufResult, function(jsonStr) {
        handleCard(jsonStr, imgDataUrl, file.name).then(resolve);
      }, function(errMsg) {
        log('⚠ ' + file.name + ': ' + errMsg);
        resolve();
      });
    }

    rBuf.onload = function(e) { bufResult = e.target.result; bufDone = true; tryParse(); };
    rBuf.onerror = function() { log('无法读取文件'); resolve(); };
    rImg.onload = function(e) { imgDataUrl = e.target.result; imgDone = true; tryParse(); };
    rImg.onerror = function() { imgDone = true; tryParse(); };

    rBuf.readAsArrayBuffer(file);
    rImg.readAsDataURL(file);
  });
}

// ── PNG Chunk extractor ──
// Handles: tEXt (plain base64), zTXt (compressed), iTXt (utf-8)
function extractCharaChunk(buffer, onOk, onErr) {
  var u8 = new Uint8Array(buffer);
  // PNG magic: 89 50 4E 47 0D 0A 1A 0A
  if (u8[0]!==0x89||u8[1]!==0x50||u8[2]!==0x4E||u8[3]!==0x47) {
    onErr('不是PNG文件 (文件头: 0x'+u8[0].toString(16)+u8[1].toString(16)+u8[2].toString(16)+')');
    return;
  }
  var pos = 8;
  var seen = [];
  while (pos + 12 <= u8.length) {
    var len = (u8[pos]<<24|u8[pos+1]<<16|u8[pos+2]<<8|u8[pos+3]) >>> 0;
    pos += 4;
    var type = String.fromCharCode(u8[pos],u8[pos+1],u8[pos+2],u8[pos+3]);
    pos += 4;
    if (len > 20000000 || pos + len > u8.length) break;
    var chunkData = u8.slice(pos, pos + len);
    pos += len + 4;
    seen.push(type);
    if (type === 'IEND') break;
    if (type === 'tEXt') {
      var r = parseTEXT(chunkData);
      if (r) { console.log('[chara] tEXt ok, len='+r.length); onOk(r); return; }
    }
    if (type === 'zTXt') {
      parseZTXT(chunkData, function(r){ console.log('[chara] zTXt ok'); onOk(r); }, function(e){ console.warn('[chara] zTXt fail:',e); });
      return;
    }
    if (type === 'iTXt') {
      var r = parseITXT(chunkData);
      if (r) { console.log('[chara] iTXt ok, len='+r.length); onOk(r); return; }
    }
  }
  console.warn('[chara] chunks seen:', seen.join(','));
  onErr('未找到chara块。PNG块列表: ' + seen.slice(0,10).join(','));
}
// ── base64 → UTF-8 (CJK-safe): atob returns Latin-1 bytes, must re-decode as UTF-8 ──
function b64ToUtf8(b64) {
  // Strip anything that isn't valid base64 (newlines, spaces, etc)
  b64 = b64.replace(/[^A-Za-z0-9+\/=]/g, '').trim();
  if (!b64) throw new Error('empty base64');
  var bin = atob(b64);                          // Latin-1 byte string
  var u8  = new Uint8Array(bin.length);
  for (var i = 0; i < bin.length; i++) u8[i] = bin.charCodeAt(i);
  return new TextDecoder('utf-8').decode(u8);   // correct UTF-8 decode
}

function parseTEXT(data) {
  // tEXt chunk format:  keyword \0 value
  // 'value' is a base64-encoded UTF-8 JSON string
  var nul = -1;
  for (var i = 0; i < data.length; i++) { if (data[i] === 0) { nul = i; break; } }
  if (nul < 0) return null;
  // keyword is ASCII
  var kw = '';
  for (var i = 0; i < nul; i++) kw += String.fromCharCode(data[i]);
  if (kw.toLowerCase() !== 'chara') return null;
  // base64 value: all chars are ASCII < 128, charCodeAt is fine
  var b64 = '';
  for (var i = nul + 1; i < data.length; i++) b64 += String.fromCharCode(data[i]);
  try { return b64ToUtf8(b64); }
  catch(e) { console.warn('[tEXt] decode fail:', e.message, '| b64 preview:', b64.substring(0,60)); return null; }
}

function parseITXT(data) {
  // iTXt format: keyword \0 compFlag(1) compMethod(1) \0 language \0 translatedKw \0 text
  var nul = -1;
  for (var i = 0; i < data.length; i++) { if (data[i] === 0) { nul = i; break; } }
  if (nul < 0) return null;
  var kw = '';
  for (var i = 0; i < nul; i++) kw += String.fromCharCode(data[i]);
  if (kw.toLowerCase() !== 'chara') return null;
  // Find 2nd null after (nul+3) to skip: compFlag, compMethod, \0lang, \0translated
  var nullsSeen = 0, textStart = nul + 1;
  for (var i = nul + 3; i < data.length; i++) {
    if (data[i] === 0) { nullsSeen++; if (nullsSeen >= 2) { textStart = i + 1; break; } }
  }
  var text = new TextDecoder('utf-8').decode(data.slice(textStart)).trim();
  if (!text) return null;
  try { return b64ToUtf8(text); } catch(e) {}
  if (text.startsWith('{')) return text;
  return null;
}

function parseZTXT(data, onOk, onErr) {
  var nul = -1;
  for (var i = 0; i < data.length; i++) { if (data[i] === 0) { nul = i; break; } }
  if (nul < 0) { onErr('zTXt: no null'); return; }
  var kw = '';
  for (var i = 0; i < nul; i++) kw += String.fromCharCode(data[i]);
  if (kw.toLowerCase() !== 'chara') return;
  var compressed = data.slice(nul + 2);
  if (typeof DecompressionStream === 'undefined') { onErr('zTXt: no DecompressionStream'); return; }
  var ds = new DecompressionStream('deflate-raw');
  var w = ds.writable.getWriter();
  try { w.write(compressed); w.close(); } catch(e) { onErr('zTXt write: '+e); return; }
  new Response(ds.readable).arrayBuffer().then(function(buf) {
    var text = new TextDecoder('utf-8').decode(new Uint8Array(buf)).trim();
    try { onOk(b64ToUtf8(text)); return; } catch(e) {}
    if (text.startsWith('{')) { onOk(text); return; }
    onErr('zTXt: could not parse result');
  }).catch(function(e) { onErr('zTXt: ' + e); });
}

function getImportedRegexIdentityKey(entry) {
  var item = normalizeImportedRegexScript(entry, '导入脚本');

    String(item.findRegex || ''),

function choosePreferredImportedRegexEntry(current, incoming) {
  var a = normalizeImportedRegexScript(current, '导入脚本');
  var b = normalizeImportedRegexScript(incoming, '导入脚本');
  if (!a) return b;
  if (!b) return a;
  var aScore = 0;
  var bScore = 0;
  if (!a.disabled) aScore += 5;
  if (!b.disabled) bScore += 5;
  if (String(a.findRegex || '').trim()) aScore += 2;
  if (String(b.findRegex || '').trim()) bScore += 2;
  if (String(a.replaceString || '').trim()) aScore += 2;
  if (String(b.replaceString || '').trim()) bScore += 2;
  if (Array.isArray(a.placement) && a.placement.length) aScore += 1;
  if (Array.isArray(b.placement) && b.placement.length) bScore += 1;
  if (String(a.text || '').trim().length) aScore += Math.min(2, Math.ceil(String(a.text || '').trim().length / 800));
  if (String(b.text || '').trim().length) bScore += Math.min(2, Math.ceil(String(b.text || '').trim().length / 800));
  return bScore > aScore ? b : a;
}

function dedupeImportedRegexEntries(entries) {
  var seen = {};
  var out = [];
  (Array.isArray(entries) ? entries : []).forEach(function(entry) {
    var item = normalizeImportedRegexScript(entry, '导入脚本');

    if (!seen[key]) {

    }
    var preferred = choosePreferredImportedRegexEntry(seen[key], item);
    seen[key] = preferred;
    var idx = out.findIndex(function(candidate) {
      return getImportedRegexIdentityKey(candidate) === key;
    });
    if (idx >= 0) out[idx] = preferred;
  });
  return out;
}
