  if (!clean) return false;
  if (/^>\s*原作者/i.test(clean)) return true;
  if (/请务必留意|游玩相关|免费发布|dc社区|discord|手机格式适配|状态栏二选一|世界书|正则|快捷|快捷指令|作者说明/i.test(clean)) {
    if (/^>/.test(clean) || /(?:^|\n)\s*#{1,4}\s*/.test(clean) || /(?:^|\n)\s*\d+\./.test(clean)) return true;
  }
  return false;
}

function normalizeImportedGreetingPool(firstMes, alternateGreetings) {
  var rawList = [];
  if (String(firstMes || '').trim()) rawList.push(firstMes);
  if (Array.isArray(alternateGreetings)) rawList = rawList.concat(alternateGreetings);
  rawList = rawList.map(function(entry) {
    return String(entry || '').replace(/\r\n/g, '\n').trim();
  }).filter(Boolean);
  rawList = rawList.filter(function(entry) {
    return !looksLikeImportedGreetingMetaNote(entry);
  });
  return dedupeImportedEntries(rawList, function(entry) {
    return String(entry || '').trim().toLowerCase();
  });
}

function importedFileNameFromUri(uri) {
  var raw = String(uri || '').trim();
  if (!raw) return '';
  var cleaned = raw.replace(/^(?:embeded|embedded):\/\//i, '').replace(/^__asset:/i, '').trim();
  if (!cleaned) return '';
  if (isImportedImageUrl(cleaned)) return basenameFromImportUrl(cleaned);
  var normalized = cleaned.split(/[?#]/)[0].split('/').pop();
  return isImportedImageFileName(normalized) ? normalized : '';
}

function parseImportedMemeCatboxToken(token, label) {
  var clean = stripImportedImageDecorations(token);
  if (!clean) return null;
  if (isImportedImageUrl(clean)) {
    var remoteName = basenameFromImportUrl(clean);
    return {
      src: clean,
      fileName: remoteName,
      label: normalizeImportedLabel(label, remoteName)
    };
  }
  var normalized = clean.replace(/^(?:embeded|embedded):\/\//i, '').replace(/^__asset:/i, '').trim();
  if (!normalized) return null;
  var fileName = '';
  var parsedLabel = '';
  var catboxTail = normalized.match(/([a-z0-9]{6}\.(?:png|jpe?g|gif|webp|apng|avif|bmp|jfif))$/i);
  if (catboxTail && catboxTail[1]) {
    fileName = String(catboxTail[1] || '').trim();
    parsedLabel = normalizeImportedLabel(normalized.slice(0, normalized.length - fileName.length), '');
  } else if (isImportedImageFileName(normalized)) {
    fileName = normalized;
  } else {
    return null;
  }
  return {
    src: fileName ? ('https://files.catbox.moe/' + fileName) : '',
    fileName: fileName,
    label: normalizeImportedMemeDisplayName(normalizeImportedLabel(label, parsedLabel || fileName), fileName)
  };
}

function parseImportedAvatarCatboxToken(token, label) {
  var clean = stripImportedImageDecorations(token);
  if (!clean) return null;
  if (isImportedImageUrl(clean)) {
    var remoteName = basenameFromImportUrl(clean);
    return {
      src: clean,
      fileName: remoteName,
      label: normalizeImportedLabel(label, remoteName)
    };
  }
  var normalized = clean.replace(/^(?:embeded|embedded):\/\//i, '').replace(/^__asset:/i, '').trim();
  if (!normalized) return null;
  if (!isImportedImageFileName(normalized)) return null;
  return {
    src: isLikelyImportedCatboxFileName(normalized) ? ('https://files.catbox.moe/' + normalized) : '',
    fileName: normalized,
    label: normalizeImportedLabel(label, normalized)
  };
}

function stripImportedMemeFileNameSuffix(name, fileName) {
  var text = String(name || '').trim();
  var tail = String(fileName || '').trim();
  if (!text) return '';
  if (!tail) return text;
  if (text.toLowerCase() === tail.toLowerCase()) return '';
  if (text.toLowerCase().slice(-tail.length) === tail.toLowerCase()) {
    return String(text.slice(0, text.length - tail.length) || '').trim();
  }
  return text;
}

function normalizeImportedMemeDisplayName(name, fileName) {
  var text = String(name || '').trim();
  var tail = String(fileName || '').trim();
  text = stripImportedMemeFileNameSuffix(text, tail);
  text = text
    .replace(/^<meme>\s*/i, '')
    .replace(/\s*<\/meme>$/i, '')
    .replace(/^[【\[]?(?:表情包|meme)[】\]]?\s*[:：]?\s*/i, '')
    .replace(/[，。；;！？!?]+$/g, '')
    .trim();
  if (!text) return '';
  if (tail && text.toLowerCase() === tail.toLowerCase()) return '';
  if (/^[a-z0-9]{6}\.(?:png|jpe?g|gif|webp|apng|avif|bmp|jfif)$/i.test(text)) return '';
  if (/^[a-z0-9]{6}$/i.test(text)) return '';
  return text;
}

function parseImportedBareMemeLine(line, path) {
  var text = String(line || '').trim();
  if (!text) return null;
  text = text
    .replace(/^[`"'[{(]+/g, '')
    .replace(/[`"',\]})]+$/g, '')
    .replace(/^[•·▪◦\-\*\d.\)\( ]+/g, '')
    .trim();
  if (!text) return null;
  var match = text.match(/^(.+?)([a-z0-9]{6}\.(?:png|jpe?g|gif|webp|apng|avif|bmp|jfif))$/i);
  if (!match) return null;
  var label = normalizeImportedMemeDisplayName(match[1], match[2]);
  if (!label) return null;
  return buildImportedImageEntry('meme', match[2], label, path, '世界书表情包列表');
}

function countImportedBareMemeLines(lines) {
  var count = 0;
  (Array.isArray(lines) ? lines : []).forEach(function(line) {
    if (parseImportedBareMemeLine(line, '')) count += 1;
  });
  return count;
}

function buildImportedImageEntry(kind, token, label, path, note) {
  var safeKind = kind === 'avatar' ? 'avatar' : 'meme';
  var clean = stripImportedImageDecorations(token);
  if (!clean) return null;
  var src = isImportedImageUrl(clean) ? clean : '';
  var fileName = importedFileNameFromUri(clean);
  var parsedLabel = normalizeImportedLabel(label, '');
  if (safeKind === 'avatar') {
    var avatarMeta = parseImportedAvatarCatboxToken(clean, parsedLabel);
    if (avatarMeta) {
      src = avatarMeta.src || src;
      fileName = avatarMeta.fileName || fileName;
      parsedLabel = avatarMeta.label || parsedLabel;
    }
  } else if (safeKind === 'meme') {
    var memeMeta = parseImportedMemeCatboxToken(clean, parsedLabel);
    if (memeMeta) {
      src = memeMeta.src || src;
      fileName = memeMeta.fileName || fileName;
      parsedLabel = memeMeta.label || parsedLabel;
    }
  }
  if (!src && !fileName && isImportedImageFileName(clean)) fileName = clean;
  if (!src && !fileName) return null;
  var fallback = '';
  if (safeKind === 'avatar') {
    fallback = src ? importedResourceLabelFromUrl(src, '头像') : (fileName || '头像');
  }
  return {
    kind: safeKind,
    url: src,
    fileName: fileName,
    label: normalizeImportedLabel(parsedLabel, fallback),
    path: String(path || ''),
    note: normalizeImportedLabel(note, '')
  };
}

function collectStructuredImportedAssets(source, path, bucket) {
  var assets = source && source.assets;
  if (!Array.isArray(assets)) return;
  assets.slice(0, 160).forEach(function(asset, idx) {
    if (!asset || typeof asset !== 'object') return;
    var type = String(asset.type || '').trim().toLowerCase();
    var token = String(asset.uri || asset.url || asset.src || asset.path || '').trim();
    var kind = getStructuredImportedAssetKind(type);
    if (kind === 'unknown') return;
    if (!token && asset.name && isImportedImageFileName(asset.name)) token = String(asset.name || '').trim();
    var entry = buildImportedImageEntry(
      kind,
      token,
      asset.name || asset.label || asset.id || '',
      String(path || 'data.assets') + '[' + idx + ']',
      type || '角色卡资源'
    );
    if (entry) bucket.images.push(entry);
  });
}

function collectLooseImportedAssetObject(source, path, bucket) {
  if (!source || typeof source !== 'object' || Array.isArray(source)) return;
  var typeHint = String(source.type || source.assetType || source.kind || source.role || '').trim();
  var label = source.name || source.label || source.title || source.id || '';
  var token = source.uri || source.url || source.src || source.path || source.file || source.fileName || source.filename || '';
  if (!token && label && isImportedImageFileName(label)) token = label;
  if (!token) return;
  var kind = getStructuredImportedAssetKind(typeHint);
  if (kind === 'unknown' && !/(?:^|\.)(?:assets|emotions?|expressions?|memes?|stickers?|emoji|emotes?|reactions?)(?:\.|$)/i.test(String(path || ''))) return;
  if (kind === 'unknown') return;
  if (kind !== 'avatar' && kind !== 'meme') return;
  var entry = buildImportedImageEntry(kind, token, label, String(path || ''), typeHint || '角色卡资源对象');
  if (entry) bucket.images.push(entry);
}

function collectStructuredRegexScripts(source, path, bucket) {
  var roots = [];
  if (source && typeof source === 'object') roots.push(source);
  if (source && source.extensions && typeof source.extensions === 'object') roots.push(source.extensions);
  roots.forEach(function(root) {
    ['regex_scripts', 'regx_scripts'].forEach(function(key) {
      var value = root[key];
      if (!value) return;
      if (Array.isArray(value)) {
        value.slice(0, 80).forEach(function(item, idx) {
          if (!item || typeof item !== 'object') return;
          if (!item.findRegex && !item.replaceString && !item.scriptName && !Array.isArray(item.placement)) return;
          var entry = normalizeImportedRegexScript(item, key + '_' + (idx + 1));
          if (entry) bucket.regex.push(entry);
        });
        return;
      }
      if (value && typeof value === 'object' && (value.findRegex || value.replaceString || value.scriptName || Array.isArray(value.placement))) {
        var single = normalizeImportedRegexScript(value, key);
        if (single) bucket.regex.push(single);
      }
    });
  });
}

function extractImportedAssetEntriesFromText(text, path, options) {
  var raw = String(text || '').replace(/\r\n/g, '\n').replace(/\r/g, '\n');
  if (!raw.trim()) return [];
  var fallbackKind = guessImportedResourceKind(path, '');
  var currentKind = fallbackKind === 'unknown' ? '' : fallbackKind;
  var avatarSectionAllowed = currentKind === 'avatar';
  var lines = raw.split('\n').map(function(line){ return String(line || '').trim(); }).filter(Boolean);
  var bareMemeLineCount = countImportedBareMemeLines(lines);
  var avatarLike = /(头像列表|头像管理|可用头像|avatar(?:\s+list|\s+library)?|初始头像|平时的头像|崩溃时(?:时)?头像|极度兴奋.*头像)/i.test(raw);
  var hasExplicitSection = lines.some(function(line){
    return isImportedAvatarSectionLine(line) || isImportedMemeSectionLine(line);
  });
  var denseBareMemeBlock = bareMemeLineCount >= 4 && !avatarLike && fallbackKind !== 'avatar';
  if (!hasExplicitSection && currentKind !== 'avatar' && currentKind !== 'meme') {
    var memeLike = /(表情包|表情列表|表符|<meme>|meme|sticker|emoji|贴图)/i.test(raw);
    if (memeLike || denseBareMemeBlock) currentKind = 'meme';
    else if (avatarLike) currentKind = 'avatar';
    else return [];
  }
  var entries = [];
  lines.forEach(function(line) {
    if (isImportedAvatarSectionLine(line)) {
      var owner = getImportedAvatarSectionOwner(line, options);
      currentKind = 'avatar';
      if (owner === 'main') avatarSectionAllowed = true;
      else if (owner === 'other') avatarSectionAllowed = false;
    } else if (isImportedMemeSectionLine(line)) {
      currentKind = 'meme';
    }
    if ((currentKind === 'meme' || fallbackKind === 'meme' || denseBareMemeBlock) && currentKind !== 'avatar') {
      var bareMemeEntry = parseImportedBareMemeLine(line, path);
      if (bareMemeEntry) {
        entries.push(bareMemeEntry);
        return;
      }
    }
    var token = extractImportedImageTokenFromLine(line);
    if (!token) return;
    var kindHint = detectImportedLineKind(line, currentKind, path);
    if (kindHint !== 'avatar' && kindHint !== 'meme') return;
    if (kindHint === 'avatar' && !avatarSectionAllowed) return;
    if (!isExplicitImportedResourceEntryLine(line, token, kindHint)) return;
    var isAvatar = kindHint === 'avatar';
    var label = '';
    if (isAvatar) {
      label = normalizeImportedLabel(
        line
          .replace(token, '')
          .replace(/^[•·▪◦\-\*\d.\)\( ]+/g, '')
          .replace(/[：:]\s*$/, '')
          .trim(),
        importedFileNameFromUri(token)
      );
    } else {
      label = normalizeImportedLabel(
        line
          .replace(token, '')
          .replace(/^[•·▪◦\-\*\d.\)\( ]+/g, '')
          .replace(/[：:]\s*$/, '')
          .trim(),
        importedFileNameFromUri(token) || basenameFromImportUrl(token)
      );
    }
    var entry = buildImportedImageEntry(kindHint, token, label, path, isAvatar ? '世界书头像列表' : '世界书表情包列表');
    if (entry) entries.push(entry);
  });
  var pairContextIsMeme = currentKind === 'meme'
    || fallbackKind === 'meme'
    || hasExplicitSection
    || denseBareMemeBlock
    || /(表情包|表情列表|表符|<meme>|meme|sticker|emoji|贴图)/i.test(raw);
  if (pairContextIsMeme) {
    var pairRe = /(?:^|[,\n，])\s*([^,\n，]+?)\s+(https?:\/\/[^\s,，]+?\.(?:png|jpe?g|gif|webp|apng|avif|bmp|jfif)(?:\?[^\s,，]*)?)/ig;
    var match;
    while ((match = pairRe.exec(raw))) {
      var pairLabel = normalizeImportedLabel(String(match[1] || '').trim().replace(/[：:]\s*$/, ''), '');
      var pairToken = String(match[2] || '').trim();
      if (!pairLabel || !pairToken) continue;
      var pairEntry = buildImportedImageEntry('meme', pairToken, pairLabel, path, '世界书表情包列表');
      if (pairEntry) entries.push(pairEntry);
    }
    var catboxPairRe = /(?:^|[,\n，])\s*([^,\n，]+?)\s*[:：]?\s*([A-Za-z0-9_\-\u4e00-\u9fa5]{0,48}[a-z0-9]{6}\.(?:png|jpe?g|gif|webp|apng|avif|bmp|jfif))/ig;
    while ((match = catboxPairRe.exec(raw))) {
      var catboxLabel = normalizeImportedLabel(String(match[1] || '').trim().replace(/[：:]\s*$/, ''), '');
      var catboxToken = String(match[2] || '').trim();
      if (!catboxToken) continue;
      var catboxEntry = buildImportedImageEntry('meme', catboxToken, catboxLabel, path, '世界书表情包列表');
      if (catboxEntry) entries.push(catboxEntry);
    }
  }
  return entries;
}

function collectImportedMetadataFromNode(node, path, bucket, depth, options) {
  if (depth > 6 || node == null) return;
  if (typeof node === 'string') {
    var pathHint = importPathHint(path);
    var allowAssetScan = /character_book|world_info|entries\[\d+\]\.(content|comment|title)|extensions|avatar|meme|sticker|emoji/.test(pathHint)
      || guessImportedResourceKind(path, node) !== 'unknown';
    if (allowAssetScan) {
      extractImportedAssetEntriesFromText(node, path, options).forEach(function(entry) {
        bucket.images.push(entry);
      });
    }
    splitRuleBlocksFromText(node).forEach(function(block) {
      bucket.rules.push(block);
    });
    return;
  }
  if (Array.isArray(node)) {
    node.slice(0, 120).forEach(function(item, idx) {
      collectImportedMetadataFromNode(item, String(path || '') + '[' + idx + ']', bucket, depth + 1, options);
    });
    return;
  }
  if (typeof node !== 'object') return;
  collectStructuredImportedAssets(node, path, bucket);
  collectLooseImportedAssetObject(node, path, bucket);
  collectStructuredRegexScripts(node, path, bucket);
  Object.keys(node).slice(0, 120).forEach(function(key) {
    collectImportedMetadataFromNode(node[key], path ? (path + '.' + key) : key, bucket, depth + 1, options);
  });
}

function extractImportedCardMetadata(raw, d, charBook, jsonStr, filename) {
  var bucket = { images: [], rules: [], regex: [] };
  var importOptions = {
    charAliases: [d && d.name, d && d.char_name, d && d.nick, d && d.nickname, filename && String(filename || '').replace(/\.(png|json)$/i, '')]
  };
  collectImportedMetadataFromNode(raw, 'raw', bucket, 0, importOptions);
  if (charBook) collectImportedMetadataFromNode(charBook, 'character_book', bucket, 0, importOptions);
  splitRuleBlocksFromText(jsonStr).forEach(function(block) { bucket.rules.push(block); });
  var directAvatarCandidates = [
    d && d.avatar_url,
    d && d.avatarUrl,
    d && d.profile_image,
    d && d.profileImage,
    raw && raw.avatar_url,
    raw && raw.avatarUrl
  ].map(function(value){ return String(value || '').trim(); }).filter(function(value){
    return isImportedImageUrl(value);
  }).map(function(url){
    return { kind: 'avatar', url: url, fileName: importedFileNameFromUri(url), label: importedResourceLabelFromUrl(url, filename), path: 'direct.avatar', note: '角色卡自带头像链接' };
  });
  bucket.images = directAvatarCandidates.concat(bucket.images);

  var avatarResources = dedupeImportedEntries(bucket.images.filter(function(entry) {
    return entry && (entry.url || entry.fileName) && String(entry.kind || guessImportedResourceKind(entry.path, entry.label || '')).toLowerCase() === 'avatar';
  }).map(function(entry, idx) {
    var previewData = isImportedImageUrl(entry.url) ? String(entry.url || '').trim() : '';
    var fileName = importedFileNameFromUri(entry.fileName || entry.url || '');
    if (!previewData && fileName && isLikelyImportedCatboxFileName(fileName)) {
      previewData = 'https://files.catbox.moe/' + fileName;
    }
    return {
      id: 'import_avatar_' + idx,
      label: normalizeImportedLabel(entry.label, importedResourceLabelFromUrl(previewData || fileName, '头像')),
      previewData: previewData,
      fileName: fileName,
      note: normalizeImportedLabel(entry.note, '角色卡导入')
    };
  }), function(entry) {
    return (String(entry.previewData || '').trim().toLowerCase() + '::' + String(entry.fileName || '').trim().toLowerCase());
  });

  var memeResources = dedupeImportedEntries(bucket.images.filter(function(entry) {
    return entry && (entry.url || entry.fileName) && String(entry.kind || guessImportedResourceKind(entry.path, entry.label || '')).toLowerCase() === 'meme';
  }).map(function(entry, idx) {
    var src = isImportedImageUrl(entry.url) ? String(entry.url || '').trim() : '';
    var fileName = importedFileNameFromUri(entry.fileName || entry.url || '');
    if (!src && fileName && isLikelyImportedCatboxFileName(fileName)) {
      src = 'https://files.catbox.moe/' + fileName;
    }
    var cleanName = normalizeImportedMemeDisplayName(entry.label, fileName);
    if (!cleanName) return null;
    return {
      id: 'import_meme_' + idx,
      name: cleanName,
      src: src,
      fileName: fileName
    };
  }).filter(Boolean), function(entry) {
    return (String(entry.name || '').trim().toLowerCase() + '::' + String(entry.src || '').trim().toLowerCase() + '::' + String(entry.fileName || '').trim().toLowerCase());
  });

  var ruleBlocks = dedupeImportedEntries(bucket.rules.map(function(entry) {
    return normalizeImportedRuleBlock(entry, '作者规则');
  }).filter(Boolean), function(entry) {
    return (String(entry.title || '') + '::' + String(entry.text || '')).toLowerCase();
  });

  var regexScripts = dedupeImportedRegexEntries(bucket.regex);

  return {
    avatarUrl: avatarResources.length ? String(avatarResources[0].previewData || '').trim() : '',
    importedAvatarResources: avatarResources.slice(0, 24),
    importedMemeResources: memeResources.slice(0, 120),
    importedRuleBlocks: ruleBlocks.slice(0, 20),
    importedRegexScripts: regexScripts.slice(0, 80),
    importedMemeCategory: buildImportedMemeCategory((d && (d.nick || d.nickname || d.name || d.char_name)) || filename),
    authorRulesEnabled: ruleBlocks.length ? true : false,
    regexRulesEnabled: regexScripts.length ? true : false
  };
}

// ── Parse card JSON — handles V1, V2, V3, raw, and nested formats ──
function parseCard(jsonStr, imageData, filename) {
  try {
    // Safety: jsonStr must be a valid string
    if (typeof jsonStr !== 'string' || !jsonStr.trim()) {
      log('解析失败: 收到空内容'); return;
    }
    console.log('[parseCard] preview:', jsonStr.substring(0, 120));
    var raw = JSON.parse(jsonStr);
    var spec = raw.spec || '';
    // V2/V3: data is in raw.data
    var d = (spec && raw.data) ? raw.data : raw;

    // character_book can be in d.character_book or d.data.character_book or d.world_info
    var charBook = d.character_book || (d.data && d.data.character_book) || d.world_info || null;

    // Prefer stable id from card; otherwise mint a fresh one
    var derivedId = d.id || d.character_id || (d.data && d.data.id);
    if (!derivedId) derivedId = 'c_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);

    var importMeta = extractImportedCardMetadata(raw, d, charBook, jsonStr, filename);
    var normalizedGreetings = normalizeImportedGreetingPool(d.first_mes || d.char_greeting || '', d.alternate_greetings || []);

    var card = {
      id: derivedId,
      spec: spec || 'V1',
      name: d.name || d.char_name || filename.replace(/\.(png|json)$/i,'') || 'Unknown',
      nickname: d.nick || d.nickname || '',
      avatar: '🌸',
      avatarUrl: importMeta.avatarUrl || '',
      description: d.description || d.char_persona || '',
      personality: d.personality || '',
      scenario: d.scenario || d.world_scenario || '',
      first_mes: normalizedGreetings[0] || '',
      mes_example: d.mes_example || d.example_dialogue || '',
      system_prompt: d.system_prompt || d.char_system_prompt || '',
      post_history_instructions: d.post_history_instructions || '',
      alternate_greetings: normalizedGreetings.slice(1),
      character_book: charBook,
      tags: d.tags || [],
      creator: d.creator || d.character_creator || '',
      character_version: d.character_version || '',
      spec_version: d.spec_version || '',
      imageData: imageData || null,
      msgMin: d.msg_min || 1,
      msgMax: d.msg_max || 3,
      importedAvatarResources: importMeta.importedAvatarResources || [],
      importedMemeResources: importMeta.importedMemeResources || [],
      importedRuleBlocks: importMeta.importedRuleBlocks || [],
      importedRegexScripts: importMeta.importedRegexScripts || [],
      importedMemeCategory: importMeta.importedMemeCategory || buildImportedMemeCategory(d.name || d.char_name || filename),
      authorRulesEnabled: importMeta.authorRulesEnabled !== false,
      regexRulesEnabled: !!importMeta.regexRulesEnabled,
      regexRulesUserTouched: false,
      ownerAccountId: window.AccountManager ? ((window.AccountManager.getActive()||{}).id || '') : ''
    };
    if(card.imageData && card.imageData.length > 200000){
      console.warn('avatar still large after shrink, dropping imageData');
      card.imageData = null;
    }

    function normalizeImportName(value){
      return String(value || '').trim().toLowerCase().replace(/\s+/g, '');
    }

    function shouldReuseImportedId(existingCard, nextCard){
      if(!existingCard || !nextCard) return false;
      var existingName = normalizeImportName(existingCard.nickname || existingCard.name || '');
      var nextName = normalizeImportName(nextCard.nickname || nextCard.name || '');
      if(!existingName || !nextName) return true;
      return existingName === nextName;
    }

    function mintImportedCharacterId(base){
      var seed = String(base || 'c').trim() || 'c';
      return seed + '__' + Date.now() + '_' + Math.random().toString(36).slice(2, 6);
    }

    async function doImportNow(){
      var storedCard = makeStoredCharacterCard(card);
      var incomingName = normalizeImportName(storedCard.nickname || storedCard.name || '');
      var matchingIdxs = [];
      chars.forEach(function(c, idx){
        if(!(c && c.ownerAccountId === storedCard.ownerAccountId)) return false;
        if(c.id === storedCard.id){
          matchingIdxs.push(idx);
          return;
        }
        if(incomingName && normalizeImportName(c.nickname || c.name || '') === incomingName){
          matchingIdxs.push(idx);
        }
      });
      if (matchingIdxs.length) {
        var existIdx = matchingIdxs[0];
        var existingCard = chars[existIdx];
        if(shouldReuseImportedId(existingCard, storedCard)){
          var oldId = existingCard.id;
          await removeImportedCharacterArtifacts([oldId]);
          card.id = oldId;
          storedCard.id = oldId;
          chars[existIdx] = Object.assign({}, existingCard || {}, card);
          card = chars[existIdx];
          storedCard = makeStoredCharacterCard(card);
          var removedIds = matchingIdxs.slice(1).map(function(idx){
            var item = chars[idx];
            return item && item.id ? String(item.id || '').trim() : '';
          }).filter(Boolean);
          if(removedIds.length){
            chars = chars.filter(function(item, idx){
              return matchingIdxs.indexOf(idx) === -1 || idx === existIdx;
            });
            await removeImportedCharacterArtifacts(removedIds);
          }
        }else{
          card.id = mintImportedCharacterId(card.id || card.name || 'c');
          storedCard.id = card.id;
          chars.push(card);
          log('检测到角色卡 ID 冲突，已为 ' + card.name + ' 分配新身份');
        }
      } else {
        chars.push(card);
      }
      if(card.avatarUrl){
        saveStoredAsset('char_avatar_' + card.id, '');
        avatarAssetCache[card.id] = '';
      }else if(card.imageData){
        saveStoredAsset('char_avatar_' + card.id, card.imageData);
        avatarAssetCache[card.id] = card.imageData;
      }
      if (!(await saveCharsWithFallback(card))) {
        chars = chars.filter(function(c){ return !(c && c.id === card.id && c.ownerAccountId === card.ownerAccountId); });
        renderList();
        updateCount();
        log('导入失败：角色没有保存下来，请先清一点存储空间');
        return;
      }
      if (charBook) autoImportWorldBook(card, charBook);
      var importBits = [];
      if (card.importedAvatarResources && card.importedAvatarResources.length) importBits.push(card.importedAvatarResources.length + ' 个头像');
      if (card.importedMemeResources && card.importedMemeResources.length) importBits.push(card.importedMemeResources.length + ' 个表情包');
      if (card.importedRuleBlocks && card.importedRuleBlocks.length) importBits.push(card.importedRuleBlocks.length + ' 份作者规则');
      if (card.importedRegexScripts && card.importedRegexScripts.length) importBits.push(card.importedRegexScripts.length + ' 份正则');
      log('已导入: ' + card.name + (charBook ? ' · 档案已载入 ✓' : '') +
        (card.alternate_greetings.length ? ' · ' + (card.alternate_greetings.length+1) + '条开场白' : '') +
        (importBits.length ? (' · 扩展：' + importBits.join(' / ')) : ''));
      updateCount(); renderList();
      window.parent.postMessage({ type:'CHARACTER_IMPORTED', payload:card }, '*');
    }

    doImportNow();
    if(window.AccountManager && !isDefaultAccount() && !window.AccountManager.isFriend(card.id)){
      askFriendRequestWithCallbacks(
        card.id,
        function(){ log('好友申请已通过'); },
        function(){ log('好友申请被拒绝，角色已保留，可稍后再试'); }
      );
    }

  } catch(e) {
    log('解析失败: ' + e.message);
    console.error('parseCard error', e, 'json preview:', typeof jsonStr === 'string' ? jsonStr.substring(0,300) : jsonStr);
  }
}

// ── Auto-import world book from card ──
function autoImportWorldBook(card, charBook) {
  try {
    var allWbs = {};
    allWbs = getStoredWorldbooksSnapshot();
    if (!allWbs[card.id]) allWbs[card.id] = [];

    function normalizeWbIdentity(value){
      return String(value || '').trim().toLowerCase().replace(/\s+/g, '');
    }

    function cardWorldbookIdentity(cardData, bookData){
      var cardName = normalizeWbIdentity(cardData && (cardData.nickname || cardData.name || ''));
      var bookName = normalizeWbIdentity(bookData && bookData.name);
      return [cardName, bookName].filter(Boolean).join('::') || cardName || bookName || String(cardData && cardData.id || '');
    }

    var wbId = 'wb_card_' + card.id;
    var latestIdentity = cardWorldbookIdentity(card, charBook);

    Object.keys(allWbs).forEach(function(bucketKey){
      var list = Array.isArray(allWbs[bucketKey]) ? allWbs[bucketKey] : [];
      allWbs[bucketKey] = list.filter(function(wb){
        if(!wb || !wb._autoImportedFromCard) return true;
        if(String(wb.id || '') === wbId) return false;
        return String(wb._cardIdentity || '') !== latestIdentity;
      });
    });
    if (!allWbs[card.id]) allWbs[card.id] = [];

    var rawEntries = charBook.entries || charBook;
    var entries = [];

    if (Array.isArray(rawEntries)) {
      rawEntries.forEach(function(e, i) {
        entries.push(makeWBEntry(e, i));
      });
    } else if (typeof rawEntries === 'object' && rawEntries !== null) {
      // Sometimes keyed by index: {"0": {...}, "1": {...}}
      Object.keys(rawEntries).sort().forEach(function(k, i) {
        entries.push(makeWBEntry(rawEntries[k], i));
      });
    }

    if (entries.length > 0) {
      // Hard cap to avoid blowing localStorage (keep first N and limit total text)
      var maxEntries = 80;
      var maxChars = 120000; // ~120 KB of text
      var trimmed = [];
      var accLen = 0;
      for (var i=0;i<entries.length && trimmed.length<maxEntries;i++){
        var e = entries[i];
        var len = (e.content||'').length;
        if (accLen + len > maxChars) break;
        trimmed.push(e); accLen += len;
      }

      allWbs[card.id].unshift({
        id: wbId,
        name: (charBook.name || card.name) + ' 档案',
        _autoImportedFromCard: true,
        _cardIdentity: latestIdentity,
        global: false,
        entries: trimmed
      });
      if(window.MetadataStore && typeof window.MetadataStore.saveWorldbooks === 'function'){
        window.MetadataStore.saveWorldbooks(allWbs).catch(function(){
          log('档案太大，未全部导入（存储超限）');
        });
      }else if (!safeSet('worldbooks', JSON.stringify(allWbs))) {
        log('档案太大，未全部导入（存储超限）');
      }
    }
  } catch(e) {
    console.warn('autoImportWorldBook error', e);
    log('档案导入失败：' + (e.message||e));
  }
}

function makeWBEntry(e, idx) {
  var keys = e.key || e.keys || e.keywords || [];
  if (typeof keys === 'string') keys = keys.split(',').map(function(k){return k.trim();}).filter(Boolean);
  var title = e.comment || e.name || e.title || (keys[0] || ('条目 ' + (idx+1)));
  return {
    id: 'wi_' + idx + '_' + Date.now(),
    enabled: !(e.disable || e.disabled || e.enabled === false),
    title: String(title),
    content: String(e.content || e.value || e.text || ''),
    keywords: Array.isArray(keys) ? keys.join(', ') : String(keys || ''),
    position: mapPos(e.position),
    order: e.order || e.insertion_order || idx
  };
}

function mapPos(p) {
  // SillyTavern positions: 0=before_char, 1=after_char, 2=author_note(mid), 3=before_example, 4=after_example
  if (p === 0 || p === 'before_char' || p === 'before') return 'before';
  if (p === 2 || p === 'author_note' || p === 'mid') return 'mid';
  return 'after';
}

// ── Drag & Drop ──
document.addEventListener('dragover', function(e){ e.preventDefault(); document.getElementById('dropOverlay').classList.add('active'); });
document.addEventListener('dragleave', function(e){ if(!e.relatedTarget) document.getElementById('dropOverlay').classList.remove('active'); });
document.addEventListener('drop', function(e){
  e.preventDefault();
  document.getElementById('dropOverlay').classList.remove('active');
  onFiles(e.dataTransfer.files);
});

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

var logTimer = null;
function log(msg) {
  var el = document.getElementById('importLog');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(logTimer);
  logTimer = setTimeout(function(){ el.classList.remove('show'); }, 3500);
}

function normalizeHeartText(value) {
  return typeof value === 'string' ? value.replace(/\u2665(\uFE0E|\uFE0F)?/g, '\u2665\uFE0E') : value;
}

document.addEventListener('input', function(e){
  var target = e.target;
  if(!target || (target.tagName !== 'INPUT' && target.tagName !== 'TEXTAREA')) return;
  if(!('value' in target)) return;
  var next = normalizeHeartText(target.value);
  if(next === target.value) return;
  var start = target.selectionStart;
  var end = target.selectionEnd;
  target.value = next;
  try{ target.setSelectionRange(start, end); }catch(err){}
}, true);

Promise.resolve(window.MetadataStore && typeof window.MetadataStore.init === 'function' ? window.MetadataStore.init() : null)
  .catch(function(){ return null; })
  .then(function(){
    load(); hydrateAvatarAssets(); renderList();
  });
</script>
