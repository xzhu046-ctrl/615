<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>朋友圈</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
<script src="../accountManager.js?v=2026-04-29T10:54:00Z"></script>
<script src="../assetStore.js?v=2026-04-29T10:54:00Z"></script>
<script src="../chatStorage.js?v=2026-04-29T10:54:00Z"></script>
<script src="../metadataStore.js?v=2026-04-29T10:54:00Z"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --b:#0a0a0a;--w:#fff;--off:#f7f7f7;--g:#6f6f6f;
  --bd:2px solid #0a0a0a;--sh:2px 2px 0 #0a0a0a;
  --font:'Quicksand',sans-serif;--fontd:'Nunito',sans-serif;
  --safe-top:max(env(safe-area-inset-top),0px);
  --safe-bottom:max(env(safe-area-inset-bottom),0px);
}
html,body{width:100%;max-width:100%;height:100%}
body{font-family:var(--font);background:var(--off);color:var(--b);min-height:100vh;display:flex;flex-direction:column;overflow:hidden}
button,input,textarea{font-family:inherit;color:inherit}
button{-webkit-appearance:none;appearance:none;-webkit-touch-callout:none}

.main{position:relative;flex:1;min-height:0;overflow:hidden}

.hero{position:absolute;left:12px;right:12px;top:calc(-1px + var(--safe-top));z-index:10;min-height:298px;border:3px solid #111;background:#fff;box-shadow:3px 3px 0 rgba(0,0,0,.12),0 0 0 7px rgba(255,255,255,.88) inset;overflow:hidden}
.moments-captcha{position:relative;height:298px;padding:12px;background:linear-gradient(180deg,#fff,#f7f7f7);overflow:hidden}
.captcha-prompt{position:relative;height:96px;border:2px solid #111;background:#111;color:#fff;padding:14px 18px;display:flex;flex-direction:column;justify-content:center;box-shadow:inset 0 0 0 1px rgba(255,255,255,.22)}
.captcha-kicker{font-family:var(--fontd);font-size:18px;font-weight:900;line-height:1;letter-spacing:.04em}
.captcha-target{align-self:flex-start;margin-top:8px;border:none;background:transparent;color:#fff;font-family:'ZCOOL KuaiLe','Nunito',sans-serif;font-size:31px;font-weight:900;line-height:1;letter-spacing:.06em;cursor:pointer;text-decoration-line:underline;text-decoration-style:dashed;text-decoration-thickness:4px;text-underline-offset:7px;text-decoration-color:rgba(255,255,255,.72)}
.captcha-target:focus{outline:none;text-decoration-style:solid}
.captcha-sub{display:none}
.captcha-grid{display:flex;gap:7px;margin-top:10px;overflow-x:auto;scroll-snap-type:x mandatory;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.captcha-grid::-webkit-scrollbar{display:none}
.captcha-tile{position:relative;flex:0 0 calc((100% - 14px) / 3);aspect-ratio:1/1;border:2px solid #111;background:center/cover no-repeat #e9e9e9;cursor:pointer;overflow:hidden;box-shadow:1px 1px 0 #111;scroll-snap-align:start}
.captcha-tile::before{content:"";position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.18),transparent 45%,rgba(0,0,0,.14));mix-blend-mode:multiply;pointer-events:none}
.captcha-tile::after{content:"";position:absolute;left:5px;top:5px;width:13px;height:13px;border:2px solid rgba(255,255,255,.92);background:rgba(0,0,0,.18);box-shadow:0 0 0 1px rgba(0,0,0,.34)}
.captcha-dots{display:flex;align-items:center;justify-content:center;gap:6px;height:14px;margin-top:5px}
.captcha-dot{width:6px;height:6px;border:1.5px solid #111;border-radius:999px;background:#fff}
.captcha-dot.active{background:#111}
.captcha-controls{display:flex;align-items:center;justify-content:space-between;margin-top:3px}
.captcha-icons{display:flex;align-items:center;gap:17px;color:#111}
.captcha-icon{width:30px;height:30px;display:grid;place-items:center;border:0;background:transparent;padding:0;cursor:pointer}
.captcha-icon img{width:26px;height:26px;object-fit:contain;display:block;filter:grayscale(1) contrast(1.2)}
.captcha-icon:nth-child(2) img{width:22px;height:22px}
.captcha-icon:active{transform:translate(1px,1px)}
.captcha-verify{min-width:108px;height:38px;border:2px solid #111;background:#111;color:#fff;box-shadow:2px 2px 0 rgba(0,0,0,.38);font-family:var(--fontd);font-size:15px;font-weight:900;letter-spacing:.08em;cursor:pointer}
.captcha-verify:active{transform:translate(1px,1px);box-shadow:1px 1px 0 rgba(0,0,0,.38)}
.moment-action-toolbar{position:absolute;right:12px;bottom:10px;z-index:20;display:flex;gap:6px}
.tiny-btn{border:2px solid #111;background:#fff;border-radius:999px;box-shadow:2px 2px 0 rgba(8,8,8,.88);width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.tiny-btn:active{transform:translate(1px,1px);box-shadow:1px 1px 0 #0a0a0a}
.tiny-btn img{width:16px;height:16px;object-fit:contain;display:block;filter:brightness(0) contrast(1.4)}
.tiny-btn.plus-btn{background:#fff;color:#111;border-color:#111;font-family:var(--fontd);font-size:22px;font-weight:900;line-height:1;box-shadow:2px 2px 0 rgba(8,8,8,.88)}
.tiny-btn.delete-active{background:#111}
.tiny-btn.delete-active img{filter:brightness(0) invert(1)}
@media (max-width:360px){
  .hero{left:8px;right:8px}
  .moments-captcha{padding:10px}
  .captcha-prompt{height:92px;padding:12px 16px}
  .captcha-target{font-size:28px}
  .captcha-grid{gap:6px;margin-top:10px}
  .captcha-tile{flex-basis:calc((100% - 12px) / 3)}
  .captcha-controls{margin-top:10px}
  .captcha-icons{gap:14px}
}

.feed-wrap{position:absolute;left:12px;right:12px;top:calc(305px + var(--safe-top));bottom:0;overflow:auto;padding-bottom:calc(108px + var(--safe-bottom))}

.feed{display:flex;flex-direction:column;gap:10px}
.post{width:100%;margin:0 auto;border:none;border-radius:0;background:#fff;box-shadow:none;padding:20px 10px 22px;display:flex;flex-direction:column;gap:14px}
.post.delete-mode{position:relative;padding-left:44px}
.post-select{position:absolute;left:12px;top:14px;width:22px;height:22px;border-radius:999px;border:var(--bd);background:#fff;box-shadow:1px 1px 0 #0a0a0a;font-family:var(--fontd);font-size:12px;font-weight:900;line-height:1;display:flex;align-items:center;justify-content:center;cursor:pointer}
.post-select.selected{background:#d73c3c;color:#fff}
.post-head{display:flex;align-items:center;justify-content:flex-start;gap:10px}
.post-left{display:flex;align-items:center;gap:12px;min-width:0}
.post-av{width:48px;height:48px;border:none;border-radius:999px;background:center/cover no-repeat #111;box-shadow:none;flex-shrink:0;color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--fontd);font-size:15px;font-weight:900;letter-spacing:.04em}
.post-name{font-family:var(--fontd);font-size:17px;font-weight:900;letter-spacing:0}
.post-time{margin-top:2px;font-size:12px;color:#8a8a8a;font-weight:900;letter-spacing:.14em;text-transform:uppercase}
.post-text{font-size:20px;font-weight:500;line-height:1.55;white-space:pre-wrap;word-break:break-word;color:#111;letter-spacing:0}
.moment-translate-wrap{display:flex;flex-direction:column;align-items:flex-start;gap:7px}
.moment-translate-btn{min-width:0;height:26px;padding:0;border:none;border-radius:0;background:transparent;color:#6d6d6d;font-family:var(--fontd);font-size:13px;font-weight:900;letter-spacing:0;box-shadow:none;cursor:pointer}
.moment-translate-btn:active{transform:translate(1px,1px);box-shadow:0 0 0}
.moment-translate-btn:disabled{opacity:.58;cursor:default}
.moment-translation-card{width:100%;margin-top:4px;padding:4px 0 4px 18px;border:none;border-left:3px solid #e4e4e4;border-radius:0;background:transparent;color:#5f5f5f;box-shadow:none}
.moment-translation-kicker{display:none}
.moment-translation-pill{display:none}
.moment-translation-sub{display:none}
.moment-translation-body{padding-top:0;border-top:0;font-size:15px;font-weight:500;line-height:1.65;color:#666;white-space:pre-wrap;word-break:break-word}
.post-action-row{display:flex;align-items:center;justify-content:flex-start;gap:22px;color:#555}
.like-text{display:none}
.like-btn,.comment-jump-btn,.share-btn{border:none;border-radius:0;background:transparent;box-shadow:none;padding:0;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;color:#555;font-size:15px;font-weight:700;-webkit-tap-highlight-color:transparent;outline:none}
.like-btn:focus,.like-btn:focus-visible,.comment-jump-btn:focus,.comment-jump-btn:focus-visible,.share-btn:focus,.share-btn:focus-visible{outline:none;box-shadow:none}
.like-btn:active{transform:none;box-shadow:none}
.like-btn svg,.comment-jump-btn svg,.share-btn svg{width:24px;height:24px;display:block;fill:none;stroke:#666;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
.like-btn.liked svg{fill:#d83b3b;stroke:#d83b3b}
.like-btn.liked svg,.like-btn.cat-liked .like-cat-icon{animation:qqLikePop .52s cubic-bezier(.2,1.55,.36,1)}
.like-cat-icon{width:26px;height:26px;object-fit:contain;display:block;filter:grayscale(1) contrast(1.16)}
@keyframes qqLikePop{
  0%{transform:scale(.45) rotate(-12deg);opacity:.45}
  45%{transform:scale(1.42) rotate(8deg);opacity:1}
  68%{transform:scale(.88) rotate(-4deg)}
  84%{transform:scale(1.12) rotate(2deg)}
  100%{transform:scale(1) rotate(0)}
}
.image-card-button{width:138px;height:138px;border:var(--bd);border-radius:22px;background:center/contain no-repeat url('assets/樱花.jpg');background-color:#fff;box-shadow:var(--sh);cursor:pointer;position:relative;overflow:hidden}
.image-card-button::after{content:'查看';position:absolute;right:10px;bottom:10px;padding:4px 8px;border:1.5px solid var(--b);border-radius:999px;background:rgba(255,255,255,.92);font-family:var(--fontd);font-size:10px;font-weight:900;line-height:1;color:var(--b)}
.post-image-button{width:100%;border:none;border-radius:8px;background:#f1f1f1;box-shadow:none;padding:0;cursor:pointer;overflow:hidden;position:relative}
.post-image-button:active{transform:translateY(1px);box-shadow:none}
.post-image-real{display:block;width:100%;aspect-ratio:1/1;max-height:none;object-fit:cover;background:#f2f2f2;filter:grayscale(.18) saturate(.74) contrast(.98)}
.post-image-button.contain .post-image-real{object-fit:contain}
.post-image-button::after{display:none}
.comment-box{border-top:0;padding:18px 14px;display:flex;flex-direction:column;gap:12px;background:#f7f7f7;border-radius:22px;box-shadow:0 12px 28px rgba(0,0,0,.04)}
.comment-list{display:flex;flex-direction:column;gap:14px}
.comment-item{background:transparent;border:none;border-radius:0;padding:0;font-size:14px;font-weight:500;line-height:1.5;cursor:pointer;display:flex;align-items:flex-start;gap:10px;color:#222}
.comment-item.reply-comment{margin-left:40px}
.comment-item:active{transform:translate(1px,1px)}
.comment-av{width:30px;height:30px;border:none;border-radius:999px;background:center/cover no-repeat #777;box-shadow:none;flex-shrink:0;color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--fontd);font-size:10px;font-weight:900}
.comment-main{min-width:0;flex:1}
.comment-main strong{font-size:14px;font-weight:900}
.comment-del{width:20px;height:20px;border:none;border-radius:999px;background:transparent;color:#999;box-shadow:none;display:flex;align-items:center;justify-content:center;font-family:var(--fontd);font-size:12px;font-weight:900;line-height:1;flex-shrink:0;cursor:pointer}
.comment-del:active{transform:translate(1px,1px);box-shadow:none}
.name-accent{color:#111;text-decoration-line:underline;text-decoration-style:dashed;text-decoration-thickness:2px;text-underline-offset:4px;text-decoration-color:#111}
.reply-word{color:#888;font-weight:700;margin:0 2px}
.comment-compose{display:flex;flex-direction:column;gap:6px}
.comment-input-row{display:flex;gap:6px}
.comment-input{flex:1;border:none;border-bottom:1.5px solid #d6d6d6;border-radius:0;padding:8px 0;background:transparent;font-size:13px;font-weight:600;outline:none}
.comment-btn{border:none;border-radius:999px;background:#111;color:#fff;box-shadow:none;padding:8px 12px;font-family:var(--fontd);font-size:11px;font-weight:900;cursor:pointer}
.comment-btn:active{transform:translate(1px,1px);box-shadow:1px 1px 0 #0a0a0a}
.reply-preview{display:flex;align-items:center;gap:6px;border:var(--bd);border-radius:10px;background:#fff;box-shadow:1px 1px 0 #0a0a0a;padding:5px 7px}
.reply-preview-text{flex:1;min-width:0;font-size:10px;font-weight:800;color:#555;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.reply-preview-close{width:18px;height:18px;border:var(--bd);border-radius:999px;background:#fff;box-shadow:1px 1px 0 #0a0a0a;font-family:var(--fontd);font-size:12px;font-weight:900;line-height:1;display:flex;align-items:center;justify-content:center;cursor:pointer}
.reply-preview-close:active{transform:translate(1px,1px);box-shadow:none}
.empty{width:calc(100% - 6px);margin:0 auto;border:none;background:transparent;padding:16px;text-align:center;color:#111;font-size:14px;font-weight:900;text-decoration-line:underline;text-decoration-style:dashed;text-decoration-thickness:4px;text-underline-offset:6px;text-decoration-color:#111}

.qq-bottom-nav{position:fixed;left:12px;right:12px;bottom:calc(10px + var(--safe-bottom));z-index:90;display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
.qq-bottom-btn > span:not(.nav-icon){display:none}
.qq-bottom-btn{gap:0;font-size:0}
.qq-bottom-btn{border:none;background:transparent;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:#7a7a80;font-family:var(--fontd);font-size:10px;font-weight:900;cursor:pointer}
.qq-bottom-btn:active{transform:translateY(1px)}
.qq-bottom-btn .nav-icon{width:46px;height:46px;border:2px solid #111;border-radius:999px;background:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 10px 20px rgba(0,0,0,.12)}
.qq-bottom-btn .nav-icon img{width:28px;height:28px;object-fit:contain;display:block;filter:brightness(0)}
.qq-bottom-btn.active{color:#111}
.qq-bottom-btn.active .nav-icon{background:#111}
.qq-bottom-btn.active .nav-icon img{filter:brightness(0) invert(1)}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.28);display:none;align-items:center;justify-content:center;padding:20px;z-index:120}
.overlay.open{display:flex}
.modal{width:min(330px,100%);border:var(--bd);border-radius:20px;background:#fff;box-shadow:5px 5px 0 #0a0a0a;padding:14px;display:flex;flex-direction:column;gap:10px}
.modal-title{font-family:var(--fontd);font-size:16px;font-weight:900}
.modal-sub{font-size:12px;font-weight:700;color:#666;line-height:1.5}
.mode-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mode-btn{border:var(--bd);border-radius:12px;box-shadow:var(--sh);padding:10px 8px;font-family:var(--fontd);font-size:13px;font-weight:900;cursor:pointer}
.mode-btn.black{background:var(--w);color:var(--b)}
.mode-btn:active{transform:translate(1px,1px);box-shadow:1px 1px 0 #0a0a0a}
.modal textarea{width:100%;min-height:84px;resize:none;border:var(--bd);border-radius:12px;background:var(--off);padding:10px 12px;font-size:13px;font-weight:700;outline:none}
.helper-row{display:flex;justify-content:space-between;align-items:center;gap:8px}
.add-image-btn{border:var(--bd);border-radius:10px;background:#0a0a0a;color:#fff;box-shadow:var(--sh);padding:8px 10px;font-family:var(--fontd);font-size:12px;font-weight:900;cursor:pointer}
.add-image-btn:active{transform:translate(1px,1px);box-shadow:1px 1px 0 #0a0a0a}
.image-preview-wrap{display:none;align-items:center;gap:10px}
.image-preview-wrap.show{display:flex}
.image-preview-thumb{width:74px;height:74px;border:var(--bd);border-radius:14px;background:center/cover no-repeat url('assets/樱花.jpg');background-color:#fff;box-shadow:var(--sh);position:relative;overflow:hidden}
.image-preview-thumb::after{content:'图';position:absolute;right:5px;bottom:5px;background:rgba(255,255,255,.9);border:1.5px solid #111;border-radius:8px;padding:1px 5px;font-size:9px;font-family:var(--fontd);font-weight:900}
.image-preview-thumb.has-real-image{background-size:cover;background-position:center;background-repeat:no-repeat}
.image-preview-thumb.has-real-image::after{content:'已选'}
.image-preview-text{font-size:11px;font-weight:700;line-height:1.4;color:#555;white-space:pre-wrap;word-break:break-word;max-height:160px;overflow:auto}
.footer-actions{display:flex;gap:8px}
.footer-btn{flex:1;border:var(--bd);border-radius:12px;background:var(--w);color:var(--b);box-shadow:var(--sh);padding:10px 8px;font-family:var(--fontd);font-size:13px;font-weight:900;cursor:pointer}
.footer-btn.black{background:var(--w);color:var(--b)}
.footer-btn:active{transform:translate(1px,1px);box-shadow:1px 1px 0 #0a0a0a}

.image-view-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;z-index:140;padding:18px}
.image-view-overlay.open{display:flex}
.image-view-card{width:min(328px,100%);max-height:min(78vh,620px);background:var(--w);border:var(--bd);border-radius:20px;box-shadow:var(--sh);padding:14px;display:flex;flex-direction:column;gap:12px}
.image-view-header{display:flex;align-items:center;justify-content:space-between;gap:8px}
.image-view-title{font-family:var(--fontd);font-size:14px;font-weight:900}
.image-view-close{width:30px;height:30px;border-radius:999px;border:var(--bd);background:var(--w);box-shadow:1px 1px 0 var(--b);font-size:16px;font-weight:900;cursor:pointer}
.image-view-close:active{transform:translate(1px,1px);box-shadow:0 0 0}
.image-view-content{display:flex;flex-direction:column;gap:10px;min-height:0;overflow:auto;padding-right:2px}
.image-view-real-wrap{display:none;border:var(--bd);border-radius:18px;background:#fff;box-shadow:var(--sh);overflow:hidden}
.image-view-real-wrap.show{display:block}
.image-view-real{display:block;width:100%;max-height:min(52vh,420px);object-fit:contain;background:#f4f4f4}
.image-view-paper{border:var(--bd);border-radius:18px;background:linear-gradient(180deg,#fff 0%,#f6f6f6 100%);padding:16px;box-shadow:inset 0 0 0 1px #dcdcdc}
.image-view-text{font-size:13px;font-weight:700;line-height:1.75;color:var(--b);white-space:pre-wrap;word-break:break-word}
.image-view-translate-wrap{display:flex;flex-direction:column;align-items:flex-start;gap:8px}
.image-view-translation-body .moment-translation-body{max-height:min(28vh,220px);overflow:auto;padding-right:2px}

.toast{position:fixed;left:50%;bottom:88px;transform:translateX(-50%) translateY(10px);background:#0a0a0a;color:#fff;padding:8px 14px;border-radius:999px;font-size:12px;font-weight:800;opacity:0;transition:all .2s;pointer-events:none;z-index:160}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.char-profile-overlay{position:fixed;inset:0;background:rgba(0,0,0,.28);display:none;z-index:150;align-items:stretch;justify-content:flex-start}
.char-profile-overlay.open{display:flex}
.char-profile-panel{width:min(372px,92vw);height:100%;background:#fff;border-right:3px solid #111;box-shadow:8px 0 0 rgba(0,0,0,.22);overflow:auto;display:flex;flex-direction:column}
.char-profile-top{position:relative;min-height:242px;border-bottom:var(--bd);background:#f4f4f4;overflow:hidden}
.char-profile-cover{height:154px;background:center/cover no-repeat linear-gradient(135deg,#f8f8f8,#dcdcdc);border-bottom:var(--bd);cursor:pointer}
.char-profile-back{position:absolute;left:12px;top:calc(12px + var(--safe-top));width:34px;height:34px;border:var(--bd);border-radius:999px;background:#fff;box-shadow:var(--sh);font-size:20px;font-weight:900;line-height:1;z-index:2}
.char-profile-avatar{position:absolute;left:50%;top:104px;transform:translateX(-50%);width:92px;height:92px;border:var(--bd);border-radius:999px;background:center/cover no-repeat #eee;box-shadow:0 0 0 7px #fff,4px 4px 0 #111}
.char-profile-info{padding:54px 18px 16px;text-align:center}
.char-profile-name{font-family:var(--fontd);font-size:22px;font-weight:900;letter-spacing:.01em}
.char-profile-sign{margin-top:6px;font-size:12px;font-weight:800;color:#666;line-height:1.45}
.char-profile-stats{display:flex;justify-content:center;gap:34px;margin-top:14px}
.char-profile-stat{font-family:var(--fontd);font-size:18px;font-weight:900}
.char-profile-stat span{display:block;margin-top:2px;font-size:9px;font-weight:900;letter-spacing:.22em;color:#aaa}
.char-profile-section{padding:16px 16px 26px;display:flex;flex-direction:column;gap:12px}
.char-profile-kicker{font-family:var(--fontd);font-size:11px;font-weight:900;letter-spacing:.18em;color:#888;text-transform:uppercase}

const REPLY_LANGUAGE_OPTIONS = {
  zh:{ value:'zh', label:'中文', nativeLabel:'简体中文' },
  en:{ value:'en', label:'英语', nativeLabel:'English' },
  fr:{ value:'fr', label:'法语', nativeLabel:'Francais' },

function scopedKey(base){
  if(window.AccountManager){
    window.AccountManager.ensure();
    return window.AccountManager.scopedKey(base);
  }
  return base;
}
function getAccountIdCandidates(){
  const ids = [];
  try{
    if(window.AccountManager){
      window.AccountManager.ensure();
      const active = window.AccountManager.getActive ? window.AccountManager.getActive() : null;
      const defaultId = window.AccountManager.getDefaultId ? window.AccountManager.getDefaultId() : '';
      if(active && active.id) ids.push(String(active.id));
      if(defaultId) ids.push(String(defaultId));
      const accounts = window.AccountManager.loadAccounts ? window.AccountManager.loadAccounts() : [];
      if(Array.isArray(accounts)){
        accounts.forEach((account)=>{
          if(account && account.id) ids.push(String(account.id));
        });
      }
    }
  }catch(e){}
  return Array.from(new Set(ids.filter(Boolean)));
}
function storageKeyCandidates(base){
  const raw = String(base || '').trim();
  const keys = raw ? [raw] : [];
  getAccountIdCandidates().forEach((id)=>{
    if(raw) keys.push(raw + '__acct_' + id);
  });
  if(raw) keys.unshift(scopedKey(raw));
  return Array.from(new Set(keys.filter(Boolean)));
}
function lsGet(base){
  return localStorage.getItem(scopedKey(base));
}
function lsSet(base, val){
  localStorage.setItem(scopedKey(base), val);
}
function lsRemove(base){
  localStorage.removeItem(scopedKey(base));
}
function activeProfile(){
  if(window.AccountManager){
    window.AccountManager.ensure();
    return window.AccountManager.getActive();
  }
  return { name: DEFAULT_BUBBLE_NAME, avatar: '' };
}

function esc(s){
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function normalizeReplyLanguage(value){
  const safe = String(value || 'zh').trim().toLowerCase();
  return REPLY_LANGUAGE_OPTIONS[safe] ? safe : 'zh';
}
function normalizeTranslationMode(value){
  return String(value || '').trim().toLowerCase() === 'prefetch' ? 'prefetch' : 'ondemand';
}

function getReplyLanguageOption(value){
  return REPLY_LANGUAGE_OPTIONS[normalizeReplyLanguage(value)];
}

function getStoredCharactersSnapshot(){
  try{
    const list = JSON.parse(localStorage.getItem('characters') || '[]');
    return Array.isArray(list) ? list : [];
  }catch(e){
    return [];
  }
}

function getActiveAccountId(){
  try{
    if(window.AccountManager){
      window.AccountManager.ensure();
      const active = window.AccountManager.getActive ? window.AccountManager.getActive() : null;
      return String((active && active.id) || '').trim();
    }
  }catch(e){}
  return '';
}

function accountScopedRawKey(base){
  const accountId = getActiveAccountId();
  return accountId ? (String(base || '') + '__acct_' + accountId) : String(base || '');
}

function getCharacterById(charId){
  const id = String(charId || '').trim();
  if(!id) return null;
  const activeAccountId = getActiveAccountId();
  const roster = getStoredCharactersSnapshot();
  return roster.find((item)=>{
    if(!item || String(item.id || '').trim() !== id) return false;
    const owner = String(item.ownerAccountId || '').trim();
    return !activeAccountId || !owner || owner === activeAccountId;
  }) || roster.find((item)=>item && String(item.id || '').trim() === id) || null;
}

function getActiveChatCharacter(){
  const idKeys = [
    scopedKey('activeChatCharacterId'),
    'activeChatCharacterId',
    scopedKey(STORAGE_PROFILE_CHAR),
    STORAGE_PROFILE_CHAR
  ];
  for(const key of idKeys){
    try{
      const id = String(localStorage.getItem(key) || '').trim();
      const found = getCharacterById(id);
      if(found) return found;
    }catch(e){}
  }
  const rawKeys = [scopedKey('activeCharacter'), 'activeCharacter'];
  for(const key of rawKeys){
    try{
      const parsed = JSON.parse(localStorage.getItem(key) || 'null');
      const found = parsed && parsed.id ? getCharacterById(parsed.id) : null;
      if(found) return found;
    }catch(e){}
  }
  return null;
}

function getCharacterDisplayName(char){
  return String((char && (char.nickname || char.name)) || '').trim() || 'CHAR';
}

function getCharacterAvatarSource(char){
  return String((char && (char.imageData || char.avatar || char.avatarUrl || char.photo || char.icon)) || '').trim();
}

function avatarVisionEnabledForChar(charId){
  const raw = 'avatar_vision_enabled_' + String(charId || '').trim();
  const keys = [scopedKey(raw), accountScopedRawKey(raw), raw];
  for(const key of Array.from(new Set(keys.filter(Boolean)))){
    try{
      const value = localStorage.getItem(key);
      if(value === '1') return true;
      if(value === '0') return false;
    }catch(e){}
  }
  return false;
}

function resolveMomentAuthorMeta(post){
  const next = Object.assign({}, post || {});
  const charId = String(next.charId || '').trim();
  const authorName = String(next.authorName || '').trim();
  let translationEnabled = next.translationEnabled != null ? !!next.translationEnabled : false;
  let replyLanguage = normalizeReplyLanguage(next.replyLanguage || 'zh');
  let translationMode = normalizeTranslationMode(next.translationMode || 'ondemand');
  const activeAccountId = (()=>{ try{ return String(((window.AccountManager && window.AccountManager.getActive && window.AccountManager.getActive()) || {}).id || '').trim(); }catch(e){ return ''; } })();
  const roster = getStoredCharactersSnapshot();
  let found = null;
  if(charId){
    found = roster.find((item)=>{
      if(!item || String(item.id || '').trim() !== charId) return false;
      const owner = String(item.ownerAccountId || '').trim();
      return !activeAccountId || !owner || owner === activeAccountId;
    }) || roster.find((item)=> item && String(item.id || '').trim() === charId) || null;
  }
  if(!found && authorName){
    found = roster.find((item)=>{
      if(!item) return false;
      const owner = String(item.ownerAccountId || '').trim();
      if(activeAccountId && owner && owner !== activeAccountId) return false;
      const names = [item.nickname, item.name].map((value)=>String(value || '').trim()).filter(Boolean);
      return names.indexOf(authorName) !== -1;
    }) || null;
  }
  if(found){
    next.charId = String(next.charId || found.id || '');
    translationEnabled = found.translationEnabled != null ? !!found.translationEnabled : translationEnabled;
    replyLanguage = normalizeReplyLanguage(found.replyLanguage || found.language || replyLanguage);
    translationMode = normalizeTranslationMode(found.translationMode || translationMode);
  }
  next.translationEnabled = !!translationEnabled;
  next.replyLanguage = replyLanguage;
  next.translationMode = translationMode;
  return next;
}

function shouldOfferMomentTranslation(post){
  const resolved = resolveMomentAuthorMeta(post);
  return !!(resolved.translationEnabled && normalizeReplyLanguage(resolved.replyLanguage) !== 'zh');
}
function shouldPrefetchMomentTranslation(post){
  const resolved = resolveMomentAuthorMeta(post);
  return !!(resolved.translationEnabled && normalizeReplyLanguage(resolved.replyLanguage) !== 'zh' && normalizeTranslationMode(resolved.translationMode) === 'prefetch');
}

function getMomentTranslationState(post){
  const resolved = resolveMomentAuthorMeta(post);
  const translation = resolved.translation && typeof resolved.translation === 'object' ? resolved.translation : {};
  return {
    post: resolved,
    translation: translation,
    option: getReplyLanguageOption(resolved.replyLanguage)
  };
}

function buildMomentTranslationCardHtml(text, sourceLabel, extraClass){
  const safeText = String(text || '').trim();
  if(!safeText) return '';
  return '<div class="moment-translation-card' + (extraClass ? (' ' + extraClass) : '') + '">'
    + '<div class="moment-translation-kicker"><span class="moment-translation-pill">TRANSLATION</span><span class="moment-translation-sub">' + esc(sourceLabel || '简体中文') + '</span></div>'
    + '<div class="moment-translation-body">' + esc(safeText) + '</div>'
    + '</div>';
}

function getMomentsAiHost(){
  const hosts = [];
  try{ if(window.parent && window.parent !== window) hosts.push(window.parent); }catch(e){}
  try{ if(window.top && window.top !== window && hosts.indexOf(window.top) === -1) hosts.push(window.top); }catch(e){}
  for(const host of hosts){
    try{
      if(host && typeof host.getBackgroundProviderConfig === 'function' && typeof host.callAiForBackground === 'function'){
        return host;
      }
    }catch(e){}
  }
  return null;
}

async function callMomentsAi(systemPrompt, userPrompt){
  const host = getMomentsAiHost();
  if(!host) throw new Error('no ai host');
  const cfg = host.getBackgroundProviderConfig();
  if(!cfg) throw new Error('missing provider config');
  return host.callAiForBackground(cfg, systemPrompt, userPrompt);
}

function parseMomentTranslationResult(raw){
  let text = String(raw || '').trim();
  if(!text) return '';
  if(text.startsWith('```')){
    text = text.replace(/^```[a-zA-Z]*\s*/, '');
    if(text.endsWith('```')) text = text.slice(0, -3);
    text = text.trim();
  }
  try{
    const obj = JSON.parse(text);
    if(obj && typeof obj === 'object'){
      return String(obj.translation || obj.text || obj.content || '').trim();
    }
  }catch(e){}
  return text.replace(/^["'“”‘’]+|["'“”‘’]+$/g, '').trim();
}

const momentTranslationPrefetchQueue = Object.create(null);
async function requestMomentTranslation(postId, field, options){
  const posts = getPosts();
  const idx = posts.findIndex((item)=>String(item && item.id || '') === String(postId || ''));
  if(idx === -1) return;
  const post = resolveMomentAuthorMeta(posts[idx]);
  const opts = options || {};
  if(!shouldOfferMomentTranslation(post)) return;
  const sourceText = String(field === 'imageText' ? post.imageText : post.text || '').trim();
  if(!sourceText) return;
  const translation = Object.assign({}, post.translation || {});
  if(field === 'imageText') translation.imageLoading = true;
  else translation.textLoading = true;
  if(field === 'imageText') translation.imageVisible = opts.showOnReady !== false;
  else translation.textVisible = opts.showOnReady !== false;
  post.translation = translation;
  posts[idx] = post;
  savePosts(posts);
  renderFeed();
  renderImageViewer();
  try{
    const option = getReplyLanguageOption(post.replyLanguage);
    const systemPrompt = [
      '你是翻译器，只把原文翻成自然简体中文。',
      '只返回 JSON：{"translation":"..."}，不要解释，不要 markdown，不要括号前后缀。'
    ].join('\n');
    const userPrompt = JSON.stringify({
      sourceLanguage: option && option.nativeLabel ? option.nativeLabel : post.replyLanguage,
      field: field === 'imageText' ? '动态图片描述' : '朋友圈正文',
      text: sourceText
    });
    const translated = parseMomentTranslationResult(await callMomentsAi(systemPrompt, userPrompt));
    if(!translated) throw new Error('empty translation');
    const latestPosts = getPosts();
    const latestIdx = latestPosts.findIndex((item)=>String(item && item.id || '') === String(postId || ''));
    if(latestIdx === -1) return;
    const latestPost = resolveMomentAuthorMeta(latestPosts[latestIdx]);
    const nextTranslation = Object.assign({}, latestPost.translation || {}, { sourceLanguage: post.replyLanguage });
    if(field === 'imageText'){
      nextTranslation.imageText = translated;
      nextTranslation.imageLoading = false;
      nextTranslation.imageVisible = opts.showOnReady !== false;
    }else{
      nextTranslation.text = translated;
      nextTranslation.textLoading = false;
      nextTranslation.textVisible = opts.showOnReady !== false;
    }
    latestPost.translation = nextTranslation;
    latestPosts[latestIdx] = latestPost;
    savePosts(latestPosts);
  }catch(e){
    const latestPosts = getPosts();
    const latestIdx = latestPosts.findIndex((item)=>String(item && item.id || '') === String(postId || ''));
    if(latestIdx !== -1){
      const latestPost = resolveMomentAuthorMeta(latestPosts[latestIdx]);
      const nextTranslation = Object.assign({}, latestPost.translation || {});
      if(field === 'imageText'){
        nextTranslation.imageLoading = false;
        nextTranslation.imageVisible = false;
      }else{
        nextTranslation.textLoading = false;
        nextTranslation.textVisible = false;
      }
      latestPost.translation = nextTranslation;
      latestPosts[latestIdx] = latestPost;
      savePosts(latestPosts);
    }
    if(!opts.silent) showToast('翻译失败');
  }
  renderFeed();
  renderImageViewer();
}
function queueMomentTranslationPrefetch(postId, field){
  const safePostId = String(postId || '').trim();
  const safeField = field === 'imageText' ? 'imageText' : 'text';
  const key = safePostId + '::' + safeField;
  if(!safePostId || momentTranslationPrefetchQueue[key]) return;
  const posts = getPosts();
  const idx = posts.findIndex((item)=>String(item && item.id || '') === safePostId);
  if(idx === -1) return;
  const post = resolveMomentAuthorMeta(posts[idx]);
  if(!shouldPrefetchMomentTranslation(post)) return;
  const translation = Object.assign({}, post.translation || {});
  const hasText = safeField === 'imageText'
    ? String(translation.imageText || '').trim()
    : String(translation.text || '').trim();
  const isLoading = safeField === 'imageText' ? !!translation.imageLoading : !!translation.textLoading;
  if(hasText || isLoading) return;
  momentTranslationPrefetchQueue[key] = true;
  Promise.resolve().then(()=>{
    return requestMomentTranslation(safePostId, safeField, { silent:true, showOnReady:false });
  }).catch(()=>{})
    .finally(()=>{
      delete momentTranslationPrefetchQueue[key];
    });
}
function primeMomentTranslations(posts){
  (Array.isArray(posts) ? posts : getPosts()).slice(0, 5).forEach((item)=>{
    const post = resolveMomentAuthorMeta(item);
    if(!shouldPrefetchMomentTranslation(post)) return;
    if(String(post.text || '').trim()) queueMomentTranslationPrefetch(post.id, 'text');
    if(String(post.imageText || '').trim()) queueMomentTranslationPrefetch(post.id, 'imageText');
  });
}

function toggleMomentTranslation(postId, field){
  const posts = getPosts();
  const idx = posts.findIndex((item)=>String(item && item.id || '') === String(postId || ''));
  if(idx === -1) return;
  const post = resolveMomentAuthorMeta(posts[idx]);
  if(!shouldOfferMomentTranslation(post)) return;
  const translation = Object.assign({}, post.translation || {});
  const hasText = field === 'imageText'
    ? String(translation.imageText || '').trim()
    : String(translation.text || '').trim();
  if(!hasText){
    requestMomentTranslation(postId, field).catch(()=>{});
    return;
  }
  if(field === 'imageText'){
    translation.imageLoading = false;
    translation.imageVisible = !translation.imageVisible;
  }else{
    translation.textLoading = false;
    translation.textVisible = !translation.textVisible;
  }
  post.translation = translation;
  posts[idx] = post;
  savePosts(posts);
  renderFeed();
  renderImageViewer();
}

function renderMomentCaptionTranslation(post){

}

function bindTap(element, handler){
  if(!element || typeof handler !== 'function' || element.dataset.tapBound === '1') return;
  element.dataset.tapBound = '1';
  let lastHandledAt = 0;
  let lastHandledType = '';
  ['pointerup','click','touchend'].forEach((eventName)=>{
    element.addEventListener(eventName, (evt)=>{
      const now = Date.now();
      if(lastHandledType && now - lastHandledAt < 220) return;
      lastHandledAt = now;
      lastHandledType = eventName;
      setTimeout(()=>{ lastHandledType = ''; }, 240);
      if(evt && evt.preventDefault) evt.preventDefault();
      if(evt && evt.stopPropagation) evt.stopPropagation();
      handler(evt);
    }, { passive:false });
  });
}

function getPosts(){
  try{
    if(Array.isArray(hydratedPostsCache)){
      return hydratedPostsCache.slice();
    }
    const orderedCandidates = [
      scopedKey(STORAGE_POSTS_BRIDGE),
      STORAGE_POSTS_BRIDGE,
      scopedKey(STORAGE_POSTS),
      scopedKey(STORAGE_POSTS_ALT),
      STORAGE_POSTS,
      STORAGE_POSTS_ALT
    ].concat(storageKeyCandidates(STORAGE_POSTS)).concat(storageKeyCandidates(STORAGE_POSTS_ALT));
    for(const key of Array.from(new Set(orderedCandidates.filter(Boolean)))){
      try{
        const posts = JSON.parse(localStorage.getItem(key) || '[]');
        if(Array.isArray(posts)){
          hydratedPostsCache = posts.slice();
          return posts.slice();
        }
      }catch(ignoreErr){}
    }
    return [];
  }catch(e){
    return [];
  }
}

function writePostsToStorageKey(key, payload){
  try{
    if(key) localStorage.setItem(key, payload);
  }catch(ignoreErr){}
}

function writePostsToAllLocalStores(payload){
  const keys = [
    STORAGE_POSTS,
    STORAGE_POSTS_ALT,
    STORAGE_POSTS_BRIDGE,
    scopedKey(STORAGE_POSTS),
    scopedKey(STORAGE_POSTS_ALT),
    scopedKey(STORAGE_POSTS_BRIDGE)
  ].concat(storageKeyCandidates(STORAGE_POSTS)).concat(storageKeyCandidates(STORAGE_POSTS_ALT));
  Array.from(new Set(keys.filter(Boolean))).forEach((key)=>{
    writePostsToStorageKey(key, payload);
  });
}

function savePosts(posts){
  const safePosts = Array.isArray(posts) ? posts.slice() : [];
  const payload = JSON.stringify(safePosts);
  hydratedPostsCache = safePosts.slice();
  writePostsToAllLocalStores(payload);
  if(window.PhoneStorage && typeof window.PhoneStorage.putJson === 'function'){
    const phoneKeys = [
      scopedKey(STORAGE_POSTS),
      scopedKey(STORAGE_POSTS_ALT),
      STORAGE_POSTS,
      STORAGE_POSTS_ALT
    ];
    Array.from(new Set(phoneKeys.filter(Boolean))).forEach((key)=>{
      if(!key) return;
      try{
        window.PhoneStorage.putJson(key, safePosts).catch(()=>{});
      }catch(ignorePhoneErr){}
    });
  }
}

async function hydratePostsFromLargeStore(){
  if(!(window.PhoneStorage && typeof window.PhoneStorage.getJson === 'function')) return;
  try{
    const preferredCandidates = [
      scopedKey(STORAGE_POSTS),
      scopedKey(STORAGE_POSTS_ALT),
      STORAGE_POSTS,
      STORAGE_POSTS_ALT
    ].concat(storageKeyCandidates(STORAGE_POSTS)).concat(storageKeyCandidates(STORAGE_POSTS_ALT));
    for(const key of Array.from(new Set(preferredCandidates.filter(Boolean)))){
      let stored = null;
      try{
        stored = await window.PhoneStorage.getJson(key);
      }catch(ignoreErr){}
      if(Array.isArray(stored)){
        hydratedPostsCache = stored.slice();
        writePostsToAllLocalStores(JSON.stringify(stored));
        return;
      }
    }
    if(typeof window.PhoneStorage.list === 'function'){
      try{
        const records = await window.PhoneStorage.list('kv');
        if(Array.isArray(records)){
          let matched = [];
          records.forEach((record)=>{
            const id = String(record && record.id || '');
            const data = record && Object.prototype.hasOwnProperty.call(record, 'data') ? record.data : null;
            if(!/moments_posts/i.test(id)) return;
            if(Array.isArray(data) && !matched.length){
              matched = data;
            }
          });
          if(Array.isArray(matched)){
            hydratedPostsCache = matched.slice();
            writePostsToAllLocalStores(JSON.stringify(matched));
          }
        }
      }catch(ignoreListErr){}
    }
  }catch(e){}
}

function hydratePostsFromBridge(){
  try{
    const scopedRaw = localStorage.getItem(scopedKey(STORAGE_POSTS_BRIDGE)) || '';
    const plainRaw = localStorage.getItem(STORAGE_POSTS_BRIDGE) || '';
    const raw = scopedRaw || plainRaw;
    if(!raw) return false;
    const posts = JSON.parse(raw);
    if(!Array.isArray(posts)) return false;
    hydratedPostsCache = posts.slice();
    writePostsToAllLocalStores(JSON.stringify(posts));
    if(window.PhoneStorage && typeof window.PhoneStorage.putJson === 'function'){
      [
        scopedKey(STORAGE_POSTS),
        scopedKey(STORAGE_POSTS_ALT),
        STORAGE_POSTS,
        STORAGE_POSTS_ALT
      ].forEach((key)=>{
        try{
          window.PhoneStorage.putJson(key, posts).catch(()=>{});
        }catch(ignorePhoneErr){}
      });
    }
    return true;
  }catch(e){
    return false;
  }
}

function fmtTime(ts){
  try{
    const d = new Date(ts);
    if(Number.isNaN(d.getTime())) return '';
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,'0');
    const day = String(d.getDate()).padStart(2,'0');
    const h = String(d.getHours()).padStart(2,'0');
    const min = String(d.getMinutes()).padStart(2,'0');
    return y + '-' + m + '-' + day + ' ' + h + ':' + min;
  }catch(e){
    return '';
  }
}

    closeDeleteConfirm();
    return;
  }
  const selected = new Set(deleteSelection.map((id)=>String(id || '')));
  getPosts().forEach((post)=>{
    if(!selected.has(String(post && post.id || ''))) return;
    const assetKey = String((post && post.imageAssetKey) || '').trim();
    if(assetKey) removeStoredAsset(assetKey).catch(()=>{});
  });
  const next = getPosts().filter((post)=>!selected.has(String(post && post.id || '')));
  savePosts(next);
  const btn = document.getElementById('deleteFab');
  if(btn) btn.classList.remove('delete-active');
  const overlay = document.getElementById('deleteConfirmOverlay');
  if(overlay) overlay.classList.remove('open');
  deleteMode = false;
  deleteSelection = [];
  replyTarget = {};
  renderFeed();
  showToast('已删除');
}

  const posts = getPosts();

  const comments = Array.isArray(posts[idx].comments) ? posts[idx].comments : [];
  const bubbleName = getCurrentBubbleName();

  comments.push({ id: 'c_' + Date.now(), name: bubbleName, avatar: currentHeroAvatarSrc || activeProfile().avatar || lsGet(STORAGE_AVATAR) || '', replyToName: replyTo, text: text, at: Date.now() });

async function publishCurrent(){
  const text = (publishState.text || '').trim();
  const imageText = (publishState.imageText || '').trim();
  const hasRealImage = !!(publishState.imageFile || publishState.imagePreviewSrc);
  if(publishState.mode === 'say'){
    if(!text){ showToast('请输入说说内容'); return; }
  }
  if(publishState.mode === 'dynamic'){
    if(!text && !imageText && !hasRealImage){ showToast('请输入动态内容或图片'); return; }
  }
  const posts = getPosts();
  const postId = 'post_' + Date.now() + '_' + Math.random().toString(36).slice(2,7);
  let imageAssetKey = '';
  if(publishState.mode === 'dynamic' && hasRealImage){
    imageAssetKey = momentImageAssetKey(postId);
    try{
      const savedImage = await saveStoredAsset(imageAssetKey, publishState.imageFile || publishState.imagePreviewSrc);
      if(savedImage === false) throw new Error('moment image save returned false');
    }catch(e){
      showToast('图片保存失败，换一张小一点的试试');
      return;
    }
  }
  const targetChar = getActiveChatCharacter();
  const targetCharId = targetChar && targetChar.id ? String(targetChar.id) : '';
  posts.push({
    id: postId,
    type: publishState.mode === 'dynamic' ? 'dynamic' : 'say',
    text: text,
    imageText: publishState.mode === 'dynamic' ? imageText : '',
    imageAssetKey: imageAssetKey,
    imageFileName: publishState.mode === 'dynamic' ? String(publishState.imageFileName || '') : '',
    imageContextMode: imageAssetKey && targetCharId ? (avatarVisionEnabledForChar(targetCharId) ? 'vision' : 'description') : '',
    targetCharId: targetCharId,
    authorName: getCurrentBubbleName(),
    authorAvatar: activeProfile().avatar || '',
    createdAt: Date.now(),
    comments: []
  });
  savePosts(posts);
  closePublishOverlay();
  renderFeed();
  showToast('已发布');
}

function loadStoredAsset(key){
  const scoped = scopedKey(key);
  if(window.assetStore) return window.assetStore.load(scoped);
  try{ return Promise.resolve(localStorage.getItem(scoped) || ''); }catch(e){ return Promise.resolve(''); }
}

function saveStoredAsset(key, data){
  const scoped = scopedKey(key);
  if(window.assetStore) return window.assetStore.saveOrFallback(scoped, data);
  try{
    localStorage.setItem(scoped, data);
    return Promise.resolve();
  }catch(e){
    return Promise.reject(e);
  }
}

function removeStoredAsset(key){
  const scoped = scopedKey(key);
  if(window.assetStore && typeof window.assetStore.remove === 'function') return window.assetStore.remove(scoped);
  try{ localStorage.removeItem(scoped); }catch(e){}
  return Promise.resolve();
}

function momentImageAssetKey(postId){
  return 'qq_moment_image_' + String(postId || '').trim();
}

function charProfileCoverAssetKey(charId){
  return 'qq_moment_profile_cover_' + String(charId || '').trim();
}

function revokeObjectUrlLater(src){
  if(typeof src !== 'string' || !src.startsWith('blob:')) return;
  setTimeout(()=>{ try{ URL.revokeObjectURL(src); }catch(e){} }, 30000);
}

async function resolveMomentImageSource(post){
  const assetKey = String((post && post.imageAssetKey) || '').trim();
  if(assetKey){
    try{
      const assetVal = await loadStoredAsset(assetKey);
      if(assetVal instanceof Blob) return URL.createObjectURL(assetVal);
      if(typeof assetVal === 'string' && assetVal) return assetVal;
    }catch(e){}
  }
  return String((post && (post.imageSrc || post.imageData || post.imagePreviewSrc)) || '').trim();
}

async function hydrateMomentImageElements(root){
  const host = root || document;
  const nodes = host.querySelectorAll ? host.querySelectorAll('[data-moment-image-id]') : [];
  const posts = getPosts();
  nodes.forEach((node)=>{
    const id = String(node.getAttribute('data-moment-image-id') || '').trim();
    const post = posts.find((item)=>String(item && item.id || '') === id);
    if(!post || node.dataset.imageHydrating === '1') return;
    node.dataset.imageHydrating = '1';
    resolveMomentImageSource(post).then((src)=>{
      if(!src) return;
      if(node.tagName === 'IMG') node.src = src;
      else node.style.backgroundImage = 'url(' + src + ')';
      revokeObjectUrlLater(src);
    }).catch(()=>{}).finally(()=>{
      delete node.dataset.imageHydrating;
    });
  });
}

function hasMomentRealImage(post){
  return !!(post && (post.imageAssetKey || post.imageSrc || post.imageData || post.imagePreviewSrc));
}

async function resolveHeroSource(legacyKey, assetKey){
  const cacheKey = scopedKey(assetKey);
  if(transientAssets[cacheKey]) return transientAssets[cacheKey];
  const assetVal = await loadStoredAsset(assetKey);
  if(assetVal instanceof Blob){
    return URL.createObjectURL(assetVal);
  }
  if(typeof assetVal === 'string' && assetVal) return assetVal;
  return lsGet(legacyKey) || '';
}

async function persistHeroUpload(legacyKey, assetKey, file, src){
  const cacheKey = scopedKey(assetKey);
  try{
    if(file) await saveStoredAsset(assetKey, file);
    else await saveStoredAsset(assetKey, src);
    delete transientAssets[cacheKey];
    lsRemove(legacyKey);
    return true;
  }catch(e){
    if(!src) return false;
    try{
      lsSet(legacyKey, src);
      delete transientAssets[cacheKey];
      return true;
    }catch(err){
      transientAssets[cacheKey] = src;
      showToast('图片较大，仅本次会话可用');
      return true;
    }
  }
}

async function renderHero(){
  const profile = activeProfile();
  const storedHeroAvatar = await resolveHeroSource(STORAGE_AVATAR, STORAGE_AVATAR_ASSET);
  const avSrc = storedHeroAvatar || profile.avatar || '';
  if(heroAvatarObjectUrl && heroAvatarObjectUrl !== avSrc){
    URL.revokeObjectURL(heroAvatarObjectUrl);
    heroAvatarObjectUrl = '';
  }
  if(typeof avSrc === 'string' && avSrc.startsWith('blob:')) heroAvatarObjectUrl = avSrc;
  currentHeroAvatarSrc = avSrc || '';
  const tileSrcs = await Promise.all(['tile1','tile2','tile3','tile4','tile5','tile6'].map(resolveHeaderImage));
  tileSrcs.forEach((src, index)=>{
    setHeaderSlotBackground(headerImageConfig('tile' + (index + 1)), src);
  });
  tileSrcs.forEach(revokeObjectUrlLater);
  const targetText = document.getElementById('momentHeaderTarget');
  if(targetText && targetText !== document.activeElement) targetText.textContent = lsGet(STORAGE_HEADER_TEXT_LEFT) || DEFAULT_HEADER_TEXT_LEFT;
  renderFeed();
}

function readFileAsDataUrl(file, cb){
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>cb(typeof reader.result === 'string' ? reader.result : '');
  reader.readAsDataURL(file);
}

function pickHeroBg(){
  const input = document.getElementById('heroBgInput');
  if(input) input.click();
}

function pickHeroAvatar(evt){
  if(evt && evt.stopPropagation) evt.stopPropagation();
  showToast('请到个人中心修改头像');
}

function bindInputs(){
  const bgInput = document.getElementById('heroBgInput');
  const avInput = document.getElementById('heroAvatarInput');
  const headerInputs = ['tile1', 'tile2', 'tile3', 'tile4', 'tile5', 'tile6'].map((slot)=>{
    const cfg = headerImageConfig(slot);
    return cfg ? { slot, cfg, input:document.getElementById(cfg.inputId) } : null;
  }).filter(Boolean);
  const momentInput = document.getElementById('momentImageInput');
  const profileCoverInput = document.getElementById('charProfileCoverInput');
  if(bgInput){
    bgInput.addEventListener('change', (evt)=>{
      const file = evt.target && evt.target.files ? evt.target.files[0] : null;
      readFileAsDataUrl(file, async (src)=>{
        if(!src) return;
        const ok = await persistHeroUpload(STORAGE_BG, STORAGE_BG_ASSET, file, src);
        evt.target.value = '';
        if(ok) renderHero();
      });
    });
  }
  if(avInput){
    avInput.addEventListener('change', (evt)=>{ evt.target.value = ''; });
  }
  headerInputs.forEach(({ cfg, input })=>{
    if(!input) return;
    input.addEventListener('change', (evt)=>{
      const file = evt.target && evt.target.files ? evt.target.files[0] : null;
      readFileAsDataUrl(file, async (src)=>{
        evt.target.value = '';
        if(!src) return;
        const ok = await persistHeroUpload(cfg.legacyKey, cfg.assetKey, file, src);
        if(ok) renderHero();
      });
    });
  });
  if(momentInput){
    momentInput.addEventListener('change', (evt)=>{
      const file = evt.target && evt.target.files ? evt.target.files[0] : null;
      readFileAsDataUrl(file, (src)=>{
        evt.target.value = '';
        if(!src) return;
        publishState.imageFile = file || null;
        publishState.imagePreviewSrc = src;
        publishState.imageFileName = file && file.name ? file.name : '图片';
        renderDynamicForm();
      });
    });
  }
  if(profileCoverInput){
    profileCoverInput.addEventListener('change', (evt)=>{
      const file = evt.target && evt.target.files ? evt.target.files[0] : null;
      const charId = currentProfileCharId;
      readFileAsDataUrl(file, async (src)=>{
        evt.target.value = '';
        if(!src || !charId) return;
        try{
          await saveStoredAsset(charProfileCoverAssetKey(charId), file || src);
          showToast('封面已保存');
          renderCharProfile();
        }catch(e){
          showToast('封面保存失败');
        }
      });
    });
  }

  const publishOverlay = document.getElementById('publishOverlay');
  if(publishOverlay){
    publishOverlay.addEventListener('click', (evt)=>{
      if(evt.target === evt.currentTarget) closePublishOverlay();
    });
  }
  const signatureOverlay = document.getElementById('signatureOverlay');
  if(signatureOverlay){
    signatureOverlay.addEventListener('click', (evt)=>{
      if(evt.target === evt.currentTarget) closeSignatureEditor();
    });
  }
  const bubbleNameOverlay = document.getElementById('bubbleNameOverlay');
  if(bubbleNameOverlay){
    bubbleNameOverlay.addEventListener('click', (evt)=>{
      if(evt.target === evt.currentTarget) closeBubbleNameEditor();
    });
  }
  const deleteConfirmOverlay = document.getElementById('deleteConfirmOverlay');
  if(deleteConfirmOverlay){
    deleteConfirmOverlay.addEventListener('click', (evt)=>{
      if(evt.target === evt.currentTarget) closeDeleteConfirm();
    });
  }
  const deleteConfirmModal = document.getElementById('deleteConfirmModal');
  if(deleteConfirmModal){
    ['click','touchend'].forEach((eventName)=>{
      deleteConfirmModal.addEventListener(eventName, (evt)=>{
        evt.stopPropagation();
      }, { passive:false });
    });
  }
  const deleteCommentOverlay = document.getElementById('deleteCommentConfirmOverlay');
  if(deleteCommentOverlay){
    deleteCommentOverlay.addEventListener('click', (evt)=>{
      if(evt.target === evt.currentTarget) closeDeleteCommentConfirm();
    });
  }
  const deleteCommentModal = document.getElementById('deleteCommentConfirmModal');
  if(deleteCommentModal){
    ['click','touchend'].forEach((eventName)=>{
      deleteCommentModal.addEventListener(eventName, (evt)=>{
        evt.stopPropagation();
      }, { passive:false });
    });
  }
  const deleteFab = document.getElementById('deleteFab');
  bindTap(deleteFab, ()=>{ toggleDeleteMode(); });
  const heroToolbar = document.querySelector('.hero-toolbar');
  if(heroToolbar && heroToolbar.dataset.stopHeroBubble !== '1'){
    heroToolbar.dataset.stopHeroBubble = '1';
    ['pointerdown','pointerup','click','touchstart','touchend'].forEach((eventName)=>{
      heroToolbar.addEventListener(eventName, (evt)=>{
        if(evt && evt.stopPropagation) evt.stopPropagation();
      }, { passive:false });
    });
  }
  const feed = document.getElementById('feedList');
  if(feed && feed.dataset.boundActions !== '1'){
    feed.dataset.boundActions = '1';
    let feedLastHandledAt = 0;
    const handleFeedTap = (evt)=>{
      const now = Date.now();
      if(now - feedLastHandledAt < 220) return;
      feedLastHandledAt = now;
      const delBtn = evt.target && evt.target.closest ? evt.target.closest('[data-delete-comment-post][data-delete-comment-id]') : null;
      if(delBtn){
        if(evt && evt.preventDefault) evt.preventDefault();
        if(evt && evt.stopPropagation) evt.stopPropagation();
        openDeleteCommentConfirm(evt, delBtn.getAttribute('data-delete-comment-post') || '', delBtn.getAttribute('data-delete-comment-id') || '');
        return;
      }
      const selBtn = evt.target && evt.target.closest ? evt.target.closest('[data-delete-post]') : null;
      if(selBtn){
        if(evt && evt.preventDefault) evt.preventDefault();
        if(evt && evt.stopPropagation) evt.stopPropagation();
        toggleDeletePost(selBtn.getAttribute('data-delete-post') || '');
        return;
      }
      const replyNode = evt.target && evt.target.closest ? evt.target.closest('[data-reply-post][data-reply-comment]') : null;
      if(replyNode){
        if(evt && evt.preventDefault) evt.preventDefault();
        if(evt && evt.stopPropagation) evt.stopPropagation();
        prepareReply(replyNode.getAttribute('data-reply-post') || '', replyNode.getAttribute('data-reply-comment') || '');
      }
    };
    ['pointerup','click','touchend'].forEach((eventName)=>{
      feed.addEventListener(eventName, handleFeedTap, { passive:false });
    });
  }

  const imageOverlay = document.getElementById('imageViewOverlay');
  if(imageOverlay){
    imageOverlay.addEventListener('click', (evt)=>{
      if(evt.target === evt.currentTarget) closeImageViewer();
    });
  }
  const profileOverlay = document.getElementById('charProfileOverlay');
  if(profileOverlay){
    profileOverlay.addEventListener('click', (evt)=>{
      if(evt.target === evt.currentTarget) closeCharProfile();
    });
  }
}

function updateCaptchaDots(){
  const grid = document.querySelector('.captcha-grid');
  const dot1 = document.getElementById('captchaDot1');
  const dot2 = document.getElementById('captchaDot2');
  if(!grid || !dot1 || !dot2) return;
  const page = grid.scrollLeft > grid.clientWidth * 0.35 ? 2 : 1;
  dot1.classList.toggle('active', page === 1);
  dot2.classList.toggle('active', page === 2);
}

function bindCaptchaCarousel(){
  const grid = document.querySelector('.captcha-grid');
  if(!grid || grid.dataset.bound === '1') return;
  grid.dataset.bound = '1';
  grid.addEventListener('scroll', updateCaptchaDots, { passive:true });
  updateCaptchaDots();
}

function hideParentTopbar(){
  const docs = [];
  try{
    if(window.parent && window.parent !== window && window.parent.document) docs.push(window.parent.document);
  }catch(e){}
  try{
    if(window.top && window.top !== window && window.top.document) docs.push(window.top.document);
  }catch(e){}
  docs.forEach((doc)=>{
    try{
      const bar = doc.querySelector('.app-topbar');
      if(bar){
        bar.dataset.prevDisplay = bar.style.display || '';
        bar.style.display = 'none';
      }
      const frame = doc.getElementById('app-iframe');
      if(frame){
        frame.dataset.prevMarginTop = frame.style.marginTop || '';
        frame.style.marginTop = '0';
      }
    }catch(err){}
  });
}

function restoreParentTopbar(){
  const docs = [];
  try{
    if(window.parent && window.parent !== window && window.parent.document) docs.push(window.parent.document);
  }catch(e){}
  try{
    if(window.top && window.top !== window && window.top.document) docs.push(window.top.document);
  }catch(e){}
  docs.forEach((doc)=>{
    try{
      const bar = doc.querySelector('.app-topbar');
      if(bar) bar.style.display = bar.dataset.prevDisplay || '';
      const frame = doc.getElementById('app-iframe');
      if(frame) frame.style.marginTop = frame.dataset.prevMarginTop || '';
    }catch(err){}
  });
}

bindInputs();
bindCaptchaCarousel();
hideParentTopbar();
window.addEventListener('beforeunload', restoreParentTopbar);
window.addEventListener('pagehide', restoreParentTopbar);
hydratePostsFromBridge();
renderHero();
hydratePostsFromLargeStore().then(function(){
  renderFeed();
  let queryProfileChar = '';
  try{ queryProfileChar = String(new URLSearchParams(location.search).get('char') || '').trim(); }catch(e){}
  const storedProfileChar = queryProfileChar || String(localStorage.getItem(scopedKey(STORAGE_PROFILE_CHAR)) || localStorage.getItem(STORAGE_PROFILE_CHAR) || '').trim();
  if(storedProfileChar) openCharProfile(storedProfileChar);
}).catch(function(){
  renderFeed();
});
if(window.MetadataStore && typeof window.MetadataStore.init === 'function'){
  window.MetadataStore.init().then(function(){
    renderHero();
    renderFeed();
    renderImageViewer();
    renderCharProfile();
  }).catch(function(){});
}
if(window.MetadataStore && typeof window.MetadataStore.subscribe === 'function'){
  window.MetadataStore.subscribe(function(topic){
    if(topic !== 'characters') return;
    renderHero();
    renderFeed();
    renderImageViewer();
    renderCharProfile();
  });
}
</script>
