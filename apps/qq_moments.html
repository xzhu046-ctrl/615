<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>朋友圈</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
<script src="../assetStore.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --b:#0a0a0a;--w:#fff;--off:#f7f7f7;--g:#6f6f6f;
  --bd:2px solid #0a0a0a;--sh:2px 2px 0 #0a0a0a;
  --font:'Quicksand',sans-serif;--fontd:'Nunito',sans-serif;
  --safe-top:max(env(safe-area-inset-top),0px);
}
html,body{width:100%;max-width:100%;height:100%}
body{font-family:var(--font);background:var(--off);color:var(--b);min-height:100vh;display:flex;flex-direction:column;overflow:hidden}
button,input,textarea{font-family:inherit;color:inherit}
button{-webkit-appearance:none;appearance:none;-webkit-touch-callout:none}

.main{position:relative;flex:1;min-height:0;overflow:hidden}

.hero{position:absolute;left:12px;right:12px;top:calc(10px + var(--safe-top));z-index:10;border:var(--bd);border-radius:24px;overflow:hidden;background:linear-gradient(180deg,#f8f8f8 0%,#ececec 100%);box-shadow:3px 3px 0 #0a0a0a}
.hero-bg{height:188px;background:center/cover no-repeat #d9d9d9;position:relative}
.hero-bg::after{content:'+';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-family:var(--fontd);font-size:34px;font-weight:900;line-height:1;color:#111;pointer-events:none;text-shadow:0 1px 0 rgba(255,255,255,.75)}
.hero-bg.has-image::after{content:''}
.hero-toolbar{position:absolute;left:10px;top:10px;display:flex;gap:8px}
.tiny-btn{border:var(--bd);background:rgba(255,255,255,.94);border-radius:12px;box-shadow:var(--sh);width:38px;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.tiny-btn:active{transform:translate(1px,1px);box-shadow:1px 1px 0 #0a0a0a}
.tiny-btn svg{width:20px;height:20px;display:block;fill:#0a0a0a}
.hero-avatar{position:absolute;right:12px;bottom:-28px;width:98px;height:98px;border:var(--bd);border-radius:22px;background:center/cover no-repeat #efefef;box-shadow:3px 3px 0 #0a0a0a;display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden}
.hero-avatar::after{content:'+';font-family:var(--fontd);font-size:26px;font-weight:900;color:#111}
.hero-avatar.has-image::after{content:''}
.hero-sign-wrap{display:flex;align-items:center;justify-content:flex-start;gap:10px;padding:16px 122px 14px 14px;background:rgba(255,255,255,.95);border-top:var(--bd)}
.hero-sign{font-family:'Ma Shan Zheng',cursive;font-size:18px;line-height:1.2;letter-spacing:.01em;word-break:break-word;cursor:pointer}

.feed-wrap{position:absolute;left:12px;right:12px;top:calc(290px + var(--safe-top));bottom:0;overflow:auto;padding-bottom:84px}

.feed{display:flex;flex-direction:column;gap:10px}
.post{border:var(--bd);border-radius:20px;background:#fff;box-shadow:3px 3px 0 #0a0a0a;padding:12px;display:flex;flex-direction:column;gap:9px}
.post-head{display:flex;align-items:center;justify-content:space-between;gap:8px}
.post-left{display:flex;align-items:center;gap:10px;min-width:0}
.post-av{width:42px;height:42px;border:var(--bd);border-radius:12px;background:center/cover no-repeat #eee;box-shadow:var(--sh);flex-shrink:0}
.post-name{font-family:var(--fontd);font-size:13px;font-weight:900}
.post-time{font-size:10px;color:var(--g);font-weight:800}
.post-type{border:var(--bd);border-radius:999px;background:#111;color:#fff;padding:2px 8px;font-size:9px;font-weight:900;letter-spacing:.04em}
.post-text{font-size:13px;font-weight:700;line-height:1.55;white-space:pre-wrap;word-break:break-word}
.image-card-button{width:138px;height:138px;border:var(--bd);border-radius:22px;background:center/cover no-repeat url('https://files.catbox.moe/6ruu03.jpeg');box-shadow:var(--sh);cursor:pointer;position:relative;overflow:hidden}
.image-card-button::after{content:'查看';position:absolute;right:10px;bottom:10px;padding:4px 8px;border:1.5px solid var(--b);border-radius:999px;background:rgba(255,255,255,.92);font-family:var(--fontd);font-size:10px;font-weight:900;line-height:1;color:var(--b)}
.comment-box{border-top:1.5px dashed #cfcfcf;padding-top:8px;display:flex;flex-direction:column;gap:7px}
.comment-list{display:flex;flex-direction:column;gap:6px}
.comment-item{background:#f4f4f4;border:1.5px solid #111;border-radius:10px;padding:6px 8px;font-size:12px;font-weight:700;line-height:1.4}
.comment-input-row{display:flex;gap:6px}
.comment-input{flex:1;border:var(--bd);border-radius:10px;padding:8px 9px;background:var(--w);font-size:12px;font-weight:700;outline:none}
.comment-btn{border:var(--bd);border-radius:10px;background:var(--w);box-shadow:var(--sh);padding:8px 10px;font-family:var(--fontd);font-size:11px;font-weight:900;cursor:pointer}
.comment-btn:active{transform:translate(1px,1px);box-shadow:1px 1px 0 #0a0a0a}
.empty{border:var(--bd);border-radius:18px;background:#fff;box-shadow:var(--sh);padding:16px;text-align:center;color:#666;font-size:13px;font-weight:700}

.fab{position:fixed;right:16px;bottom:18px;width:58px;height:58px;border-radius:999px;border:var(--bd);background:linear-gradient(180deg,#fff 0%,#ececec 100%);box-shadow:4px 4px 0 #0a0a0a;display:flex;align-items:center;justify-content:center;font-family:var(--fontd);font-size:34px;font-weight:900;cursor:pointer;z-index:80}
.fab:active{transform:translate(1px,1px);box-shadow:2px 2px 0 #0a0a0a}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.28);display:none;align-items:center;justify-content:center;padding:20px;z-index:120}
.overlay.open{display:flex}
.modal{width:min(330px,100%);border:var(--bd);border-radius:20px;background:#fff;box-shadow:5px 5px 0 #0a0a0a;padding:14px;display:flex;flex-direction:column;gap:10px}
.modal-title{font-family:var(--fontd);font-size:16px;font-weight:900}
.modal-sub{font-size:12px;font-weight:700;color:#666;line-height:1.5}
.mode-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mode-btn{border:var(--bd);border-radius:12px;box-shadow:var(--sh);padding:10px 8px;font-family:var(--fontd);font-size:13px;font-weight:900;cursor:pointer}
.mode-btn.black{background:var(--w);color:var(--b)}
.mode-btn:active{transform:translate(1px,1px);box-shadow:1px 1px 0 #0a0a0a}
.modal textarea{width:100%;min-height:84px;resize:none;border:var(--bd);border-radius:12px;background:var(--off);padding:10px 12px;font-size:13px;font-weight:700;outline:none}
.helper-row{display:flex;justify-content:space-between;align-items:center;gap:8px}
.add-image-btn{border:var(--bd);border-radius:10px;background:#0a0a0a;color:#fff;box-shadow:var(--sh);padding:8px 10px;font-family:var(--fontd);font-size:12px;font-weight:900;cursor:pointer}
.add-image-btn:active{transform:translate(1px,1px);box-shadow:1px 1px 0 #0a0a0a}
.image-preview-wrap{display:none;align-items:center;gap:10px}
.image-preview-wrap.show{display:flex}
.image-preview-thumb{width:74px;height:74px;border:var(--bd);border-radius:14px;background:center/cover no-repeat url('https://files.catbox.moe/6ruu03.jpeg');box-shadow:var(--sh);position:relative;overflow:hidden}
.image-preview-thumb::after{content:'图';position:absolute;right:5px;bottom:5px;background:rgba(255,255,255,.9);border:1.5px solid #111;border-radius:8px;padding:1px 5px;font-size:9px;font-family:var(--fontd);font-weight:900}
.image-preview-text{font-size:11px;font-weight:700;line-height:1.4;color:#555;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.footer-actions{display:flex;gap:8px}
.footer-btn{flex:1;border:var(--bd);border-radius:12px;background:var(--w);color:var(--b);box-shadow:var(--sh);padding:10px 8px;font-family:var(--fontd);font-size:13px;font-weight:900;cursor:pointer}
.footer-btn.black{background:var(--w);color:var(--b)}
.footer-btn:active{transform:translate(1px,1px);box-shadow:1px 1px 0 #0a0a0a}

.image-view-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;z-index:140;padding:18px}
.image-view-overlay.open{display:flex}
.image-view-card{width:min(328px,100%);background:var(--w);border:var(--bd);border-radius:20px;box-shadow:var(--sh);padding:14px;display:flex;flex-direction:column;gap:12px}
.image-view-header{display:flex;align-items:center;justify-content:space-between;gap:8px}
.image-view-title{font-family:var(--fontd);font-size:14px;font-weight:900}
.image-view-close{width:30px;height:30px;border-radius:999px;border:var(--bd);background:var(--w);box-shadow:1px 1px 0 var(--b);font-size:16px;font-weight:900;cursor:pointer}
.image-view-close:active{transform:translate(1px,1px);box-shadow:0 0 0}
.image-view-paper{border:var(--bd);border-radius:18px;background:linear-gradient(180deg,#fff 0%,#f6f6f6 100%);padding:16px;box-shadow:inset 0 0 0 1px #dcdcdc}
.image-view-text{font-size:13px;font-weight:700;line-height:1.75;color:var(--b);white-space:pre-wrap;word-break:break-word}

.toast{position:fixed;left:50%;bottom:88px;transform:translateX(-50%) translateY(10px);background:#0a0a0a;color:#fff;padding:8px 14px;border-radius:999px;font-size:12px;font-weight:800;opacity:0;transition:all .2s;pointer-events:none;z-index:160}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

#heroBgInput,#heroAvatarInput{display:none}
</style>
</head>
<body>
  <div class="main">
    <section class="hero">
      <div class="hero-bg" id="heroBg" onclick="pickHeroBg()">
        <div class="hero-toolbar">
          <button class="tiny-btn" type="button" title="返回QQ" onclick="goBackQQ(event)">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09A6 6 0 0 1 16.5 3C19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54z"/></svg>
          </button>
        </div>
        <button class="hero-avatar" id="heroAvatar" type="button" title="更换头像" onclick="pickHeroAvatar(event)"></button>
      </div>
      <div class="hero-sign-wrap">
        <div class="hero-sign" id="heroSignature" onclick="openSignatureEditor()">在时间的尽头我们终将相遇</div>
      </div>
    </section>

    <div class="feed-wrap">
      <section class="feed" id="feedList"></section>
    </div>
  </div>

  <button class="fab" type="button" aria-label="发布" onclick="openPublishMode()">+</button>

  <div class="overlay" id="publishOverlay">
    <div class="modal" id="publishModal"></div>
  </div>
  <div class="overlay" id="signatureOverlay">
    <div class="modal">
      <div class="modal-title">编辑个性签名</div>
      <textarea id="signatureInput" maxlength="50" placeholder="输入个性签名..."></textarea>
      <div class="footer-actions">
        <button class="footer-btn" type="button" onclick="closeSignatureEditor()">取消</button>
        <button class="footer-btn black" type="button" onclick="confirmSignature()">确定</button>
      </div>
    </div>
  </div>

  <div class="image-view-overlay" id="imageViewOverlay">
    <div class="image-view-card">
      <div class="image-view-header">
        <div class="image-view-title">图片内容</div>
        <button class="image-view-close" type="button" onclick="closeImageViewer()">×</button>
      </div>
      <div class="image-view-paper">
        <div class="image-view-text" id="imageViewText"></div>
      </div>
    </div>
  </div>

  <input id="heroBgInput" type="file" accept="image/*,.png,.jpg,.jpeg,.webp,.gif,.bmp,.svg">
  <input id="heroAvatarInput" type="file" accept="image/*,.png,.jpg,.jpeg,.webp,.gif,.bmp,.svg">
  <div class="toast" id="toast"></div>

<script>
const STORAGE_POSTS = 'qq_moments_posts';
const STORAGE_BG = 'qq_moments_hero_bg';
const STORAGE_AVATAR = 'qq_moments_hero_avatar';
const STORAGE_SIGN = 'qq_moments_signature';
const STORAGE_BG_ASSET = 'qq_moments_hero_bg_asset';
const STORAGE_AVATAR_ASSET = 'qq_moments_hero_avatar_asset';
const IMAGE_CARD_BG = 'https://files.catbox.moe/6ruu03.jpeg';

let toastTimer = null;
let currentHeroAvatarSrc = '';
let currentHeroBgSrc = '';
let heroBgObjectUrl = '';
let heroAvatarObjectUrl = '';
const transientAssets = {};
let publishState = {
  mode: '',
  text: '',
  imageText: ''
};

function esc(s){
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(text){
  const t = document.getElementById('toast');
  if(!t) return;
  t.textContent = text || '';
  t.classList.add('show');
  if(toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 1500);
}

function goBackQQ(evt){
  if(evt && evt.stopPropagation) evt.stopPropagation();
  window.location.href = 'qq.html';
}

function getPosts(){
  try{
    const posts = JSON.parse(localStorage.getItem(STORAGE_POSTS) || '[]');
    return Array.isArray(posts) ? posts : [];
  }catch(e){
    return [];
  }
}

function savePosts(posts){
  localStorage.setItem(STORAGE_POSTS, JSON.stringify(posts));
}

function fmtTime(ts){
  try{
    const d = new Date(ts);
    if(Number.isNaN(d.getTime())) return '';
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,'0');
    const day = String(d.getDate()).padStart(2,'0');
    const h = String(d.getHours()).padStart(2,'0');
    const min = String(d.getMinutes()).padStart(2,'0');
    return y + '-' + m + '-' + day + ' ' + h + ':' + min;
  }catch(e){
    return '';
  }
}

function renderFeed(){
  const host = document.getElementById('feedList');
  if(!host) return;
  const posts = getPosts().sort((a,b)=> (b.createdAt||0) - (a.createdAt||0));
  if(!posts.length){
    host.innerHTML = '<div class="empty">还没有朋友圈，点击右下角 + 发布第一条吧。</div>';
    return;
  }
  host.innerHTML = posts.map((post)=>{
    const comments = Array.isArray(post.comments) ? post.comments : [];
    const typeLabel = post.type === 'dynamic' ? '动态' : '说说';
    return '<article class="post">'
      + '<div class="post-head">'
      + '<div class="post-left">'
      + '<div class="post-av" style="background-image:' + getAvatarStyleValue() + ';"></div>'
      + '<div><div class="post-name">我</div><div class="post-time">' + esc(fmtTime(post.createdAt)) + '</div></div>'
      + '</div>'
      + '<span class="post-type">' + esc(typeLabel) + '</span>'
      + '</div>'
      + (post.text ? '<div class="post-text">' + esc(post.text) + '</div>' : '')
      + (post.type === 'dynamic' && post.imageText ? '<button class="image-card-button" type="button" data-post-id="' + esc(post.id) + '"></button>' : '')
      + '<div class="comment-box">'
      + '<div class="comment-list">'
      + (comments.length ? comments.map((c)=>'<div class="comment-item">' + esc(c.text) + '</div>').join('') : '<div class="comment-item">还没有评论，快来抢沙发。</div>')
      + '</div>'
      + '<div class="comment-input-row">'
      + '<input class="comment-input" id="comment-' + esc(post.id) + '" maxlength="120" placeholder="写评论...">'
      + '<button class="comment-btn" type="button" onclick="addComment(\'' + esc(post.id) + '\')">评论</button>'
      + '</div>'
      + '</div>'
      + '</article>';
  }).join('');

  host.querySelectorAll('.image-card-button[data-post-id]').forEach((btn)=>{
    btn.addEventListener('click', ()=>{
      const id = btn.getAttribute('data-post-id');
      const post = getPosts().find((p)=>p.id === id);
      openImageViewer(post && post.imageText ? post.imageText : '无图片描述');
    });
  });
}

function addComment(postId){
  const input = document.getElementById('comment-' + postId);
  const text = input ? (input.value || '').trim() : '';
  if(!text){
    showToast('评论不能为空');
    return;
  }
  const posts = getPosts();
  const idx = posts.findIndex((p)=>p.id === postId);
  if(idx === -1) return;
  const comments = Array.isArray(posts[idx].comments) ? posts[idx].comments : [];
  comments.push({ id: 'c_' + Date.now(), text: text, at: Date.now() });
  posts[idx].comments = comments;
  savePosts(posts);
  if(input) input.value = '';
  renderFeed();
}

function publishCurrent(){
  const text = (publishState.text || '').trim();
  const imageText = (publishState.imageText || '').trim();
  if(publishState.mode === 'say'){
    if(!text){ showToast('请输入说说内容'); return; }
  }
  if(publishState.mode === 'dynamic'){
    if(!text && !imageText){ showToast('请输入动态内容或图片描述'); return; }
  }
  const posts = getPosts();
  posts.push({
    id: 'post_' + Date.now() + '_' + Math.random().toString(36).slice(2,7),
    type: publishState.mode === 'dynamic' ? 'dynamic' : 'say',
    text: text,
    imageText: publishState.mode === 'dynamic' ? imageText : '',
    createdAt: Date.now(),
    comments: []
  });
  savePosts(posts);
  closePublishOverlay();
  renderFeed();
  showToast('已发布');
}

function openPublishMode(){
  publishState = { mode: '', text: '', imageText: '' };
  renderModePicker();
  const overlay = document.getElementById('publishOverlay');
  if(overlay) overlay.classList.add('open');
}

function closePublishOverlay(){
  const overlay = document.getElementById('publishOverlay');
  if(overlay) overlay.classList.remove('open');
}

function openSignatureEditor(){
  const overlay = document.getElementById('signatureOverlay');
  const input = document.getElementById('signatureInput');
  const current = localStorage.getItem(STORAGE_SIGN) || '在时间的尽头我们终将相遇';
  if(input) input.value = current;
  if(overlay) overlay.classList.add('open');
}

function closeSignatureEditor(){
  const overlay = document.getElementById('signatureOverlay');
  if(overlay) overlay.classList.remove('open');
}

function confirmSignature(){
  const input = document.getElementById('signatureInput');
  const next = input ? String(input.value || '').trim() : '';
  localStorage.setItem(STORAGE_SIGN, next || '在时间的尽头我们终将相遇');
  renderHero();
  closeSignatureEditor();
}

function renderModePicker(){
  const modal = document.getElementById('publishModal');
  if(!modal) return;
  modal.innerHTML = ''
    + '<div class="modal-title">您要发布...</div>'
    + '<div class="modal-sub">选择发布类型，先搭好朋友圈框架，后续可以继续精修细节。</div>'
    + '<div class="mode-actions">'
    + '<button class="mode-btn black" type="button" onclick="openSayForm()">说说</button>'
    + '<button class="mode-btn black" type="button" onclick="openDynamicForm()">动态</button>'
    + '</div>'
    + '<div class="footer-actions">'
    + '<button class="footer-btn" type="button" onclick="closePublishOverlay()">取消</button>'
    + '</div>';
}

function openSayForm(){
  publishState.mode = 'say';
  renderSayForm();
}

function renderSayForm(){
  const modal = document.getElementById('publishModal');
  if(!modal) return;
  modal.innerHTML = ''
    + '<div class="modal-title">发布说说</div>'
    + '<textarea id="sayText" maxlength="400" placeholder="输入你想说的话...">' + esc(publishState.text) + '</textarea>'
    + '<div class="footer-actions">'
    + '<button class="footer-btn" type="button" onclick="renderModePicker()">取消</button>'
    + '<button class="footer-btn black" type="button" onclick="submitSay()">发布</button>'
    + '</div>';
}

function submitSay(){
  const input = document.getElementById('sayText');
  publishState.text = input ? input.value : '';
  publishCurrent();
}

function openDynamicForm(){
  publishState.mode = 'dynamic';
  renderDynamicForm();
}

function renderDynamicForm(){
  const modal = document.getElementById('publishModal');
  if(!modal) return;
  const hasImage = !!(publishState.imageText && publishState.imageText.trim());
  modal.innerHTML = ''
    + '<div class="modal-title">发布动态</div>'
    + '<textarea id="dynamicText" maxlength="400" placeholder="输入动态文字...">' + esc(publishState.text) + '</textarea>'
    + '<div class="helper-row">'
    + '<button class="add-image-btn" type="button" onclick="openImageTextForm()">添加图片</button>'
    + (hasImage ? '<span style="font-size:11px;font-weight:800;color:#555">已添加图片描述</span>' : '<span style="font-size:11px;font-weight:800;color:#888">可选</span>')
    + '</div>'
    + '<div class="image-preview-wrap' + (hasImage ? ' show' : '') + '">'
    + '<div class="image-preview-thumb"></div>'
    + '<div class="image-preview-text">' + esc(publishState.imageText || '') + '</div>'
    + '</div>'
    + '<div class="footer-actions">'
    + '<button class="footer-btn" type="button" onclick="renderModePicker()">取消</button>'
    + '<button class="footer-btn black" type="button" onclick="submitDynamic()">发布</button>'
    + '</div>';
}

function openImageTextForm(){
  const txt = document.getElementById('dynamicText');
  if(txt) publishState.text = txt.value || '';
  const modal = document.getElementById('publishModal');
  if(!modal) return;
  modal.innerHTML = ''
    + '<div class="modal-title">添加图片内容</div>'
    + '<textarea id="imageTextInput" maxlength="280" placeholder="输入图片描述内容...">' + esc(publishState.imageText) + '</textarea>'
    + '<div class="footer-actions">'
    + '<button class="footer-btn" type="button" onclick="renderDynamicForm()">取消</button>'
    + '<button class="footer-btn black" type="button" onclick="confirmImageText()">确定</button>'
    + '</div>';
}

function confirmImageText(){
  const input = document.getElementById('imageTextInput');
  publishState.imageText = input ? (input.value || '') : '';
  renderDynamicForm();
}

function submitDynamic(){
  const txt = document.getElementById('dynamicText');
  publishState.text = txt ? txt.value : '';
  publishCurrent();
}

function openImageViewer(text){
  const overlay = document.getElementById('imageViewOverlay');
  const textEl = document.getElementById('imageViewText');
  if(textEl) textEl.textContent = String(text || '').trim() || '无图片描述';
  if(overlay) overlay.classList.add('open');
}

function closeImageViewer(){
  const overlay = document.getElementById('imageViewOverlay');
  if(overlay) overlay.classList.remove('open');
}

function getAvatarStyleValue(){
  const src = currentHeroAvatarSrc || localStorage.getItem(STORAGE_AVATAR) || '';
  return src ? ('url(' + src + ') center/cover no-repeat') : '#eee';
}

function loadStoredAsset(key){
  if(window.assetStore) return window.assetStore.load(key);
  try{ return Promise.resolve(localStorage.getItem(key) || ''); }catch(e){ return Promise.resolve(''); }
}

function saveStoredAsset(key, data){
  if(window.assetStore) return window.assetStore.set(key, data);
  try{
    localStorage.setItem(key, data);
    return Promise.resolve();
  }catch(e){
    return Promise.reject(e);
  }
}

async function resolveHeroSource(legacyKey, assetKey){
  if(transientAssets[assetKey]) return transientAssets[assetKey];
  const assetVal = await loadStoredAsset(assetKey);
  if(assetVal instanceof Blob){
    return URL.createObjectURL(assetVal);
  }
  if(typeof assetVal === 'string' && assetVal) return assetVal;
  return localStorage.getItem(legacyKey) || '';
}

async function persistHeroUpload(legacyKey, assetKey, file, src){
  try{
    if(file) await saveStoredAsset(assetKey, file);
    else await saveStoredAsset(assetKey, src);
    delete transientAssets[assetKey];
    localStorage.removeItem(legacyKey);
    return true;
  }catch(e){
    if(!src) return false;
    try{
      localStorage.setItem(legacyKey, src);
      delete transientAssets[assetKey];
      return true;
    }catch(err){
      transientAssets[assetKey] = src;
      showToast('图片较大，仅本次会话可用');
      return true;
    }
  }
}

async function renderHero(){
  const bg = document.getElementById('heroBg');
  const av = document.getElementById('heroAvatar');
  const sig = document.getElementById('heroSignature');
  const bgSrc = await resolveHeroSource(STORAGE_BG, STORAGE_BG_ASSET);
  const avSrc = await resolveHeroSource(STORAGE_AVATAR, STORAGE_AVATAR_ASSET);
  const sign = localStorage.getItem(STORAGE_SIGN) || '在时间的尽头我们终将相遇';
  if(heroBgObjectUrl && heroBgObjectUrl !== bgSrc){
    URL.revokeObjectURL(heroBgObjectUrl);
    heroBgObjectUrl = '';
  }
  if(heroAvatarObjectUrl && heroAvatarObjectUrl !== avSrc){
    URL.revokeObjectURL(heroAvatarObjectUrl);
    heroAvatarObjectUrl = '';
  }
  if(typeof bgSrc === 'string' && bgSrc.startsWith('blob:')) heroBgObjectUrl = bgSrc;
  if(typeof avSrc === 'string' && avSrc.startsWith('blob:')) heroAvatarObjectUrl = avSrc;
  if(bg){
    bg.style.backgroundImage = bgSrc ? ('url(' + bgSrc + ')') : 'none';
    bg.classList.toggle('has-image', !!bgSrc);
  }
  if(av){
    av.style.backgroundImage = avSrc ? ('url(' + avSrc + ')') : 'none';
    av.classList.toggle('has-image', !!avSrc);
  }
  currentHeroBgSrc = bgSrc || '';
  currentHeroAvatarSrc = avSrc || '';
  if(sig) sig.textContent = sign;
  renderFeed();
}

function readFileAsDataUrl(file, cb){
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>cb(typeof reader.result === 'string' ? reader.result : '');
  reader.readAsDataURL(file);
}

function pickHeroBg(){
  const input = document.getElementById('heroBgInput');
  if(input) input.click();
}

function pickHeroAvatar(evt){
  if(evt && evt.stopPropagation) evt.stopPropagation();
  const input = document.getElementById('heroAvatarInput');
  if(input) input.click();
}

function bindInputs(){
  const bgInput = document.getElementById('heroBgInput');
  const avInput = document.getElementById('heroAvatarInput');
  if(bgInput){
    bgInput.addEventListener('change', (evt)=>{
      const file = evt.target && evt.target.files ? evt.target.files[0] : null;
      readFileAsDataUrl(file, async (src)=>{
        if(!src) return;
        const ok = await persistHeroUpload(STORAGE_BG, STORAGE_BG_ASSET, file, src);
        evt.target.value = '';
        if(ok) renderHero();
      });
    });
  }
  if(avInput){
    avInput.addEventListener('change', (evt)=>{
      const file = evt.target && evt.target.files ? evt.target.files[0] : null;
      readFileAsDataUrl(file, async (src)=>{
        if(!src) return;
        const ok = await persistHeroUpload(STORAGE_AVATAR, STORAGE_AVATAR_ASSET, file, src);
        evt.target.value = '';
        if(ok) renderHero();
      });
    });
  }

  const publishOverlay = document.getElementById('publishOverlay');
  if(publishOverlay){
    publishOverlay.addEventListener('click', (evt)=>{
      if(evt.target === evt.currentTarget) closePublishOverlay();
    });
  }
  const signatureOverlay = document.getElementById('signatureOverlay');
  if(signatureOverlay){
    signatureOverlay.addEventListener('click', (evt)=>{
      if(evt.target === evt.currentTarget) closeSignatureEditor();
    });
  }

  const imageOverlay = document.getElementById('imageViewOverlay');
  if(imageOverlay){
    imageOverlay.addEventListener('click', (evt)=>{
      if(evt.target === evt.currentTarget) closeImageViewer();
    });
  }
}

function hideParentTopbar(){
  const docs = [];
  try{
    if(window.parent && window.parent !== window && window.parent.document) docs.push(window.parent.document);
  }catch(e){}
  try{
    if(window.top && window.top !== window && window.top.document) docs.push(window.top.document);
  }catch(e){}
  docs.forEach((doc)=>{
    try{
      const bar = doc.querySelector('.app-topbar');
      if(bar){
        bar.dataset.prevDisplay = bar.style.display || '';
        bar.style.display = 'none';
      }
      const frame = doc.getElementById('app-iframe');
      if(frame){
        frame.dataset.prevMarginTop = frame.style.marginTop || '';
        frame.style.marginTop = '0';
      }
    }catch(err){}
  });
}

function restoreParentTopbar(){
  const docs = [];
  try{
    if(window.parent && window.parent !== window && window.parent.document) docs.push(window.parent.document);
  }catch(e){}
  try{
    if(window.top && window.top !== window && window.top.document) docs.push(window.top.document);
  }catch(e){}
  docs.forEach((doc)=>{
    try{
      const bar = doc.querySelector('.app-topbar');
      if(bar) bar.style.display = bar.dataset.prevDisplay || '';
      const frame = doc.getElementById('app-iframe');
      if(frame) frame.style.marginTop = frame.dataset.prevMarginTop || '';
    }catch(err){}
  });
}

bindInputs();
hideParentTopbar();
window.addEventListener('beforeunload', restoreParentTopbar);
window.addEventListener('pagehide', restoreParentTopbar);
renderHero();
renderFeed();
</script>
</body>
</html>
