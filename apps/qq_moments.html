<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>朋友圈</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--b:#0a0a0a;--w:#fff;--off:#f7f7f7;--g:#777;--bd:2px solid #0a0a0a;--sh:2px 2px 0 #0a0a0a;--font:'Quicksand',sans-serif;--fontd:'Nunito',sans-serif}
body{font-family:var(--font);background:var(--off);color:var(--b);min-height:100vh;display:flex;flex-direction:column;overflow:hidden}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:8px;background:var(--w);border-bottom:var(--bd);padding:10px 12px;flex-shrink:0}
.back{border:var(--bd);border-radius:12px;background:var(--w);box-shadow:var(--sh);padding:8px 12px;font-family:var(--fontd);font-weight:900;font-size:13px;cursor:pointer}
.back:active{transform:translate(1px,1px);box-shadow:1px 1px 0 #0a0a0a}
.title{font-family:var(--fontd);font-weight:900;font-size:22px;letter-spacing:.02em}
.right-pad{width:56px}
.main{flex:1;min-height:0;overflow:auto;padding:10px;display:flex;flex-direction:column;gap:10px}
.card{border:var(--bd);border-radius:18px;background:var(--w);box-shadow:3px 3px 0 #0a0a0a;padding:12px}
.compose-title{font-family:var(--fontd);font-size:15px;font-weight:900;display:flex;align-items:center;gap:8px}
.compose-title::before{content:'';width:9px;height:9px;border-radius:50%;background:#0a0a0a}
.compose-area{margin-top:10px;display:flex;flex-direction:column;gap:8px}
#composeText{width:100%;min-height:90px;resize:none;border:var(--bd);border-radius:12px;background:var(--off);padding:10px 12px;font-family:var(--font);font-size:13px;font-weight:600;color:var(--b);outline:none}
.compose-row{display:flex;gap:8px;align-items:center}
.file-btn,input[type='file'],.publish{border:var(--bd);border-radius:12px;background:var(--w);box-shadow:var(--sh);font-family:var(--fontd);font-weight:900;font-size:12px;cursor:pointer}
.file-btn,.publish{padding:9px 12px}
input[type='file']{padding:8px;max-width:170px}
.publish{margin-left:auto}
.file-btn:active,.publish:active{transform:translate(1px,1px);box-shadow:1px 1px 0 #0a0a0a}
.preview{margin-top:4px;display:none;border:var(--bd);border-radius:14px;overflow:hidden;background:#f0f0f0}
.preview img{width:100%;max-height:230px;object-fit:cover;display:block}
.feed{display:flex;flex-direction:column;gap:10px}
.post{border:var(--bd);border-radius:18px;background:linear-gradient(180deg,#fff 0%,#f6f6f6 100%);box-shadow:3px 3px 0 #0a0a0a;padding:12px;display:flex;flex-direction:column;gap:8px}
.post-head{display:flex;justify-content:space-between;align-items:center}
.author{font-family:var(--fontd);font-size:14px;font-weight:900}
.time{font-size:11px;color:var(--g);font-weight:700}
.post-text{font-size:13px;line-height:1.55;white-space:pre-wrap;word-break:break-word}
.post-img-wrap{border:var(--bd);border-radius:14px;overflow:hidden;background:#eee}
.post-img-wrap img{width:100%;max-height:300px;object-fit:cover;display:block}
.comment-box{border-top:1.5px dashed #cfcfcf;padding-top:8px;display:flex;flex-direction:column;gap:7px}
.comment-list{display:flex;flex-direction:column;gap:6px}
.comment-item{background:#f5f5f5;border:1.5px solid #111;border-radius:10px;padding:6px 8px;font-size:12px;line-height:1.4}
.comment-input-row{display:flex;gap:6px}
.comment-input{flex:1;border:var(--bd);border-radius:10px;padding:8px 9px;background:var(--w);font-family:var(--font);font-size:12px;font-weight:700;outline:none}
.comment-btn{border:var(--bd);border-radius:10px;background:var(--w);box-shadow:var(--sh);padding:8px 10px;font-family:var(--fontd);font-size:11px;font-weight:900;cursor:pointer}
.comment-btn:active{transform:translate(1px,1px);box-shadow:1px 1px 0 #0a0a0a}
.empty{border:var(--bd);border-radius:16px;background:#fff;box-shadow:var(--sh);padding:16px;text-align:center;color:#666;font-size:13px;font-weight:700}
.toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%) translateY(10px);background:#0a0a0a;color:#fff;padding:8px 14px;border-radius:999px;font-size:12px;font-weight:800;opacity:0;transition:all .2s;pointer-events:none;z-index:99}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
  <div class="topbar">
    <button class="back" type="button" onclick="goBackQQ()">‹ Back</button>
    <div class="title">朋友圈</div>
    <div class="right-pad"></div>
  </div>

  <div class="main">
    <section class="card">
      <div class="compose-title">发一条朋友圈</div>
      <div class="compose-area">
        <textarea id="composeText" maxlength="400" placeholder="写点今天的心情吧..."></textarea>
        <div class="compose-row">
          <button class="file-btn" type="button" onclick="triggerUpload()">添加图片</button>
          <input id="composeImage" type="file" accept="image/*" onchange="onPickImage(event)">
          <button class="publish" type="button" onclick="publishPost()">发布</button>
        </div>
        <div class="preview" id="imagePreview"><img id="previewImg" alt="preview"></div>
      </div>
    </section>

    <section class="feed" id="feedList"></section>
  </div>

  <div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'qq_moments_posts';
let draftImage = '';
let toastTimer = null;

function esc(s){
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(text){
  const t = document.getElementById('toast');
  if(!t) return;
  t.textContent = text || '';
  t.classList.add('show');
  if(toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 1500);
}

function goBackQQ(){
  window.location.href = 'qq.html';
}

function triggerUpload(){
  const input = document.getElementById('composeImage');
  if(input) input.click();
}

function onPickImage(evt){
  const file = evt && evt.target && evt.target.files ? evt.target.files[0] : null;
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    draftImage = typeof reader.result === 'string' ? reader.result : '';
    const preview = document.getElementById('imagePreview');
    const img = document.getElementById('previewImg');
    if(preview && img && draftImage){
      img.src = draftImage;
      preview.style.display = 'block';
    }
  };
  reader.readAsDataURL(file);
}

function getPosts(){
  try{
    const posts = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    return Array.isArray(posts) ? posts : [];
  }catch(e){
    return [];
  }
}

function savePosts(posts){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(posts));
}

function fmtTime(ts){
  try{
    const d = new Date(ts);
    if(Number.isNaN(d.getTime())) return '';
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,'0');
    const day = String(d.getDate()).padStart(2,'0');
    const h = String(d.getHours()).padStart(2,'0');
    const min = String(d.getMinutes()).padStart(2,'0');
    return y + '-' + m + '-' + day + ' ' + h + ':' + min;
  }catch(e){
    return '';
  }
}

function renderFeed(){
  const host = document.getElementById('feedList');
  if(!host) return;
  const posts = getPosts().sort((a,b)=> (b.createdAt||0) - (a.createdAt||0));
  if(!posts.length){
    host.innerHTML = '<div class="empty">还没有朋友圈，先发布第一条吧。</div>';
    return;
  }
  host.innerHTML = posts.map((post)=>{
    const comments = Array.isArray(post.comments) ? post.comments : [];
    return '<article class="post">'
      + '<div class="post-head"><span class="author">我</span><span class="time">' + esc(fmtTime(post.createdAt)) + '</span></div>'
      + (post.text ? '<div class="post-text">' + esc(post.text) + '</div>' : '')
      + (post.image ? '<div class="post-img-wrap"><img src="' + post.image + '" alt="post image"></div>' : '')
      + '<div class="comment-box">'
      + '<div class="comment-list">'
      + (comments.length ? comments.map((c)=>'<div class="comment-item">' + esc(c.text) + '</div>').join('') : '<div class="comment-item">还没有评论，快来抢沙发。</div>')
      + '</div>'
      + '<div class="comment-input-row">'
      + '<input class="comment-input" id="comment-' + esc(post.id) + '" maxlength="120" placeholder="写评论...">'
      + '<button class="comment-btn" type="button" onclick="addComment(\'' + esc(post.id) + '\')">评论</button>'
      + '</div>'
      + '</div>'
      + '</article>';
  }).join('');
}

function publishPost(){
  const textEl = document.getElementById('composeText');
  const text = textEl ? (textEl.value || '').trim() : '';
  if(!text && !draftImage){
    showToast('写点内容或加一张图');
    return;
  }
  const posts = getPosts();
  posts.push({
    id: 'post_' + Date.now() + '_' + Math.random().toString(36).slice(2,7),
    text: text,
    image: draftImage,
    createdAt: Date.now(),
    comments: []
  });
  savePosts(posts);
  if(textEl) textEl.value = '';
  draftImage = '';
  const input = document.getElementById('composeImage');
  if(input) input.value = '';
  const preview = document.getElementById('imagePreview');
  if(preview) preview.style.display = 'none';
  renderFeed();
  showToast('已发布');
}

function addComment(postId){
  const input = document.getElementById('comment-' + postId);
  const text = input ? (input.value || '').trim() : '';
  if(!text){
    showToast('评论不能为空');
    return;
  }
  const posts = getPosts();
  const idx = posts.findIndex((p)=>p.id === postId);
  if(idx === -1) return;
  const comments = Array.isArray(posts[idx].comments) ? posts[idx].comments : [];
  comments.push({ id: 'c_' + Date.now(), text: text, at: Date.now() });
  posts[idx].comments = comments;
  savePosts(posts);
  if(input) input.value = '';
  renderFeed();
}

renderFeed();
</script>
</body>
</html>
