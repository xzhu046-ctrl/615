<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,viewport-fit=cover">
<title>约会</title>
<style>
:root{
  --safe-top:max(env(safe-area-inset-top), 0px);
  --safe-bottom:max(env(safe-area-inset-bottom), 0px);
  --paper:#f5f4f1;
  --panel:#ffffff;
  --ink:#101010;
  --muted:#6b6b6b;
  --line:rgba(16,16,16,.14);
  --shadow:4px 4px 0 #111;
  --serif:"Baskerville","Times New Roman","Songti SC",serif;
  --sans:"Avenir Next","PingFang SC","Hiragino Sans GB",sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{
  margin:0;
  width:100%;
  min-height:100%;
  background:
    radial-gradient(circle at 20% 10%, rgba(0,0,0,.06) 0, rgba(0,0,0,0) 24%),
    radial-gradient(circle at 78% 18%, rgba(0,0,0,.05) 0, rgba(0,0,0,0) 20%),
    linear-gradient(180deg,#fbfaf7 0%,#f1efea 100%);
  color:var(--ink);
  font-family:var(--sans);
}
body{display:flex;justify-content:center}
.offline-page{
  width:100%;
  max-width:430px;
  min-height:100vh;
  padding:calc(var(--safe-top) + 16px) 14px calc(var(--safe-bottom) + 26px);
  position:relative;
  overflow:auto;
}
.offline-page::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background-image:radial-gradient(rgba(0,0,0,.055) .8px, transparent .8px);
  background-size:12px 12px;
  mask-image:linear-gradient(180deg, rgba(0,0,0,.3), rgba(0,0,0,.1));
  opacity:.45;
}
.offline-stack{position:relative;display:flex;flex-direction:column;gap:14px;z-index:1}
.month-card,
.hero-card,
.filters-card,
.thread-card,
.empty-card{
  position:relative;
  border:2px solid var(--ink);
  border-radius:28px;
  background:rgba(255,255,255,.92);
  box-shadow:var(--shadow);
  overflow:hidden;
}
.month-card{padding:18px 16px 16px}
.month-row{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:12px;
  margin-bottom:16px;
}
.month-label{
  display:flex;
  flex-direction:column;
  gap:4px;
}
.month-title{
  font-family:var(--serif);
  font-size:30px;
  font-weight:900;
  letter-spacing:.02em;
  line-height:1;
}
.month-sub{
  font-size:12px;
  font-weight:800;
  color:var(--muted);
  letter-spacing:.03em;
}
.month-pill{
  display:inline-flex;
  align-items:center;
  gap:8px;
  min-height:34px;
  padding:0 12px;
  border:1.8px solid var(--ink);
  border-radius:999px;
  background:#fff;
  font-size:11px;
  font-weight:900;
  letter-spacing:.03em;
  white-space:nowrap;
}
.month-pill-dot{
  width:9px;
  height:9px;
  border:1.8px solid var(--ink);
  border-radius:999px;
  background:#111;
}
.weekdays,
.calendar-strip{
  display:grid;
  grid-template-columns:repeat(7,minmax(0,1fr));
  gap:8px;
}
.weekdays{
  margin-bottom:8px;
  padding:0 4px;
  font-size:11px;
  font-weight:900;
  color:#7a7a7a;
  text-align:center;
}
.day-chip{
  min-height:82px;
  border:1.5px solid transparent;
  border-radius:24px;
  padding:10px 6px 8px;
  text-align:center;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  gap:6px;
}
.day-chip.is-active{
  background:#111;
  color:#fff;
  box-shadow:3px 3px 0 #fff, 5px 5px 0 #111;
}
.day-chip-day{
  font-size:28px;
  font-family:var(--serif);
  font-weight:900;
  line-height:1;
}
.day-chip-meta{
  font-size:10px;
  font-weight:900;
  letter-spacing:.04em;
  color:#8c8c8c;
}
.day-chip.is-active .day-chip-meta{color:rgba(255,255,255,.72)}
.hero-card{
  padding:14px;
  background:
    linear-gradient(180deg, rgba(255,255,255,.98) 0%, rgba(248,248,246,.98) 100%);
}
.hero-grid{
  display:grid;
  grid-template-columns:92px minmax(0,1fr);
  gap:12px;
  align-items:stretch;
}
.hero-art{
  position:relative;
  border:2px solid var(--ink);
  border-radius:24px;
  overflow:hidden;
  min-height:120px;
  background:
    linear-gradient(145deg, rgba(0,0,0,.1), rgba(0,0,0,0)),
    #ece9e3 center/cover no-repeat;
}
.hero-art::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(0,0,0,.18));
}
.hero-clip{
  position:absolute;
  left:10px;
  top:10px;
  z-index:1;
  min-width:42px;
  min-height:26px;
  padding:0 10px;
  border:2px solid var(--ink);
  border-radius:999px;
  background:#fff;
  box-shadow:2px 2px 0 #111;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-size:11px;
  font-weight:900;
}
.hero-copy{
  min-width:0;
  display:flex;
  flex-direction:column;
  gap:10px;
}
.hero-top{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:10px;
}
.hero-name{
  font-family:var(--serif);
  font-size:26px;
  font-weight:900;
  line-height:1.05;
  font-style:italic;
}
.hero-stage{
  display:inline-flex;
  align-items:center;
  gap:7px;
  min-height:28px;
  padding:0 10px;
  border:1.8px solid var(--ink);
  border-radius:999px;
  background:#fff;
  font-size:10px;
  font-weight:900;
  letter-spacing:.08em;
  text-transform:uppercase;
}
.hero-stage-dot{
  width:10px;
  height:10px;
  border:1.8px solid var(--ink);
  border-radius:999px;
  background:#111;
}
.hero-stage.is-pending .hero-stage-dot{background:#b53b3b}
.hero-stage.is-accepted .hero-stage-dot{background:#2f8d4a}
.hero-stage.is-rejected .hero-stage-dot{background:#808080}
.hero-blurb{
  font-size:13px;
  line-height:1.7;
  font-weight:800;
  color:#2c2c2c;
}
.hero-meta{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}
.hero-chip{
  display:inline-flex;
  align-items:center;
  min-height:30px;
  padding:0 10px;
  border:1.8px solid var(--ink);
  border-radius:999px;
  background:#fff;
  font-size:11px;
  font-weight:900;
  color:#2c2c2c;
}
.hero-roster{
  display:flex;
  align-items:center;
  gap:10px;
  padding-top:2px;
}
.hero-face{
  width:44px;
  height:44px;
  border:2px solid var(--ink);
  border-radius:16px;
  overflow:hidden;
  background:#d9d9d6 center/cover no-repeat;
  box-shadow:2px 2px 0 #111;
  filter:grayscale(1) contrast(1.05);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:15px;
  font-weight:900;
}
.hero-face.is-selected{transform:translateY(-2px)}
.filters-card{
  padding:12px 12px 10px;
  display:flex;
  flex-direction:column;
  gap:12px;
}
.filters-tabs{
  display:flex;
  gap:8px;
  overflow:auto;
  padding-bottom:2px;
}
.filter-tab{
  border:2px solid var(--ink);
  border-radius:999px;
  background:#fff;
  color:#111;
  min-height:38px;
  padding:0 16px;
  font-family:var(--serif);
  font-size:16px;
  font-weight:900;
  font-style:italic;
  box-shadow:2px 2px 0 #111;
  white-space:nowrap;
}
.filter-tab.is-active{
  background:#111;
  color:#fff;
  box-shadow:2px 2px 0 #fff, 4px 4px 0 #111;
}
.filters-tip{
  display:flex;
  align-items:center;
  gap:10px;
  padding:0 4px;
  font-size:12px;
  font-weight:800;
  color:#4c4c4c;
}
.filters-star{
  width:18px;
  height:18px;
  flex-shrink:0;
}
.thread-list{display:flex;flex-direction:column;gap:12px}
.thread-card{
  padding:14px 14px 12px;
  display:grid;
  grid-template-columns:58px minmax(0,1fr);
  gap:12px;
  align-items:start;
}
.thread-card.is-selected{transform:translateY(-1px)}
.thread-avatar{
  width:58px;
  height:58px;
  border:2px solid var(--ink);
  border-radius:18px;
  overflow:hidden;
  background:#d8d8d5 center/cover no-repeat;
  box-shadow:2px 2px 0 #111;
  filter:grayscale(1) contrast(1.08);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  font-weight:900;
}
.thread-main{
  min-width:0;
  display:flex;
  flex-direction:column;
  gap:6px;
}
.thread-top{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:10px;
}
.thread-name{
  font-family:var(--serif);
  font-size:19px;
  font-weight:900;
  font-style:italic;
  line-height:1.15;
}
.thread-time{
  font-size:11px;
  font-weight:900;
  color:#9b9b9b;
  white-space:nowrap;
}
.thread-preview{
  font-size:13px;
  line-height:1.55;
  font-weight:800;
  color:#313131;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
}
.thread-sub{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  flex-wrap:wrap;
}
.thread-meta{
  font-size:11px;
  font-weight:900;
  color:#7e7e7e;
  letter-spacing:.03em;
}
.thread-stage{
  display:inline-flex;
  align-items:center;
  gap:7px;
  font-size:10px;
  font-weight:900;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:#373737;
}
.thread-stage-dot{
  width:10px;
  height:10px;
  border:1.8px solid var(--ink);
  border-radius:999px;
  background:#111;
}
.thread-stage.is-pending .thread-stage-dot{background:#b53b3b}
.thread-stage.is-accepted .thread-stage-dot{background:#2f8d4a}
.thread-stage.is-rejected .thread-stage-dot{background:#808080}
.empty-card{
  min-height:260px;
  padding:26px 20px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  gap:12px;
}
.empty-title{
  font-family:var(--serif);
  font-size:26px;
  font-weight:900;
  font-style:italic;
}
.empty-copy{
  max-width:260px;
  font-size:13px;
  line-height:1.8;
  font-weight:800;
  color:#565656;
}
</style>
</head>
<body>
  <main class="offline-page">
    <div class="offline-stack">
      <section class="month-card" id="monthCard"></section>
      <section class="hero-card" id="heroCard"></section>
      <section class="filters-card">
        <div class="filters-tabs" id="filterTabs"></div>
        <div class="filters-tip">
          <svg class="filters-star" viewBox="0 0 24 24" aria-hidden="true"><path fill="none" stroke="#111" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" d="m12 3 2.6 5.27 5.82.85-4.21 4.1 1 5.78L12 16.98 6.79 19l1-5.78-4.21-4.1 5.82-.85z"/></svg>
          <span id="filtersTip">答应下来的见面会立刻收进这里，也会顺手记进日程。</span>
        </div>
      </section>
      <section class="thread-list" id="threadList"></section>
    </div>
  </main>
<script src="../assetStore.js"></script>
<script src="../offlineInviteStore.js"></script>
<script>
var currentFilter = 'all';
var currentSelectedId = '';

function esc(text){
  return String(text == null ? '' : text)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

function getParentCharacters(){
  try{
    if(window.parent && window.parent !== window && typeof window.parent.getStoredCharactersSnapshot === 'function'){
      return window.parent.getStoredCharactersSnapshot();
    }
  }catch(err){}
  return [];
}

function getScopedFocusKey(){
  try{
    if(window.parent && window.parent !== window && typeof window.parent.scopedKeyForAccount === 'function' && typeof window.parent.getActiveAccountId === 'function'){
      return window.parent.scopedKeyForAccount('offline_invite_focus_id_v1', window.parent.getActiveAccountId());
    }
  }catch(err){}
  return 'offline_invite_focus_id_v1';
}

function readFocusId(){
  try{
    return String(localStorage.getItem(getScopedFocusKey()) || localStorage.getItem('offline_invite_focus_id_v1') || '').trim();
  }catch(err){
    return '';
  }
}

function clearFocusId(){
  try{ localStorage.removeItem(getScopedFocusKey()); }catch(err){}
  try{ localStorage.removeItem('offline_invite_focus_id_v1'); }catch(err){}
}

function findByDataAttr(root, attr, value){
  var list = root && root.querySelectorAll ? root.querySelectorAll('[' + attr + ']') : [];
  for(var i = 0; i < list.length; i += 1){
    if(String(list[i].getAttribute(attr) || '') === String(value || '')) return list[i];
  }
  return null;
}

function getOfflineRecords(){
  var store = window.OfflineInviteStore;
  if(!(store && typeof store.listRecords === 'function')) return [];
  return store.listRecords().filter(function(item){
    return item && (String(item.charId || '').trim() || String(item.charName || '').trim());
  });
}

function getRecordStage(item){
  var status = String(item && item.status || 'pending').trim() || 'pending';
  if(status === 'accepted'){
    return { tone:'accepted', label:'Planned', note:'已经写进日程' };
  }
  if(status === 'rejected'){
    return { tone:'rejected', label:'Declined', note:'这次没有约成' };
  }
  return { tone:'pending', label:'Pending', note:'还在等对方回应' };
}

function getRecordPreview(item){
  var preview = String(item && item.previewText || '').trim();
  if(preview) return preview;
  var stage = getRecordStage(item);
  if(stage.tone === 'accepted') return '时间和地点已经定下来了，也已经顺手写进日程。';
  if(stage.tone === 'rejected') return '这次先没有约成，之后也许还能再找个更合适的时间。';
  return '邀约已经发出去，现在就等对方给一个自然的回答。';
}

function getRecordMeta(item){
  return [
    String(item && item.dateLabel || '').trim(),
    String(item && item.timeLabel || '').trim(),
    String(item && item.location || '').trim()
  ].filter(Boolean).join(' · ');
}

function getRecordTimeStamp(item){
  var updatedAt = Number(item && (item.updatedAt || item.createdAt) || 0) || 0;
  if(!updatedAt) return '';
  var date = new Date(updatedAt);
  var hh = String(date.getHours()).padStart(2, '0');
  var mm = String(date.getMinutes()).padStart(2, '0');
  return hh + ':' + mm;
}

function getRecordDateObj(item){
  var raw = String(item && item.scheduledDate || '').trim();
  if(!/^\d{4}-\d{2}-\d{2}$/.test(raw)) return new Date();
  var parts = raw.split('-');
  return new Date(Number(parts[0]) || 0, Math.max(0, (Number(parts[1]) || 1) - 1), Number(parts[2]) || 1);
}

function formatMonthTitle(date){
  var safe = date instanceof Date ? date : new Date();
  return safe.getFullYear() + '年' + (safe.getMonth() + 1) + '月';
}

function formatWeekRange(date){
  var safe = date instanceof Date ? new Date(date.getTime()) : new Date();
  var day = safe.getDay();
  var offset = day === 0 ? 6 : day - 1;
  safe.setDate(safe.getDate() - offset);
  var start = new Date(safe.getTime());
  var end = new Date(safe.getTime());
  end.setDate(start.getDate() + 6);
  function shortDate(value){
    return (value.getMonth() + 1) + '.' + value.getDate();
  }
  return '本周 ' + shortDate(start) + ' ~ ' + shortDate(end);
}

function formatLunarStub(date){
  var safe = date instanceof Date ? date : new Date();
  var day = safe.getDate();
  if(day === 1) return '初一';
  if(day < 11) return '初' + day;
  if(day < 20) return '十' + (day - 10);
  if(day === 20) return '二十';
  if(day < 30) return '廿' + (day - 20);
  return '三十';
}

function buildWeekDays(date){
  var safe = date instanceof Date ? new Date(date.getTime()) : new Date();
  var day = safe.getDay();
  var offset = day === 0 ? 6 : day - 1;
  safe.setDate(safe.getDate() - offset);
  var list = [];
  for(var i = 0; i < 7; i += 1){
    var item = new Date(safe.getTime());
    item.setDate(safe.getDate() + i);
    list.push(item);
  }
  return list;
}

function resolveCharAvatar(charId){
  var safeId = String(charId || '').trim();
  var chars = getParentCharacters();
  var match = Array.isArray(chars) ? chars.find(function(item){ return item && String(item.id || '') === safeId; }) : null;
  if(match && String(match.imageData || '').trim()) return Promise.resolve(String(match.imageData || '').trim());
  if(match && String(match.avatar || '').trim() && /^data:|^blob:|^https?:|^\.{0,2}\//i.test(String(match.avatar || '').trim())){
    return Promise.resolve(String(match.avatar || '').trim());
  }
  if(window.loadStoredAsset && safeId){
    return loadStoredAsset('char_avatar_' + safeId).catch(function(){ return ''; });
  }
  return Promise.resolve('');
}

function filterRecords(records){
  var list = Array.isArray(records) ? records.slice() : [];
  if(currentFilter === 'accepted') return list.filter(function(item){ return getRecordStage(item).tone === 'accepted'; });
  if(currentFilter === 'pending') return list.filter(function(item){ return getRecordStage(item).tone === 'pending'; });
  if(currentFilter === 'rejected') return list.filter(function(item){ return getRecordStage(item).tone === 'rejected'; });
  if(currentFilter === 'recent') return list.slice(0, 6);
  return list;
}

function pickSelectedRecord(records){
  var list = Array.isArray(records) ? records : [];
  var focusId = readFocusId();
  var chosen = null;
  if(focusId){
    chosen = list.find(function(item){ return String(item.id || '') === focusId; }) || null;
  }
  if(!chosen && currentSelectedId){
    chosen = list.find(function(item){ return String(item.id || '') === currentSelectedId; }) || null;
  }
  if(!chosen){
    chosen = list.find(function(item){ return getRecordStage(item).tone === 'accepted'; })
      || list[0]
      || null;
  }
  currentSelectedId = chosen ? String(chosen.id || '').trim() : '';
  if(focusId) clearFocusId();
  return chosen;
}

function renderMonthCard(selectedRecord){
  var root = document.getElementById('monthCard');
  if(!root) return;
  var anchor = selectedRecord ? getRecordDateObj(selectedRecord) : new Date();
  var week = buildWeekDays(anchor);
  var selectedDateKey = selectedRecord && String(selectedRecord.scheduledDate || '').trim()
    ? String(selectedRecord.scheduledDate || '').trim()
    : [
        anchor.getFullYear(),
        String(anchor.getMonth() + 1).padStart(2, '0'),
        String(anchor.getDate()).padStart(2, '0')
      ].join('-');
  var pillText = selectedRecord && getRecordStage(selectedRecord).tone === 'accepted'
    ? '已写进日程'
    : 'Date App';
  root.innerHTML = ''
    + '<div class="month-row">'
    +   '<div class="month-label">'
    +     '<div class="month-title">' + esc(formatMonthTitle(anchor)) + '</div>'
    +     '<div class="month-sub">' + esc(formatWeekRange(anchor)) + '</div>'
    +   '</div>'
    +   '<div class="month-pill"><span class="month-pill-dot"></span><span>' + esc(pillText) + '</span></div>'
    + '</div>'
    + '<div class="weekdays"><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div><div>日</div></div>'
    + '<div class="calendar-strip">'
    + week.map(function(item){
        var key = [
          item.getFullYear(),
          String(item.getMonth() + 1).padStart(2, '0'),
          String(item.getDate()).padStart(2, '0')
        ].join('-');
        var active = key === selectedDateKey ? ' is-active' : '';
        return '<div class="day-chip' + active + '">'
          + '<div class="day-chip-day">' + esc(item.getDate()) + '</div>'
          + '<div class="day-chip-meta">' + esc(formatLunarStub(item)) + '</div>'
          + '</div>';
      }).join('')
    + '</div>';
}

function renderHeroCard(records, selectedRecord){
  var root = document.getElementById('heroCard');
  if(!root) return;
  if(!selectedRecord){
    root.innerHTML = '<div class="empty-card"><div class="empty-title">Date App</div><div class="empty-copy">等一场见面真的被约下来，这里就会像一本黑白漫画一样，把你们的时间地点和聊天余温一起收好。</div></div>';
    return;
  }
  var stage = getRecordStage(selectedRecord);
  var metaParts = getRecordMeta(selectedRecord);
  var roster = records.slice(0, 4);
  root.innerHTML = ''
    + '<div class="hero-grid">'
    +   '<div class="hero-art" id="heroArt"><div class="hero-clip">' + esc(stage.label) + '</div></div>'
    +   '<div class="hero-copy">'
    +     '<div class="hero-top">'
    +       '<div class="hero-name">' + esc(selectedRecord.charName || '未命名角色') + '</div>'
    +       '<div class="hero-stage is-' + esc(stage.tone) + '"><span class="hero-stage-dot"></span><span>' + esc(stage.label) + '</span></div>'
    +     '</div>'
    +     '<div class="hero-blurb">' + esc(getRecordPreview(selectedRecord)) + '</div>'
    +     '<div class="hero-meta">'
    +       (metaParts ? ('<div class="hero-chip">' + esc(metaParts) + '</div>') : '')
    +       (selectedRecord.scheduleEntryId ? '<div class="hero-chip">已写进日程</div>' : '')
    +     '</div>'
    +     '<div class="hero-roster">' + roster.map(function(item){
            var label = String(item.charName || '角').slice(0, 1) || '角';
            var active = String(item.id || '') === String(selectedRecord.id || '') ? ' is-selected' : '';
            return '<button class="hero-face' + active + '" type="button" data-hero-record="' + esc(item.id) + '">' + esc(label) + '</button>';
          }).join('') + '</div>'
    +   '</div>'
    + '</div>';
  var art = document.getElementById('heroArt');
  if(art){
    art.style.backgroundImage = 'url("assets/黑白城市.jpg")';
  }
  roster.forEach(function(item){
    resolveCharAvatar(item.charId).then(function(src){
      var safe = String(src || '').trim();
      if(!safe) return;
      var node = findByDataAttr(root, 'data-hero-record', item.id);
      if(!node) return;
      node.style.backgroundImage = 'url(' + JSON.stringify(safe) + ')';
      node.textContent = '';
    }).catch(function(){});
  });
}

function renderFilterTabs(records){
  var root = document.getElementById('filterTabs');
  var tip = document.getElementById('filtersTip');
  if(!root || !tip) return;
  var counts = {
    all: records.length,
    accepted: records.filter(function(item){ return getRecordStage(item).tone === 'accepted'; }).length,
    pending: records.filter(function(item){ return getRecordStage(item).tone === 'pending'; }).length,
    rejected: records.filter(function(item){ return getRecordStage(item).tone === 'rejected'; }).length,
    recent: Math.min(records.length, 6)
  };
  var tabs = [
    { id:'all', label:'All' },
    { id:'accepted', label:'Planned' },
    { id:'pending', label:'Pending' },
    { id:'rejected', label:'Declined' },
    { id:'recent', label:'Recent' }
  ];
  root.innerHTML = tabs.map(function(tab){
    var active = tab.id === currentFilter ? ' is-active' : '';
    return '<button class="filter-tab' + active + '" type="button" data-filter-id="' + esc(tab.id) + '">' + esc(tab.label) + ' ' + esc(counts[tab.id] || 0) + '</button>';
  }).join('');
  tip.textContent = currentFilter === 'accepted'
    ? '答应下来的见面会立刻收进这里，也会顺手记进日程。'
    : currentFilter === 'pending'
      ? '还没回音的见面会先排在这里，像等一条迟一点才来的消息。'
      : currentFilter === 'rejected'
        ? '没约成的也会留痕，但语气和状态都会更安静一点。'
        : '这页会把见面记录收成一个黑白漫画风的 date app 首页。';
}

function renderThreadList(records, selectedRecord){
  var root = document.getElementById('threadList');
  if(!root) return;
  var list = filterRecords(records);
  if(!list.length){
    root.innerHTML = '<article class="empty-card"><div class="empty-title">Nothing Yet</div><div class="empty-copy">这一栏暂时还是空的。等你们开始约时间、定地点、或者被答应一次见面，它就会慢慢长成一排黑白小对话。</div></article>';
    return;
  }
  root.innerHTML = list.map(function(item){
    var stage = getRecordStage(item);
    var active = selectedRecord && String(selectedRecord.id || '') === String(item.id || '') ? ' is-selected' : '';
    var fallback = esc(String(item.charName || '角').slice(0, 1) || '角');
    return '<article class="thread-card' + active + '" data-record-id="' + esc(item.id) + '">'
      + '<button class="thread-avatar" type="button" data-avatar-id="' + esc(item.id) + '">' + fallback + '</button>'
      + '<div class="thread-main">'
      +   '<div class="thread-top"><div class="thread-name">' + esc(item.charName || '未命名角色') + '</div><div class="thread-time">' + esc(getRecordTimeStamp(item)) + '</div></div>'
      +   '<div class="thread-preview">' + esc(getRecordPreview(item)) + '</div>'
      +   '<div class="thread-sub">'
      +     '<div class="thread-meta">' + esc(getRecordMeta(item) || '时间地点待定') + '</div>'
      +     '<div class="thread-stage is-' + esc(stage.tone) + '"><span class="thread-stage-dot"></span><span>' + esc(stage.note) + '</span></div>'
      +   '</div>'
      + '</div>'
      + '</article>';
  }).join('');
  list.forEach(function(item){
    resolveCharAvatar(item.charId).then(function(src){
      var safe = String(src || '').trim();
      if(!safe) return;
      var node = findByDataAttr(root, 'data-avatar-id', item.id);
      if(!node) return;
      node.style.backgroundImage = 'url(' + JSON.stringify(safe) + ')';
      node.textContent = '';
    }).catch(function(){});
  });
}

function renderOfflineApp(){
  var records = getOfflineRecords();
  var selected = pickSelectedRecord(records);
  renderMonthCard(selected);
  renderHeroCard(records, selected);
  renderFilterTabs(records);
  renderThreadList(records, selected);
}

document.addEventListener('click', function(event){
  var filterBtn = event.target && event.target.closest ? event.target.closest('[data-filter-id]') : null;
  if(filterBtn){
    currentFilter = String(filterBtn.getAttribute('data-filter-id') || 'all');
    renderOfflineApp();
    return;
  }
  var recordBtn = event.target && event.target.closest ? event.target.closest('[data-record-id], [data-hero-record]') : null;
  if(recordBtn){
    currentSelectedId = String(recordBtn.getAttribute('data-record-id') || recordBtn.getAttribute('data-hero-record') || '').trim();
    renderOfflineApp();
  }
});

window.addEventListener('message', function(e){
  var data = e.data || {};
  if(data.type === 'OFFLINE_INVITE_STORE_DIRTY' || data.type === 'OPEN_SHELL_NOTIFICATION'){
    renderOfflineApp();
  }
});

window.addEventListener('storage', function(e){
  if(e && /offline_invite/i.test(String(e.key || ''))) renderOfflineApp();
});

document.addEventListener('visibilitychange', function(){
  if(document.visibilityState === 'visible') renderOfflineApp();
});

renderOfflineApp();
setInterval(renderOfflineApp, 20000);
</script>
</body>
</html>
