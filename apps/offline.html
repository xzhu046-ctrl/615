<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,viewport-fit=cover">
<title>约会</title>
<style>
:root{
  --safe-top:max(env(safe-area-inset-top), 0px);
  --safe-bottom:max(env(safe-area-inset-bottom), 0px);
  --paper:#f7f7f5;
  --panel:#ffffff;
  --ink:#101010;
  --muted:#5f5f5f;
  --line:rgba(16,16,16,.18);
  --shadow:6px 6px 0 rgba(17,17,17,.22);
  --frame-shadow:2px 2px 0 #111, 4px 4px 0 #fff, 8px 8px 0 rgba(17,17,17,.18);
  --serif:"Baskerville","Times New Roman","Songti SC",serif;
  --sans:"Avenir Next","PingFang SC","Hiragino Sans GB",sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{
  margin:0;
  width:100%;
  min-height:100%;
  background:
    radial-gradient(circle at 20% 10%, rgba(0,0,0,.045) 0, rgba(0,0,0,0) 24%),
    radial-gradient(circle at 78% 18%, rgba(0,0,0,.04) 0, rgba(0,0,0,0) 20%),
    linear-gradient(180deg,#fdfdfc 0%,#f3f3f1 100%);
  color:var(--ink);
  font-family:var(--sans);
}
body{display:flex;justify-content:center}
.offline-page{
  width:100%;
  max-width:430px;
  height:100vh;
  height:100dvh;
  min-height:100vh;
  min-height:100dvh;
  padding:calc(var(--safe-top) - 6px) 14px calc(var(--safe-bottom) + 10px);
  position:relative;
  overflow:hidden;
  display:flex;
  flex-direction:column;
}
.offline-page::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background-image:radial-gradient(rgba(0,0,0,.055) .8px, transparent .8px);
  background-size:12px 12px;
  mask-image:linear-gradient(180deg, rgba(0,0,0,.3), rgba(0,0,0,.1));
  opacity:.24;
}
.offline-stack{
  position:relative;
  display:flex;
  flex-direction:column;
  gap:14px;
  z-index:1;
  flex:1;
  min-height:0;
}
.month-card,
.filters-card,
.thread-card{
  position:relative;
  border:2px solid var(--ink);
  border-radius:0;
  background:rgba(255,255,255,.92);
  box-shadow:var(--frame-shadow);
  overflow:hidden;
}
.month-card{
  padding:14px 14px 16px;
  background:linear-gradient(180deg, rgba(255,255,255,.985) 0%, rgba(246,246,244,.98) 100%);
}
.month-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  margin-bottom:16px;
}
.month-exit{
  width:34px;
  height:34px;
  padding:0;
  flex:0 0 auto;
  margin-top:-9px;
  border:2px solid var(--ink);
  border-radius:0;
  background:#fff;
  box-shadow:2px 2px 0 #111, 4px 4px 0 #fff, 6px 6px 0 rgba(17,17,17,.18);
  color:#111;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-size:17px;
  font-weight:900;
}
.month-exit:active{
  transform:translate(2px, 2px);
  box-shadow:1px 1px 0 #111, 2px 2px 0 #fff, 3px 3px 0 rgba(17,17,17,.16);
}
.month-label{
  display:flex;
  flex-direction:column;
  gap:4px;
  min-width:0;
  margin-left:auto;
  align-items:flex-end;
  text-align:right;
}
.month-title{
  font-family:var(--serif);
  font-size:30px;
  font-weight:900;
  letter-spacing:.02em;
  line-height:1;
}
.month-sub{
  font-size:12px;
  font-weight:800;
  color:var(--muted);
  letter-spacing:.03em;
}
.weekdays,
.calendar-strip{
  display:grid;
  grid-template-columns:repeat(7,minmax(0,1fr));
  gap:8px;
}
.weekdays{
  margin-bottom:8px;
  padding:0 4px;
  font-size:11px;
  font-weight:900;
  color:#7a7a7a;
  text-align:center;
}
.day-chip{
  min-height:82px;
  border:1.5px solid var(--line);
  border-radius:0;
  padding:10px 6px 8px;
  color:#111;
  font:inherit;
  text-align:center;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  gap:6px;
  background:rgba(255,255,255,.84);
  cursor:pointer;
}
.day-chip.is-active{
  background:#fff;
  color:#111;
  border-color:#111;
  box-shadow:inset 0 0 0 2px #111, 2px 2px 0 #fff, 4px 4px 0 #111;
}
.day-chip-day{
  font-size:28px;
  font-family:var(--serif);
  font-weight:900;
  line-height:1;
}
.day-chip-meta{
  font-size:10px;
  font-weight:900;
  letter-spacing:.04em;
  color:#8c8c8c;
}
.day-chip.is-active .day-chip-meta{color:#111}
.day-chip-dot{
  width:8px;
  height:8px;
  border-radius:999px;
  background:#111;
  border:1.5px solid #111;
}
.day-chip.is-active .day-chip-dot{
  background:#111;
  border-color:#111;
}
.day-chip-ghost{
  width:8px;
  height:8px;
}
.filters-card{
  padding:10px;
  background:#111;
  box-shadow:2px 2px 0 #fff, 4px 4px 0 #111, 8px 8px 0 rgba(17,17,17,.16);
}
.filters-tabs{
  display:flex;
  gap:10px;
  overflow:auto;
  padding-bottom:2px;
}
.filter-tab{
  border:2px solid var(--ink);
  border-radius:0;
  background:#fff;
  color:#111;
  min-height:40px;
  padding:0 14px;
  font-family:var(--serif);
  font-size:16px;
  font-weight:900;
  font-style:italic;
  box-shadow:1px 1px 0 #111;
  white-space:nowrap;
}
.filter-tab.is-active{
  background:#111;
  color:#fff;
  box-shadow:2px 2px 0 #fff, 4px 4px 0 #111;
}
.thread-list{
  display:flex;
  flex-direction:column;
  gap:12px;
  flex:1;
  min-height:0;
  overflow-y:scroll;
  overflow-x:hidden;
  padding:4px 14px 18px 2px;
  scrollbar-width:none;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior-y:auto;
}
.thread-list::-webkit-scrollbar{display:none}
.thread-empty{
  margin:8px 2px 0;
  padding:22px 16px;
  border:2px dashed rgba(17,17,17,.42);
  background:rgba(255,255,255,.72);
  color:#5f5f5f;
  font-size:13px;
  font-weight:900;
  line-height:1.6;
  text-align:center;
}
.thread-row{
  position:relative;
  min-height:144px;
  overflow:visible;
}
.thread-row + .thread-row::before{
  content:"";
  position:absolute;
  left:8px;
  right:18px;
  top:-7px;
  border-top:2px dashed rgba(17,17,17,.38);
}
.thread-delete{
  position:absolute;
  z-index:3;
  top:9px;
  right:0;
  bottom:9px;
  width:72px;
  border:2px solid #7f0f0f;
  border-radius:0;
  background:linear-gradient(180deg,#ff8e8e 0%,#e23434 58%,#9e0f16 100%);
  color:#fff;
  box-shadow:2px 2px 0 #fff, 5px 5px 0 rgba(17,17,17,.22);
  display:flex;
  align-items:center;
  justify-content:center;
  gap:7px;
  font-family:var(--sans);
  font-size:11px;
  font-weight:900;
  letter-spacing:.16em;
  text-transform:uppercase;
  opacity:0;
  pointer-events:none;
  transition:opacity .16s ease;
}
.thread-delete:active{transform:translate(2px,2px)}
.thread-delete svg{width:16px;height:16px;display:block;fill:currentColor;flex:0 0 auto}
.thread-row.is-open .thread-delete{
  opacity:1;
  pointer-events:auto;
}
.thread-item{
  position:relative;
  z-index:1;
  padding:12px;
  display:grid;
  grid-template-columns:88px minmax(0,1fr);
  gap:12px;
  align-items:center;
  will-change:transform;
  touch-action:pan-y;
  transition:transform .18s ease;
}
.thread-row.is-dragging .thread-item{transition:none}
.thread-row.is-open .thread-item{transform:translateX(-72px)}
.thread-item.is-selected{transform:translateY(-1px)}
.thread-row.is-open .thread-item.is-selected{transform:translateX(-72px) translateY(-1px)}
.thread-polaroid{
  position:relative;
  width:88px;
  padding:7px 7px 22px;
  border:2px solid var(--ink);
  background:#fff;
  box-shadow:2px 2px 0 #111, 4px 4px 0 #fff, 7px 7px 0 rgba(17,17,17,.18);
  transform:rotate(-4deg);
}
.thread-polaroid::after{
  content:"";
  position:absolute;
  inset:0;
  border:1px solid rgba(255,255,255,.88);
  pointer-events:none;
}
.thread-avatar{
  position:relative;
  width:100%;
  aspect-ratio:1/1;
  border:2px solid var(--ink);
  border-radius:0;
  overflow:hidden;
  background:#d8d8d5 center/cover no-repeat;
  box-shadow:1px 1px 0 #fff, 2px 2px 0 #111;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  font-weight:900;
}
.thread-avatar img{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  display:none;
}
.thread-avatar.has-image{
  background:#d8d8d5;
}
.thread-avatar.has-image img{
  display:block;
}
.thread-polaroid-label{
  margin-top:7px;
  font-size:10px;
  font-weight:900;
  letter-spacing:.08em;
  text-transform:uppercase;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.thread-main{
  min-width:0;
  display:flex;
  flex-direction:column;
  gap:7px;
}
.thread-top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}
.thread-name{
  font-family:var(--serif);
  font-size:19px;
  font-weight:900;
  font-style:italic;
  line-height:1.15;
}
.thread-time{
  font-size:11px;
  font-weight:900;
  color:#9b9b9b;
  white-space:nowrap;
}
.thread-highlight{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:24px;
  padding:0 10px;
  background:#111;
  color:#fff;
  border:2px solid #111;
  box-shadow:1px 1px 0 #fff, 3px 3px 0 rgba(17,17,17,.18);
  font-size:10px;
  font-weight:900;
  letter-spacing:.1em;
  text-transform:uppercase;
  white-space:nowrap;
}
.thread-preview{
  font-size:13px;
  line-height:1.55;
  font-weight:800;
  color:#313131;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
}
.thread-sub{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  flex-wrap:wrap;
}
.thread-meta{
  font-size:11px;
  font-weight:900;
  color:#7e7e7e;
  letter-spacing:.03em;
}
.thread-stage{
  display:inline-flex;
  align-items:center;
  gap:7px;
  font-size:10px;
  font-weight:900;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:#373737;
}
.thread-stage-dot{
  width:10px;
  height:10px;
  border:1.8px solid var(--ink);
  border-radius:999px;
  background:#111;
}
.thread-stage.is-pending .thread-stage-dot{background:#b53b3b}
.thread-stage.is-accepted .thread-stage-dot{background:#fff}
.thread-stage.is-complete .thread-stage-dot{background:#111}
.thread-stage.is-continued .thread-stage-dot{background:#fff}
.thread-stage.is-upcoming .thread-stage-dot{background:#fff}
.thread-stage.is-ended .thread-stage-dot{background:#fff}
.delete-confirm{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  padding:24px;
  background:rgba(0,0,0,.16);
  z-index:50;
}
.delete-confirm.open{display:flex}
.delete-confirm-sheet{
  width:min(320px, 100%);
  border:2px solid #111;
  background:#fff;
  box-shadow:2px 2px 0 #111, 4px 4px 0 #fff, 8px 8px 0 rgba(17,17,17,.2);
  padding:18px 16px 16px;
  display:flex;
  flex-direction:column;
  gap:12px;
}
.delete-confirm-title{
  font-family:var(--serif);
  font-size:24px;
  font-weight:900;
  line-height:1;
}
.delete-confirm-copy{
  font-size:13px;
  line-height:1.6;
  font-weight:800;
  color:#343434;
}
.delete-confirm-actions{
  display:flex;
  justify-content:flex-end;
  gap:10px;
}
.delete-confirm-btn{
  min-height:38px;
  padding:0 14px;
  border:2px solid #111;
  border-radius:0;
  background:#fff;
  color:#111;
  box-shadow:2px 2px 0 #111, 4px 4px 0 #fff;
  font-size:12px;
  font-weight:900;
  letter-spacing:.08em;
}
.delete-confirm-btn.is-danger{
  border-color:#7f0f0f;
  background:#111;
  color:#fff;
  box-shadow:2px 2px 0 #7f0f0f, 4px 4px 0 #fff;
}
</style>
</head>
<body>
  <main class="offline-page">
    <div class="offline-stack">
      <section class="month-card" id="monthCard"></section>
      <section class="filters-card">
        <div class="filters-tabs" id="filterTabs"></div>
      </section>
      <section class="thread-list" id="threadList"></section>
    </div>
  </main>
  <div class="delete-confirm" id="deleteConfirm" aria-hidden="true">
    <div class="delete-confirm-sheet">
      <div class="delete-confirm-title">删除邀约</div>
      <div class="delete-confirm-copy" id="deleteConfirmCopy">这条邀约会从约会 app 里移走。</div>
      <div class="delete-confirm-actions">
        <button class="delete-confirm-btn" type="button" data-delete-cancel>取消</button>
        <button class="delete-confirm-btn is-danger" type="button" data-delete-confirm>删除</button>
      </div>
    </div>
  </div>
<script src="../assetStore.js"></script>
<script src="../offlineInviteStore.js"></script>
<script>
var currentFilter = 'all';
var currentSelectedId = '';
var currentSelectedDateKey = '';
var avatarAssetCache = {};
var offlineRenderVersion = 0;
var latestOfflineRecords = [];
var offlineSwipeState = null;
var pendingDeleteRecordId = '';

function esc(text){
  return String(text == null ? '' : text)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

function getParentCharacters(){
  try{
    if(window.parent && window.parent !== window && typeof window.parent.getStoredCharactersSnapshot === 'function'){
      return window.parent.getStoredCharactersSnapshot();
    }
  }catch(err){}
  return [];
}

function isRenderableAssetSource(src){
  var value = String(src || '').trim();
  return !!(value && value !== '__asset__' && (value.indexOf('data:') === 0 || value.indexOf('blob:') === 0 || value.indexOf('http') === 0 || value.indexOf('/') === 0 || value.indexOf('./') === 0 || value.indexOf('../') === 0));
}

function getParentCharByIdOrName(charId, charName){
  var safeId = String(charId || '').trim();
  var safeName = String(charName || '').trim().toLowerCase();
  var chars = getParentCharacters();
  if(!Array.isArray(chars)) return null;
  if(safeId){
    var byId = chars.find(function(item){ return item && String(item.id || '') === safeId; }) || null;
    if(byId) return byId;
  }
  if(safeName){
    return chars.find(function(item){
      if(!item) return false;
      var nick = String(item.nickname || '').trim().toLowerCase();
      var name = String(item.name || '').trim().toLowerCase();
      return !!((nick && nick === safeName) || (name && name === safeName));
    }) || null;
  }
  return null;
}

function readStoredCharAvatar(charId){
  var safeId = String(charId || '').trim();
  if(!safeId) return '';
  if(avatarAssetCache[safeId]) return avatarAssetCache[safeId];
  try{
    var direct = String(localStorage.getItem('char_avatar_' + safeId) || '').trim();
    if(isRenderableAssetSource(direct)){
      avatarAssetCache[safeId] = direct;
      return direct;
    }
  }catch(err){}
  return '';
}

function requestStoredCharAvatar(charId, recordId){
  var safeId = String(charId || '').trim();
  var safeRecordId = String(recordId || '').trim();
  if(!safeId || avatarAssetCache[safeId]) return;
  if(!(window.assetStore && typeof window.assetStore.load === 'function')) return;
  window.assetStore.load('char_avatar_' + safeId).then(function(src){
    var clean = String(src || '').trim();
    if(!isRenderableAssetSource(clean)) return;
    avatarAssetCache[safeId] = clean;
    applyThreadAvatarSource(safeRecordId, { type:'image', value: clean });
  }).catch(function(){});
}

function getCharAvatarSource(charId, charName){
  var safeId = String(charId || '').trim();
  var match = getParentCharByIdOrName(charId, charName);
  var override = readStoredCharAvatar(safeId);
  if(override) return { type:'image', value: override };
  if(match && isRenderableAssetSource(match.imageData)) return { type:'image', value: String(match.imageData || '').trim() };
  if(match && isRenderableAssetSource(match.avatarUrl)) return { type:'image', value: String(match.avatarUrl || '').trim() };
  if(match && isRenderableAssetSource(match.avatar)) return { type:'image', value: String(match.avatar || '').trim() };
  return { type:'text', value: String((charName || (match && (match.nickname || match.name)) || '角')).trim().slice(0, 1) || '角' };
}

function applyThreadAvatarSource(recordId, source){
  var root = document.getElementById('threadList');
  if(!root) return;
  var safeRecordId = String(recordId || '').trim();
  if(!safeRecordId) return;
  var node = findByDataAttr(root, 'data-avatar-id', safeRecordId);
  var img = findByDataAttr(root, 'data-avatar-img', safeRecordId);
  if(!node || !img) return;
  if(source && source.type === 'image' && source.value){
    var safe = String(source.value || '').trim();
    img.onerror = function(){
      img.removeAttribute('src');
      node.classList.remove('has-image');
      var brokenFallback = node.childNodes[node.childNodes.length - 1];
      if(brokenFallback && brokenFallback.nodeType === 3) brokenFallback.textContent = '角';
    };
    img.src = safe;
    node.classList.add('has-image');
    node.style.backgroundImage = '';
    var fallbackNode = node.childNodes[node.childNodes.length - 1];
    if(fallbackNode && fallbackNode.nodeType === 3) fallbackNode.textContent = '';
    return;
  }
  img.removeAttribute('src');
  node.classList.remove('has-image');
  var text = String(source && source.value || '角').trim().slice(0, 1) || '角';
  var fallback = node.childNodes[node.childNodes.length - 1];
  if(fallback && fallback.nodeType === 3) fallback.textContent = text;
}

function getScopedFocusKey(){
  try{
    if(window.parent && window.parent !== window && typeof window.parent.scopedKeyForAccount === 'function' && typeof window.parent.getActiveAccountId === 'function'){
      return window.parent.scopedKeyForAccount('offline_invite_focus_id_v1', window.parent.getActiveAccountId());
    }
  }catch(err){}
  return 'offline_invite_focus_id_v1';
}

function readFocusId(){
  try{
    return String(localStorage.getItem(getScopedFocusKey()) || localStorage.getItem('offline_invite_focus_id_v1') || '').trim();
  }catch(err){
    return '';
  }
}

function clearFocusId(){
  try{ localStorage.removeItem(getScopedFocusKey()); }catch(err){}
  try{ localStorage.removeItem('offline_invite_focus_id_v1'); }catch(err){}
}

function findByDataAttr(root, attr, value){
  var list = root && root.querySelectorAll ? root.querySelectorAll('[' + attr + ']') : [];
  for(var i = 0; i < list.length; i += 1){
    if(String(list[i].getAttribute(attr) || '') === String(value || '')) return list[i];
  }
  return null;
}

function getOfflineRecordsFromStore(){
  var store = window.OfflineInviteStore;
  if(!(store && typeof store.listRecords === 'function')) return [];
  return store.listRecords().filter(function(item){
    return item && (String(item.charId || '').trim() || String(item.charName || '').trim());
  });
}

function getHiddenOfflineRecordKey(){
  try{
    if(window.parent && window.parent !== window && typeof window.parent.scopedKeyForAccount === 'function' && typeof window.parent.getActiveAccountId === 'function'){
      return window.parent.scopedKeyForAccount('offline_invite_hidden_ids_v1', window.parent.getActiveAccountId());
    }
  }catch(err){}
  return 'offline_invite_hidden_ids_v1';
}

function readHiddenOfflineRecordIds(){
  var ids = [];
  try{
    ids = JSON.parse(localStorage.getItem(getHiddenOfflineRecordKey()) || localStorage.getItem('offline_invite_hidden_ids_v1') || '[]');
  }catch(err){
    ids = [];
  }
  if(!Array.isArray(ids)) ids = [];
  return ids.reduce(function(map, value){
    var safe = String(value || '').trim();
    if(safe) map[safe] = true;
    return map;
  }, Object.create(null));
}

function writeHiddenOfflineRecordIds(map){
  var list = Object.keys(map || {}).filter(Boolean);
  try{ localStorage.setItem(getHiddenOfflineRecordKey(), JSON.stringify(list)); }catch(err){}
  try{ localStorage.setItem('offline_invite_hidden_ids_v1', JSON.stringify(list)); }catch(err2){}
}

function getCompletedOfflineInviteIdsKey(){
  try{
    if(window.parent && window.parent !== window && typeof window.parent.scopedKeyForAccount === 'function' && typeof window.parent.getActiveAccountId === 'function'){
      return window.parent.scopedKeyForAccount('offline_invite_completed_ids_v1', window.parent.getActiveAccountId());
    }
  }catch(err){}
  return 'offline_invite_completed_ids_v1';
}

function getForceCompleteOfflineInvitePayloadKey(){
  try{
    if(window.parent && window.parent !== window && typeof window.parent.scopedKeyForAccount === 'function' && typeof window.parent.getActiveAccountId === 'function'){

    var wanted = safeIds.reduce(function(map, id){ map[id] = true; return map; }, Object.create(null));
    var targetMap = safeIds.reduce(function(map, id){ map[id] = true; return map; }, Object.create(null));
    var latestSameCharRecordId = '';

            var value = String(record && record[key] || '').trim();

            if(recordIdForChar && !latestSameCharRecordId && meetState !== 'complete' && status !== 'completed' && status !== 'rejected' && status !== 'declined'){
              latestSameCharRecordId = recordIdForChar;
            }
            if(status === 'accepted' || meetState === 'ongoing' || meetState === 'continued' || meetState === 'accepted' || meetState === 'scheduled'){
              var activeRecordId = recordIdForChar;
              if(activeRecordId) targetMap[activeRecordId] = true;

          var anyMeetState = String(record && record.meetState || '').trim();

          if(anyRecordId && anyActive && !anyClosed && !latestActiveRecordId) latestActiveRecordId = anyRecordId;

    }) && latestActiveRecordId){
      targetMap[latestActiveRecordId] = true;
    }
    var targetIds = Object.keys(targetMap);
    markCompletedOfflineInviteIds(targetIds);
    var primaryId = targetIds[0] || safeIds[0] || '';
    targetIds.forEach(function(id){
      try{
        var existing = typeof store.getRecord === 'function' ? store.getRecord(id) : null;
        if(existing || typeof store.getRecord !== 'function'){
          store.patchRecord(id, { status:'completed', meetState:'complete', readOnly:true, completedAt:now, updatedAt:now });

    if(hasRoster && !(charMeta && getParentCharByIdOrName(charId, ''))) continue;
    for(var j = 0; j < history.length; j += 1){
      var record = buildFallbackRecordFromChatEntry(history[j], charMeta);
      if(record) mergeOfflineRecordMaps(map, record);
    }
  }
  return Object.keys(map).map(function(id){ return map[id]; }).sort(function(a, b){
    return (Number(b.updatedAt || b.createdAt || 0) || 0) - (Number(a.updatedAt || a.createdAt || 0) || 0);
  });
}

async function getOfflineRecords(){
  var fromStore = getOfflineRecordsFromStore();
  var map = Object.create(null);
  var hiddenIds = readHiddenOfflineRecordIds();
  fromStore.forEach(function(item){ mergeOfflineRecordMaps(map, item); });
  var fallback = await loadOfflineRecordsFromChatsFallback();
  fallback.forEach(function(item){ mergeOfflineRecordMaps(map, item); });
  return Object.keys(map).map(function(id){ return map[id]; }).sort(function(a, b){
    return (Number(b.updatedAt || b.createdAt || 0) || 0) - (Number(a.updatedAt || a.createdAt || 0) || 0);
  }).map(function(item){
    return normalizeCompletedOfflineRecord(item);
  }).filter(function(item){
    var safeId = String(item && item.id || '').trim();
    return !!(item && safeId && !hiddenIds[safeId] && (String(item.charId || '').trim() || String(item.charName || '').trim()));
  });
}

function isPendingInviteRecord(item){
  var status = String(item && item.status || 'pending').trim() || 'pending';
  var meetState = String(item && item.meetState || '').trim();
  return status === 'pending' && !meetState;
}

function isCompletedInviteRecord(item){
  var meetState = String(item && item.meetState || '').trim();
  var status = String(item && item.status || '').trim();
  return isRecordForceCompleted(item) || meetState === 'complete' || meetState === 'completed' || meetState === 'ended' || status === 'completed' || status === 'rejected' || status === 'declined' || (!!(item && item.readOnly) && !!(item && item.completedAt));
}

function isContinuedInviteRecord(item){
  var meetState = String(item && item.meetState || '').trim();
  return meetState === 'continued';
}

function isOngoingInviteRecord(item){
  var meetState = String(item && item.meetState || '').trim();
  return meetState === 'ongoing';
}

function isAcceptedInviteRecord(item){
  var status = String(item && item.status || '').trim();
  var meetState = String(item && item.meetState || '').trim();
  return status === 'accepted' && (!meetState || meetState === 'scheduled' || meetState === 'accepted');
}

function isUpcomingInviteRecord(item){
  return isAcceptedInviteRecord(item);
}

function getRecordStage(item){
  var status = String(item && item.status || 'pending').trim() || 'pending';
  if(isPendingInviteRecord(item)){
    return { tone:'pending', label:'Pending', note:'pending', badge:'待回复' };
  }
  if(isCompletedInviteRecord(item)){
    return { tone:'complete', label:'Complete', note:'complete', badge:'结束' };
  }
  if(isContinuedInviteRecord(item)){
    return { tone:'continued', label:'To Be Continued', note:'to be continued', badge:'待续' };
  }
  if(isOngoingInviteRecord(item)){
    return { tone:'continued', label:'On Date', note:'on date', badge:'赴约中' };
  }
  if(isAcceptedInviteRecord(item)){
    return { tone:'accepted', label:'Accepted', note:'accepted', badge:'同意' };
  }
  if(status === 'rejected'){
    return { tone:'ended', label:'Ended', note:'declined', badge:'结束' };
  }
  return { tone:'pending', label:'Pending', note:'pending', badge:'待回复' };
}

function getRecordPreview(item){
  var preview = String(item && item.previewText || '').trim();
  if(preview) return preview;
  var stage = getRecordStage(item);
  if(stage.tone === 'pending') return String(item && item.sourceRole || '').trim() === 'assistant'
    ? '对方发来了一个见面邀请，现在还没有同意或拒绝。'
    : '邀约已经发出去，现在还没有得到同意或拒绝。';
  if(stage.tone === 'complete') return '这次见面已经好好收尾，也算认真结束了。';
  if(stage.tone === 'continued') return '这次见面还没真正结束，只是先暂时离开了一下。';
  if(stage.tone === 'accepted') return '这次见面已经说定了，点进来就能直接进入线下。';
  if(stage.tone === 'ended') return '这次先没有约成，之后也许还能再找个更合适的时间。';
  return '邀约已经发出去，现在就等对方给一个自然的回答。';
}

function getRecordMeta(item){
  return [
    String(item && item.dateLabel || '').trim(),
    String(item && item.timeLabel || '').trim(),
    String(item && item.location || '').trim()
  ].filter(Boolean).join(' · ');
}

function getRecordTimeStamp(item){
  var updatedAt = Number(item && (item.updatedAt || item.createdAt) || 0) || 0;
  if(!updatedAt) return '';
  var date = new Date(updatedAt);
  var hh = String(date.getHours()).padStart(2, '0');
  var mm = String(date.getMinutes()).padStart(2, '0');
  return hh + ':' + mm;
}

function toDateKeyFromTimestamp(value){
  var stamp = Number(value || 0) || 0;
  if(stamp <= 0) return '';
  return toDateKey(new Date(stamp));
}

function toDateKey(date){
  if(!(date instanceof Date) || Number.isNaN(date.getTime())) return '';
  return [
    date.getFullYear(),
    String(date.getMonth() + 1).padStart(2, '0'),
    String(date.getDate()).padStart(2, '0')
  ].join('-');
}

function getRecordDateObj(item){
  var raw = getRecordDateKey(item);
  if(!/^\d{4}-\d{2}-\d{2}$/.test(raw)) return new Date();
  var parts = raw.split('-');
  return new Date(Number(parts[0]) || 0, Math.max(0, (Number(parts[1]) || 1) - 1), Number(parts[2]) || 1);
}
function getRecordDateKey(item){
  var scheduled = String(item && item.scheduledDate || '').trim();
  if(/^\d{4}-\d{2}-\d{2}$/.test(scheduled)) return scheduled;
  return toDateKeyFromTimestamp(item && (item.createdAt || item.updatedAt)) || toDateKey(new Date());
}

function formatMonthTitle(date){
  var safe = date instanceof Date ? date : new Date();
  return safe.getFullYear() + '年' + (safe.getMonth() + 1) + '月';
}

function formatWeekRange(date){
  var safe = date instanceof Date ? new Date(date.getTime()) : new Date();
  var day = safe.getDay();
  var offset = day === 0 ? 6 : day - 1;
  safe.setDate(safe.getDate() - offset);
  var start = new Date(safe.getTime());
  var end = new Date(safe.getTime());
  end.setDate(start.getDate() + 6);
  function shortDate(value){
    return (value.getMonth() + 1) + '.' + value.getDate();
  }
  return '本周 ' + shortDate(start) + ' ~ ' + shortDate(end);
}

function formatLunarStub(date){
  var safe = date instanceof Date ? date : new Date();
  var day = safe.getDate();
  if(day === 1) return '初一';
  if(day < 11) return '初' + day;
  if(day < 20) return '十' + (day - 10);
  if(day === 20) return '二十';
  if(day < 30) return '廿' + (day - 20);
  return '三十';
}

function buildWeekDays(date){
  var safe = date instanceof Date ? new Date(date.getTime()) : new Date();
  var day = safe.getDay();
  var offset = day === 0 ? 6 : day - 1;
  safe.setDate(safe.getDate() - offset);
  var list = [];
  for(var i = 0; i < 7; i += 1){
    var item = new Date(safe.getTime());
    item.setDate(safe.getDate() + i);
    list.push(item);
  }
  return list;
}

function closeOpenThreadRows(exceptRow){

  var rows = root.querySelectorAll('.thread-row.is-open, .thread-row.is-dragging');
  rows.forEach(function(row){

function applySwipeOffset(row, offset){
  if(!row) return;
  var item = row.querySelector('.thread-item');
  if(!item) return;
  var clamped = Math.max(-72, Math.min(0, Number(offset || 0) || 0));
  item.style.transform = clamped ? ('translateX(' + clamped + 'px)') : '';
}

function finalizeThreadSwipe(row, offset){
  if(!row) return;
  row.classList.remove('is-dragging');
  var item = row.querySelector('.thread-item');
  if(!item) return;
  item.style.transform = '';

function filterRecords(records){
  var list = Array.isArray(records) ? records.slice() : [];
  var selectedDate = String(currentSelectedDateKey || toDateKey(new Date())).trim();
  if(selectedDate){
    list = list.filter(function(item){ return getRecordDateKey(item) === selectedDate; });
  }
  if(currentFilter === 'complete') return list.filter(isCompletedInviteRecord);
  if(currentFilter === 'pending') return list.filter(isPendingInviteRecord);
  if(currentFilter === 'continued') return list.filter(isContinuedInviteRecord);
  return list;
}

function pickSelectedRecord(records){
  var list = filterRecords(records);
  var focusId = readFocusId();
  var chosen = null;
  if(focusId){
    chosen = list.find(function(item){ return String(item.id || '') === focusId; }) || null;
  }
  if(!chosen && currentSelectedId){
    chosen = list.find(function(item){ return String(item.id || '') === currentSelectedId; }) || null;
  }
  if(!chosen){
    chosen = list.find(isOngoingInviteRecord)
      || list.find(isContinuedInviteRecord)
      || list.find(isAcceptedInviteRecord)
      || list.find(isPendingInviteRecord)
      || list[0]
      || null;
  }
  currentSelectedId = chosen ? String(chosen.id || '').trim() : '';
  if(focusId) clearFocusId();
  return chosen;
}

function collectCalendarDots(records){
  var marks = Object.create(null);
  (Array.isArray(records) ? records : []).forEach(function(item){
    var key = getRecordDateKey(item);
    if(key) marks[key] = true;
  });
  return marks;
}

async function renderOfflineApp(){
  var renderToken = ++offlineRenderVersion;
  consumePendingForceCompleteOfflineRecords();
  var records = await getOfflineRecords();
  if(renderToken !== offlineRenderVersion) return;
  latestOfflineRecords = Array.isArray(records) ? records.slice() : [];
  if(!currentSelectedDateKey) currentSelectedDateKey = toDateKey(new Date());
  var focusId = readFocusId();
  if(focusId){
    var focusRecord = latestOfflineRecords.find(function(item){ return String(item && item.id || '') === focusId; }) || null;
    if(focusRecord) currentSelectedDateKey = getRecordDateKey(focusRecord);
  }
  var selected = pickSelectedRecord(records);
  renderMonthCard(records, selected);
  renderFilterTabs(records);
  renderThreadList(records, selected);
}

function canOpenRecordInOfflineMode(item){
  if(!item) return false;
  return isAcceptedInviteRecord(item)
    || isOngoingInviteRecord(item)
    || isContinuedInviteRecord(item)
    || isCompletedInviteRecord(item);
}

function openRecordInOfflineMode(item){
  if(!item || !canOpenRecordInOfflineMode(item)) return false;
  var safeId = String(item.id || '').trim();
  var safeCharId = String(item.charId || '').trim();
  if(!safeCharId) return false;
  var openAsFreshInvite = false;
  var launchToken = 'offline_record_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 8);
  try{
    localStorage.setItem(getScopedFocusKey(), safeId);
  }catch(err){}
  var readOnly = isCompletedInviteRecord(item);
  var openPayload = {
    app:'offline_mode',
    charId:safeCharId,
    launchMode: openAsFreshInvite ? 'invite' : 'resume',
    launchToken: launchToken,
    forceOpen: true,
    readOnly: readOnly,
    offlineLaunchRecord:{
      mode: openAsFreshInvite ? 'invite' : 'resume',
      launchToken: launchToken,
      freshStart: openAsFreshInvite,
      readOnly: readOnly,
      createdAt: Date.now(),
      charId:safeCharId,
      payload:{
        id:safeId,
        recordId:safeId,
        inviteRecordId:safeId,
        threadId:String(item.threadId || safeId).trim() || safeId,
        charId:safeCharId,
        charName:String(item.charName || '').trim(),
        sourceRole:String(item.sourceRole || '').trim(),
        status:String(item.status || '').trim(),
        meetState:String(item.meetState || '').trim(),
        freshStart: openAsFreshInvite,
        readOnly: readOnly,
        location:String(item.location || '').trim(),
        scheduledDate:String(item.scheduledDate || '').trim(),
        scheduledTime:String(item.scheduledTime || '').trim(),
        dateLabel:String(item.dateLabel || '').trim(),
        timeLabel:String(item.timeLabel || '').trim(),
        previewText:String(item.previewText || '').trim(),
        inviteMessageId:String(item.inviteMessageId || '').trim(),
        replyMessageId:String(item.replyMessageId || '').trim()
      },
      createdAt:Date.now()
    }
  };
  try{
    if(window.parent && window.parent !== window && typeof window.parent.forceOpenOfflineMode === 'function'){
      window.parent.forceOpenOfflineMode(openPayload);
      return true;
    }
  }catch(err){}
  try{
    if(window.parent && window.parent !== window){
      window.parent.postMessage({
        type:'OPEN_APP_WITH',
        payload:openPayload
      }, '*');
      return true;
    }
  }catch(err){}
  return false;
}

document.addEventListener('click', async function(event){
  var deleteBtn = event.target && event.target.closest ? event.target.closest('[data-delete-record-id]') : null;
  if(deleteBtn){
    var deleteId = String(deleteBtn.getAttribute('data-delete-record-id') || '').trim();
    if(deleteId) openDeleteConfirm(deleteId);
    return;
  }
  var deleteCancelBtn = event.target && event.target.closest ? event.target.closest('[data-delete-cancel]') : null;
  if(deleteCancelBtn){
    closeDeleteConfirm();
    return;
  }
  var deleteConfirmBtn = event.target && event.target.closest ? event.target.closest('[data-delete-confirm]') : null;
  if(deleteConfirmBtn){
    if(pendingDeleteRecordId){
      await removeOfflineRecord(pendingDeleteRecordId);
      closeDeleteConfirm();
      await renderOfflineApp();
      return;
    }
    closeDeleteConfirm();
    return;
  }
  var deleteOverlay = event.target && event.target.closest ? event.target.closest('#deleteConfirm') : null;
  if(deleteOverlay && event.target === deleteOverlay){
    closeDeleteConfirm();
    return;
  }
  var exitBtn = event.target && event.target.closest ? event.target.closest('[data-offline-exit]') : null;
  if(exitBtn){
    try{
      if(window.parent && window.parent !== window && typeof window.parent.handleBack === 'function'){
        window.parent.handleBack();
        return;
      }
    }catch(err){}
    try{
      if(window.history.length > 1) window.history.back();
    }catch(err){}
    return;
  }
  var filterBtn = event.target && event.target.closest ? event.target.closest('[data-filter-id]') : null;
  if(filterBtn){
    currentFilter = String(filterBtn.getAttribute('data-filter-id') || 'all');
    renderOfflineApp();
    return;
  }
  var dayBtn = event.target && event.target.closest ? event.target.closest('[data-date-key]') : null;
  if(dayBtn){
    currentSelectedDateKey = String(dayBtn.getAttribute('data-date-key') || '').trim() || toDateKey(new Date());
    currentSelectedId = '';
    renderOfflineApp();
    return;
  }
  var recordBtn = event.target && event.target.closest ? event.target.closest('[data-record-id]') : null;
  if(recordBtn){
    var row = recordBtn.closest ? recordBtn.closest('.thread-row') : null;
    if(row && row.classList.contains('is-open')){
      row.classList.remove('is-open');
      return;
    }
    closeOpenThreadRows();
    currentSelectedId = String(recordBtn.getAttribute('data-record-id') || '').trim();
    var source = Array.isArray(latestOfflineRecords) ? latestOfflineRecords.slice() : [];
    var hit = source.find(function(item){
      return String(item && item.id || '') === currentSelectedId;
    }) || null;
    if(hit && canOpenRecordInOfflineMode(hit)){
      openRecordInOfflineMode(hit);
      return;
    }
    renderOfflineApp();
  }
});

document.addEventListener('pointermove', function(event){
  if(!offlineSwipeState || event.pointerId !== offlineSwipeState.pointerId) return;
  var dx = Number(event.clientX || 0) - offlineSwipeState.startX;
  var dy = Number(event.clientY || 0) - offlineSwipeState.startY;
  if(!offlineSwipeState.dragging){
    if(Math.abs(dx) < 8) return;
    if(Math.abs(dy) > Math.abs(dx)){
      offlineSwipeState = null;
      return;
    }
    offlineSwipeState.dragging = true;
    offlineSwipeState.row.classList.add('is-dragging');
  }
  offlineSwipeState.offset = Math.max(-72, Math.min(0, offlineSwipeState.startOffset + dx));
  applySwipeOffset(offlineSwipeState.row, offlineSwipeState.offset);
  event.preventDefault();
}, { passive:false });

document.addEventListener('pointerup', function(event){
  if(!offlineSwipeState || event.pointerId !== offlineSwipeState.pointerId) return;
  finalizeThreadSwipe(offlineSwipeState.row, offlineSwipeState.offset);
  offlineSwipeState = null;
});

document.addEventListener('pointercancel', function(event){
  if(!offlineSwipeState || event.pointerId !== offlineSwipeState.pointerId) return;
  finalizeThreadSwipe(offlineSwipeState.row, offlineSwipeState.offset);
  offlineSwipeState = null;
});

window.addEventListener('message', function(e){
  var data = e.data || {};
  if(data.type === 'OFFLINE_INVITE_FORCE_COMPLETE'){
    var payload = data.payload || {};
    var ids = Array.isArray(payload.ids) ? payload.ids.slice() : [];
    if(payload.inviteId) ids.push(payload.inviteId);
    forceCompleteOfflineRecords(ids, payload.charId);
    renderOfflineApp();
    return;
  }
  if(data.type === 'OFFLINE_INVITE_STORE_DIRTY' || data.type === 'OPEN_SHELL_NOTIFICATION'){
    consumePendingForceCompleteOfflineRecords();
    renderOfflineApp();
  }
});

window.addEventListener('storage', function(e){
  if(e && /offline_invite/i.test(String(e.key || ''))){
    consumePendingForceCompleteOfflineRecords();
    renderOfflineApp();
  }
});

document.addEventListener('visibilitychange', function(){
  if(document.visibilityState === 'visible'){
    consumePendingForceCompleteOfflineRecords();
    renderOfflineApp();
  }
});

consumePendingForceCompleteOfflineRecords();
renderOfflineApp();
setInterval(function(){
  consumePendingForceCompleteOfflineRecords();
  renderOfflineApp();
}, 20000);
</script>
</body>
</html>
