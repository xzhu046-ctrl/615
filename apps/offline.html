<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,viewport-fit=cover">
<title>约会</title>
<style>
:root{
  --safe-top:max(env(safe-area-inset-top), 0px);
  --safe-bottom:max(env(safe-area-inset-bottom), 0px);
  --paper:#f7f7f5;
  --panel:#ffffff;
  --ink:#101010;
  --muted:#5f5f5f;
  --line:rgba(16,16,16,.18);
  --shadow:6px 6px 0 rgba(17,17,17,.22);
  --frame-shadow:2px 2px 0 #111, 4px 4px 0 #fff, 8px 8px 0 rgba(17,17,17,.18);
  --serif:"Baskerville","Times New Roman","Songti SC",serif;
  --sans:"Avenir Next","PingFang SC","Hiragino Sans GB",sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{
  margin:0;
  width:100%;
  min-height:100%;
  background:
    radial-gradient(circle at 20% 10%, rgba(0,0,0,.045) 0, rgba(0,0,0,0) 24%),
    radial-gradient(circle at 78% 18%, rgba(0,0,0,.04) 0, rgba(0,0,0,0) 20%),
    linear-gradient(180deg,#fdfdfc 0%,#f3f3f1 100%);
  color:var(--ink);
  font-family:var(--sans);
}
body{display:flex;justify-content:center}
.offline-page{
  width:100%;
  max-width:430px;
  min-height:100vh;
  padding:calc(var(--safe-top) + 4px) 14px calc(var(--safe-bottom) + 26px);
  position:relative;
  overflow:auto;
}
.offline-page::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background-image:radial-gradient(rgba(0,0,0,.055) .8px, transparent .8px);
  background-size:12px 12px;
  mask-image:linear-gradient(180deg, rgba(0,0,0,.3), rgba(0,0,0,.1));
  opacity:.24;
}
.offline-stack{position:relative;display:flex;flex-direction:column;gap:14px;z-index:1}
.month-card,
.filters-card,
.thread-card{
  position:relative;
  border:2px solid var(--ink);
  border-radius:0;
  background:rgba(255,255,255,.92);
  box-shadow:var(--frame-shadow);
  overflow:hidden;
}
.month-card{
  padding:14px 14px 16px;
  background:linear-gradient(180deg, rgba(255,255,255,.985) 0%, rgba(246,246,244,.98) 100%);
}
.month-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  margin-bottom:16px;
}
.month-exit{
  width:34px;
  height:34px;
  padding:0;
  flex:0 0 auto;
  border:2px solid var(--ink);
  border-radius:0;
  background:#fff;
  box-shadow:2px 2px 0 #111, 4px 4px 0 #fff, 6px 6px 0 rgba(17,17,17,.18);
  color:#111;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-size:17px;
  font-weight:900;
}
.month-exit:active{
  transform:translate(2px, 2px);
  box-shadow:1px 1px 0 #111, 2px 2px 0 #fff, 3px 3px 0 rgba(17,17,17,.16);
}
.month-label{
  display:flex;
  flex-direction:column;
  gap:4px;
  min-width:0;
  margin-left:auto;
  align-items:flex-end;
  text-align:right;
}
.month-title{
  font-family:var(--serif);
  font-size:30px;
  font-weight:900;
  letter-spacing:.02em;
  line-height:1;
}
.month-sub{
  font-size:12px;
  font-weight:800;
  color:var(--muted);
  letter-spacing:.03em;
}
.weekdays,
.calendar-strip{
  display:grid;
  grid-template-columns:repeat(7,minmax(0,1fr));
  gap:8px;
}
.weekdays{
  margin-bottom:8px;
  padding:0 4px;
  font-size:11px;
  font-weight:900;
  color:#7a7a7a;
  text-align:center;
}
.day-chip{
  min-height:82px;
  border:1.5px solid var(--line);
  border-radius:0;
  padding:10px 6px 8px;
  text-align:center;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  gap:6px;
  background:rgba(255,255,255,.84);
}
.day-chip.is-active{
  background:#111;
  color:#fff;
  border-color:#111;
  box-shadow:2px 2px 0 #fff, 4px 4px 0 #111;
}
.day-chip-day{
  font-size:28px;
  font-family:var(--serif);
  font-weight:900;
  line-height:1;
}
.day-chip-meta{
  font-size:10px;
  font-weight:900;
  letter-spacing:.04em;
  color:#8c8c8c;
}
.day-chip.is-active .day-chip-meta{color:rgba(255,255,255,.72)}
.day-chip-dot{
  width:8px;
  height:8px;
  border-radius:999px;
  background:#111;
  border:1.5px solid #111;
}
.day-chip.is-active .day-chip-dot{
  background:#fff;
  border-color:#fff;
}
.day-chip-ghost{
  width:8px;
  height:8px;
}
.filters-card{
  padding:10px;
  background:#111;
  box-shadow:2px 2px 0 #fff, 4px 4px 0 #111, 8px 8px 0 rgba(17,17,17,.16);
}
.filters-tabs{
  display:flex;
  gap:10px;
  overflow:auto;
  padding-bottom:2px;
}
.filter-tab{
  border:2px solid var(--ink);
  border-radius:0;
  background:#fff;
  color:#111;
  min-height:40px;
  padding:0 14px;
  font-family:var(--serif);
  font-size:16px;
  font-weight:900;
  font-style:italic;
  box-shadow:1px 1px 0 #111;
  white-space:nowrap;
}
.filter-tab.is-active{
  background:#111;
  color:#fff;
  box-shadow:2px 2px 0 #fff, 4px 4px 0 #111;
}
.thread-list{display:flex;flex-direction:column;gap:12px}
.thread-card{
  padding:12px;
  display:grid;
  grid-template-columns:88px minmax(0,1fr);
  gap:12px;
  align-items:center;
}
.thread-card.is-selected{transform:translateY(-1px)}
.thread-polaroid{
  position:relative;
  width:88px;
  padding:7px 7px 22px;
  border:2px solid var(--ink);
  background:#fff;
  box-shadow:2px 2px 0 #111, 4px 4px 0 #fff, 7px 7px 0 rgba(17,17,17,.18);
  transform:rotate(-4deg);
}
.thread-polaroid::after{
  content:"";
  position:absolute;
  inset:0;
  border:1px solid rgba(255,255,255,.88);
  pointer-events:none;
}
.thread-avatar{
  width:100%;
  aspect-ratio:1/1;
  border:2px solid var(--ink);
  border-radius:0;
  overflow:hidden;
  background:#d8d8d5 center/cover no-repeat;
  box-shadow:1px 1px 0 #fff, 2px 2px 0 #111;
  filter:grayscale(1) contrast(1.08);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  font-weight:900;
}
.thread-polaroid-label{
  margin-top:7px;
  font-size:10px;
  font-weight:900;
  letter-spacing:.08em;
  text-transform:uppercase;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.thread-main{
  min-width:0;
  display:flex;
  flex-direction:column;
  gap:7px;
}
.thread-top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}
.thread-name{
  font-family:var(--serif);
  font-size:19px;
  font-weight:900;
  font-style:italic;
  line-height:1.15;
}
.thread-time{
  font-size:11px;
  font-weight:900;
  color:#9b9b9b;
  white-space:nowrap;
}
.thread-highlight{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:24px;
  padding:0 10px;
  background:#111;
  color:#fff;
  border:2px solid #111;
  box-shadow:1px 1px 0 #fff, 3px 3px 0 rgba(17,17,17,.18);
  font-size:10px;
  font-weight:900;
  letter-spacing:.1em;
  text-transform:uppercase;
  white-space:nowrap;
}
.thread-preview{
  font-size:13px;
  line-height:1.55;
  font-weight:800;
  color:#313131;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
}
.thread-sub{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  flex-wrap:wrap;
}
.thread-meta{
  font-size:11px;
  font-weight:900;
  color:#7e7e7e;
  letter-spacing:.03em;
}
.thread-stage{
  display:inline-flex;
  align-items:center;
  gap:7px;
  font-size:10px;
  font-weight:900;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:#373737;
}
.thread-stage-dot{
  width:10px;
  height:10px;
  border:1.8px solid var(--ink);
  border-radius:999px;
  background:#111;
}
.thread-stage.is-pending .thread-stage-dot{background:#b53b3b}
.thread-stage.is-accepted .thread-stage-dot{background:#111}
.thread-stage.is-rejected .thread-stage-dot{background:#fff}
</style>
</head>
<body>
  <main class="offline-page">
    <div class="offline-stack">
      <section class="month-card" id="monthCard"></section>
      <section class="filters-card">
        <div class="filters-tabs" id="filterTabs"></div>
      </section>
      <section class="thread-list" id="threadList"></section>
    </div>
  </main>
<script src="../assetStore.js"></script>
<script src="../offlineInviteStore.js"></script>
<script>
var currentFilter = 'all';
var currentSelectedId = '';

function esc(text){
  return String(text == null ? '' : text)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

function getParentCharacters(){
  try{
    if(window.parent && window.parent !== window && typeof window.parent.getStoredCharactersSnapshot === 'function'){
      return window.parent.getStoredCharactersSnapshot();
    }
  }catch(err){}
  return [];
}

function getScopedFocusKey(){
  try{
    if(window.parent && window.parent !== window && typeof window.parent.scopedKeyForAccount === 'function' && typeof window.parent.getActiveAccountId === 'function'){
      return window.parent.scopedKeyForAccount('offline_invite_focus_id_v1', window.parent.getActiveAccountId());
    }
  }catch(err){}
  return 'offline_invite_focus_id_v1';
}

function readFocusId(){
  try{
    return String(localStorage.getItem(getScopedFocusKey()) || localStorage.getItem('offline_invite_focus_id_v1') || '').trim();
  }catch(err){
    return '';
  }
}

function clearFocusId(){
  try{ localStorage.removeItem(getScopedFocusKey()); }catch(err){}
  try{ localStorage.removeItem('offline_invite_focus_id_v1'); }catch(err){}
}

function findByDataAttr(root, attr, value){
  var list = root && root.querySelectorAll ? root.querySelectorAll('[' + attr + ']') : [];
  for(var i = 0; i < list.length; i += 1){
    if(String(list[i].getAttribute(attr) || '') === String(value || '')) return list[i];
  }
  return null;
}

function getOfflineRecords(){
  var store = window.OfflineInviteStore;
  if(!(store && typeof store.listRecords === 'function')) return [];
  return store.listRecords().filter(function(item){
    return item && (String(item.charId || '').trim() || String(item.charName || '').trim());
  });
}

function getRecordStage(item){
  var status = String(item && item.status || 'pending').trim() || 'pending';
  if(status === 'accepted'){
    return { tone:'accepted', label:'Complete', note:'complete', badge:'赴约' };
  }
  if(status === 'rejected'){
    return { tone:'rejected', label:'To Be Continued', note:'to be continued', badge:'结束' };
  }
  return { tone:'pending', label:'Pending', note:'pending', badge:'赴约' };
}

function getRecordPreview(item){
  var preview = String(item && item.previewText || '').trim();
  if(preview) return preview;
  var stage = getRecordStage(item);
  if(stage.tone === 'accepted') return '时间和地点已经定下来了，也已经顺手写进日程。';
  if(stage.tone === 'rejected') return '这次先没有约成，之后也许还能再找个更合适的时间。';
  return '邀约已经发出去，现在就等对方给一个自然的回答。';
}

function getRecordMeta(item){
  return [
    String(item && item.dateLabel || '').trim(),
    String(item && item.timeLabel || '').trim(),
    String(item && item.location || '').trim()
  ].filter(Boolean).join(' · ');
}

function getRecordTimeStamp(item){
  var updatedAt = Number(item && (item.updatedAt || item.createdAt) || 0) || 0;
  if(!updatedAt) return '';
  var date = new Date(updatedAt);
  var hh = String(date.getHours()).padStart(2, '0');
  var mm = String(date.getMinutes()).padStart(2, '0');
  return hh + ':' + mm;
}

function toDateKeyFromTimestamp(value){
  var stamp = Number(value || 0) || 0;
  if(stamp <= 0) return '';
  return toDateKey(new Date(stamp));
}

function toDateKey(date){
  if(!(date instanceof Date) || Number.isNaN(date.getTime())) return '';
  return [
    date.getFullYear(),
    String(date.getMonth() + 1).padStart(2, '0'),
    String(date.getDate()).padStart(2, '0')
  ].join('-');
}

function getRecordDateObj(item){
  var raw = String(item && item.scheduledDate || '').trim();
  if(!/^\d{4}-\d{2}-\d{2}$/.test(raw)) return new Date();
  var parts = raw.split('-');
  return new Date(Number(parts[0]) || 0, Math.max(0, (Number(parts[1]) || 1) - 1), Number(parts[2]) || 1);
}

function formatMonthTitle(date){
  var safe = date instanceof Date ? date : new Date();
  return safe.getFullYear() + '年' + (safe.getMonth() + 1) + '月';
}

function formatWeekRange(date){
  var safe = date instanceof Date ? new Date(date.getTime()) : new Date();
  var day = safe.getDay();
  var offset = day === 0 ? 6 : day - 1;
  safe.setDate(safe.getDate() - offset);
  var start = new Date(safe.getTime());
  var end = new Date(safe.getTime());
  end.setDate(start.getDate() + 6);
  function shortDate(value){
    return (value.getMonth() + 1) + '.' + value.getDate();
  }
  return '本周 ' + shortDate(start) + ' ~ ' + shortDate(end);
}

function formatLunarStub(date){
  var safe = date instanceof Date ? date : new Date();
  var day = safe.getDate();
  if(day === 1) return '初一';
  if(day < 11) return '初' + day;
  if(day < 20) return '十' + (day - 10);
  if(day === 20) return '二十';
  if(day < 30) return '廿' + (day - 20);
  return '三十';
}

function buildWeekDays(date){
  var safe = date instanceof Date ? new Date(date.getTime()) : new Date();
  var day = safe.getDay();
  var offset = day === 0 ? 6 : day - 1;
  safe.setDate(safe.getDate() - offset);
  var list = [];
  for(var i = 0; i < 7; i += 1){
    var item = new Date(safe.getTime());
    item.setDate(safe.getDate() + i);
    list.push(item);
  }
  return list;
}

function resolveCharAvatar(charId){
  var safeId = String(charId || '').trim();
  var chars = getParentCharacters();
  var match = Array.isArray(chars) ? chars.find(function(item){ return item && String(item.id || '') === safeId; }) : null;
  if(match && String(match.imageData || '').trim()) return Promise.resolve(String(match.imageData || '').trim());
  if(match && String(match.avatar || '').trim() && /^data:|^blob:|^https?:|^\.{0,2}\//i.test(String(match.avatar || '').trim())){
    return Promise.resolve(String(match.avatar || '').trim());
  }
  if(window.loadStoredAsset && safeId){
    return loadStoredAsset('char_avatar_' + safeId).catch(function(){ return ''; });
  }
  return Promise.resolve('');
}

function filterRecords(records){
  var list = Array.isArray(records) ? records.slice() : [];
  if(currentFilter === 'received') return list.filter(function(item){ return String(item && item.sourceRole || '').trim() === 'assistant'; });
  if(currentFilter === 'complete') return list.filter(function(item){ return getRecordStage(item).tone === 'accepted'; });
  if(currentFilter === 'pending') return list.filter(function(item){ return getRecordStage(item).tone === 'pending'; });
  if(currentFilter === 'continued') return list.filter(function(item){ return getRecordStage(item).tone === 'rejected'; });
  return list;
}

function pickSelectedRecord(records){
  var list = Array.isArray(records) ? records : [];
  var focusId = readFocusId();
  var chosen = null;
  if(focusId){
    chosen = list.find(function(item){ return String(item.id || '') === focusId; }) || null;
  }
  if(!chosen && currentSelectedId){
    chosen = list.find(function(item){ return String(item.id || '') === currentSelectedId; }) || null;
  }
  if(!chosen){
    chosen = list.find(function(item){ return getRecordStage(item).tone === 'accepted'; })
      || list[0]
      || null;
  }
  currentSelectedId = chosen ? String(chosen.id || '').trim() : '';
  if(focusId) clearFocusId();
  return chosen;
}

function collectCalendarDots(records){
  var marks = Object.create(null);
  (Array.isArray(records) ? records : []).forEach(function(item){
    var scheduledKey = String(item && item.scheduledDate || '').trim();
    if(/^\d{4}-\d{2}-\d{2}$/.test(scheduledKey)) marks[scheduledKey] = true;
    var createdKey = toDateKeyFromTimestamp(item && item.createdAt);
    if(createdKey) marks[createdKey] = true;
    var updatedKey = toDateKeyFromTimestamp(item && item.updatedAt);
    if(updatedKey) marks[updatedKey] = true;
  });
  return marks;
}

function renderMonthCard(records, selectedRecord){
  var root = document.getElementById('monthCard');
  if(!root) return;
  var anchor = selectedRecord ? getRecordDateObj(selectedRecord) : new Date();
  var week = buildWeekDays(anchor);
  var marks = collectCalendarDots(records);
  var selectedDateKey = selectedRecord && String(selectedRecord.scheduledDate || '').trim()
    ? String(selectedRecord.scheduledDate || '').trim()
    : toDateKey(anchor);
  root.innerHTML = ''
    + '<div class="month-row">'
    +   '<button class="month-exit" type="button" data-offline-exit aria-label="返回">♥</button>'
    +   '<div class="month-label">'
    +     '<div class="month-title">' + esc(formatMonthTitle(anchor)) + '</div>'
    +     '<div class="month-sub">' + esc(formatWeekRange(anchor)) + '</div>'
    +   '</div>'
    + '</div>'
    + '<div class="weekdays"><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div><div>日</div></div>'
    + '<div class="calendar-strip">'
    + week.map(function(item){
        var key = toDateKey(item);
        var active = key === selectedDateKey ? ' is-active' : '';
        var dot = marks[key] ? '<div class="day-chip-dot"></div>' : '<div class="day-chip-ghost"></div>';
        return '<div class="day-chip' + active + '">'
          + '<div class="day-chip-day">' + esc(item.getDate()) + '</div>'
          + '<div class="day-chip-meta">' + esc(formatLunarStub(item)) + '</div>'
          + dot
          + '</div>';
      }).join('')
    + '</div>';
}

function renderFilterTabs(records){
  var root = document.getElementById('filterTabs');
  if(!root) return;
  var counts = {
    all: records.length,
    received: records.filter(function(item){ return String(item && item.sourceRole || '').trim() === 'assistant'; }).length,
    complete: records.filter(function(item){ return getRecordStage(item).tone === 'accepted'; }).length,
    pending: records.filter(function(item){ return getRecordStage(item).tone === 'pending'; }).length,
    continued: records.filter(function(item){ return getRecordStage(item).tone === 'rejected'; }).length
  };
  var tabs = [
    { id:'all', label:'All' },
    { id:'received', label:'Received' },
    { id:'pending', label:'Pending' },
    { id:'complete', label:'Complete' },
    { id:'continued', label:'To Be Continued' }
  ];
  root.innerHTML = tabs.map(function(tab){
    var active = tab.id === currentFilter ? ' is-active' : '';
    return '<button class="filter-tab' + active + '" type="button" data-filter-id="' + esc(tab.id) + '">' + esc(tab.label) + ' ' + esc(counts[tab.id] || 0) + '</button>';
  }).join('');
}

function renderThreadList(records, selectedRecord){
  var root = document.getElementById('threadList');
  if(!root) return;
  var list = filterRecords(records);
  if(!list.length){
    root.innerHTML = '';
    return;
  }
  root.innerHTML = list.map(function(item){
    var stage = getRecordStage(item);
    var active = selectedRecord && String(selectedRecord.id || '') === String(item.id || '') ? ' is-selected' : '';
    var fallback = esc(String(item.charName || '角').slice(0, 1) || '角');
    return '<article class="thread-card' + active + '" data-record-id="' + esc(item.id) + '">'
      + '<div class="thread-polaroid">'
      +   '<button class="thread-avatar" type="button" data-avatar-id="' + esc(item.id) + '">' + fallback + '</button>'
      +   '<div class="thread-polaroid-label">' + esc(item.charName || '未命名角色') + '</div>'
      + '</div>'
      + '<div class="thread-main">'
      +   '<div class="thread-top"><div class="thread-name">' + esc(item.charName || '未命名角色') + '</div><div class="thread-highlight">' + esc(stage.badge || stage.note) + '</div></div>'
      +   '<div class="thread-preview">' + esc(getRecordPreview(item)) + '</div>'
      +   '<div class="thread-sub">'
      +     '<div class="thread-meta">' + esc(getRecordMeta(item) || '时间地点待定') + '</div><div class="thread-time">' + esc(getRecordTimeStamp(item)) + '</div>'
      +     '<div class="thread-stage is-' + esc(stage.tone) + '"><span class="thread-stage-dot"></span><span>' + esc(stage.note) + '</span></div>'
      +   '</div>'
      + '</div>'
      + '</article>';
  }).join('');
  list.forEach(function(item){
    resolveCharAvatar(item.charId).then(function(src){
      var safe = String(src || '').trim();
      if(!safe) return;
      var node = findByDataAttr(root, 'data-avatar-id', item.id);
      if(!node) return;
      node.style.backgroundImage = 'url(' + JSON.stringify(safe) + ')';
      node.textContent = '';
    }).catch(function(){});
  });
}

function renderOfflineApp(){
  var records = getOfflineRecords();
  var selected = pickSelectedRecord(records);
  renderMonthCard(records, selected);
  renderFilterTabs(records);
  renderThreadList(records, selected);
}

document.addEventListener('click', function(event){
  var exitBtn = event.target && event.target.closest ? event.target.closest('[data-offline-exit]') : null;
  if(exitBtn){
    try{
      if(window.parent && window.parent !== window && typeof window.parent.handleBack === 'function'){
        window.parent.handleBack();
        return;
      }
    }catch(err){}
    try{
      if(window.history.length > 1) window.history.back();
    }catch(err){}
    return;
  }
  var filterBtn = event.target && event.target.closest ? event.target.closest('[data-filter-id]') : null;
  if(filterBtn){
    currentFilter = String(filterBtn.getAttribute('data-filter-id') || 'all');
    renderOfflineApp();
    return;
  }
  var recordBtn = event.target && event.target.closest ? event.target.closest('[data-record-id]') : null;
  if(recordBtn){
    currentSelectedId = String(recordBtn.getAttribute('data-record-id') || '').trim();
    renderOfflineApp();
  }
});

window.addEventListener('message', function(e){
  var data = e.data || {};
  if(data.type === 'OFFLINE_INVITE_STORE_DIRTY' || data.type === 'OPEN_SHELL_NOTIFICATION'){
    renderOfflineApp();
  }
});

window.addEventListener('storage', function(e){
  if(e && /offline_invite/i.test(String(e.key || ''))) renderOfflineApp();
});

document.addEventListener('visibilitychange', function(){
  if(document.visibilityState === 'visible') renderOfflineApp();
});

renderOfflineApp();
setInterval(renderOfflineApp, 20000);
</script>
</body>
</html>
