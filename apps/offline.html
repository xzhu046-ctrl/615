<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,viewport-fit=cover">
<title>约会</title>
<style>
:root{
  --safe-top:max(env(safe-area-inset-top), 0px);
  --safe-bottom:max(env(safe-area-inset-bottom), 0px);
  --paper:#fafafa;
  --panel:#ffffff;
  --ink:#101010;
  --muted:#5f5f5f;
  --line:rgba(16,16,16,.18);
  --shadow:0 12px 30px rgba(0,0,0,.06);
  --frame-shadow:none;
  --hard-shadow:2px 2px 0 #0a0a0a;
  --serif:"Avenir Next","PingFang SC","Hiragino Sans GB",sans-serif;
  --sans:"Avenir Next","PingFang SC","Hiragino Sans GB",sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{
  margin:0;
  width:100%;
  min-height:100%;
  background:
    linear-gradient(180deg,#fff 0%,#f7f7f7 100%);
  color:var(--ink);
  font-family:var(--sans);
}
body{display:flex;justify-content:center}
.offline-page{
  width:100%;
  max-width:430px;
  height:100vh;
  height:100dvh;
  min-height:100vh;
  min-height:100dvh;
  padding:calc(var(--safe-top) + 8px) 12px calc(var(--safe-bottom) + 10px);
  position:relative;
  overflow:hidden;
  display:flex;
  flex-direction:column;
}
.offline-page::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background:linear-gradient(180deg,rgba(0,0,0,.03),transparent 32%);
  opacity:.45;
}
.offline-stack{
  position:relative;
  display:flex;
  flex-direction:column;
  gap:12px;
  z-index:1;
  flex:1;
  min-height:0;
}
.month-card,
.filters-card,
.thread-card{
  position:relative;
  border:1px solid rgba(0,0,0,.08);
  border-radius:8px;
  background:rgba(255,255,255,.94);
  box-shadow:0 16px 36px rgba(0,0,0,.08);
  overflow:hidden;
}
.month-card{
  padding:14px 12px 13px;
  background:#fff;
  overflow:visible;
  box-shadow:0 18px 42px rgba(0,0,0,.13);
}
.month-row{
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:34px;
  margin-bottom:10px;
}
.month-exit{
  position:absolute;
  left:0;
  top:1px;
  width:30px;
  height:30px;
  padding:0;
  flex:0 0 auto;
  margin-top:0;
  border:1.5px solid #111;
  border-radius:999px;
  background:#fff;
  box-shadow:var(--hard-shadow);
  color:#111;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-size:15px;
  font-weight:900;
}
.month-exit:active{
  transform:translate(2px,2px);
  box-shadow:0 0 0 #0a0a0a;
}
.month-label{
  display:flex;
  flex-direction:column;
  gap:4px;
  min-width:0;
  width:100%;
  padding:0 42px;
  align-items:center;
  text-align:center;
}
.month-title{
  position:relative;
  display:inline-block;
  font-family:var(--serif);
  font-size:25px;
  font-weight:900;
  letter-spacing:.01em;
  line-height:1.18;
  text-shadow:none;
  text-align:center;
}
.month-title::after{
  content:"";
  position:absolute;
  left:2px;
  right:2px;
  bottom:-4px;
  border-bottom:3px dashed rgba(17,17,17,.7);
  border-radius:999px;
}
.month-sub{
  display:none;
}
.month-picker{
  display:grid;
  grid-template-columns:30px minmax(0,1fr) minmax(0,1fr) 30px;
  gap:6px;
  align-items:center;
  margin:0 0 10px;
}
.month-nav,
.date-field{
  height:30px;
  border:1px solid rgba(0,0,0,.14);
  border-radius:999px;
  background:#fff;
  color:#111;
  box-shadow:none;
  font-family:var(--sans);
  font-size:10px;
  font-weight:900;
}
.month-nav{
  padding:0;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:14px;
  cursor:pointer;
}
.date-field{
  min-width:0;
  width:100%;
  padding:0 9px;
  letter-spacing:.02em;
  -webkit-appearance:none;
  appearance:none;
}
.date-field:focus,
.month-nav:focus{
  outline:none;
  border-color:#111;
  box-shadow:0 0 0 2px rgba(0,0,0,.05);
}
.weekdays,
.calendar-strip{
  display:grid;
  grid-template-columns:repeat(7,minmax(0,1fr));
  gap:6px;
}
.weekdays{
  margin-bottom:6px;
  padding:0 2px;
  font-size:10px;
  font-weight:900;
  color:#7a7a7a;
  text-align:center;
}
.day-chip{
  min-height:64px;
  border:1px solid rgba(0,0,0,.1);
  border-radius:999px;
  padding:8px 4px 7px;
  color:#111;
  font:inherit;
  text-align:center;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  gap:5px;
  background:#fff;
  cursor:pointer;
}
.day-chip.is-active{
  background:#111;
  color:#fff;
  border-color:#111;
  box-shadow:0 10px 22px rgba(0,0,0,.12);
}
.day-chip-day{
  font-size:21px;
  font-family:var(--serif);
  font-weight:900;
  line-height:1;
}
.day-chip-meta{
  font-size:10px;
  font-weight:900;
  letter-spacing:.04em;
  color:#8c8c8c;
}
.day-chip.is-active .day-chip-meta{color:#111}
.day-chip.is-active .day-chip-meta{color:rgba(255,255,255,.78)}
.day-chip-dot{
  width:5px;
  height:5px;
  border-radius:999px;
  background:#111;
  border:1.5px solid #111;
}
.day-chip.is-active .day-chip-dot{
  background:#fff;
  border-color:#fff;
}
.day-chip-ghost{
  width:5px;
  height:5px;
}
.filters-card{
  padding:0;
  background:transparent;
  border:none;
  box-shadow:none;
  overflow:visible;
}
.filters-tabs{
  display:flex;
  gap:8px;
  overflow:auto;
  padding-bottom:2px;
}
.filter-tab{
  border:1px solid rgba(0,0,0,.12);
  border-radius:999px;
  background:#fff;
  color:#111;
  min-height:32px;
  padding:0 13px;
  font-family:var(--sans);
  font-size:10px;
  font-weight:900;
  letter-spacing:.08em;
  text-transform:uppercase;
  box-shadow:none;
  white-space:nowrap;
}
.filter-tab.is-active{
  background:#111;
  color:#fff;
  border-color:#111;
  box-shadow:none;
}
.thread-list{
  display:flex;
  flex-direction:column;
  gap:0;
  flex:1;
  min-height:0;
  overflow-y:scroll;
  overflow-x:hidden;
  padding:8px 2px 22px;
  scrollbar-width:none;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior-y:auto;
}
.thread-list::-webkit-scrollbar{display:none}
.thread-empty{
  margin:8px 0 0;
  padding:24px 16px;
  border:1px solid rgba(0,0,0,.1);
  border-radius:8px;
  background:#fff;
  color:#5f5f5f;
  font-size:13px;
  font-weight:900;
  line-height:1.6;
  text-align:center;
}
.thread-row{
  position:relative;
  min-height:146px;
  overflow:visible;
  background:transparent;
  border-bottom:0;
  padding-bottom:16px;
}
.thread-row + .thread-row{margin-top:22px}
.thread-row + .thread-row::before{
  display:none;
}
.thread-row + .thread-row::after{
  display:none;
}
.thread-delete{
  position:absolute;
  z-index:3;
  top:9px;
  right:0;
  bottom:9px;
  width:72px;
  border:1.5px solid #111;
  border-radius:0;
  background:#111;
  color:#fff;
  box-shadow:0 10px 22px rgba(0,0,0,.18);
  display:flex;
  align-items:center;
  justify-content:center;
  gap:7px;
  font-family:var(--sans);
  font-size:11px;
  font-weight:900;
  letter-spacing:.16em;
  text-transform:uppercase;
  opacity:0;
  pointer-events:none;
  transition:opacity .16s ease;
}
.thread-delete:active{transform:translate(2px,2px)}
.thread-delete svg{width:16px;height:16px;display:block;fill:currentColor;flex:0 0 auto}
.thread-row.is-open .thread-delete{
  opacity:1;
  pointer-events:auto;
}
.thread-item{
  position:relative;
  z-index:1;
  min-height:130px;
  padding:16px 15px 15px 13px;
  display:grid;
  grid-template-columns:88px minmax(0,1fr);
  gap:15px;
  align-items:center;
  border:3px dashed rgba(17,17,17,.82);
  border-radius:16px;
  background:
    linear-gradient(180deg,rgba(255,255,255,.98),rgba(246,246,246,.94)),
    #fff;
  box-shadow:none;
  will-change:transform;
  touch-action:pan-y;
  transition:transform .18s ease;
  overflow:hidden;
}
.thread-row.is-dragging .thread-item{transition:none}
.thread-row.is-open .thread-item{transform:translateX(-72px)}
.thread-item.is-selected{transform:translateY(-1px)}
.thread-row.is-open .thread-item.is-selected{transform:translateX(-72px) translateY(-1px)}
.thread-polaroid{
  position:relative;
  z-index:1;
  width:82px;
  padding:7px 7px 19px;
  border:1.5px solid rgba(17,17,17,.78);
  background:#fff;
  box-shadow:2px 2px 0 rgba(17,17,17,.12),0 10px 20px rgba(0,0,0,.12);
  transform:rotate(-1.5deg);
}
.thread-polaroid::before{
  content:"";
  position:absolute;
  left:50%;
  top:-7px;
  width:34px;
  height:10px;
  border:1px solid rgba(17,17,17,.12);
  background:rgba(255,255,255,.72);
  transform:translateX(-50%) rotate(2deg);
  box-shadow:0 4px 10px rgba(0,0,0,.08);
  pointer-events:none;
}
.thread-polaroid::after{
  content:"";
  display:block;
  position:absolute;
  inset:0;
  border:1px solid rgba(255,255,255,.82);
  pointer-events:none;
}
.thread-avatar{
  position:relative;
  width:100%;
  aspect-ratio:1/1;
  border:1.5px solid rgba(0,0,0,.78);
  border-radius:0;
  overflow:hidden;
  background:#d8d8d5 center/cover no-repeat;
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.7);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:16px;
  font-weight:900;
}
.thread-avatar img{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  display:none;
}
.thread-avatar.has-image{
  background:#d8d8d5;
  filter:grayscale(.45) contrast(1.04);
}
.thread-avatar.has-image img{
  display:block;
}
.thread-polaroid-label{
  display:block;
  margin-top:7px;
  font-size:9px;
  font-weight:900;
  letter-spacing:.06em;
  text-transform:uppercase;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.thread-main{
  position:relative;
  z-index:1;
  min-width:0;
  display:flex;
  flex-direction:column;
  gap:8px;
  padding-left:2px;
}
.thread-top{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:10px;
}
.thread-name{
  font-family:var(--sans);
  font-size:17px;
  font-weight:900;
  font-style:normal;
  line-height:1.15;
  padding-right:58px;
}
.thread-time{
  font-size:12px;
  font-weight:900;
  color:#2d2d2d;
  white-space:nowrap;
}
.thread-highlight{
  position:absolute;
  top:-6px;
  right:7px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:23px;
  padding:0 8px;
  background:rgba(255,255,255,.92);
  color:#9e1010;
  border:1.5px solid #9e1010;
  border-radius:2px;
  box-shadow:0 8px 14px rgba(158,16,16,.1);
  font-size:9px;
  font-weight:900;
  letter-spacing:.16em;
  text-transform:uppercase;
  white-space:nowrap;
  transform:rotate(-6deg);
  mix-blend-mode:multiply;
}
.thread-preview{
  font-size:12px;
  line-height:1.55;
  font-weight:700;
  color:#313131;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
}
.thread-sub{
  display:flex;
  flex-direction:column;
  align-items:flex-start;
  gap:5px;
  padding:7px 9px 7px 11px;
  border-left:0;
  border-radius:0 12px 12px 0;
  background:
    linear-gradient(180deg,rgba(247,247,247,.96),rgba(247,247,247,.86)),
    linear-gradient(180deg,rgba(17,17,17,.14) 0%,rgba(17,17,17,.88) 24%,rgba(17,17,17,.88) 76%,rgba(17,17,17,.14) 100%);
  background-repeat:no-repeat,no-repeat;
  background-size:100% 100%,3px 100%;
  background-position:0 0,0 0;
  box-shadow:inset 0 0 0 1px rgba(17,17,17,.04);
}
.thread-meta{
  font-size:12px;
  font-weight:900;
  color:#6a6a6a;
  letter-spacing:.03em;
}
.thread-stage{
  display:inline-flex;
  align-items:center;
  gap:7px;
  font-size:9px;
  font-weight:900;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:#373737;
}
.thread-stage-dot{
  width:8px;
  height:8px;
  border:1px solid var(--ink);
  border-radius:999px;
  background:#111;
}
.thread-stage.is-pending .thread-stage-dot{background:#b53b3b}
.thread-stage.is-accepted .thread-stage-dot{background:#fff}
.thread-stage.is-complete .thread-stage-dot{background:#111}
.thread-stage.is-continued .thread-stage-dot{background:#fff}
.thread-stage.is-upcoming .thread-stage-dot{background:#fff}
.thread-stage.is-ended .thread-stage-dot{background:#fff}
.delete-confirm{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  padding:24px;
  background:rgba(0,0,0,.38);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  z-index:50;
}
.delete-confirm.open{display:flex}
.delete-confirm-sheet{
  width:min(320px, 100%);
  border:1.5px solid #111;
  background:#fff;
  box-shadow:0 24px 55px rgba(0,0,0,.28);
  padding:18px 16px 16px;
  display:flex;
  flex-direction:column;
  gap:12px;
}
.delete-confirm-title{
  font-family:var(--serif);
  font-size:24px;
  font-weight:900;
  line-height:1;
}
.delete-confirm-copy{
  font-size:13px;
  line-height:1.6;
  font-weight:800;
  color:#343434;
}
.delete-confirm-actions{
  display:flex;
  justify-content:flex-end;
  gap:10px;
}
.delete-confirm-btn{
  min-height:38px;
  padding:0 14px;
  border:1.5px solid #111;
  border-radius:0;
  background:#fff;
  color:#111;
  box-shadow:none;
  font-size:12px;
  font-weight:900;
  letter-spacing:.08em;
}
.delete-confirm-btn.is-danger{
  border-color:#111;
  background:#111;
  color:#fff;
  box-shadow:none;
}
</style>
</head>
<body>
  <main class="offline-page">
    <div class="offline-stack">
      <section class="month-card" id="monthCard"></section>
      <section class="filters-card">
        <div class="filters-tabs" id="filterTabs"></div>
      </section>
      <section class="thread-list" id="threadList"></section>
    </div>
  </main>
  <div class="delete-confirm" id="deleteConfirm" aria-hidden="true">
    <div class="delete-confirm-sheet">
      <div class="delete-confirm-title">删除邀约</div>
      <div class="delete-confirm-copy" id="deleteConfirmCopy">这条邀约会从约会 app 里移走。</div>
      <div class="delete-confirm-actions">
        <button class="delete-confirm-btn" type="button" data-delete-cancel>取消</button>
        <button class="delete-confirm-btn is-danger" type="button" data-delete-confirm>删除</button>
      </div>
    </div>
  </div>
<script src="../assetStore.js?v=2026-04-29T15:16:00Z"></script>
<script src="../offlineInviteStore.js?v=2026-04-29T15:16:00Z"></script>
<script>
var OFFLINE_APP_BUILD_ID = '2026-04-29T15:16:00Z';
var currentFilter = 'all';
var currentSelectedId = '';
var currentSelectedDateKey = '';
var avatarAssetCache = {};
var offlineRenderVersion = 0;
var latestOfflineRecords = [];
var offlineSwipeState = null;
var pendingDeleteRecordId = '';
var lastConsumedForceCompletePayloads = [];
var lastConsumedEndRequestPayloads = [];
var pendingInlineForceCompletePayloads = [];
function esc(text){
  return String(text == null ? '' : text)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

function getParentCharacters(){
  try{
    if(window.parent && window.parent !== window && typeof window.parent.getStoredCharactersSnapshot === 'function'){
      return window.parent.getStoredCharactersSnapshot();
    }
  }catch(err){}
  return [];
}

function isRenderableAssetSource(src){
  var value = String(src || '').trim();
  return !!(value && value !== '__asset__' && (value.indexOf('data:') === 0 || value.indexOf('blob:') === 0 || value.indexOf('http') === 0 || value.indexOf('/') === 0 || value.indexOf('./') === 0 || value.indexOf('../') === 0));
}

function getParentCharByIdOrName(charId, charName){
  var safeId = String(charId || '').trim();
  var safeName = String(charName || '').trim().toLowerCase();
  var chars = getParentCharacters();
  if(!Array.isArray(chars)) return null;
  if(safeId){
    var byId = chars.find(function(item){ return item && String(item.id || '') === safeId; }) || null;
    if(byId) return byId;
  }
  if(safeName){
    return chars.find(function(item){
      if(!item) return false;
      var nick = String(item.nickname || '').trim().toLowerCase();
      var name = String(item.name || '').trim().toLowerCase();
      return !!((nick && nick === safeName) || (name && name === safeName));
    }) || null;
  }
  return null;
}

function readStoredCharAvatar(charId){
  var safeId = String(charId || '').trim();
  if(!safeId) return '';
  if(avatarAssetCache[safeId]) return avatarAssetCache[safeId];
  try{
    var direct = String(localStorage.getItem('char_avatar_' + safeId) || '').trim();
    if(isRenderableAssetSource(direct)){
      avatarAssetCache[safeId] = direct;
      return direct;
    }
  }catch(err){}
  return '';
}

function requestStoredCharAvatar(charId, recordId){
  var safeId = String(charId || '').trim();
  var safeRecordId = String(recordId || '').trim();
  if(!safeId || avatarAssetCache[safeId]) return;
  if(!(window.assetStore && typeof window.assetStore.load === 'function')) return;
  window.assetStore.load('char_avatar_' + safeId).then(function(src){
    var clean = String(src || '').trim();
    if(!isRenderableAssetSource(clean)) return;
    avatarAssetCache[safeId] = clean;
    applyThreadAvatarSource(safeRecordId, { type:'image', value: clean });
  }).catch(function(){});
}

function getCharAvatarSource(charId, charName){
  var safeId = String(charId || '').trim();
  var match = getParentCharByIdOrName(charId, charName);
  var override = readStoredCharAvatar(safeId);
  if(override) return { type:'image', value: override };
  if(match && isRenderableAssetSource(match.imageData)) return { type:'image', value: String(match.imageData || '').trim() };
  if(match && isRenderableAssetSource(match.avatarUrl)) return { type:'image', value: String(match.avatarUrl || '').trim() };
  if(match && isRenderableAssetSource(match.avatar)) return { type:'image', value: String(match.avatar || '').trim() };
  return { type:'text', value: String((charName || (match && (match.nickname || match.name)) || '角')).trim().slice(0, 1) || '角' };
}

function applyThreadAvatarSource(recordId, source){
  var root = document.getElementById('threadList');
  if(!root) return;
  var safeRecordId = String(recordId || '').trim();
  if(!safeRecordId) return;
  var node = findByDataAttr(root, 'data-avatar-id', safeRecordId);
  var img = findByDataAttr(root, 'data-avatar-img', safeRecordId);
  if(!node || !img) return;
  if(source && source.type === 'image' && source.value){
    var safe = String(source.value || '').trim();
    img.onerror = function(){
      img.removeAttribute('src');
      node.classList.remove('has-image');
      var brokenFallback = node.childNodes[node.childNodes.length - 1];
      if(brokenFallback && brokenFallback.nodeType === 3) brokenFallback.textContent = '角';
    };
    img.src = safe;
    node.classList.add('has-image');
    node.style.backgroundImage = '';
    var fallbackNode = node.childNodes[node.childNodes.length - 1];
    if(fallbackNode && fallbackNode.nodeType === 3) fallbackNode.textContent = '';
    return;
  }
  img.removeAttribute('src');
  node.classList.remove('has-image');
  var text = String(source && source.value || '角').trim().slice(0, 1) || '角';
  var fallback = node.childNodes[node.childNodes.length - 1];
  if(fallback && fallback.nodeType === 3) fallback.textContent = text;
}

function getScopedFocusKey(){
  try{
    if(window.parent && window.parent !== window && typeof window.parent.scopedKeyForAccount === 'function' && typeof window.parent.getActiveAccountId === 'function'){
      return window.parent.scopedKeyForAccount('offline_invite_focus_id_v1', window.parent.getActiveAccountId());

function forceCompleteRenderedRecords(records, payloads){
  var list = Array.isArray(records) ? records : [];
  var sources = Array.isArray(payloads) ? payloads : [];
  if(!sources.length) return list;
  var ids = [];
  var charIds = [];
  var charNames = [];
  sources.forEach(function(payload){
    normalizeOfflineInviteCompleteIds(payload).forEach(function(id){
      if(id && ids.indexOf(id) === -1) ids.push(id);
    });
    var charId = String(payload && payload.charId || '').trim();
    if(charId && charIds.indexOf(charId) === -1) charIds.push(charId);
    var charName = String(payload && (payload.charName || payload.name) || '').trim();
    if(charName && charNames.indexOf(charName) === -1) charNames.push(charName);
  });
  try{
    var focusId = String(readFocusId() || '').trim();
    if(focusId && ids.indexOf(focusId) === -1) ids.unshift(focusId);
  }catch(err){}
  var targetIds = [];
  list.forEach(function(record){
    if(!(record && typeof record === 'object')) return;
    var aliases = [record.id, record.recordId, record.inviteRecordId, record.threadId, record.inviteMessageId, record.replyMessageId]
      .map(function(value){ return String(value || '').trim(); })
      .filter(Boolean);
    var idHit = aliases.some(function(value){ return ids.indexOf(value) !== -1; });
    var lifecycleHit = sources.some(function(payload){
      if(!recordMatchesOfflineEndPayload(record, payload)) return false;
      if(!isActiveOpenInviteRecordForCompletion(record) && !isCompletedInviteRecord(record)) return false;
      var payloadAt = Number(payload && (payload.at || payload.completedAt || payload.updatedAt) || 0) || 0;
      var createdAt = Number(record && (record.createdAt || record.updatedAt) || 0) || 0;
      return !(payloadAt && createdAt && createdAt > payloadAt + 2 * 60 * 1000);
    });
    var charHit = (charIds.length && charIds.indexOf(String(record.charId || '').trim()) !== -1)
      || (charNames.length && charNames.indexOf(String(record.charName || '').trim()) !== -1);
    var focusedCharHit = charHit && ids.some(function(id){ return aliases.indexOf(id) !== -1; });
    if(idHit || lifecycleHit || (focusedCharHit && (isAcceptedInviteRecord(record) || isOngoingInviteRecord(record) || isContinuedInviteRecord(record)))){
      aliases.forEach(function(value){ if(value && targetIds.indexOf(value) === -1) targetIds.push(value); });
    }
  });
  if(!targetIds.length){
    var active = list.find(function(record){
      return record && (isAcceptedInviteRecord(record) || isOngoingInviteRecord(record) || isContinuedInviteRecord(record));
    });
    if(active){
      [active.id, active.threadId, active.inviteMessageId, active.replyMessageId].forEach(function(value){
        var safe = String(value || '').trim();
        if(safe && targetIds.indexOf(safe) === -1) targetIds.push(safe);
      });
    }
  }
  if(targetIds.length){
    markCompletedOfflineInviteIds(targetIds);
    forceCompleteOfflineRecords(targetIds, charIds[0] || '', charNames[0] || '');
    return list.map(function(record){ return normalizeCompletedOfflineRecord(record); });
  }
  return list;
}

function collapseCompletedDuplicateInviteRecords(records){

function dedupeCompletedInviteRecords(records){
  var list = Array.isArray(records) ? records.slice() : [];
  if(!list.length) return list;
  var chosenByKey = Object.create(null);
  var duplicateIds = [];
  function dedupeKey(item){
    var charKey = String((item && item.charId) || (item && item.charName) || '').trim();
    if(!charKey) return '';
    return [
      charKey,
      getRecordDateKey(item),
      String(item && item.location || '').trim(),
      String((item && item.scheduledTime) || (item && item.timeLabel) || '').trim()
    ].join('::');
  }
  list.forEach(function(item, index){
    if(!isCompletedInviteRecord(item)) return;
    var key = dedupeKey(item);
    if(!key) return;
    var current = chosenByKey[key];
    var stamp = Number(item && (item.completedAt || item.updatedAt || item.createdAt) || 0) || 0;
    if(!current){
      chosenByKey[key] = { index:index, stamp:stamp };
      return;
    }
    if(stamp >= current.stamp){
      duplicateIds.push(String(list[current.index] && list[current.index].id || '').trim());
      chosenByKey[key] = { index:index, stamp:stamp };
    }else{
      duplicateIds.push(String(item && item.id || '').trim());
    }
  });
  var hiddenDuplicate = duplicateIds.reduce(function(map, id){
    if(id) map[id] = true;
    return map;
  }, Object.create(null));
  return list.filter(function(item){
    return !hiddenDuplicate[String(item && item.id || '').trim()];
  });
}

function getOfflineCompletionMergeKey(item){
  var charKey = String((item && item.charId) || (item && item.charName) || '').trim();
  var dayKey = getRecordDateKey(item);
  var location = String(item && item.location || '').trim();
  var time = String((item && item.scheduledTime) || (item && item.timeLabel) || '').trim();
  if(!charKey || !dayKey || !(location || time)) return '';
  return [charKey, dayKey, location, time].join('::');
}

function promoteActiveDuplicatesFromCompletedRecords(records){
  var list = Array.isArray(records) ? records.slice() : [];
  if(!list.length) return list;
  var completedByKey = Object.create(null);
  list.forEach(function(item){
    if(!isCompletedInviteRecord(item)) return;
    var key = getOfflineCompletionMergeKey(item);
    if(!key) return;
    var stamp = Number(item && (item.completedAt || item.updatedAt || item.createdAt) || 0) || 0;
    if(!completedByKey[key] || stamp >= completedByKey[key].stamp){
      completedByKey[key] = { stamp:stamp, item:item };
    }
  });
  if(!Object.keys(completedByKey).length) return list;
  return list.map(function(item){
    if(!(item && isActiveOpenInviteRecordForCompletion(item))) return item;
    var key = getOfflineCompletionMergeKey(item);
    var completed = key ? completedByKey[key] : null;
    if(!completed) return item;
    var createdAt = Number(item.createdAt || item.updatedAt || 0) || 0;
    if(completed.stamp && createdAt && createdAt > completed.stamp + 2 * 60 * 1000) return item;
    forceCompleteOfflineRecords(getOfflineRecordAliasIds(item), item.charId, item.charName);
    return normalizeCompletedOfflineRecord(Object.assign({}, item, {
      status:'completed',
      meetState:'complete',
      readOnly:true,
      completedAt:completed.stamp || Date.now(),
      updatedAt:Math.max(Number(item.updatedAt || 0) || 0, completed.stamp || Date.now())
    }));
  });
}

async function getOfflineRecords(){

  fromStore = getOfflineRecordsFromStore();
  fromStore.forEach(function(item){ mergeOfflineRecordMaps(map, Object.assign({ source:'store' }, item || {})); });
  adoptedRecords.forEach(function(item){ mergeOfflineRecordMaps(map, Object.assign({ source:'phoneStorageAdopted' }, item || {})); });
  var storeIds = fromStore.concat(adoptedRecords).reduce(function(out, item){
    var id = String(item && item.id || '').trim();

    return out;
  }, Object.create(null));
  fallback.forEach(function(item){

    if(fallbackId && storeIds[fallbackId] && !isCompletedInviteRecord(item) && !isOngoingInviteRecord(item) && !isContinuedInviteRecord(item)) return;
    mergeOfflineRecordMaps(map, Object.assign({ source:'chatFallback' }, item || {}));

  });
  return dedupeCompletedInviteRecords(collapseCompletedDuplicateInviteRecords(promoteActiveDuplicatesFromCompletedRecords(repairSelectedActiveRecordFromCompletedSameDay(records))));

function isPendingInviteRecord(item){

function isCompletedInviteRecord(item){

  var status = String(item && item.status || '').trim();
  return isRecordForceCompleted(item) || meetState === 'complete' || meetState === 'completed' || meetState === 'ended' || status === 'completed' || status === 'rejected' || status === 'declined' || (!!(item && item.readOnly) && !!(item && item.completedAt));
}

function isContinuedInviteRecord(item){

}

function getRecordStage(item){
  var status = String(item && item.status || 'pending').trim() || 'pending';
  if(isCompletedInviteRecord(item)){
    return { tone:'complete', label:'Complete', note:'complete', badge:'结束' };
  }
  if(isPendingInviteRecord(item)){
    return { tone:'pending', label:'Pending', note:'pending', badge:'待回复' };
  }
  if(isContinuedInviteRecord(item)){
    return { tone:'continued', label:'To Be Continued', note:'to be continued', badge:'待续' };
  }
  if(isOngoingInviteRecord(item)){
    return { tone:'continued', label:'On Date', note:'on date', badge:'赴约中' };
  }
  if(isAcceptedInviteRecord(item)){
    return { tone:'accepted', label:'Accepted', note:'accepted', badge:'同意' };
  }
  if(status === 'rejected'){
    return { tone:'ended', label:'Ended', note:'declined', badge:'结束' };

  return { tone:'pending', label:'Pending', note:'pending', badge:'待回复' };

function getRecordPreview(item){
  var preview = String(item && item.previewText || '').trim();

  var stage = getRecordStage(item);
  if(stage.tone === 'pending') return String(item && item.sourceRole || '').trim() === 'assistant'

  if(stage.tone === 'continued') return '这次见面还没真正结束，只是先暂时离开了一下。';

function recordMatchesOfflineEndPayload(record, payload){
  if(!(record && typeof record === 'object') || !(payload && typeof payload === 'object')) return false;
  var ids = normalizeOfflineInviteCompleteIds(payload);
  var aliases = getOfflineRecordAliasIds(record);
  if(ids.some(function(id){ return aliases.indexOf(id) !== -1; })) return true;
  var payloadKey = String(payload.lifecycleKey || payload.inviteLifecycleKey || '').trim();
  if(payloadKey && payloadKey === getOfflineInviteLifecycleKey(record)) return true;
  var charId = String(payload.charId || '').trim();
  var charName = String(payload.charName || payload.name || '').trim();
  var sameChar = !!(charId && String(record.charId || '').trim() === charId)
    || !!(charName && String(record.charName || '').trim() === charName);
  if(!sameChar) return false;
  var payloadDate = String(payload.dateKey || payload.scheduledDate || '').trim();
  var recordDate = getRecordDateKey(record);
  if(payloadDate && recordDate && payloadDate !== recordDate) return false;
  var recordTime = String(record.scheduledTime || record.timeLabel || '').trim();
  var payloadTime = String(payload.scheduledTime || payload.timeLabel || '').trim();
  var recordLocation = String(record.location || '').trim();
  var payloadLocation = String(payload.location || '').trim();
  var recordPreview = String(getRecordPreview(record) || record.previewText || '').trim();
  var payloadPreview = String(payload.previewText || '').trim();
  if(payloadTime && recordTime && payloadTime === recordTime) return true;
  if(payloadLocation && recordLocation && payloadLocation === recordLocation) return true;
  if(payloadPreview && recordPreview && payloadPreview === recordPreview) return true;
  return false;
}

function forceCompleteOfflineRecordsByEndPayload(payload){
  payload = payload && typeof payload === 'object' ? payload : {};
  var targetIds = [];

    if(Array.isArray(latestOfflineRecords)) sources = sources.concat(latestOfflineRecords);
    var store = window.OfflineInviteStore || null;
    if(store && typeof store.listRecords === 'function') sources = sources.concat(store.listRecords());
  }catch(err){}
  sources.forEach(function(record){
    if(!(record && isActiveOpenInviteRecordForCompletion(record))) return;

    getOfflineRecordAliasIds(record).forEach(function(id){

  });
  if(targetIds.length) forceCompleteOfflineRecords(targetIds, payload.charId, payload.charName || payload.name);
  return targetIds;
}

function getRecordTimeStamp(item){

function toDateKeyFromTimestamp(value){
  var stamp = Number(value || 0) || 0;
  if(stamp <= 0) return '';
  return toDateKey(new Date(stamp));
}

function toDateKey(date){
  if(!(date instanceof Date) || Number.isNaN(date.getTime())) return '';
  return [
    date.getFullYear(),
    String(date.getMonth() + 1).padStart(2, '0'),
    String(date.getDate()).padStart(2, '0')
  ].join('-');
}

function getRecordDateObj(item){
  var raw = getRecordDateKey(item);
  if(!/^\d{4}-\d{2}-\d{2}$/.test(raw)) return new Date();
  var parts = raw.split('-');
  return new Date(Number(parts[0]) || 0, Math.max(0, (Number(parts[1]) || 1) - 1), Number(parts[2]) || 1);
}

function getMonthKeyFromDateKey(dateKey){
  var safe = String(dateKey || '').trim();
  return /^\d{4}-\d{2}-\d{2}$/.test(safe) ? safe.slice(0, 7) : toDateKey(new Date()).slice(0, 7);
}

function daysInMonth(year, monthIndex){
  return new Date(Number(year) || 1970, Number(monthIndex || 0) + 1, 0).getDate();
}

function clampDateKeyInMonth(monthKey, day){
  var safeMonth = String(monthKey || '').trim();
  if(!/^\d{4}-\d{2}$/.test(safeMonth)) safeMonth = toDateKey(new Date()).slice(0, 7);
  var parts = safeMonth.split('-');
  var year = Number(parts[0]) || new Date().getFullYear();
  var monthIndex = Math.max(0, Math.min(11, (Number(parts[1]) || 1) - 1));
  var safeDay = Math.max(1, Math.min(daysInMonth(year, monthIndex), Number(day || 1) || 1));
  return [String(year).padStart(4, '0'), String(monthIndex + 1).padStart(2, '0'), String(safeDay).padStart(2, '0')].join('-');
}

function findBestDateInMonth(records, monthKey){
  var safeMonth = String(monthKey || '').trim();
  if(!/^\d{4}-\d{2}$/.test(safeMonth)) return '';
  var best = '';
  var bestStamp = -1;
  (Array.isArray(records) ? records : []).forEach(function(item){
    var key = getRecordDateKey(item);
    if(key.slice(0, 7) !== safeMonth) return;
    var stamp = Number(item && (item.completedAt || item.updatedAt || item.createdAt) || 0) || 0;
    if(!best || stamp >= bestStamp){
      best = key;
      bestStamp = stamp;
    }
  });
  return best;
}

function shiftMonthDateKey(dateKey, delta){
  var source = /^\d{4}-\d{2}-\d{2}$/.test(String(dateKey || '')) ? String(dateKey) : toDateKey(new Date());
  var parts = source.split('-');
  var date = new Date(Number(parts[0]) || 1970, Math.max(0, (Number(parts[1]) || 1) - 1), 1);
  date.setMonth(date.getMonth() + (Number(delta || 0) || 0));
  return clampDateKeyInMonth(toDateKey(date).slice(0, 7), Number(parts[2]) || 1);
}

function getRecordDateKey(item){
  var scheduled = String(item && item.scheduledDate || '').trim();
  if(/^\d{4}-\d{2}-\d{2}$/.test(scheduled)) return scheduled;
  return toDateKeyFromTimestamp(item && (item.createdAt || item.updatedAt)) || toDateKey(new Date());
}

function formatWeekRange(date){
  var safe = date instanceof Date ? new Date(date.getTime()) : new Date();
  var day = safe.getDay();

  safe.setDate(safe.getDate() - offset);

function buildWeekDays(date){

  return chosen;
}

function collectCalendarDots(records){
  var marks = Object.create(null);
  (Array.isArray(records) ? records : []).forEach(function(item){
    var key = getRecordDateKey(item);
    if(key) marks[key] = true;
  });
  return marks;
}

function getRecordDisplayDateTime(item){
  var parts = [
    String(item && item.dateLabel || '').trim(),
    String(item && item.timeLabel || '').trim()
  ].filter(Boolean);
  if(!parts.length){
    var dateKey = getRecordDateKey(item);
    if(dateKey) parts.push(dateKey.replace(/-/g, '.'));
    var timeStamp = getRecordTimeStamp(item);
    if(timeStamp) parts.push(timeStamp);
  }
  return parts.join(' ');
}

function getRecordDisplayLocation(item){
  return String(item && item.location || '').trim() || '地点待定';
}

function getRecordDisplayPreview(item, locationText){
  var preview = getRecordPreview(item);
  var safePreview = String(preview || '').trim();
  var safeLocation = String(locationText || '').trim();
  if(!safePreview) return '';
  if(safeLocation && safePreview === safeLocation) return '';
  if(safeLocation && safePreview.replace(/\s+/g, '') === safeLocation.replace(/\s+/g, '')) return '';
  return safePreview;
}

function renderMonthCard(records, selectedRecord){
  var root = document.getElementById('monthCard');
  if(!root) return;
  if(!currentSelectedDateKey) currentSelectedDateKey = selectedRecord ? getRecordDateKey(selectedRecord) : toDateKey(new Date());
  var anchor = currentSelectedDateKey ? getRecordDateObj({ scheduledDate: currentSelectedDateKey }) : (selectedRecord ? getRecordDateObj(selectedRecord) : new Date());
  var week = buildWeekDays(anchor);
  var marks = collectCalendarDots(records);
  var selectedDateKey = currentSelectedDateKey || toDateKey(anchor);
  var monthKey = getMonthKeyFromDateKey(selectedDateKey);
  root.innerHTML = ''
    + '<div class="month-row">'
    +   '<button class="month-exit" type="button" data-offline-exit aria-label="返回">♥</button>'
    +   '<div class="month-label">'
    +     '<div class="month-title">' + esc(formatDateTitle(anchor)) + '</div>'
    +     '<div class="month-sub">' + esc(formatWeekRange(anchor)) + '</div>'
    +   '</div>'
    + '</div>'
    + '<div class="month-picker">'
    +   '<button class="month-nav" type="button" data-month-shift="-1" aria-label="上个月">‹</button>'
    +   '<input class="date-field" type="month" data-month-picker value="' + esc(monthKey) + '" aria-label="选择月份">'
    +   '<input class="date-field" type="date" data-date-picker value="' + esc(selectedDateKey) + '" aria-label="选择日期">'
    +   '<button class="month-nav" type="button" data-month-shift="1" aria-label="下个月">›</button>'
    + '</div>'
    + '<div class="weekdays"><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div><div>日</div></div>'
    + '<div class="calendar-strip">'
    + week.map(function(item){
        var key = toDateKey(item);
        var active = key === selectedDateKey ? ' is-active' : '';
        var dot = marks[key] ? '<div class="day-chip-dot"></div>' : '<div class="day-chip-ghost"></div>';
        return '<button class="day-chip' + active + '" type="button" data-date-key="' + esc(key) + '">'
          + '<div class="day-chip-day">' + esc(item.getDate()) + '</div>'
          + '<div class="day-chip-meta">' + esc(formatLunarStub(item)) + '</div>'
          + dot
          + '</button>';
      }).join('')
    + '</div>';
}

function renderFilterTabs(records){
  var root = document.getElementById('filterTabs');
  if(!root) return;
  var dayRecords = (Array.isArray(records) ? records : []).filter(function(item){
    return getRecordDateKey(item) === String(currentSelectedDateKey || toDateKey(new Date())).trim();
  });
  var counts = {
    all: dayRecords.length,
    complete: dayRecords.filter(isCompletedInviteRecord).length,
    pending: dayRecords.filter(isPendingInviteRecord).length,
    continued: dayRecords.filter(isContinuedInviteRecord).length
  };
  var tabs = [
    { id:'all', label:'All' },
    { id:'pending', label:'Pending' },
    { id:'complete', label:'Complete' },
    { id:'continued', label:'Continued' }
  ];
  root.innerHTML = tabs.map(function(tab){
    var active = tab.id === currentFilter ? ' is-active' : '';
    return '<button class="filter-tab' + active + '" type="button" data-filter-id="' + esc(tab.id) + '">' + esc(tab.label) + ' ' + esc(counts[tab.id] || 0) + '</button>';
  }).join('');
}

function renderThreadList(records, selectedRecord){
  var root = document.getElementById('threadList');
  if(!root) return;
  var list = filterRecords(records);
  if(!list.length){
    root.innerHTML = '<div class="thread-empty">这一天这个分类还没有邀约。</div>';
    return;
  }
  root.innerHTML = list.map(function(item){
    var stage = getRecordStage(item);
    var active = selectedRecord && String(selectedRecord.id || '') === String(item.id || '') ? ' is-selected' : '';
    var fallback = esc(String(item.charName || '角').slice(0, 1) || '角');
    var dateTimeText = getRecordDisplayDateTime(item) || '时间待定';
    var locationText = getRecordDisplayLocation(item);
    var previewText = getRecordDisplayPreview(item, locationText);
    return '<div class="thread-row" data-thread-row="' + esc(item.id) + '">'
      + '<button class="thread-delete" type="button" data-delete-record-id="' + esc(item.id) + '"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 3.5h6l.8 1.5H20a1 1 0 1 1 0 2h-1l-.9 11a2 2 0 0 1-2 1.82H8a2 2 0 0 1-2-1.82L5 7H4a1 1 0 1 1 0-2h4.2L9 3.5Zm-1.99 3 .9 10.92h8.18L17 6.5H7.01ZM10 9a1 1 0 0 1 1 1v5a1 1 0 1 1-2 0v-5a1 1 0 0 1 1-1Zm4 0a1 1 0 0 1 1 1v5a1 1 0 1 1-2 0v-5a1 1 0 0 1 1-1Z"></path></svg><span>删除</span></button>'
      + '<article class="thread-item' + active + '" data-record-id="' + esc(item.id) + '">'
      + '<div class="thread-polaroid">'
      +   '<button class="thread-avatar" type="button" data-avatar-id="' + esc(item.id) + '"><img alt="' + esc(item.charName || '头像') + '" data-avatar-img="' + esc(item.id) + '">' + fallback + '</button>'
      +   '<div class="thread-polaroid-label">' + esc(item.charName || '未命名角色') + '</div>'
      + '</div>'
      + '<div class="thread-main">'
      +   '<div class="thread-top"><div class="thread-name">' + esc(item.charName || '未命名角色') + '</div><div class="thread-highlight">' + esc(stage.badge || stage.note) + '</div></div>'
      +   '<div class="thread-sub">'
      +     '<div class="thread-time">' + esc(dateTimeText) + '</div>'
      +     '<div class="thread-meta">' + esc(locationText) + '</div>'
      +   '</div>'
      +   (previewText ? '<div class="thread-preview">' + esc(previewText) + '</div>' : '')
      + '</div>'
      + '</article>'
      + '</div>';
  }).join('');
  list.forEach(function(item){
    applyThreadAvatarSource(item.id, getCharAvatarSource(item.charId, item.charName));
    requestStoredCharAvatar(item.charId, item.id);
  });
  requestAnimationFrame(refreshThreadListElasticSpace);
}

async function renderOfflineApp(){
  var renderToken = ++offlineRenderVersion;
  var endPayloads = consumePendingOfflineInviteEndRequests();
  lastConsumedEndRequestPayloads = endPayloads.slice();
  var inlinePayloads = pendingInlineForceCompletePayloads.slice();
  pendingInlineForceCompletePayloads = [];
  var forcePayloads = consumePendingForceCompleteOfflineRecords().concat(consumePendingExitCompleteOfflineIntents()).concat(endPayloads).concat(inlinePayloads);
  var records = await getOfflineRecords();
  records = forceCompleteRenderedRecords(records, forcePayloads);
  if(renderToken !== offlineRenderVersion) return;
  latestOfflineRecords = Array.isArray(records) ? records.slice() : [];
  if(!currentSelectedDateKey) currentSelectedDateKey = toDateKey(new Date());
  var focusId = readFocusId();
  if(focusId){
    var focusRecord = latestOfflineRecords.find(function(item){ return String(item && item.id || '') === focusId; }) || null;
    if(focusRecord) currentSelectedDateKey = getRecordDateKey(focusRecord);
  }
  var selected = pickSelectedRecord(records);
  var repairedRecords = repairSelectedActiveRecordFromCompletedSameDay(records);
  if(repairedRecords !== records){
    records = dedupeCompletedInviteRecords(collapseCompletedDuplicateInviteRecords(repairedRecords));
    latestOfflineRecords = Array.isArray(records) ? records.slice() : [];
    selected = pickSelectedRecord(records);
  }
  renderMonthCard(records, selected);
  renderFilterTabs(records);
  renderThreadList(records, selected);
}

function canOpenRecordInOfflineMode(item){
  if(!item) return false;
  return isAcceptedInviteRecord(item)
    || isOngoingInviteRecord(item)
    || isContinuedInviteRecord(item)
    || isCompletedInviteRecord(item);
}

function openRecordInOfflineMode(item){
  if(!item || !canOpenRecordInOfflineMode(item)) return false;
  var safeId = String(item.id || '').trim();
  var safeCharId = String(item.charId || '').trim();
  if(!safeCharId) return false;
  var openAsFreshInvite = isAcceptedInviteRecord(item) && !isOngoingInviteRecord(item) && !isContinuedInviteRecord(item) && !isCompletedInviteRecord(item);
  var launchToken = 'offline_record_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 8);
  try{
    localStorage.setItem(getScopedFocusKey(), safeId);
  }catch(err){}
  try{
    var launchIntent = { recordId:safeId, charId:safeCharId, charName:String(item.charName || '').trim(), openedAt:Date.now() };
    localStorage.setItem(getActiveOfflineLaunchIntentKey(), JSON.stringify(launchIntent));
    localStorage.setItem('offline_invite_active_launch_v1', JSON.stringify(launchIntent));
  }catch(errLaunch){}
  var readOnly = isCompletedInviteRecord(item);
  var openPayload = {
    app:'offline_mode',
    charId:safeCharId,
    inviteId:safeId,
    recordId:safeId,
    launchMode: openAsFreshInvite ? 'invite' : 'resume',
    launchToken: launchToken,
    forceOpen: true,
    readOnly: readOnly,
    offlineLaunchRecord:{
      mode: openAsFreshInvite ? 'invite' : 'resume',
      launchToken: launchToken,
      freshStart: openAsFreshInvite,
      readOnly: readOnly,
      createdAt: Date.now(),
      charId:safeCharId,
      payload:{
        id:safeId,
        recordId:safeId,
        inviteRecordId:safeId,
        threadId:String(item.threadId || safeId).trim() || safeId,
        charId:safeCharId,
        charName:String(item.charName || '').trim(),
        sourceRole:String(item.sourceRole || '').trim(),
        status:String(item.status || '').trim(),
        meetState:String(item.meetState || '').trim(),
        freshStart: openAsFreshInvite,
        readOnly: readOnly,
        lifecycleKey:getOfflineInviteLifecycleKey(item),
        dateKey:getRecordDateKey(item),
        location:String(item.location || '').trim(),
        scheduledDate:String(item.scheduledDate || '').trim(),
        scheduledTime:String(item.scheduledTime || '').trim(),
        dateLabel:String(item.dateLabel || '').trim(),
        timeLabel:String(item.timeLabel || '').trim(),
        previewText:String(item.previewText || '').trim(),
        inviteMessageId:String(item.inviteMessageId || '').trim(),
        replyMessageId:String(item.replyMessageId || '').trim()
      },
      createdAt:Date.now()
    }
  };
  try{
    if(window.parent && window.parent !== window && typeof window.parent.forceOpenOfflineMode === 'function'){
      window.parent.forceOpenOfflineMode(openPayload);
      return true;
    }
  }catch(err){}
  try{
    if(window.parent && window.parent !== window){
      window.parent.postMessage({
        type:'OPEN_APP_WITH',
        payload:openPayload
      }, '*');
      return true;
    }
  }catch(err){}
  return false;
}

document.addEventListener('click', async function(event){
  var deleteBtn = event.target && event.target.closest ? event.target.closest('[data-delete-record-id]') : null;
  if(deleteBtn){
    var deleteId = String(deleteBtn.getAttribute('data-delete-record-id') || '').trim();
    if(deleteId) openDeleteConfirm(deleteId);
    return;
  }
  var deleteCancelBtn = event.target && event.target.closest ? event.target.closest('[data-delete-cancel]') : null;
  if(deleteCancelBtn){
    closeDeleteConfirm();
    return;
  }
  var deleteConfirmBtn = event.target && event.target.closest ? event.target.closest('[data-delete-confirm]') : null;
  if(deleteConfirmBtn){
    if(pendingDeleteRecordId){
      await removeOfflineRecord(pendingDeleteRecordId);
      closeDeleteConfirm();
      await renderOfflineApp();
      return;
    }
    closeDeleteConfirm();
    return;
  }
  var deleteOverlay = event.target && event.target.closest ? event.target.closest('#deleteConfirm') : null;
  if(deleteOverlay && event.target === deleteOverlay){
    closeDeleteConfirm();
    return;
  }
  var exitBtn = event.target && event.target.closest ? event.target.closest('[data-offline-exit]') : null;
  if(exitBtn){
    try{
      if(window.parent && window.parent !== window && typeof window.parent.handleBack === 'function'){
        window.parent.handleBack();
        return;
      }
    }catch(err){}
    try{
      if(window.history.length > 1) window.history.back();
    }catch(err){}
    return;
  }
  var filterBtn = event.target && event.target.closest ? event.target.closest('[data-filter-id]') : null;
  if(filterBtn){
    currentFilter = String(filterBtn.getAttribute('data-filter-id') || 'all');
    renderOfflineApp();
    return;
  }
  var monthShiftBtn = event.target && event.target.closest ? event.target.closest('[data-month-shift]') : null;
  if(monthShiftBtn){
    currentSelectedDateKey = shiftMonthDateKey(currentSelectedDateKey || toDateKey(new Date()), Number(monthShiftBtn.getAttribute('data-month-shift') || 0) || 0);
    var shiftedMonth = getMonthKeyFromDateKey(currentSelectedDateKey);
    currentSelectedDateKey = findBestDateInMonth(latestOfflineRecords, shiftedMonth) || currentSelectedDateKey;
    currentSelectedId = '';
    renderOfflineApp();
    return;
  }
  var dayBtn = event.target && event.target.closest ? event.target.closest('[data-date-key]') : null;
  if(dayBtn){
    currentSelectedDateKey = String(dayBtn.getAttribute('data-date-key') || '').trim() || toDateKey(new Date());
    currentSelectedId = '';
    renderOfflineApp();
    return;
  }
  var recordBtn = event.target && event.target.closest ? event.target.closest('[data-record-id]') : null;
  if(recordBtn){
    var row = recordBtn.closest ? recordBtn.closest('.thread-row') : null;
    if(row && row.classList.contains('is-open')){
      row.classList.remove('is-open');
      return;
    }
    closeOpenThreadRows();
    currentSelectedId = String(recordBtn.getAttribute('data-record-id') || '').trim();
    var source = Array.isArray(latestOfflineRecords) ? latestOfflineRecords.slice() : [];
    var hit = source.find(function(item){
      return String(item && item.id || '') === currentSelectedId;
    }) || null;
    if(hit && canOpenRecordInOfflineMode(hit)){
      openRecordInOfflineMode(hit);
      return;
    }
    renderOfflineApp();
  }
});

document.addEventListener('change', function(event){
  var monthInput = event.target && event.target.closest ? event.target.closest('[data-month-picker]') : null;
  if(monthInput){
    var monthKey = String(monthInput.value || '').trim();
    if(/^\d{4}-\d{2}$/.test(monthKey)){
      currentSelectedDateKey = findBestDateInMonth(latestOfflineRecords, monthKey) || clampDateKeyInMonth(monthKey, 1);
      currentSelectedId = '';
      renderOfflineApp();
    }
    return;
  }
  var dateInput = event.target && event.target.closest ? event.target.closest('[data-date-picker]') : null;
  if(dateInput){
    var dateKey = String(dateInput.value || '').trim();
    if(/^\d{4}-\d{2}-\d{2}$/.test(dateKey)){
      currentSelectedDateKey = dateKey;
      currentSelectedId = '';
      renderOfflineApp();
    }
  }
});

document.addEventListener('pointerdown', function(event){
  var deleteBtn = event.target && event.target.closest ? event.target.closest('[data-delete-record-id]') : null;
  if(!deleteBtn) return;
  event.stopPropagation();
}, true);

document.addEventListener('click', function(event){
  var deleteBtn = event.target && event.target.closest ? event.target.closest('[data-delete-record-id]') : null;
  if(!deleteBtn) return;
  event.preventDefault();
  event.stopPropagation();
  if(typeof event.stopImmediatePropagation === 'function') event.stopImmediatePropagation();
  var deleteId = String(deleteBtn.getAttribute('data-delete-record-id') || '').trim();
  if(deleteId) openDeleteConfirm(deleteId);
}, true);

document.addEventListener('pointerdown', function(event){
  if(event.target && event.target.closest && event.target.closest('[data-delete-record-id]')) return;
  var item = event.target && event.target.closest ? event.target.closest('.thread-item') : null;
  if(!item) return;
  var row = item.closest ? item.closest('.thread-row') : null;
  if(!row) return;
  closeOpenThreadRows(row);
  offlineSwipeState = {
    row: row,
    pointerId: event.pointerId,
    startX: Number(event.clientX || 0),
    startY: Number(event.clientY || 0),
    startOffset: row.classList.contains('is-open') ? -72 : 0,
    offset: row.classList.contains('is-open') ? -72 : 0,
    dragging: false
  };
}, { passive:true });

document.addEventListener('pointermove', function(event){
  if(!offlineSwipeState || event.pointerId !== offlineSwipeState.pointerId) return;
  var dx = Number(event.clientX || 0) - offlineSwipeState.startX;
  var dy = Number(event.clientY || 0) - offlineSwipeState.startY;
  if(!offlineSwipeState.dragging){
    if(Math.abs(dx) < 8) return;
    if(Math.abs(dy) > Math.abs(dx)){
      offlineSwipeState = null;
      return;
    }
    offlineSwipeState.dragging = true;
    offlineSwipeState.row.classList.add('is-dragging');
  }
  offlineSwipeState.offset = Math.max(-72, Math.min(0, offlineSwipeState.startOffset + dx));
  applySwipeOffset(offlineSwipeState.row, offlineSwipeState.offset);
  event.preventDefault();
}, { passive:false });

document.addEventListener('pointerup', function(event){
  if(!offlineSwipeState || event.pointerId !== offlineSwipeState.pointerId) return;
  finalizeThreadSwipe(offlineSwipeState.row, offlineSwipeState.offset);
  offlineSwipeState = null;
});

document.addEventListener('pointercancel', function(event){
  if(!offlineSwipeState || event.pointerId !== offlineSwipeState.pointerId) return;
  finalizeThreadSwipe(offlineSwipeState.row, offlineSwipeState.offset);
  offlineSwipeState = null;
});

window.addEventListener('message', function(e){
  var data = e.data || {};
  if(data.type === 'OFFLINE_INVITE_FORCE_COMPLETE'){
    var payload = data.payload || {};
    pendingInlineForceCompletePayloads.push(payload);
    var ids = normalizeOfflineInviteCompleteIds(payload);
    forceCompleteOfflineRecords(ids, payload.charId, payload.charName || payload.name);
    forceCompleteOfflineRecordsByEndPayload(payload);
    renderOfflineApp();
    return;
  }
  if(data.type === 'OFFLINE_INVITE_STORE_DIRTY' || data.type === 'OPEN_SHELL_NOTIFICATION'){
    renderOfflineApp();
  }
});

window.addEventListener('storage', function(e){
  if(e && /offline_invite/i.test(String(e.key || ''))){
    renderOfflineApp();
  }
});

document.addEventListener('visibilitychange', function(){
  if(document.visibilityState === 'visible'){
    renderOfflineApp();
  }
});

renderOfflineApp();
setInterval(function(){
  renderOfflineApp();
}, 20000);
</script>
