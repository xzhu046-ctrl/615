<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>QQ</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Nunito:wght@700;900&family=Cormorant+Garamond:wght@600;700&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
<script src="../accountManager.js"></script>
<script src="../assetStore.js"></script>
<script src="../chatStorage.js"></script>
<script src="../metadataStore.js"></script>
<script src="../sunnySupport.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --b:#0f0f10;
  --w:#ffffff;
  --off:#f5f5f6;
  --off-2:#fcfcfc;
  --g:#8c8c8f;
  --g-2:#cfcfd2;
  --line:rgba(15,15,16,.12);
  --line-strong:rgba(15,15,16,.2);
  --soft-shadow:0 16px 34px rgba(15,15,16,.06),0 4px 10px rgba(15,15,16,.04);
  --card-shadow:0 22px 44px rgba(15,15,16,.08),0 2px 8px rgba(15,15,16,.05);
  --font:'Quicksand',sans-serif;
  --fontd:'Nunito',sans-serif;
  --fontcute:'ZCOOL KuaiLe',cursive;
  --serif:'Cormorant Garamond',serif;
  --safe-top:max(env(safe-area-inset-top),0px);
  --qq-header-art:url('assets/%E6%A8%B1%E8%8A%B1%E5%9C%A8%E6%B0%B4%E9%87%8C.jpg');
}
html,body{height:100%}
body{
  font-family:var(--font);
  background:
    radial-gradient(circle at top left, rgba(244,244,245,.92) 0%, rgba(244,244,245,0) 26%),
    linear-gradient(180deg,#ffffff 0%,#f1f2f4 100%);
  color:var(--b);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}
.qq-shell{flex:1;min-height:0;display:flex;flex-direction:column}
.qq-shell,.qq-shell button,.qq-shell input,.qq-shell textarea,.qq-shell .name,.qq-shell .snip,.qq-shell .time,.qq-shell .pin-chip,.qq-shell .contacts-drawer-title,.qq-shell .contacts-drawer-name,.qq-shell .contacts-drawer-note,.qq-shell .nav-label{font-family:var(--fontcute)!important}
.view{flex:1;overflow:hidden;display:none;min-height:0}
.view.active{display:flex;flex-direction:column;min-height:0}
.qq-chat-page{
  flex:1;
  min-height:0;
  height:100%;
  max-height:100%;
  overflow-y:auto;
  overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior-y:contain;
  touch-action:pan-y;
  padding:calc(10px + var(--safe-top)) 14px calc(156px + env(safe-area-inset-bottom));
  display:flex;
  flex-direction:column;
  gap:14px;
  scrollbar-width:none;
}
.qq-chat-page::-webkit-scrollbar{display:none}
.hero-row{display:flex;justify-content:flex-end;min-height:42px}
.sky-pill{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:9px 16px;
  border-radius:999px;
  background:rgba(255,255,255,.82);
  border:1px solid rgba(15,15,16,.05);
  box-shadow:var(--soft-shadow);
  font-size:12px;
  font-weight:700;
  color:#767679;
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
}
.sky-dot{
  width:12px;
  height:12px;
  border-radius:999px;
  background:var(--b);
  box-shadow:0 0 0 5px rgba(15,15,16,.08);
  flex-shrink:0;
}
.memory-card{
  position:relative;
  padding-top:22px;
}
.memory-card::before,
.memory-card::after{
  content:'';
  position:absolute;
  top:0;
  left:18px;
  width:56px;
  height:46px;
  border-radius:18px;
  background:linear-gradient(180deg,#f2f2f2 0%,#d8d8d8 100%);
  box-shadow:0 10px 18px rgba(15,15,16,.12);
  transform:rotate(-8deg);
  opacity:.74;
}
.memory-card::after{
  left:48px;
  top:-2px;
  width:60px;
  height:50px;
  background:
    radial-gradient(circle at 68% 28%, rgba(15,15,16,.9) 0 9px, transparent 10px),
    radial-gradient(circle at 32% 58%, rgba(15,15,16,.14) 0 3px, transparent 4px),
    linear-gradient(180deg,#fafafa 0%,#e5e5e5 100%);
  transform:rotate(6deg);
}
.memory-card-inner{
  position:relative;
  z-index:1;
  background:rgba(255,255,255,.92);
  border:1px solid rgba(15,15,16,.08);
  border-radius:32px;
  padding:18px 18px 18px;
  box-shadow:var(--card-shadow);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
}
.memory-head{
  display:flex;
  align-items:center;
  gap:14px;
}
.memory-chip{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:9px 14px;
  border-radius:999px;
  background:#efefef;
  color:#2c2c2d;
  font-size:12px;
  font-weight:700;
  white-space:nowrap;
  box-shadow:inset 0 -1px 0 rgba(255,255,255,.8);
}
.memory-title{
  flex:1;
  font-family:var(--serif);
  font-size:31px;
  line-height:1.06;
  font-weight:700;
  letter-spacing:-.01em;
}
.memory-tools{
  display:grid;
  grid-template-columns:44px 1fr 44px;
  align-items:center;
  gap:14px;
  margin-top:18px;
}
.memory-tool{
  width:44px;
  height:44px;
  border:none;
  border-radius:16px;
  background:rgba(255,255,255,.88);
  box-shadow:0 10px 18px rgba(15,15,16,.08);
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--b);
  cursor:pointer;
  transition:transform .12s ease, box-shadow .12s ease;
}
.memory-tool:active{transform:translateY(1px);box-shadow:0 6px 12px rgba(15,15,16,.08)}
.memory-tool svg{width:24px;height:24px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.memory-strip{
  display:flex;
  align-items:center;
  gap:16px;
  overflow:auto;
  padding:2px 2px 8px;
  scrollbar-width:none;
}
.memory-strip::-webkit-scrollbar{display:none}
.memory-strip .quick-face{
  width:58px;
  height:58px;
  border:none;
  border-radius:20px;
  background:#fff;
  box-shadow:0 10px 20px rgba(15,15,16,.12);
  overflow:hidden;
  position:relative;
  cursor:pointer;
  flex:0 0 auto;
}
.memory-strip .quick-face img{width:100%;height:100%;object-fit:cover;display:block;filter:grayscale(1) contrast(112%)}
.memory-strip .quick-face-fallback{
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
}
.memory-strip .quick-face::after{
  content:'';
  position:absolute;
  right:-2px;
  bottom:-2px;
  width:14px;
  height:14px;
  border-radius:999px;
  background:#fff;
  box-shadow:0 0 0 3px rgba(15,15,16,.12);
}
.filter-card{
  background:rgba(255,255,255,.9);
  border:1px solid rgba(15,15,16,.08);
  border-radius:34px;
  padding:18px 18px 16px;
  box-shadow:var(--soft-shadow);
}
.filter-tabs{
  display:grid;
  grid-template-columns:repeat(5,minmax(0,1fr));
  gap:10px;
}
.filter-tab{
  border:none;
  background:transparent;
  border-radius:999px;
  padding:10px 6px;
  color:#171718;
  font-family:var(--serif);
  font-size:26px;
  font-style:italic;
  font-weight:700;
  cursor:pointer;
  transition:background .14s ease,color .14s ease,transform .14s ease,box-shadow .14s ease;
}
.filter-tab.active{
  background:#0f0f10;
  color:#fff;
  box-shadow:0 14px 22px rgba(15,15,16,.18);
}
.filter-tab:active{transform:translateY(1px)}
.filter-note{
  display:flex;
  align-items:center;
  gap:16px;
  margin-top:18px;
  padding:12px 4px 0;
  border-top:1px solid rgba(15,15,16,.08);
}
.filter-note-star{
  font-size:26px;
  line-height:1;
}
.filter-note-text{
  font-size:14px;
  font-weight:700;
  letter-spacing:.02em;
  color:#454547;
}
.list{
  display:flex;
  flex-direction:column;
  gap:14px;
  min-height:0;
  flex:1;
  padding:0 0 18px;
}
.empty-card{
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:160px;
  padding:18px;
  border-radius:34px;
  background:rgba(255,255,255,.92);
  border:1px solid rgba(15,15,16,.08);
  box-shadow:var(--soft-shadow);
  color:#7a7a7e;
  font-weight:700;
}
.chat-section{
  background:rgba(255,255,255,.94);
  border:1px solid rgba(15,15,16,.08);
  border-radius:34px;
  box-shadow:var(--card-shadow);
  padding:8px 18px;
}
.item{
  display:flex;
  align-items:center;
  gap:16px;
  padding:18px 0;
  cursor:pointer;
  position:relative;
  transition:transform .12s ease,opacity .12s ease;
}
.item:active{transform:translateY(1px)}
.item + .item{border-top:1px solid rgba(15,15,16,.08)}
.item.pinned .name{font-style:italic}
.pin-chip{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:3px 9px;
  border-radius:999px;
  background:#121213;
  color:#fff;
  font-size:9px;
  font-weight:900;
  letter-spacing:.12em;
  line-height:1;
  flex-shrink:0;
  margin-left:8px;
}
.av{
  width:66px;
  height:66px;
  border-radius:22px;
  background:linear-gradient(180deg,#ffffff 0%,#efefef 100%);
  border:1px solid rgba(15,15,16,.09);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  overflow:hidden;
  box-shadow:0 12px 20px rgba(15,15,16,.11);
  flex-shrink:0;
}
.av img{width:100%;height:100%;object-fit:cover;display:block;filter:grayscale(1) contrast(112%)}
.meta{flex:1;min-width:0}
.name{
  font-family:var(--serif);
  font-size:28px;
  line-height:1;
  font-weight:700;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.snip{
  margin-top:10px;
  font-size:14px;
  line-height:1.35;
  font-weight:700;
  color:#9a9a9f;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.item-side{
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  justify-content:flex-start;
  gap:10px;
  min-width:58px;
  padding-top:2px;
}
.time{
  font-size:12px;
  font-weight:700;
  color:#c2c2c6;
  white-space:nowrap;
}
.badge{font-size:10px;font-weight:900;padding:4px 9px;border-radius:999px}
.badge.unread{
  min-width:23px;
  height:23px;
  padding:0 7px;
  border-radius:999px;
  background:#121213;
  color:#fff;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-family:var(--fontd);
  box-shadow:0 8px 14px rgba(15,15,16,.18);
}
.badge.status-dot{
  width:22px;
  height:22px;
  padding:0;
  border-radius:999px;
  border:1.5px solid rgba(15,15,16,.22);
  background:linear-gradient(180deg,#ffffff 0%,#f3f3f3 100%);
  box-shadow:0 8px 14px rgba(15,15,16,.08);
}
.qq-chat-page{
  flex:1;
  min-height:0;
  height:100%;
  max-height:100%;
  display:flex;
  flex-direction:column;
  padding:calc(8px + var(--safe-top)) 12px 0;
  overflow:hidden;
  gap:8px;
}
.qq-chat-page::after{
  display:none;
}
.qq-stage{
  display:flex;
  flex-direction:column;
  gap:6px;
  min-height:0;
  height:100%;
  padding-bottom:0;
}
.header-ribbon{
  position:relative;
  display:flex;
  flex-direction:column;
  gap:2px;
  padding:calc(8px + var(--safe-top)) 0 6px;
  margin:calc(-10px - var(--safe-top)) -14px 0;
  flex:0 0 auto;
  isolation:isolate;
}
.header-ribbon::before{
  content:'';
  position:absolute;
  inset:0;
  background-image:
    linear-gradient(180deg, rgba(255,255,255,.12) 0%, rgba(255,255,255,.04) 16%, rgba(255,255,255,0) 34%),
    linear-gradient(180deg, rgba(245,245,246,0) 40%, rgba(245,245,246,.12) 56%, rgba(245,245,246,.42) 76%, rgba(245,245,246,.82) 92%, #f5f5f6 100%),
    var(--qq-header-art);
  background-position:center top, center top, center top;
  background-repeat:no-repeat;
  background-size:100% 100%, 100% 100%, cover;
  opacity:1;
  z-index:0;
}
.header-ribbon::after{
  content:'';
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  height:44px;
  background:linear-gradient(180deg, rgba(245,245,246,0) 0%, rgba(245,245,246,.18) 36%, rgba(245,245,246,.68) 78%, #f5f5f6 100%);
  z-index:0;
}
.header-ribbon > *{
  position:relative;
  z-index:1;
}
.header-ribbon-main{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding:0 14px;
}
.love-exit{
  width:34px;
  height:34px;
  border:2px solid #0f0f10;
  border-radius:8px;
  background:#fff;
  box-shadow:2px 2px 0 #0f0f10;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  line-height:1;
  color:#0f0f10;
  flex-shrink:0;
}
.love-exit:active{transform:translate(1px,1px);box-shadow:1px 1px 0 #0f0f10}
.love-exit .heart-glyph{
  display:block;
  font-family:var(--fontd);
  font-size:19px;
  font-weight:900;
  line-height:1;
}
.contact-launch{
  width:34px;
  height:34px;
  border:2px solid #0f0f10;
  border-radius:8px;
  background:#fff;
  box-shadow:2px 2px 0 #0f0f10;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  flex-shrink:0;
}
.contact-launch:active{transform:translate(1px,1px);box-shadow:1px 1px 0 #0f0f10}
.contact-launch img{
  width:18px;
  height:18px;
  display:block;
  object-fit:contain;
}
.header-tools{
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  gap:6px;
  min-width:0;
  padding:0 14px;
  margin-top:-10px;
}
.header-actions{
  display:flex;
  align-items:center;
  gap:8px;
  flex-shrink:0;
}
.header-mini-btn{
  width:34px;
  height:34px;
  border:2px solid #0f0f10;
  border-radius:8px;
  background:#fff;
  box-shadow:2px 2px 0 #0f0f10;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  padding:0;
}
.header-mini-btn:active{transform:translate(1px,1px);box-shadow:1px 1px 0 #0f0f10}
.header-mini-btn img{
  width:18px;
  height:18px;
  object-fit:contain;
  display:block;
}
.day-link{
  border:none;
  background:transparent;
  padding:0;
  text-align:left;
  cursor:pointer;
  color:#0f0f10;
  font-family:"Helvetica Neue","Avenir Next","Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif!important;
  font-size:36px;
  font-weight:800;
  letter-spacing:.01em;
  text-transform:uppercase;
  white-space:nowrap;
  line-height:1;
  font-style:normal;
  text-shadow:0 1px 0 rgba(255,255,255,.36);
}
.polaroid-stack{
  display:flex;
  align-items:flex-start;
  justify-content:center;
  gap:8px;
  min-height:228px;
  padding:8px 12px 0;
}
.quick-face{
  position:relative;
  flex:0 0 126px;
  border:2px solid #111;
  border-radius:0;
  background:#fff;
  cursor:pointer;
  display:flex;
  flex-direction:column;
  gap:6px;
  align-items:stretch;
  padding:8px 8px 22px;
  box-shadow:4px 4px 0 rgba(0,0,0,.82);
  transition:transform .14s ease,box-shadow .14s ease;
  overflow:hidden;
  min-height:150px;
}
.quick-face::before{
  content:'';
  position:absolute;
  top:9px;
  left:50%;
  width:14px;
  height:14px;
  border-radius:999px;
  transform:translateX(-50%);
  background:
    radial-gradient(circle at 35% 32%, rgba(255,255,255,.38) 0 18%, transparent 19%),
    radial-gradient(circle at 50% 50%, #2a2a2a 0 42%, #050505 68%, #000 100%);
  box-shadow:0 1px 0 rgba(255,255,255,.12) inset, 0 2px 4px rgba(0,0,0,.24);
  z-index:3;
  pointer-events:none;
}
.quick-face:nth-child(1){transform:translateX(9px) rotate(-6deg) translateY(9px)}
.quick-face:nth-child(2){transform:rotate(3deg) translateY(0)}
.quick-face:nth-child(3){transform:translateX(-15px) rotate(-4deg) translateY(11px)}
.quick-face:active{transform:translate(1px,1px);box-shadow:2px 2px 0 rgba(0,0,0,.82)}
.quick-face::after{display:none}
.quick-face-photo{
  width:100%;
  aspect-ratio:1/1;
  border:2px solid #111;
  border-radius:0;
  background:#efefef;
  overflow:hidden;
}
.quick-face img,
.quick-face-fallback{
  width:100%;
  height:100%;
  object-fit:cover;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#e9e9eb;
  font-family:var(--fontcute, var(--fontd));
  font-size:22px;
  filter:none !important;
}
.quick-face-meta{
  position:absolute;
  left:7px;
  right:7px;
  bottom:5px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:6px;
  font-size:10px;
  font-weight:700;
  color:#111;
}
.quick-face-meta span:last-child{
  flex:1;
  min-width:0;
  text-align:right;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.list{
  display:flex;
  flex-direction:column;
  gap:10px;
  flex:1;
  min-height:0;
  overflow-y:auto;
  overflow-x:visible;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior:auto;
  touch-action:pan-y;
  padding:0 4px calc(28px + env(safe-area-inset-bottom)) 0;
  scrollbar-width:none;
}
.list::-webkit-scrollbar{display:none}
.list::after{content:'';display:block;width:100%;height:10px;flex:0 0 10px}
.chat-section{
  padding:12px 12px 10px;
  border:2px solid #0f0f10;
  border-radius:6px;
  background:#fff;
  box-shadow:3px 3px 0 #0f0f10;
  margin-right:4px;
}
.chat-section.pinned-section{
  position:relative;
  border-width:2px;
  background:#fff;
  box-shadow:3px 3px 0 #0f0f10;
  padding-top:18px;
  margin-top:12px;
}
.chat-section.pinned-section::before{
  content:'PINNED';
  position:absolute;
  top:0;
  left:12px;
  padding:2px 8px;
  border:2px solid #0f0f10;
  background:#fff;
  box-shadow:2px 2px 0 #0f0f10;
  font-size:9px;
  font-weight:900;
  letter-spacing:.14em;
  transform:translateY(-58%);
}
.item{
  display:flex;
  align-items:center;
  gap:12px;
  padding:2px 0;
  cursor:pointer;
}
.item + .item{margin-top:10px;padding-top:10px;border-top:2px dashed rgba(15,15,16,.16)}
.av{
  width:52px;
  height:52px;
  border:2px solid #0f0f10;
  border-radius:6px;
  background:#efeff0;
  box-shadow:2px 2px 0 #0f0f10;
}
.av img{width:100%;height:100%;object-fit:cover;display:block;filter:none !important}
.meta{flex:1;min-width:0}
.name{
  font-size:16px;
  line-height:1.1;
  font-weight:900;
  font-style:normal;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.item.pinned .name{font-size:17px}
.pin-chip{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:2px 7px;
  border-radius:999px;
  background:#0f0f10;
  color:#fff;
  font-size:8px;
  font-weight:900;
  letter-spacing:.12em;
  line-height:1;
  margin-left:6px;
}
.snip{
  margin-top:5px;
  font-size:11px;
  line-height:1.35;
  font-weight:800;
  color:#818186;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.item-side{
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  justify-content:flex-start;
  gap:6px;
  min-width:46px;
}
.time{
  font-size:10px;

function fileToDataUrl(file){
  return new Promise(function(resolve, reject){
    try{
      var reader = new FileReader();
      reader.onload = function(){ resolve(String(reader.result || '')); };
      reader.onerror = function(){ reject(reader.error || new Error('read failed')); };
      reader.readAsDataURL(file);
    }catch(err){ reject(err); }
  });
}
function shrinkDataUrl(dataUrl, maxDim){
  return new Promise(function(resolve){
    var src = String(dataUrl || '').trim();
    if(!src){ resolve(''); return; }
    if(src.indexOf('data:image/') !== 0){ resolve(src); return; }
    var img = new Image();
    img.onload = function(){
      try{
        var longest = Math.max(img.width || 0, img.height || 0);
        if(!longest || longest <= maxDim){
          resolve(src);
          return;
        }
        var scale = maxDim / longest;
        var canvas = document.createElement('canvas');
        canvas.width = Math.max(1, Math.round((img.width || maxDim) * scale));
        canvas.height = Math.max(1, Math.round((img.height || maxDim) * scale));
        var ctx = canvas.getContext('2d');
        if(!ctx){
          resolve(src);
          return;
        }
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL('image/png', 0.92));
      }catch(err){
        resolve(src);
      }
    };
    img.onerror = function(){ resolve(src); };
    img.src = src;
  });
}

async function resolveLatestChar(id, fallback){
  var targetId = String(id || '').trim();
  if(!targetId) return fallback || null;

    try{ await window.MetadataStore.loadCharacters(true); }catch(err){}
  }
  var list = getStoredCharactersSnapshot();
  if(!Array.isArray(list)) return fallback || null;
  var activeAcctId = '';
  try{
    if(window.AccountManager){
      window.AccountManager.ensure();
      var acct = window.AccountManager.getActive();
      activeAcctId = String((acct && acct.id) || '').trim();
    }
  }catch(err){}
  var hit = list.find(function(c){
    if(!c || String(c.id || '') !== targetId) return false;
    if(!activeAcctId) return true;
    return String(c.ownerAccountId || '') === activeAcctId;
  });
  if(!hit){
    hit = list.find(function(c){ return c && String(c.id || '') === targetId; }) || null;
  }
  return hit || fallback || null;
}

async function hasChatRecordForChar(charId){
  if(!charId) return false;
  var scoped = accountScopedKey('chat_' + charId);
  if(window.PhoneStorage && typeof window.PhoneStorage.get === 'function'){
    try{
      var record = await window.PhoneStorage.get('chats', scoped);
      var history = record && Array.isArray(record.history) ? record.history : [];
      if(history.length) return true;
    }catch(e){}
  }
  try{
    var keys = [scoped, 'chat_' + charId];
    for(var i = 0; i < localStorage.length; i++){
      var key = localStorage.key(i) || '';
      if(key.indexOf('chat_' + charId + '__acct_') === 0) keys.push(key);
    }
    for(var j = 0; j < keys.length; j++){
      var raw = localStorage.getItem(keys[j]);
      if(!raw) continue;
      var parsed = JSON.parse(raw);
      var list = parsed && (parsed.history || parsed.messages);
      if(Array.isArray(list) && list.length) return true;
    }
  }catch(e){}
  return false;
}

async function refreshChatCaches(){
  var next = {};
  if(window.PhoneStorage && typeof window.PhoneStorage.get === 'function'){
    await Promise.all(chars.map(async function(c){
      if(!c || !c.id) return;
      try{
        var saved = await window.PhoneStorage.get('chats', accountScopedKey('chat_' + c.id));
        var msgs = normalizeStoredChatHistory(saved && Array.isArray(saved.history) ? saved.history : []);
        var last = {content:c.description||'', type:'text'};
        var previewSource = getLastVisiblePreviewMessage(msgs);
        var lastAt = Number((previewSource && (previewSource.sentAt || previewSource.readAt)) || (saved && saved.updatedAt) || 0) || 0;
        if(previewSource){
          last = normalizePreviewMessage(previewSource);
        }
        var unread = 0;
        msgs.forEach(function(m){
          if(m && m.role === 'assistant' && !m.readAt) unread++;
        });
        next[c.id] = { last:last, unread: unread, lastAt:lastAt };
        if(livePreviewCache[c.id]){
          next[c.id].last = livePreviewCache[c.id];
        }
      }catch(e){}
    }));
  }
  chatSummaryCache = next;
}

async function refreshMomentsCache(){
  var key = accountScopedKey(MOMENTS_POSTS_KEY);
  var altKey = accountScopedKey(MOMENTS_POSTS_ALT_KEY);
  if(window.PhoneStorage && typeof window.PhoneStorage.getJson === 'function'){
    try{
      var stored = await window.PhoneStorage.getJson(key);
      if(!Array.isArray(stored) || !stored.length){
        stored = await window.PhoneStorage.getJson(altKey);
      }
      if(Array.isArray(stored)){
        momentsPostsCache = stored;
        try{
          localStorage.removeItem(key);
          localStorage.setItem(key, JSON.stringify(stored));
        }catch(ignoreErr){}
        return;
      }
    }catch(e){}
  }
  try{
    var parsed = JSON.parse(localStorage.getItem(key) || '[]');
    if(Array.isArray(parsed) && parsed.length){
      momentsPostsCache = parsed;
      return;
    }
    parsed = JSON.parse(localStorage.getItem(altKey) || '[]');
    momentsPostsCache = Array.isArray(parsed) ? parsed : [];
  }catch(e){
    momentsPostsCache = [];
  }
}

async function loadChars(){
  if(window.MetadataStore && typeof window.MetadataStore.loadCharacters === 'function'){
    try{ await window.MetadataStore.loadCharacters(true); }catch(err){}
  }
  chars = getStoredCharactersSnapshot();
  if(!Array.isArray(chars)) chars = [];
  if(window.AccountManager){
    window.AccountManager.ensure();
    var acct = window.AccountManager.getActive();
    var defaultId = window.AccountManager.getDefaultId();
    var changed = false;
    chars = chars.map(function(c){
      if(!c || typeof c !== 'object') return c;
      if(!c.ownerAccountId){
        c.ownerAccountId = defaultId || (acct && acct.id) || '';
        changed = true;
      }
      return c;
    });
    if(changed){
      if(window.MetadataStore && typeof window.MetadataStore.saveCharacters === 'function'){
        window.MetadataStore.saveCharacters(chars).catch(function(){});
      }else{
        try{ localStorage.setItem('characters', JSON.stringify(chars)); }catch(err){}
      }
    }
    if(acct){
      chars = chars.filter(function(c){ return c && c.ownerAccountId === acct.id; });
    }
    if(acct && !acct.isDefault){
      var friendSet = new Set(Array.isArray(acct.friends) ? acct.friends : []);
      var visibility = await Promise.all(chars.map(async function(c){
        return {
          char: c,
          keep: !!(c && friendSet.has(c.id)) || await hasChatRecordForChar(c && c.id)
        };
      }));
      chars = visibility.filter(function(item){ return item.keep; }).map(function(item){ return item.char; });
    }
  }
  hydrateAvatarAssets();
  await refreshChatCaches();
  await refreshMomentsCache();
  renderList();
  renderMomentsBadge();
  syncHomeBadgeCount();
}

async function removeImportedMemesForCharacter(target){
  if(!target) return 0;
  var category = normalizeDeleteMemeCategory(target.importedMemeCategory || '');
  if(!category) return 0;
  var library = await loadStoredMemeLibrary();
  var before = Array.isArray(library.items) ? library.items.slice() : [];
  var next = before.filter(function(item){
    return normalizeDeleteMemeCategory(item && item.category) !== category;
  });
  if(next.length === before.length) return 0;
  library.items = next;
  library.categories = Array.from(new Set(next.map(function(item){
    return normalizeDeleteMemeCategory(item && item.category);
  }).filter(Boolean)));
  await saveStoredMemeLibrary(library);
  return before.length - next.length;
}

  var sameDay = now.getFullYear() === then.getFullYear() && now.getMonth() === then.getMonth() && now.getDate() === then.getDate();
  if(sameDay){
    return then.toLocaleTimeString('zh-CN', { hour:'2-digit', minute:'2-digit', hour12:false });
  }
  var yesterday = new Date(now.getFullYear(), now.getMonth(), now.getDate() - 1);
  var isYesterday = yesterday.getFullYear() === then.getFullYear() && yesterday.getMonth() === then.getMonth() && yesterday.getDate() === then.getDate();
  if(isYesterday) return '昨天';
  var dayDiff = Math.floor((new Date(now.getFullYear(), now.getMonth(), now.getDate()) - new Date(then.getFullYear(), then.getMonth(), then.getDate())) / 86400000);
  if(dayDiff >= 0 && dayDiff < 7){
    return ['周日','周一','周二','周三','周四','周五','周六'][then.getDay()];
  }
  return (then.getMonth() + 1) + '/' + then.getDate();

function normalizeChatPreviewType(type){

  if(safe === 'offline_invite' || safe === 'offlineinvite') return 'offlineinvite';
  if(type === 'voice_message' || type === 'voice') return 'voice';
  if(type === 'image_message' || type === 'image_card' || type === 'image') return 'image';
  if(type === 'meme_message' || type === 'meme' || type === 'sticker') return 'meme';

function normalizePreviewMessage(msg){

  if(kind === 'sunnycard'){
    try{

      return { content: String((sunnyCard && (sunnyCard.summary || sunnyCard.text || sunnyCard.title)) || 'Sunny 卡片').trim(), type: 'text' };
    }catch(err){

    }
  }

    return { content: summarizeMemePreview(next.content), type: 'text' };
  }
  if(kind === 'familycard'){
    return { content: '【亲属卡】', type: 'text' };
  }
  if(kind === 'richhtml'){
    return { content: '【SURPRISE】', type: 'text' };
  }
  if(kind === 'moneypacket'){
    return { content: moneyPreviewText(next.content), type: 'text' };
  }
  if(kind === 'offlineinvite'){
    return { content: '【约会邀请】', type: 'text' };
  }
  if(kind === 'schedulequote'){
    try{
      var scheduleQuote = typeof next.content === 'string' ? JSON.parse(next.content) : next.content;
      var excerpt = String((scheduleQuote && (scheduleQuote.excerpt || scheduleQuote.reply || scheduleQuote.title)) || '日程引用').trim();
      return { content: '【日程引用】' + excerpt, type: 'text' };
    }catch(err){
      return { content: '【日程引用】', type: 'text' };
    }
  }
  if(kind === 'meme'){
    return { content: summarizeMemePreview(next.content), type: 'text' };
  }
  if(kind === 'recallnotice'){
    try{
      var recallPayload = typeof next.content === 'string' ? JSON.parse(next.content) : next.content;
      var actorName = '';
      var noticeText = String((recallPayload && recallPayload.notice) || '').trim();
      var nameMatch = noticeText.match(/^句子已经被(.+?)毁尸灭迹啦\^\^/);
      if(nameMatch) actorName = String(nameMatch[1] || '').trim();
      if(!actorName) actorName = String(((recallPayload && recallPayload.actorRole) === 'user') ? '你' : '对方').trim() || '对方';
      return { content: actorName + '撤回了一条消息', type: 'text' };
    }catch(err){
      return { content: '撤回了一条消息', type: 'text' };
    }
  }
  if(kind === 'text' && typeof next.content === 'string' && next.content.trim().startsWith('{')){
    try{
      var parsed = JSON.parse(next.content);
      if(parsed && typeof parsed === 'object'){
        if((parsed.html || parsed.css || parsed.js) && !parsed.type){
          return { content: '【SURPRISE】', type: 'text' };
        }
        if(parsed.content){
          var parsedType = normalizeChatPreviewType(parsed.type || 'text');
        if(parsedType === 'meme') return { content: summarizeMemePreview(parsed.content), type: 'text' };
        if(parsedType === 'richhtml') return { content: '【SURPRISE】', type: 'text' };
        if(parsedType === 'offlineinvite') return { content: '【约会邀请】', type: 'text' };
        if(parsedType === 'recallnotice'){
            var parsedRecallPayload = typeof parsed.content === 'string' ? JSON.parse(parsed.content) : parsed.content;
            var parsedActorName = '';
            var parsedNoticeText = String((parsedRecallPayload && parsedRecallPayload.notice) || '').trim();
            var parsedNameMatch = parsedNoticeText.match(/^句子已经被(.+?)毁尸灭迹啦\^\^/);
            if(parsedNameMatch) parsedActorName = String(parsedNameMatch[1] || '').trim();
            if(!parsedActorName) parsedActorName = String(((parsedRecallPayload && parsedRecallPayload.actorRole) === 'user') ? '你' : '对方').trim() || '对方';
            return { content: parsedActorName + '撤回了一条消息', type: 'text' };
          }
          return { content: parsed.content, type: parsedType };
        }
      }
    }catch(e){}
  }
  return { content: next.content || '', type: kind };
}

function getLastVisiblePreviewMessage(list){
  var items = Array.isArray(list) ? list : [];
  for(var i = items.length - 1; i >= 0; i--){
    var entry = items[i] || {};
    if(entry.hidden) continue;
    return entry;
  }
  return items.length ? (items[items.length - 1] || null) : null;
}

function historyStamp(list){
  var entries = Array.isArray(list) ? list : [];
  var lastTs = 0;
  entries.forEach(function(entry){
    var ts = Number((entry && (entry.sentAt || entry.readAt)) || 0) || 0;
    if(ts > lastTs) lastTs = ts;
  });
  return { lastTs:lastTs, count:entries.length };
}

function chooseBetterHistoryList(best, next){
  if(!Array.isArray(next) || !next.length) return best;
  if(!Array.isArray(best) || !best.length) return next;
  var bestStamp = historyStamp(best);
  var nextStamp = historyStamp(next);
  if(nextStamp.lastTs > bestStamp.lastTs) return next;
  if(nextStamp.lastTs === bestStamp.lastTs && nextStamp.count > bestStamp.count) return next;
  return best;
}

      return aPinned - bPinned;
    }
    var bTs = lastActivityOf(b);
    var aTs = lastActivityOf(a);
    if(bTs !== aTs) return bTs - aTs;
    return String(a.nickname || a.name || '').localeCompare(String(b.nickname || b.name || ''), 'zh-Hans-CN');
  });
  renderQuickAvatarStrip(sortedChars);
  var filtered = sortedChars.filter(function(c){
    var unread = unreadCountOf(c);
    var pinned = pinnedIds.indexOf(c.id) !== -1;
    if(listFilterMode === 'pinned') return pinned;
    if(listFilterMode === 'unread') return unread > 0;
    if(listFilterMode === 'recent') return !pinned;
    if(listFilterMode === 'chats') return !c.isSunnySupport;
    return true;
  });
  if(!filtered.length){
    list.innerHTML = '<div class="empty-card">这一栏现在还是空的，晚点我们再往这里放消息。</div>';
    return;
  }
  var pinnedGroup = [];
  var normalGroup = [];
  filtered.forEach(function(c){
    if(pinnedIds.indexOf(c.id) !== -1) pinnedGroup.push(c);
    else normalGroup.push(c);
  });
  var sections = [];
  if(pinnedGroup.length) sections.push({ items:pinnedGroup, pinned:true });
  if(normalGroup.length) sections.push({ items:normalGroup, pinned:false });
  if(!sections.length) sections = [{ items:filtered, pinned:false }];
  list.innerHTML = sections.map(function(group){
    return '<section class="chat-section' + (group.pinned ? ' pinned-section' : '') + '">' + group.items.map(function(c){
    var avSrc = getAvatarSrc(c);
    var av = avSrc ? '<img src="'+avSrc+'">' : (c.avatar||'🌸');
    var displayName = c.nickname || c.name || '未命名';
    var last = lastMsgOf(c);
    var unread = unreadCountOf(c);
    var preview = normalizePreviewMessage(last || { content:'', type:'text' });
    var snip = (preview && preview.content) ? String(preview.content).trim() : '';
    if(!snip) snip = '暂无消息';
    var pinned = pinnedIds.indexOf(c.id) !== -1;
    var timeLabel = formatChatTimeLabel(lastActivityOf(c));
    return '<div class="item' + (pinned ? ' pinned' : '') + '" data-chat-id="'+esc(c.id)+'">' +
      '<div class="av">'+av+'</div>' +
      '<div class="meta"><div class="name">'+esc(displayName)+(pinned ? '<span class="pin-chip">PIN</span>' : '')+'</div><div class="snip">'+esc(snip)+'</div></div>' +
      '<div class="item-side">' +
        (timeLabel ? ('<div class="time">' + esc(timeLabel) + '</div>') : '') +
        (unread > 0 ? ('<div class="badge unread">' + esc(formatBadgeCount(unread)) + '</div>') : '') +
      '</div>' +
      '</div>';
    }).join('') + '</section>';
  }).join('');
  bindListInteractions();
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
async function openChat(id){
  var c = chars.find(function(x){return x.id===id;});
  c = await resolveLatestChar(id, c);
  if(!c && window.SunnySupport && id === window.SunnySupport.ID){
    c = window.SunnySupport.getCharacter();
  }
  if(!c) return;
  markChatAsRead(id).catch(function(){});
  var slim = slimChar(c);
  var isDefault = true;
  try{
    if(window.AccountManager){
      var acct = window.AccountManager.getActive();
      isDefault = !!(acct && acct.isDefault);
    }
  }catch(e){}
  if(isDefault){
    try { localStorage.setItem('activeCharacter', JSON.stringify(slim)); } catch(e){}
  }
  try{ localStorage.setItem(accountScopedKey('activeCharacter'), JSON.stringify(slim)); }catch(e){}
  try { localStorage.setItem('pendingChatChar', JSON.stringify(slim)); } catch(e){}
  try { localStorage.setItem('pendingChatCharId', String((slim && slim.id) || '')); } catch(e){}
  var host = window.parent || window.top;
  try {
    if(host && host.localStorage){
      if(isDefault) host.localStorage.setItem('activeCharacter', JSON.stringify(slim));
      host.localStorage.setItem(accountScopedKey('activeCharacter'), JSON.stringify(slim));
      host.localStorage.setItem('pendingChatChar', JSON.stringify(slim));
      host.localStorage.setItem('pendingChatCharId', String((slim && slim.id) || ''));
    }
  } catch(e){}
  if(isDefault){
    try { host?.postMessage({type:'SET_ACTIVE_CHARACTER', payload:slim}, '*'); } catch(e){}
  }
  try { host?.postMessage({type:'OPEN_CHAT_WITH', payload:slim}, '*'); } catch(e){}
  try { if(typeof host?.openApp === 'function') host.openApp('chat'); } catch(e){}
  // standalone fallback
  if(!host || host === window){ window.location.href = 'chat.html'; }
}
function bindListInteractions(){
  document.querySelectorAll('#chatList .item[data-chat-id]').forEach(function(item){
    item.addEventListener('click', function(){
      var id = item.dataset.chatId;
      if(longPressTriggered){
        longPressTriggered = false;
        return;
      }
      openChat(id);
    });
    item.addEventListener('pointerdown', function(evt){
      if(evt.pointerType === 'mouse' && evt.button !== 0) return;
      clearLongPress();
      activePressId = item.dataset.chatId;
      longPressTimer = setTimeout(function(){
        longPressTriggered = openPinConfirm(activePressId);
      }, LONG_PRESS_MS);
    });
    ['pointerup','pointerleave','pointercancel'].forEach(function(name){
      item.addEventListener(name, clearLongPress);
    });
  });
}

function hideParentTopbar(){
  const docs = [];
  try{
    if(window.parent && window.parent !== window && window.parent.document) docs.push(window.parent.document);
  }catch(e){}
  try{
    if(window.top && window.top !== window && window.top.document) docs.push(window.top.document);
  }catch(e){}
  docs.forEach((doc)=>{
    try{
      const bar = doc.querySelector('.app-topbar');
      if(bar){
        bar.dataset.prevDisplay = bar.style.display || '';
        bar.style.display = 'none';
      }
      const frame = doc.getElementById('app-iframe');
      if(frame){
        frame.dataset.prevMarginTop = frame.style.marginTop || '';
        frame.style.marginTop = '0';
      }
    }catch(err){}
  });
}
function restoreParentTopbar(){
  const docs = [];
  try{
    if(window.parent && window.parent !== window && window.parent.document) docs.push(window.parent.document);
  }catch(e){}
  try{
    if(window.top && window.top !== window && window.top.document) docs.push(window.top.document);
  }catch(e){}
  docs.forEach((doc)=>{
    try{
      const bar = doc.querySelector('.app-topbar');
      if(bar) bar.style.display = bar.dataset.prevDisplay || '';
      const frame = doc.getElementById('app-iframe');
      if(frame) frame.style.marginTop = frame.dataset.prevMarginTop || '';
    }catch(err){}
  });
}

async function submitContactsCreate(){

  var avatarInput = document.getElementById('contactsCreateAvatar');
  var descInput = document.getElementById('contactsCreateDesc');

  if(!safeName){

    nameInput && nameInput.focus && nameInput.focus();
    return;
  }
  try{
    if(window.MetadataStore && typeof window.MetadataStore.loadCharacters === 'function'){
      await window.MetadataStore.loadCharacters(true);
    }
    var current = getStoredCharactersSnapshot();
    var nextList = Array.isArray(current) ? current.slice() : [];
    var accountId = '';
    try{
      if(window.AccountManager){
        window.AccountManager.ensure();
        var acct = window.AccountManager.getActive();
        accountId = String((acct && acct.id) || '').trim();
      }
    }catch(err){}
    var charId = 'char_' + Date.now();
    var nextChar = {
      id: charId,
      name: safeName,
      nickname: String(nickInput && nickInput.value || '').trim(),
      avatar: String(avatarInput && avatarInput.value || '').trim() || '🌸',
      description: String(descInput && descInput.value || '').trim(),
      alternate_greetings: [],
      first_mes: '',
      personality: String(descInput && descInput.value || '').trim(),
      scenario: '',
      system_prompt: '',
      msgMin: 1,
      msgMax: 3,
      ownerAccountId: accountId
    };
    nextList.push(nextChar);
    if(window.MetadataStore && typeof window.MetadataStore.saveCharacters === 'function'){
      await window.MetadataStore.saveCharacters(nextList);
    }else{
      localStorage.setItem('characters', JSON.stringify(nextList));
    }
    if(qqCreateAvatarUpload){
      if(window.assetStore && typeof window.assetStore.saveOrFallback === 'function'){
        await window.assetStore.saveOrFallback('char_avatar_' + charId, qqCreateAvatarUpload);
      }else{
        localStorage.setItem('char_avatar_' + charId, qqCreateAvatarUpload);
      }
      avatarAssetCache[charId] = qqCreateAvatarUpload;
    }
    closeContactsCreate();
    await loadChars();
    renderMomentsBadge();
    syncHomeBadgeCount();
    renderList();
    showToast('已创建：' + safeName);
    try{
      window.parent.postMessage({ type:'CHARACTER_IMPORTED', payload:nextChar }, '*');
    }catch(err){}
  }catch(err){
    console.error('create character in qq failed', err);
    showToast('创建失败，稍后再试试');

window.addEventListener('message', async function(e){
  var d=e.data||{};
  if(d.type==='CHARACTER_IMPORTED'){ await loadChars(); renderMomentsBadge(); syncHomeBadgeCount(); forward(d); }
  if(d.type==='SET_ACTIVE_CHARACTER'){
    var payload = d.payload || {};
    var payloadId = String((payload && payload.id) || '').trim();
    if(payloadId){
      var next = await resolveLatestChar(payloadId, null);
      var replaced = false;
      chars = (Array.isArray(chars) ? chars : []).map(function(item){
        if(item && String(item.id || '') === payloadId){
          if(next){
            replaced = true;
            return Object.assign({}, item, next);
          }
          return item;
        }
        return item;
      });
      if(!replaced && next) chars.push(next);
      renderList();
    }
    forward(d);
    return;
  }
  if(d.type==='CHAT_UPDATED'){
    var payload = d.payload || {};
    if(payload.id){
      livePreviewCache[payload.id] = normalizePreviewMessage({ content: payload.last || '', type: payload.lastType || 'text' });
      var current = chatSummaryCache[payload.id] || { last:{ content:'', type:'text' }, unread:0 };
      var lastAt = Number(payload.lastAt || payload.ts || Date.now()) || Date.now();
      chatSummaryCache[payload.id] = {
        last: livePreviewCache[payload.id],
        unread: Number(current.unread || 0) || 0,
        lastAt: lastAt
      };
      renderList();
    }
    await loadChars();
    renderMomentsBadge();
    syncHomeBadgeCount();
    forward(d);
  }
  if(d.type==='OPEN_CHAT_WITH' || d.type==='OPEN_APP_WITH'){ forward(d); }
});
function forward(msg){
  try{ if(window.top && window.top!==window) window.top.postMessage(msg,'*'); }catch(e){}
}
