<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>QQ</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<script src="../accountManager.js"></script>
<script src="../assetStore.js"></script>
<script src="../chatStorage.js"></script>
<script src="../metadataStore.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--b:#0a0a0a;--w:#fff;--off:#f7f7f7;--g:#888;--p:#eee;--bd:2px solid #0a0a0a;--sh:2px 2px 0 #0a0a0a;--font:'Quicksand',sans-serif;--fontd:'Nunito',sans-serif}
body{font-family:var(--font);background:var(--off);color:var(--b);min-height:100vh;display:flex;flex-direction:column;overflow:hidden}
.tabbar{display:flex;background:var(--w);border-bottom:var(--bd);padding:5px 10px 5px;gap:8px;position:relative;transform:none;margin-bottom:0}
.tab{flex:1;text-align:center;padding:10px 0;font-family:var(--fontd);font-weight:900;font-size:13px;cursor:pointer;border:1.5px solid var(--b);border-radius:14px;background:#f5f5f5;box-shadow:2px 2px 0 rgba(10,10,10,.9);transition:transform .12s ease,box-shadow .12s ease,background .12s ease}
.tab.active{background:#6f6f6f;color:var(--w);box-shadow:3px 3px 0 rgba(10,10,10,.95)}
.tab:active{transform:translate(1px,1px);box-shadow:1px 1px 0 rgba(10,10,10,.9)}
.view{flex:1;overflow:hidden;display:none}
.view.active{display:flex;flex-direction:column;min-height:0}
.list{list-style:none;padding:8px 10px 14px;display:flex;flex-direction:column;gap:8px;overflow:auto;min-height:0;flex:1}
.item{display:flex;gap:12px;padding:12px 14px;background:var(--w);border:1.5px solid var(--b);border-radius:16px;cursor:pointer;align-items:center;position:relative;transition:transform .12s ease,box-shadow .12s ease,background .12s ease;box-shadow:2px 2px 0 rgba(10,10,10,.9)}
.item:active{background:#f0f0f0;transform:translate(1px,1px);box-shadow:1px 1px 0 rgba(10,10,10,.9)}
.item.pinned{margin:2px 2px 0;padding:14px 14px 14px 16px;border:var(--bd);border-radius:20px;background:linear-gradient(180deg,#fff 0%,#f5f5f5 100%);box-shadow:4px 4px 0 var(--b)}
.item.pinned + .item.pinned{margin-top:8px}
.item.pinned::before{content:'';position:absolute;left:0;top:10px;bottom:10px;width:8px;border-radius:999px;background:var(--b)}
.item.pinned .av{background:#fff;box-shadow:3px 3px 0 var(--b)}
.item.pinned .name{display:flex;align-items:center;gap:8px}
.pin-chip{display:inline-flex;align-items:center;justify-content:center;padding:3px 8px;border:var(--bd);border-radius:999px;background:var(--b);color:var(--w);font-size:9px;font-weight:900;letter-spacing:.04em;line-height:1;flex-shrink:0}
.av{width:46px;height:46px;border-radius:12px;border:var(--bd);background:var(--p);display:flex;align-items:center;justify-content:center;font-size:22px;overflow:hidden;box-shadow:var(--sh);flex-shrink:0}
.av img{width:100%;height:100%;object-fit:cover}
.meta{flex:1;min-width:0}
.name{font-family:var(--fontd);font-size:14px;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.snip{font-size:12px;color:var(--g);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.badge{font-size:10px;font-weight:800;padding:2px 8px;border-radius:10px;border:1.5px solid var(--b);background:#f3f3f3;color:var(--b)}
.item.pinned .badge{background:var(--w);color:var(--b)}
.badge.unread{min-width:22px;height:22px;padding:0 7px;border-radius:999px;background:#d22;color:#fff;border:1.5px solid #7e0000;display:inline-flex;align-items:center;justify-content:center;font-family:var(--fontd);font-size:10px;font-weight:900;box-shadow:1px 1px 0 rgba(0,0,0,.32)}
.pin-overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);display:none;align-items:center;justify-content:center;z-index:60;padding:20px}
.pin-overlay.open{display:flex}
.pin-card{width:min(280px,100%);background:var(--b);color:var(--w);border:2px solid var(--w);border-radius:18px;box-shadow:0 14px 30px rgba(0,0,0,.3), 4px 4px 0 #000;padding:16px 14px;display:flex;flex-direction:column;gap:14px;text-align:center}
.pin-title{font-family:var(--fontd);font-size:16px;font-weight:900;line-height:1.4}
.pin-actions{display:flex;gap:10px}
.pin-btn{flex:1;padding:10px 0;border:var(--bd);border-radius:12px;background:var(--w);color:var(--b);font-family:var(--fontd);font-size:12px;font-weight:900;cursor:pointer;box-shadow:var(--sh)}
.pin-btn:active{transform:translate(2px,2px);box-shadow:0 0 0}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(12px);background:var(--b);color:var(--w);padding:9px 16px;border-radius:999px;font-size:12px;font-weight:800;opacity:0;pointer-events:none;transition:opacity .22s ease,transform .22s ease;z-index:70}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.iframe-wrap{height:100%;border:none;width:100%;display:block;flex:1;min-height:0}
.qq-bottom-nav{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;padding:9px 10px 12px;background:linear-gradient(180deg,#f7f7f7 0%,#ececec 100%);border-top:var(--bd);flex-shrink:0;margin-bottom:16px}
.qq-bottom-nav.hidden{display:none}
.qq-bottom-btn{border:var(--bd);border-radius:14px;background:var(--w);box-shadow:var(--sh);padding:10px 8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-family:var(--fontd);font-weight:900;font-size:12px;line-height:1.1;cursor:pointer;transition:transform .12s ease,box-shadow .12s ease}
.qq-bottom-btn small{font-size:9px;font-weight:800;color:#666;letter-spacing:.03em}
.qq-bottom-btn.primary{background:linear-gradient(180deg,#fff 0%,#f0f0f0 100%)}
.qq-bottom-btn:active{transform:translate(1px,1px);box-shadow:1px 1px 0 #0a0a0a}
.qq-bottom-btn.icon-only{padding:10px 0}
.qq-bottom-btn.icon-only img{width:26px;height:26px;display:block;filter:grayscale(1) contrast(120%)}
.qq-btn-wrap{position:relative;display:inline-flex}
.qq-nav-badge{position:absolute;top:-7px;right:-11px;min-width:18px;height:18px;padding:0 5px;border-radius:999px;background:#d22;color:#fff;border:1.5px solid #7e0000;display:none;align-items:center;justify-content:center;font-family:var(--fontd);font-size:9px;font-weight:900;line-height:1;box-shadow:1px 1px 0 rgba(0,0,0,.35)}
.qq-nav-badge.show{display:inline-flex}
</style>
</head>
<body>
  <div class="tabbar">
    <div class="tab active" data-view="chatlist" onclick="switchTab('chatlist')">聊天</div>
    <div class="tab" data-view="contacts" onclick="switchTab('contacts')">通讯录</div>
  </div>

  <div class="view active" id="chatlist">
    <ul class="list" id="chatList"></ul>
  </div>
  <div class="view" id="contacts">
    <iframe class="iframe-wrap" src="characters.html" frameborder="0"></iframe>
  </div>

  <div class="qq-bottom-nav">
    <button class="qq-bottom-btn primary icon-only" type="button" aria-label="朋友圈" title="朋友圈" onclick="openMomentsPage()">
      <span class="qq-btn-wrap">
        <img src="assets/moments-icon.svg" alt="">
        <span class="qq-nav-badge" id="momentsBadge">0</span>
      </span>
    </button>
    <button class="qq-bottom-btn primary icon-only" type="button" aria-label="档案馆" title="档案馆" onclick="openOfflineArchive()">
      <img src="assets/Chat-Bubble-Heart--Streamline-Sharp.png" alt="">
    </button>
    <button class="qq-bottom-btn primary icon-only" type="button" aria-label="个人中心" title="个人中心" onclick="openProfileCenter()">
      <img src="assets/User-Story--Streamline-Sharp.png" alt="">
    </button>
  </div>

  <div class="pin-overlay" id="pinOverlay" onclick="handlePinOverlayClick(event)">
    <div class="pin-card">
      <div class="pin-title" id="pinTitle">要置顶此聊天吗？</div>
      <div class="pin-actions">
        <button class="pin-btn" type="button" onclick="closePinConfirm()">取消</button>
        <button class="pin-btn" type="button" onclick="confirmPinChat()">确认</button>
      </div>
    </div>
  </div>
  <div class="toast" id="toast"></div>

<script>
var chars=[];
var pinConfirmId = '';
var pinConfirmMode = 'pin';
var longPressTimer = null;
var longPressTriggered = false;
var activePressId = null;
var toastTimer = null;
var LONG_PRESS_MS = 420;
var avatarAssetCache = {};
var MOMENTS_POSTS_KEY = 'qq_moments_posts';
var MOMENTS_POSTS_ALT_KEY = 'moments_posts';
var MOMENTS_LAST_SEEN_KEY = 'qq_moments_last_seen';
var MOMENTS_BRIDGE_KEY = 'qq_moments_bridge_posts';
var chatSummaryCache = {};
var livePreviewCache = {};
var momentsPostsCache = [];

function getStoredCharactersSnapshot(){
  if(window.MetadataStore && typeof window.MetadataStore.getCharactersSync === 'function'){
    return window.MetadataStore.getCharactersSync();
  }
  try{
    var list = JSON.parse(localStorage.getItem('characters') || '[]');
    return Array.isArray(list) ? list : [];
  }catch(err){
    return [];
  }
}

function accountScopedKey(base){
  if(window.AccountManager){
    window.AccountManager.ensure();
    return window.AccountManager.scopedKey(base);
  }
  return base;
}

function normalizeStoredChatMessage(entry){
  if(Array.isArray(entry)){
    return {
      id: String(entry[0] || ''),
      role: String(entry[1] || 'assistant'),
      type: normalizeChatPreviewType(entry[2] || 'text'),
      content: typeof entry[3] === 'string' ? entry[3] : String(entry[3] || ''),
      sentAt: Number(entry[4] || 0) || 0,
      readAt: Number(entry[5] || 0) || 0,
      replyToId: entry[6] ? String(entry[6]) : null,
      hidden: !!entry[7]
    };
  }
  if(entry && typeof entry === 'object'){
    return {
      id: String(entry.id || ''),
      role: String(entry.role || 'assistant'),
      type: normalizeChatPreviewType(entry.type || 'text'),
      content: typeof entry.content === 'string' ? entry.content : String(entry.content || ''),
      sentAt: Number(entry.sentAt || 0) || 0,
      readAt: Number(entry.readAt || 0) || 0,
      replyToId: entry.replyToId ? String(entry.replyToId) : null,
      hidden: !!entry.hidden
    };
  }
  return null;
}

function normalizeStoredChatHistory(list){
  return (Array.isArray(list) ? list : []).map(normalizeStoredChatMessage).filter(Boolean);
}

function loadStoredAsset(key){
  if(window.assetStore) return window.assetStore.load(key);
  try{ return Promise.resolve(localStorage.getItem(key) || ''); }catch(e){ return Promise.resolve(''); }
}

function hydrateAvatarAssets(){
  chars.forEach(function(c){
    if(!c || !c.id) return;
    loadStoredAsset('char_avatar_' + c.id).then(function(src){
      if(src && avatarAssetCache[c.id] !== src){
        avatarAssetCache[c.id] = src;
        loadChars();
      }
    });
  });
}

function isRenderableAssetSource(src){
  var value = String(src || '').trim();
  return !!(value && value !== '__asset__' && (value.indexOf('data:') === 0 || value.indexOf('blob:') === 0 || value.indexOf('http') === 0 || value.indexOf('/') === 0 || value.indexOf('./') === 0 || value.indexOf('../') === 0));
}

function getAvatarSrc(c){
  if(!c) return '';
  var ovr = avatarAssetCache[c.id];
  if(isRenderableAssetSource(ovr)) return ovr;
  if(isRenderableAssetSource(c.imageData)) return c.imageData;
  return '';
}
function slimChar(c){
  if(!c) return null;
  return {
    id:c.id, name:c.name, description:c.description, avatar:c.avatar,
    imageData:c.imageData,
    personality:c.personality, scenario:c.scenario, system_prompt:c.system_prompt,
    first_mes:c.first_mes, alternate_greetings:c.alternate_greetings,
    tags:c.tags, character_version:c.character_version, spec:c.spec, creator:c.creator
  };
}

async function hasChatRecordForChar(charId){
  if(!charId) return false;
  var scoped = accountScopedKey('chat_' + charId);
  if(window.PhoneStorage && typeof window.PhoneStorage.get === 'function'){
    try{
      var record = await window.PhoneStorage.get('chats', scoped);
      var history = record && Array.isArray(record.history) ? record.history : [];
      if(history.length) return true;
    }catch(e){}
  }
  try{
    var keys = [scoped, 'chat_' + charId];
    for(var i = 0; i < localStorage.length; i++){
      var key = localStorage.key(i) || '';
      if(key.indexOf('chat_' + charId + '__acct_') === 0) keys.push(key);
    }
    for(var j = 0; j < keys.length; j++){
      var raw = localStorage.getItem(keys[j]);
      if(!raw) continue;
      var parsed = JSON.parse(raw);
      var list = parsed && (parsed.history || parsed.messages);
      if(Array.isArray(list) && list.length) return true;
    }
  }catch(e){}
  return false;
}

async function refreshChatCaches(){
  var next = {};
  if(window.PhoneStorage && typeof window.PhoneStorage.get === 'function'){
    await Promise.all(chars.map(async function(c){
      if(!c || !c.id) return;
      try{
        var saved = await window.PhoneStorage.get('chats', accountScopedKey('chat_' + c.id));
        var msgs = normalizeStoredChatHistory(saved && Array.isArray(saved.history) ? saved.history : []);
        var last = {content:c.description||'', type:'text'};
        var previewSource = getLastVisiblePreviewMessage(msgs);
        if(previewSource){
          last = normalizePreviewMessage(previewSource);
        }
        var unread = 0;
        msgs.forEach(function(m){
          if(m && m.role === 'assistant' && !m.readAt) unread++;
        });
        next[c.id] = { last:last, unread: unread };
        if(livePreviewCache[c.id]){
          next[c.id].last = livePreviewCache[c.id];
        }
      }catch(e){}
    }));
  }
  chatSummaryCache = next;
}

async function refreshMomentsCache(){
  var key = accountScopedKey(MOMENTS_POSTS_KEY);
  var altKey = accountScopedKey(MOMENTS_POSTS_ALT_KEY);
  if(window.PhoneStorage && typeof window.PhoneStorage.getJson === 'function'){
    try{
      var stored = await window.PhoneStorage.getJson(key);
      if(!Array.isArray(stored) || !stored.length){
        stored = await window.PhoneStorage.getJson(altKey);
      }
      if(Array.isArray(stored)){
        momentsPostsCache = stored;
        try{
          localStorage.removeItem(key);
          localStorage.setItem(key, JSON.stringify(stored));
        }catch(ignoreErr){}
        return;
      }
    }catch(e){}
  }
  try{
    var parsed = JSON.parse(localStorage.getItem(key) || '[]');
    if(Array.isArray(parsed) && parsed.length){
      momentsPostsCache = parsed;
      return;
    }
    parsed = JSON.parse(localStorage.getItem(altKey) || '[]');
    momentsPostsCache = Array.isArray(parsed) ? parsed : [];
  }catch(e){
    momentsPostsCache = [];
  }
}

async function loadChars(){
  chars = getStoredCharactersSnapshot();
  if(!Array.isArray(chars)) chars = [];
  if(window.AccountManager){
    window.AccountManager.ensure();
    var acct = window.AccountManager.getActive();
    var defaultId = window.AccountManager.getDefaultId();
    var changed = false;
    chars = chars.map(function(c){
      if(!c || typeof c !== 'object') return c;
      if(!c.ownerAccountId){
        c.ownerAccountId = defaultId || (acct && acct.id) || '';
        changed = true;
      }
      return c;
    });
    if(changed){
      if(window.MetadataStore && typeof window.MetadataStore.saveCharacters === 'function'){
        window.MetadataStore.saveCharacters(chars).catch(function(){});
      }else{
        try{ localStorage.setItem('characters', JSON.stringify(chars)); }catch(err){}
      }
    }
    if(acct){
      chars = chars.filter(function(c){ return c && c.ownerAccountId === acct.id; });
    }
    if(acct && !acct.isDefault){
      var friendSet = new Set(Array.isArray(acct.friends) ? acct.friends : []);
      var visibility = await Promise.all(chars.map(async function(c){
        return {
          char: c,
          keep: !!(c && friendSet.has(c.id)) || await hasChatRecordForChar(c && c.id)
        };
      }));
      chars = visibility.filter(function(item){ return item.keep; }).map(function(item){ return item.char; });
    }
  }
  await refreshChatCaches();
  await refreshMomentsCache();
  renderList();
  renderMomentsBadge();
}
function pinnedChatIdsKey(){
  return accountScopedKey('qq_pinned_chat_ids');
}
function getPinnedChatIds(){
  try{
    var ids = JSON.parse(localStorage.getItem(pinnedChatIdsKey()) || '[]');
    return Array.isArray(ids) ? ids.filter(Boolean) : [];
  }catch(e){
    return [];
  }
}
function setPinnedChatIds(ids){
  localStorage.setItem(pinnedChatIdsKey(), JSON.stringify(ids));
}
function isChatPinned(id){
  return getPinnedChatIds().indexOf(id) !== -1;
}
function pinChat(id){
  var ids = getPinnedChatIds();
  if(ids.indexOf(id) === -1){
    ids.push(id);
    setPinnedChatIds(ids);
  }
}
function unpinChat(id){
  var ids = getPinnedChatIds().filter(function(item){ return item !== id; });
  setPinnedChatIds(ids);
}
function lastMsgOf(c){
  if(c && c.id && livePreviewCache[c.id]) return livePreviewCache[c.id];
  if(c && c.id && chatSummaryCache[c.id] && chatSummaryCache[c.id].last) return chatSummaryCache[c.id].last;
  try{
    var keys = [accountScopedKey('chat_'+c.id), 'chat_' + c.id];
    for(var i=0;i<localStorage.length;i++){
      var k = localStorage.key(i) || '';
      if(k.indexOf('chat_' + c.id + '__acct_') === 0) keys.push(k);
    }
    var best = [];
    keys.forEach(function(k){
      try{
        var saved = JSON.parse(localStorage.getItem(k) || 'null');
        var msgs = normalizeStoredChatHistory((saved && (saved.messages || saved.history)) || []);
        best = chooseBetterHistoryList(best, msgs);
      }catch(err){}
    });
    var previewSource = getLastVisiblePreviewMessage(best);
    if(previewSource) return normalizePreviewMessage(previewSource);
  }catch(e){}
  return {content:c.description||'', type:'text'};
}

function unreadCountOf(c){
  if(c && c.id && chatSummaryCache[c.id]) return Number(chatSummaryCache[c.id].unread || 0) || 0;
  try{
    var saved = JSON.parse(localStorage.getItem(accountScopedKey('chat_' + c.id)) || 'null');
    var msgs = normalizeStoredChatHistory((saved && (saved.messages || saved.history)) || []);
    if(!Array.isArray(msgs)) return 0;
    var count = 0;
    msgs.forEach(function(m){
      if(m && m.role === 'assistant' && !m.readAt) count++;
    });
    return count;
  }catch(e){
    return 0;
  }
}

function formatBadgeCount(n){
  if(!n || n < 1) return '';
  return n > 9 ? '9+' : String(n);
}

async function markChatAsRead(charId){
  if(!charId) return;
  var key = accountScopedKey('chat_' + charId);
  if(window.PhoneStorage && typeof window.PhoneStorage.get === 'function' && typeof window.PhoneStorage.put === 'function'){
    try{
      var savedIdb = await window.PhoneStorage.get('chats', key);
      var listIdb = savedIdb && Array.isArray(savedIdb.history) ? savedIdb.history : [];
      if(Array.isArray(listIdb) && listIdb.length){
        var nowIdb = Date.now();
        var changedIdb = false;
        listIdb = listIdb.map(function(m){
          if(m && m.role === 'assistant' && !m.readAt){
            changedIdb = true;
            var next = Array.isArray(m) ? m.slice() : Object.assign({}, m);
            if(Array.isArray(next)) next[5] = nowIdb;
            else next.readAt = nowIdb;
            return next;
          }
          return m;
        });
        if(changedIdb){
          await window.PhoneStorage.put('chats', {
            id: key,
            charId: String(charId || ''),
            updatedAt: Date.now(),
            history: listIdb
          });
          if(chatSummaryCache[charId]) chatSummaryCache[charId].unread = 0;
          return;
        }
      }
    }catch(e){}
  }
  try{
    var saved = JSON.parse(localStorage.getItem(key) || 'null');
    if(!saved) return;
    var list = saved.messages || saved.history;
    if(!Array.isArray(list)) return;
    var now = Date.now();
    var changed = false;
    list = list.map(function(m){
      if(m && m.role === 'assistant' && !m.readAt){
        changed = true;
        var next = Object.assign({}, m);
        next.readAt = now;
        return next;
      }
      return m;
    });
    if(!changed) return;
    localStorage.setItem(key, JSON.stringify({ history:list, messages:list }));
  }catch(e){}
}

function getMomentsUnreadCount(){
  var key = accountScopedKey(MOMENTS_POSTS_KEY);
  var seenKey = accountScopedKey(MOMENTS_LAST_SEEN_KEY);
  var seenAt = 0;
  try{ seenAt = parseInt(localStorage.getItem(seenKey) || '0', 10); }catch(e){ seenAt = 0; }
  if(Number.isNaN(seenAt)) seenAt = 0;
  var posts = Array.isArray(momentsPostsCache) ? momentsPostsCache : [];
  var myName = '';
  try{
    if(window.AccountManager){
      var acct = window.AccountManager.getActive();
      myName = String((acct && acct.name) || '').trim();
    }
  }catch(e){}
  var count = 0;
  posts.forEach(function(p){
    if(!p) return;
    if((p.createdAt || 0) <= seenAt) return;
    var author = String(p.authorName || '').trim();
    if(myName && author && author === myName) return;
    count++;
  });
  return count;
}

function renderMomentsBadge(){
  var el = document.getElementById('momentsBadge');
  if(!el) return;
  var count = getMomentsUnreadCount();
  if(count > 0){
    el.textContent = formatBadgeCount(count);
    el.classList.add('show');
  }else{
    el.textContent = '';
    el.classList.remove('show');
  }
}

function normalizeChatPreviewType(type){
  if(type === 'voice_message' || type === 'voice') return 'voice';
  if(type === 'image_message' || type === 'image_card' || type === 'image') return 'image';
  if(type === 'family_card' || type === 'familycard') return 'familycard';
  if(type === 'money_packet' || type === 'moneypacket' || type === 'transfer') return 'moneypacket';
  return 'text';
}

function moneyPreviewText(raw){
  try{
    var parsed = typeof raw === 'string' ? JSON.parse(raw) : raw;
    var mode = String((parsed && parsed.mode) || 'red_packet');
    var amount = Number((parsed && parsed.amount) || 0);
    var label = mode === 'transfer' ? '【转账】' : '【红包】';
    if(amount > 0) label += amount.toFixed(2) + '元';
    return label;
  }catch(e){
    return '【红包】';
  }
}

function normalizePreviewMessage(msg){
  var next = msg && typeof msg === 'object' ? msg : { content:'', type:'text' };
  var kind = normalizeChatPreviewType(next.type || 'text');
  if(kind === 'familycard'){
    return { content: '【亲属卡】', type: 'text' };
  }
  if(kind === 'moneypacket'){
    return { content: moneyPreviewText(next.content), type: 'text' };
  }
  if(kind === 'text' && typeof next.content === 'string' && next.content.trim().startsWith('{')){
    try{
      var parsed = JSON.parse(next.content);
      if(parsed && typeof parsed === 'object' && parsed.content){
        return { content: parsed.content, type: normalizeChatPreviewType(parsed.type || 'text') };
      }
    }catch(e){}
  }
  return { content: next.content || '', type: kind };
}

function getLastVisiblePreviewMessage(list){
  var items = Array.isArray(list) ? list : [];
  for(var i = items.length - 1; i >= 0; i--){
    var entry = items[i] || {};
    if(entry.hidden) continue;
    return entry;
  }
  return items.length ? (items[items.length - 1] || null) : null;
}

function historyStamp(list){
  var entries = Array.isArray(list) ? list : [];
  var lastTs = 0;
  entries.forEach(function(entry){
    var ts = Number((entry && (entry.sentAt || entry.readAt)) || 0) || 0;
    if(ts > lastTs) lastTs = ts;
  });
  return { lastTs:lastTs, count:entries.length };
}

function chooseBetterHistoryList(best, next){
  if(!Array.isArray(next) || !next.length) return best;
  if(!Array.isArray(best) || !best.length) return next;
  var bestStamp = historyStamp(best);
  var nextStamp = historyStamp(next);
  if(nextStamp.lastTs > bestStamp.lastTs) return next;
  if(nextStamp.lastTs === bestStamp.lastTs && nextStamp.count > bestStamp.count) return next;
  return best;
}
function renderList(){
  var list=document.getElementById('chatList');
  if(!chars.length){ list.innerHTML='<li class="item" style="justify-content:center;color:var(--g)">还没有联系人，去通讯录添加吧</li>'; return; }
  var pinnedIds = getPinnedChatIds();
  var sortedChars = chars.slice().sort(function(a,b){
    var aPinned = pinnedIds.indexOf(a.id);
    var bPinned = pinnedIds.indexOf(b.id);
    if(aPinned !== -1 || bPinned !== -1){
      if(aPinned === -1) return 1;
      if(bPinned === -1) return -1;
      return aPinned - bPinned;
    }
    return 0;
  });
  list.innerHTML = sortedChars.map(function(c){
    var avSrc = getAvatarSrc(c);
    var av = avSrc ? '<img src="'+avSrc+'">' : (c.avatar||'🌸');
    var displayName = c.nickname || c.name || '未命名';
    var last = lastMsgOf(c);
    var unread = unreadCountOf(c);
    var snip = '';
    var lastType = normalizeChatPreviewType(last && last.type);
    if(lastType === 'voice') snip = '语音消息 ' + Math.max(1, Math.min(60, Math.ceil((last.content||'').length/6))) + "''";
    else if(lastType === 'image') snip = '【图片】';
    else snip = (last && last.content) ? last.content : '暂无消息';
    var pinned = pinnedIds.indexOf(c.id) !== -1;
    return '<li class="item' + (pinned ? ' pinned' : '') + '" data-chat-id="'+esc(c.id)+'">' +
      '<div class="av">'+av+'</div>' +
      '<div class="meta"><div class="name">'+esc(displayName)+(pinned ? '<span class="pin-chip">置顶</span>' : '')+'</div><div class="snip">'+esc(snip)+'</div></div>' +
      (unread > 0 ? ('<div class="badge unread">' + esc(formatBadgeCount(unread)) + '</div>') : '') +
      '</li>';
  }).join('');
  bindListInteractions();
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function openChat(id){
  var c = chars.find(function(x){return x.id===id;});
  if(!c) return;
  markChatAsRead(id).catch(function(){});
  var slim = slimChar(c);
  var isDefault = true;
  try{
    if(window.AccountManager){
      var acct = window.AccountManager.getActive();
      isDefault = !!(acct && acct.isDefault);
    }
  }catch(e){}
  if(isDefault){
    try { localStorage.setItem('activeCharacter', JSON.stringify(slim)); } catch(e){}
  }
  try{ localStorage.setItem(accountScopedKey('activeCharacter'), JSON.stringify(slim)); }catch(e){}
  try { localStorage.setItem('pendingChatChar', JSON.stringify(slim)); } catch(e){}
  try { localStorage.setItem('pendingChatCharId', String((slim && slim.id) || '')); } catch(e){}
  var host = window.parent || window.top;
  try {
    if(host && host.localStorage){
      if(isDefault) host.localStorage.setItem('activeCharacter', JSON.stringify(slim));
      host.localStorage.setItem(accountScopedKey('activeCharacter'), JSON.stringify(slim));
      host.localStorage.setItem('pendingChatChar', JSON.stringify(slim));
      host.localStorage.setItem('pendingChatCharId', String((slim && slim.id) || ''));
    }
  } catch(e){}
  if(isDefault){
    try { host?.postMessage({type:'SET_ACTIVE_CHARACTER', payload:slim}, '*'); } catch(e){}
  }
  try { host?.postMessage({type:'OPEN_CHAT_WITH', payload:slim}, '*'); } catch(e){}
  try { if(typeof host?.openApp === 'function') host.openApp('chat'); } catch(e){}
  // standalone fallback
  if(!host || host === window){ window.location.href = 'chat.html'; }
}
function bindListInteractions(){
  document.querySelectorAll('#chatList .item[data-chat-id]').forEach(function(item){
    item.addEventListener('click', function(){
      var id = item.dataset.chatId;
      if(longPressTriggered){
        longPressTriggered = false;
        return;
      }
      openChat(id);
    });
    item.addEventListener('pointerdown', function(evt){
      if(evt.pointerType === 'mouse' && evt.button !== 0) return;
      clearLongPress();
      activePressId = item.dataset.chatId;
      longPressTimer = setTimeout(function(){
        longPressTriggered = openPinConfirm(activePressId);
      }, LONG_PRESS_MS);
    });
    ['pointerup','pointerleave','pointercancel'].forEach(function(name){
      item.addEventListener(name, clearLongPress);
    });
  });
}
function clearLongPress(){
  if(longPressTimer){
    clearTimeout(longPressTimer);
    longPressTimer = null;
  }
  activePressId = null;
}
function openPinConfirm(id){
  if(!id) return false;
  pinConfirmId = id;
  pinConfirmMode = isChatPinned(id) ? 'unpin' : 'pin';
  var title = document.getElementById('pinTitle');
  if(title) title.textContent = pinConfirmMode === 'unpin' ? '要取消此聊天置顶吗？' : '要置顶此聊天吗？';
  var overlay = document.getElementById('pinOverlay');
  if(overlay) overlay.classList.add('open');
  return true;
}
function closePinConfirm(){
  pinConfirmId = '';
  pinConfirmMode = 'pin';
  var overlay = document.getElementById('pinOverlay');
  if(overlay) overlay.classList.remove('open');
}
function handlePinOverlayClick(evt){
  if(evt.target === evt.currentTarget) closePinConfirm();
}
function confirmPinChat(){
  if(!pinConfirmId) return closePinConfirm();
  var mode = pinConfirmMode;
  if(mode === 'unpin'){
    unpinChat(pinConfirmId);
  }else{
    pinChat(pinConfirmId);
  }
  closePinConfirm();
  renderList();
  showToast(mode === 'unpin' ? '已取消置顶' : '已置顶到最上面');
}
function showToast(text){
  var toast = document.getElementById('toast');
  if(!toast) return;
  toast.textContent = text || '';
  toast.classList.add('show');
  if(toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){
    toast.classList.remove('show');
  }, 1600);
}
function switchTab(v){
  document.querySelectorAll('.tab').forEach(function(t){t.classList.toggle('active', t.dataset.view===v);});
  document.querySelectorAll('.view').forEach(function(s){s.classList.toggle('active', s.id===v);});
  var nav = document.querySelector('.qq-bottom-nav');
  if(nav) nav.classList.toggle('hidden', v === 'contacts');
}
function openMomentsPage(){
  try{
    localStorage.setItem(accountScopedKey(MOMENTS_LAST_SEEN_KEY), String(Date.now()));
    var bridgePayload = JSON.stringify(Array.isArray(momentsPostsCache) ? momentsPostsCache : []);
    localStorage.setItem(accountScopedKey(MOMENTS_BRIDGE_KEY), bridgePayload);
    localStorage.setItem(MOMENTS_BRIDGE_KEY, bridgePayload);
  }catch(e){}
  renderMomentsBadge();
  window.location.href = 'qq_moments.html';
}

function ensureParentTopbarVisible(){
  const docs = [];
  try{
    if(window.parent && window.parent !== window && window.parent.document) docs.push(window.parent.document);
  }catch(e){}
  try{
    if(window.top && window.top !== window && window.top.document) docs.push(window.top.document);
  }catch(e){}
  docs.forEach((doc)=>{
    try{
      const bar = doc.querySelector('.app-topbar');
      if(bar) bar.style.display = '';
      const frame = doc.getElementById('app-iframe');
      if(frame) frame.style.marginTop = '';
    }catch(err){}
  });
}
function openPlaceholderFeature(name){
  showToast((name || '该功能') + ' 暂未开放');
}
function openOfflineArchive(){
  forward({ type:'OPEN_APP', payload:'offline_archive' });
}
function openProfileCenter(){
  window.location.href = 'qq_profile.html';
}
window.addEventListener('message', async function(e){
  var d=e.data||{};
  if(d.type==='CHARACTER_IMPORTED'){ await loadChars(); renderMomentsBadge(); forward(d); }
  if(d.type==='CHAT_UPDATED'){
    var payload = d.payload || {};
    if(payload.id){
      livePreviewCache[payload.id] = normalizePreviewMessage({ content: payload.last || '', type: payload.lastType || 'text' });
      var current = chatSummaryCache[payload.id] || { last:{ content:'', type:'text' }, unread:0 };
      chatSummaryCache[payload.id] = {
        last: livePreviewCache[payload.id],
        unread: Number(current.unread || 0) || 0
      };
      renderList();
    }
    await loadChars();
    renderMomentsBadge();
    forward(d);
  }
  if(d.type==='SET_ACTIVE_CHARACTER' || d.type==='OPEN_CHAT_WITH' || d.type==='OPEN_APP_WITH'){ forward(d); }
});
function forward(msg){
  try{ if(window.top && window.top!==window) window.top.postMessage(msg,'*'); }catch(e){}
}
Promise.resolve(window.MetadataStore && typeof window.MetadataStore.init === 'function' ? window.MetadataStore.init() : null)
  .catch(function(){ return null; })
  .then(function(){
    return loadChars().catch(function(err){ console.error('qq load chars failed', err); });
  });
hydrateAvatarAssets();
setInterval(function(){ loadChars().catch(function(){}); renderMomentsBadge(); }, 3000);
ensureParentTopbarVisible();
window.addEventListener('pageshow', ensureParentTopbarVisible);
</script>
