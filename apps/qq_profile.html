<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>个人中心</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<script src="../accountManager.js"></script>
<script src="../assetStore.js"></script>
<script src="../chatStorage.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--b:#0a0a0a;--w:#fff;--off:#f5f5f5;--g:#666;--bd:2px solid #0a0a0a;--sh:2px 2px 0 #0a0a0a;--font:'Quicksand',sans-serif;--fontd:'Nunito',sans-serif;--safe-top:max(env(safe-area-inset-top),0px);--safe-bottom:max(env(safe-area-inset-bottom),0px)}
html,body{width:100%;height:100%}
body{font-family:var(--font);background:var(--off);color:var(--b);padding:calc(8px + var(--safe-top)) 12px calc(104px + var(--safe-bottom));overflow:auto}
button,input,textarea,select{color:var(--b);-webkit-text-fill-color:var(--b)}
.profile-topbar{position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:center;height:48px;border:var(--bd);border-radius:14px;background:linear-gradient(180deg,#fff 0%,#efefef 100%);box-shadow:var(--sh);margin-bottom:10px}
.top-heart{position:absolute;left:8px;top:50%;transform:translateY(-50%);width:34px;height:34px;border:var(--bd);border-radius:10px;background:#fff;display:flex;align-items:center;justify-content:center;box-shadow:var(--sh);cursor:pointer}
.top-heart:active{transform:translateY(-50%) translate(1px,1px);box-shadow:1px 1px 0 #0a0a0a}
.top-heart svg{width:18px;height:18px;display:block;fill:#0a0a0a}
.top-title{font-family:var(--fontd);font-size:17px;font-weight:900;letter-spacing:.02em}
.card{border:var(--bd);border-radius:22px;background:linear-gradient(180deg,#fff 0%,#f0f0f0 100%);box-shadow:var(--sh)}
.id{padding:12px}
.id-row{display:flex;gap:12px;align-items:center}
.avatar{width:92px;height:92px;border:var(--bd);border-radius:18px;background:#eee center/cover no-repeat;display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:900;cursor:pointer;box-shadow:var(--sh);color:#0a0a0a}
.name-wrap{flex:1;display:flex;flex-direction:column;gap:6px}
.label{font-size:10px;font-weight:800;color:var(--g);letter-spacing:.06em;text-transform:uppercase}
.name-input{width:100%;border:var(--bd);border-radius:12px;padding:10px 12px;font-family:var(--fontd);font-size:15px;font-weight:900;background:#fff;outline:none}
.hint{font-size:11px;color:#555;font-weight:700;line-height:1.5;margin-top:8px}
.section{margin-top:12px;padding:10px 12px}
.row-btn{width:100%;display:flex;align-items:center;justify-content:space-between;border:var(--bd);border-radius:14px;background:#fff;padding:12px 12px;box-shadow:var(--sh);font-family:var(--fontd);font-weight:900;font-size:14px;cursor:pointer}
.row-btn + .row-btn{margin-top:8px}
.row-btn:active{transform:translate(1px,1px);box-shadow:1px 1px 0 #0a0a0a}
.row-sub{font-size:11px;color:#666;font-weight:700}
.del-wrap{margin-top:18px}
.del-btn{width:100%;border:var(--bd);border-radius:14px;background:#e55;color:#fff;padding:12px 10px;box-shadow:var(--sh);font-family:var(--fontd);font-size:14px;font-weight:900;cursor:pointer}
.del-btn:active{transform:translate(1px,1px);box-shadow:1px 1px 0 #0a0a0a}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.28);display:none;align-items:center;justify-content:center;padding:18px;z-index:160}
.overlay.open{display:flex}
.modal{width:min(330px,100%);border:var(--bd);border-radius:20px;background:#fff;box-shadow:4px 4px 0 #0a0a0a;padding:14px;display:flex;flex-direction:column;gap:10px}
.modal h3{font-family:var(--fontd);font-size:16px;font-weight:900}
.modal .sub{font-size:12px;color:#666;font-weight:700;line-height:1.5}
.actions{display:flex;gap:8px}
.actions button,.account-item button{flex:1;border:var(--bd);border-radius:12px;background:#fff;box-shadow:var(--sh);padding:10px;font-family:var(--fontd);font-size:12px;font-weight:900;cursor:pointer}
.actions button:active,.account-item button:active{transform:translate(1px,1px);box-shadow:1px 1px 0 #0a0a0a}
.account-list{display:flex;flex-direction:column;gap:8px;max-height:280px;overflow:auto}
.account-item{border:var(--bd);border-radius:14px;background:#f7f7f7;padding:10px;display:flex;flex-direction:column;gap:8px}
.account-main{display:flex;align-items:center;justify-content:space-between;gap:8px}
.badges{display:flex;gap:6px;flex-wrap:wrap}
.badge{font-size:9px;border:var(--bd);border-radius:999px;padding:2px 7px;font-weight:900;background:#111;color:#fff}
.fav-list{display:flex;flex-direction:column;gap:8px;max-height:360px;overflow:auto;padding:2px 0;-webkit-overflow-scrolling:touch}
.fav-item{width:calc(100% - 6px);margin:0 auto;border:var(--bd);border-radius:14px;background:#f8f8f8;box-shadow:var(--sh);padding:10px;display:flex;gap:10px;touch-action:pan-y;transition:transform .15s ease}
.fav-item.swiping{transition:none}
.fav-av{width:36px;height:36px;border:var(--bd);border-radius:10px;background:#eee;flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden;font-family:var(--fontd);font-size:12px;font-weight:900;color:#666}
.fav-av img{width:100%;height:100%;object-fit:cover;display:block}
.fav-meta{min-width:0;flex:1}
.fav-name{font-family:var(--fontd);font-size:12px;font-weight:900}
.fav-time{font-size:10px;color:#666;font-weight:700}
.fav-text{font-size:12px;font-weight:700;line-height:1.5;word-break:break-word;white-space:pre-wrap}
.fav-rich-wrap{margin-top:7px;border:var(--bd);border-radius:14px;background:linear-gradient(180deg,#fff 0%,#f4f4f4 100%);box-shadow:2px 2px 0 #0a0a0a;padding:6px}
.fav-rich-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin:0 0 6px}
.fav-rich-tag{display:inline-flex;align-items:center;justify-content:center;min-height:24px;padding:0 10px;border-radius:999px;background:#111;color:#fff;font-family:var(--fontd);font-size:10px;font-weight:900;letter-spacing:.12em}
.fav-rich-expand{width:30px;height:30px;border:var(--bd);border-radius:999px;background:#fff;box-shadow:var(--sh);display:inline-flex;align-items:center;justify-content:center;cursor:pointer}
.fav-rich-expand:active{transform:translate(1px,1px);box-shadow:1px 1px 0 #0a0a0a}
.fav-rich-expand img{width:16px;height:16px;object-fit:contain;display:block}
.fav-rich-frame{display:block;width:100%;height:220px;border:none;border-radius:10px;background:#fff}
.fav-rich-hint{margin-top:6px;font-size:10px;color:#666;font-weight:800;letter-spacing:.04em}
.fav-rich-full-overlay{position:fixed;inset:0;z-index:190;display:none;align-items:center;justify-content:center;padding:14px;background:rgba(0,0,0,.5)}
.fav-rich-full-overlay.open{display:flex}
.fav-rich-full-card{width:min(980px,100%);height:min(92vh,100%);border:var(--bd);border-radius:20px;background:#fff;box-shadow:4px 6px 0 #0a0a0a;padding:10px;display:flex;flex-direction:column;gap:8px}
.fav-rich-full-head{display:flex;align-items:center;justify-content:space-between;gap:8px}
.fav-rich-full-title{display:inline-flex;align-items:center;justify-content:center;min-height:26px;padding:0 12px;border-radius:999px;background:#111;color:#fff;font-family:var(--fontd);font-size:10px;font-weight:900;letter-spacing:.14em}
.fav-rich-full-close{width:34px;height:34px;border:var(--bd);border-radius:999px;background:#fff;box-shadow:var(--sh);display:inline-flex;align-items:center;justify-content:center;cursor:pointer}
.fav-rich-full-close:active{transform:translate(1px,1px);box-shadow:1px 1px 0 #0a0a0a}
.fav-rich-full-close img{width:18px;height:18px;object-fit:contain;display:block}
.fav-rich-full-frame{width:100%;flex:1 1 auto;border:none;border-radius:12px;background:#fff;box-shadow:inset 0 0 0 1px rgba(0,0,0,.12)}
.toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(10px);background:#111;color:#fff;padding:8px 14px;border-radius:999px;font-size:12px;font-weight:800;opacity:0;transition:all .2s;pointer-events:none;z-index:99}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#avatarInput{display:none}
.wallet-page{position:fixed;inset:0;display:none;flex-direction:column;background:radial-gradient(circle at top right, rgba(255,255,255,.92) 0, rgba(255,255,255,0) 30%),linear-gradient(180deg,#f6f6f6 0%,#ececec 100%);padding:calc(10px + var(--safe-top)) 14px 16px;z-index:90}
.wallet-page.open{display:flex}
.wallet-topbar{position:relative;display:flex;align-items:center;justify-content:center;min-height:44px;margin-bottom:14px;flex-shrink:0}
.wallet-heart{position:absolute;left:0;top:0;width:42px;height:42px;border:var(--bd);border-radius:14px;background:#fff;display:flex;align-items:center;justify-content:center;box-shadow:var(--sh);cursor:pointer}
.wallet-heart:active,.wallet-cta:active,.wallet-mini-btn:active,.wallet-record:active,.wallet-plus:active,.family-unlink-btn:active,.family-mode-btn:active{transform:translate(1px,1px);box-shadow:1px 1px 0 #0a0a0a}
.wallet-heart svg{width:18px;height:18px;display:block;fill:#0a0a0a}
.wallet-title{font-family:var(--fontd);font-size:22px;font-weight:900;letter-spacing:.03em}
.wallet-shell{display:flex;flex-direction:column;gap:14px;min-height:0;flex:1}
.wallet-balance-card{position:relative;border:var(--bd);border-radius:28px;background:linear-gradient(180deg,#ffffff 0%,#efefef 100%);box-shadow:3px 3px 0 #0a0a0a;padding:16px;overflow:hidden;flex-shrink:0}
.wallet-balance-card::after{content:'';position:absolute;right:-26px;top:-22px;width:124px;height:124px;border-radius:999px;background:rgba(255,255,255,.52);pointer-events:none}
.wallet-amount{position:relative;z-index:1;margin:6px 0 14px;font-family:var(--fontd);font-size:58px;line-height:.98;font-weight:900;letter-spacing:-.06em}
.wallet-actions{position:relative;z-index:1;display:flex;justify-content:flex-end;gap:10px}
.wallet-cta{min-width:74px;height:36px;border:var(--bd);border-radius:999px;background:#fff;box-shadow:var(--sh);font-family:var(--fontd);font-size:14px;font-weight:900;cursor:pointer}
.wallet-strip{border:var(--bd);border-radius:18px;background:linear-gradient(180deg,#fff 0%,#f1f1f1 100%);box-shadow:var(--sh);padding:14px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-shrink:0}
.wallet-strip-copy{display:flex;flex-direction:column;gap:3px}
.wallet-strip-title{font-family:var(--fontd);font-size:18px;font-weight:900}
.wallet-strip-sub{font-size:11px;color:#666;font-weight:700}
.wallet-plus{width:42px;height:42px;border:var(--bd);border-radius:999px;background:#fff;box-shadow:var(--sh);display:flex;align-items:center;justify-content:center;font-family:var(--fontd);font-size:28px;font-weight:900;cursor:pointer}
.wallet-divider{height:2px;background:linear-gradient(90deg,rgba(10,10,10,.2) 0%,rgba(10,10,10,.8) 50%,rgba(10,10,10,.2) 100%);opacity:.55;margin:2px 4px 0;flex-shrink:0}
.wallet-ledger{display:flex;flex-direction:column;gap:10px;min-height:0;flex:1;overflow:auto;padding:2px 2px 4px;-webkit-overflow-scrolling:touch}
.wallet-record{width:100%;border:var(--bd);border-radius:20px;background:linear-gradient(180deg,#fcfcfc 0%,#efefef 100%);box-shadow:var(--sh);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;text-align:left;cursor:pointer}
.wallet-record-copy{min-width:0}
.wallet-record-title{font-family:var(--fontd);font-size:16px;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wallet-record-sub{margin-top:4px;font-size:11px;color:#666;font-weight:700}
.wallet-record-amount{font-family:var(--fontd);font-size:22px;font-weight:900;flex-shrink:0}
.wallet-empty{border:var(--bd);border-radius:22px;background:rgba(255,255,255,.82);box-shadow:var(--sh);padding:20px 16px;text-align:center;color:#666;font-size:12px;font-weight:700}
.wallet-input{width:100%;border:var(--bd);border-radius:14px;background:#fff;box-shadow:var(--sh);padding:12px 14px;font-family:var(--fontd);font-size:22px;font-weight:900;outline:none}
.wallet-input::placeholder,.family-amount-input::placeholder{color:#999;-webkit-text-fill-color:#999}
.wallet-note{font-size:12px;color:#666;font-weight:700;line-height:1.5}
.family-card-modal{display:flex;flex-direction:column;gap:12px}
.family-card-title{font-family:var(--fontd);font-size:24px;font-weight:900;text-align:center}
.family-select{width:100%;border:var(--bd);border-radius:16px;background:#fff;box-shadow:var(--sh);padding:13px 14px;font-family:var(--fontd);font-size:16px;font-weight:900;outline:none}
.family-mode-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.family-mode-btn{border:var(--bd);border-radius:16px;background:#fff;box-shadow:var(--sh);padding:12px 14px;display:flex;align-items:center;justify-content:space-between;font-family:var(--fontd);font-size:18px;font-weight:900;cursor:pointer}
.family-mode-btn .check{font-size:18px;line-height:1}
.family-line{height:2px;background:#d2d2d2}
.family-amount-wrap{display:flex;flex-direction:column;gap:6px;padding-top:2px}
.family-amount-label{font-family:var(--fontd);font-size:15px;font-weight:900;color:#666}
.family-amount-input{width:100%;border:none;border-bottom:2px solid #0a0a0a;background:transparent;padding:8px 4px 10px;font-family:var(--fontd);font-size:44px;font-weight:900;text-align:center;outline:none}
.family-active-list{display:flex;flex-direction:column;gap:10px}
.family-active-card{border:var(--bd);border-radius:18px;background:linear-gradient(180deg,#fff 0%,#f1f1f1 100%);box-shadow:var(--sh);padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.family-active-title{font-family:var(--fontd);font-size:15px;font-weight:900}
.family-active-sub{margin-top:4px;font-size:11px;color:#666;font-weight:700}
.family-unlink-btn{min-width:64px;height:34px;border:var(--bd);border-radius:999px;background:#d72b2b;color:#fff;box-shadow:var(--sh);font-family:var(--fontd);font-size:12px;font-weight:900;cursor:pointer}
.qq-bottom-nav{position:fixed;left:12px;right:12px;bottom:calc(10px + var(--safe-bottom));z-index:95;display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
.qq-bottom-btn{border:none;background:transparent;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:#7a7a80;font-family:var(--fontd);font-size:10px;font-weight:900;cursor:pointer}
.qq-bottom-btn:active{transform:translateY(1px)}
.qq-bottom-btn .nav-icon{width:46px;height:46px;border:2px solid #111;border-radius:999px;background:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 10px 20px rgba(0,0,0,.12)}
.qq-bottom-btn .nav-icon img{width:28px;height:28px;object-fit:contain;display:block;filter:brightness(0)}
.qq-bottom-btn.active{color:#111}
.qq-bottom-btn.active .nav-icon{background:#111}
.qq-bottom-btn.active .nav-icon img{filter:brightness(0) invert(1)}
</style>
</head>
<body>
  <div class="profile-topbar">
    <button class="top-heart" type="button" title="返回QQ" onclick="goBackQQ()">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09A6 6 0 0 1 16.5 3C19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54z"/></svg>
    </button>
    <div class="top-title">个人设置</div>
  </div>
  <section class="card id">
    <div class="id-row">
      <button class="avatar" id="avatarBtn" type="button" onclick="pickAvatar()">+</button>
      <div class="name-wrap">
        <div class="label">Display Name</div>
        <input class="name-input" id="nameInput" maxlength="24" placeholder="我哥天下第一好">
      </div>
    </div>
    <div class="hint">这里修改会同步到朋友圈头像和名字。</div>
  </section>

  <section class="card section">
    <button class="row-btn" type="button" onclick="openWalletPage()">
      <span>支付与服务</span><span class="row-sub" id="walletSub">钱包</span>
    </button>
    <button class="row-btn" type="button" onclick="openFavorites()">
      <span>收藏</span><span class="row-sub" id="favCount">0条</span>
    </button>
    <button class="row-btn" type="button" onclick="openAccountCenter()">
      <span>账号</span><span class="row-sub">切换 / 创建</span>
    </button>
  </section>

  <div class="del-wrap">
    <button class="del-btn" type="button" onclick="confirmDeleteAccount()">删除当前账号</button>
  </div>

  <input id="avatarInput" type="file" accept="image/*,.png,.jpg,.jpeg,.webp,.gif,.bmp,.svg">

  <div class="overlay" id="accountOverlay"><div class="modal"><h3>账号中心</h3><div class="account-list" id="accountList"></div><div class="actions"><button type="button" onclick="createAccountAction()">创建账号</button><button type="button" onclick="closeOverlay('accountOverlay')">关闭</button></div></div></div>
  <div class="overlay" id="favOverlay"><div class="modal"><h3>收藏</h3><div class="fav-list" id="favList"></div><div class="actions"><button type="button" onclick="closeOverlay('favOverlay')">关闭</button></div></div></div>
  <div class="fav-rich-full-overlay" id="favRichFullOverlay">
    <div class="fav-rich-full-card">
      <div class="fav-rich-full-head">
        <div class="fav-rich-full-title">SURPRISE</div>
        <button class="fav-rich-full-close" type="button" onclick="closeFavoriteRichFullscreen()"><img src="assets/屏幕缩小.png" alt="缩小"></button>
      </div>
      <iframe class="fav-rich-full-frame" id="favRichFullFrame" sandbox="allow-scripts" loading="lazy"></iframe>
    </div>
  </div>
  <div class="overlay" id="confirmOverlay"><div class="modal" id="confirmModal"></div></div>

  <div class="wallet-page" id="walletPage">
    <div class="wallet-topbar">
      <button class="wallet-heart" type="button" onclick="closeWalletPage()" aria-label="返回个人设置">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09A6 6 0 0 1 16.5 3C19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54z"/></svg>
      </button>
      <div class="wallet-title">钱包</div>
    </div>
    <div class="wallet-shell">
      <section class="wallet-balance-card">
        <div class="wallet-amount" id="walletAmount">¥0.00</div>
        <div class="wallet-actions">
          <button class="wallet-cta" type="button" onclick="openWalletRechargeModal()">充值</button>
          <button class="wallet-cta" type="button" onclick="openWalletClearModal()">清空</button>
        </div>
      </section>
      <section class="wallet-strip">
        <div class="wallet-strip-copy">
          <div class="wallet-strip-title">开通亲密付</div>
          <div class="wallet-strip-sub">可赠送给角色，或向角色索要亲属卡</div>
        </div>
        <button class="wallet-plus" type="button" onclick="openFamilyCardModal()">+</button>
      </section>
      <section class="family-active-list" id="familyActiveList"></section>
      <div class="wallet-divider"></div>
      <section class="wallet-ledger" id="walletLedger"></section>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <div class="qq-bottom-nav">
    <button class="qq-bottom-btn" type="button" aria-label="聊天" title="聊天" onclick="openChatHub()">
      <span class="nav-icon"><img src="assets/聊天图标.png" alt=""></span>
      <span>聊天</span>
    </button>
    <button class="qq-bottom-btn" type="button" aria-label="发现" title="发现" onclick="openMomentsPage()">
      <span class="nav-icon"><img src="assets/moments-icon.svg" alt=""></span>
      <span>发现</span>
    </button>
    <button class="qq-bottom-btn" type="button" aria-label="档案馆" title="档案馆" onclick="openWorldbookPage()">
      <span class="nav-icon"><img src="assets/Chat-Bubble-Heart--Streamline-Sharp.png" alt=""></span>
      <span>档案馆</span>
    </button>
    <button class="qq-bottom-btn active" type="button" aria-label="自己" title="自己">
      <span class="nav-icon"><img src="assets/User-Story--Streamline-Sharp.png" alt=""></span>
      <span>自己</span>
    </button>
  </div>

<script>
let toastTimer = null;

function goBackQQ(){ window.location.href = 'qq.html'; }
function openChatHub(){ window.location.href = 'qq.html'; }
function openMomentsPage(){ window.location.href = 'qq_moments.html'; }
function openWorldbookPage(){ window.location.href = 'worldbook.html'; }
function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),1700); }
function toast(msg){ showToast(msg); }
function closeOverlay(id){ const el=document.getElementById(id); if(el) el.classList.remove('open'); }

function hideParentTopbar(){
  const docs=[];
  try{ if(window.parent && window.parent!==window && window.parent.document) docs.push(window.parent.document); }catch(e){}
  try{ if(window.top && window.top!==window && window.top.document) docs.push(window.top.document); }catch(e){}
  docs.forEach((doc)=>{ try{ const bar=doc.querySelector('.app-topbar'); if(bar){ bar.dataset.prevDisplay=bar.style.display||''; bar.style.display='none'; } const frame=doc.getElementById('app-iframe'); if(frame){ frame.dataset.prevMarginTop=frame.style.marginTop||''; frame.style.marginTop='0'; } }catch(err){} });
}
function restoreParentTopbar(){
  const docs=[];
  try{ if(window.parent && window.parent!==window && window.parent.document) docs.push(window.parent.document); }catch(e){}

function isRenderableAvatarSrc(src){ return /^(data:|https?:|blob:|\/|\.\.?\/|assets\/|apps\/assets\/)/i.test(String(src||'').trim()); }
function assetMarkerText(){ return String((window.assetStore && window.assetStore.marker) || '__asset__'); }
async function resolveProfileAvatar(){
  const keys=[
    window.AccountManager.scopedKey('qq_profile_avatar_asset'),
    window.AccountManager.scopedKey('qq_moments_hero_avatar_asset'),
    window.AccountManager.scopedKey('user_avatar'),
    'qq_profile_avatar_asset',
    'qq_moments_hero_avatar_asset',

  ];
  for(const key of keys){

function getCharAvatarSnapshot(charObj){ const id=String((charObj&&charObj.id)||''); const key=id ? ('char_avatar_' + id) : ''; const saved=key ? String(localStorage.getItem(key)||'').trim() : ''; return saved || String((charObj&&charObj.imageData)||'').trim(); }
function getCharDisplayName(charObj){ return String((charObj && (charObj.nickname || charObj.name)) || '').trim() || 'Char'; }
function favoriteAvatarLabel(item){
  const name = String((item && item.name) || '').trim();
  return (name || '头').slice(0, 1);
}
function favoriteAvatarSyncSrc(item){
  const marker = assetMarkerText();
  const from = String((item && item.from) || '').trim();
  const charId = String((item && item.charId) || '').trim();
  let src = String((item && item.avatar) || '').trim();
  if(src && src !== marker && isRenderableAvatarSrc(src)) return src;
  if((from === 'char' || (!from && charId)) && charId){
    try{
      const localSrc = String(localStorage.getItem('char_avatar_' + charId) || '').trim();
      if(localSrc && localSrc !== marker && isRenderableAvatarSrc(localSrc)) return localSrc;
    }catch(err){}
  }
  if(from === 'user'){
    src = String(getChatUserAvatar(charId) || '').trim();
    if(src && src !== marker && isRenderableAvatarSrc(src)) return src;
  }
  return '';
}
function renderFavoriteAvatar(item){
  const src = favoriteAvatarSyncSrc(item);
  const label = esc(favoriteAvatarLabel(item));
  const from = escAttr(String((item && item.from) || '').trim());
  const charId = escAttr(String((item && item.charId) || '').trim());
  if(src){
    return '<div class="fav-av has-image" data-fav-from="' + from + '" data-fav-char-id="' + charId + '"><img src="' + escAttr(src) + '" alt=""></div>';
  }
  return '<div class="fav-av" data-fav-from="' + from + '" data-fav-char-id="' + charId + '">' + label + '</div>';
}
function loadFirstRenderableAvatar(keys){
  const list = Array.isArray(keys) ? keys.filter(Boolean) : [];
  let idx = 0;
  const marker = assetMarkerText();
  const next = ()=>{
    if(idx >= list.length) return Promise.resolve('');
    const key = list[idx++];
    return loadStoredAsset(key).then((src)=>{
      const safe = String(src || '').trim();
      if(safe && safe !== marker && isRenderableAvatarSrc(safe)) return safe;
      return next();
    }).catch(()=>next());
  };
  return next();
}
function resolveFavoriteUserAvatarAsync(charId){
  const id = String(charId || '').trim();
  const keys = [];
  if(id) keys.push(window.AccountManager.scopedKey('user_avatar_' + id));
  keys.push(window.AccountManager.scopedKey('user_avatar'));
  if(id) keys.push('user_avatar_' + id);
  keys.push('user_avatar');
  return loadFirstRenderableAvatar(keys).then((src)=>{
    if(src) return src;
    return resolveProfileAvatar().then((fallback)=>String(fallback || '').trim()).catch(()=> '');
  });
}
function hydrateFavoriteAvatarNodes(){
  const list = document.getElementById('favList');
  if(!list) return;
  list.querySelectorAll('.fav-av').forEach((slot)=>{
    if(!slot || slot.querySelector('img')) return;
    const from = String(slot.getAttribute('data-fav-from') || '').trim();
    const charId = String(slot.getAttribute('data-fav-char-id') || '').trim();
    let task = Promise.resolve('');
    if((from === 'char' || (!from && charId)) && charId){
      task = loadFirstRenderableAvatar(['char_avatar_' + charId]);
    }else if(from === 'user'){
      task = resolveFavoriteUserAvatarAsync(charId);
    }
    task.then((src)=>{
      const safe = String(src || '').trim();
      if(!safe || !isRenderableAvatarSrc(safe) || slot.querySelector('img')) return;
      slot.innerHTML = '<img src="' + escAttr(safe) + '" alt="">';
      slot.classList.add('has-image');
    }).catch(()=>{});
  });
}

    const next = String(src || '').trim();
    if(next){
      av.style.backgroundImage='url(' + JSON.stringify(next).slice(1,-1) + ')';
      av.textContent='';
    }else{
      av.style.backgroundImage='';
      av.textContent='+';

  m.innerHTML='<div class="family-card-modal"><div class="family-card-title">亲属卡</div><select class="family-select" id="familyCharSelect">' + options.join('') + '</select><div class="family-mode-row"><button class="family-mode-btn" type="button" id="familyGiftBtn" onclick="setFamilyMode(\'gift\')"><span>赠送</span><span class="check">☑</span></button><button class="family-mode-btn" type="button" id="familyRequestBtn" onclick="setFamilyMode(\'request\')"><span>索要</span><span class="check">☐</span></button></div><div class="family-line"></div><div class="family-amount-wrap"><div class="family-amount-label">额度/笔</div><input class="family-amount-input" id="familyAmountInput" type="number" min="0" step="0.01" placeholder="¥ 0.00"></div><div class="actions"><button type="button" onclick="closeOverlay(\'confirmOverlay\')">取消</button><button type="button" id="confirmYesBtn">确认</button></div></div>';
  document.getElementById('confirmOverlay').classList.add('open');
  window.__familyCardMode='gift';
  document.getElementById('confirmYesBtn').onclick=submitFamilyCardRequest;
}
function setFamilyMode(mode){ window.__familyCardMode=mode==='request'?'request':'gift'; const gift=document.getElementById('familyGiftBtn'); const req=document.getElementById('familyRequestBtn'); if(gift) gift.querySelector('.check').textContent=window.__familyCardMode==='gift'?'☑':'☐'; if(req) req.querySelector('.check').textContent=window.__familyCardMode==='request'?'☑':'☐'; }
function submitFamilyCardRequest(){
  const charId=String((document.getElementById('familyCharSelect')||{}).value||'').trim(); const amount=Number((document.getElementById('familyAmountInput')||{}).value||0);
  if(!charId){ showToast('请选择对象'); return; }

  const payload=createFamilyCardPayload(target, window.__familyCardMode||'gift', amount);
  appendFamilyCardToChat(target, payload); queueFamilyRequest(payload); openChatWithFamilyAutoTrigger(target); closeOverlay('confirmOverlay'); renderWallet(); showToast('亲属卡邀请已发送');
}
function openRevokeFamilyCardConfirm(cardId){ const item=loadActiveFamilyCards().find((entry)=>String((entry&&entry.id)||'')===String(cardId||'')); if(!item) return; const m=document.getElementById('confirmModal'); m.innerHTML='<h3>解除亲密付</h3><div class="sub">确认后将和' + esc(item.charName||'对方') + '解除亲属卡关系。</div><div class="actions"><button type="button" onclick="closeOverlay(\'confirmOverlay\')">取消</button><button type="button" id="confirmYesBtn">确认</button></div>'; document.getElementById('confirmOverlay').classList.add('open'); document.getElementById('confirmYesBtn').onclick=function(){ const payload={ id:'family_revoke_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,7), type:'family_card', kind:'revoke', status:'done', mode:item.mode||'gift', amount:Number(item.amount||0)||0, userName:getChatUserName(item.charId), userAvatar:getChatUserAvatar(item.charId), charName:item.charName||'Char', charAvatar:String(item.charAvatar||'').trim(), charId:item.charId||'', summary:getChatUserName(item.charId) + '和您解除了亲密付', createdAt:Date.now() }; appendFamilyCardToChat({ id:item.charId, name:item.charName, nickname:item.charName, imageData:item.charAvatar||'' }, payload); removeFamilyBindingsForChar(item.charId); closeOverlay('confirmOverlay'); renderWallet(); showToast('已解除亲密付'); }; }

function saveName(){ const v=String(document.getElementById('nameInput').value||'').trim(); window.AccountManager.updateActive(a=>{ a.name=v; }); renderProfile(); postProfilePreviewUpdate(); showToast('名称已保存'); }
function pickAvatar(){ document.getElementById('avatarInput').click(); }
function bindAvatarInput(){ document.getElementById('avatarInput').addEventListener('change', async (e)=>{ const f=e.target.files&&e.target.files[0]; if(!f) return; const r=new FileReader(); r.onload=async ()=>{ const data=String(r.result||''); const av=document.getElementById('avatarBtn'); if(av){ av.style.backgroundImage='url(' + JSON.stringify(data).slice(1,-1) + ')'; av.textContent=''; } try{ window.AccountManager.updateActive(a=>{ a.avatar=data; }); }catch(accountErr){} const scopedProfileKey=window.AccountManager.scopedKey('qq_profile_avatar_asset'); const scopedUserKey=window.AccountManager.scopedKey('user_avatar'); const scopedMomentsAvatarKey=window.AccountManager.scopedKey('qq_moments_hero_avatar_asset'); const scopedMomentsLegacyKey=window.AccountManager.scopedKey('qq_moments_hero_avatar'); try{ localStorage.setItem(scopedProfileKey, data); localStorage.setItem(scopedUserKey, data); localStorage.setItem(scopedMomentsAvatarKey, data); localStorage.setItem(scopedMomentsLegacyKey, data); localStorage.setItem('qq_profile_avatar_asset', data); localStorage.setItem('qq_moments_hero_avatar_asset', data); localStorage.setItem('qq_moments_hero_avatar', data); localStorage.setItem('user_avatar', data); }catch(storageErr){} await Promise.all([ saveStoredAsset(scopedProfileKey, data), saveStoredAsset(scopedUserKey, data), saveStoredAsset(scopedMomentsAvatarKey, data), saveStoredAsset(scopedMomentsLegacyKey, data), saveStoredAsset('qq_profile_avatar_asset', data), saveStoredAsset('qq_moments_hero_avatar_asset', data), saveStoredAsset('qq_moments_hero_avatar', data), saveStoredAsset('user_avatar', data) ]); renderProfile(); postProfilePreviewUpdate(); try{ window.parent.postMessage({ type:'USER_AVATAR_UPDATED', payload:{ src:data } }, '*'); }catch(err){} showToast('头像已更新'); }; r.readAsDataURL(f); e.target.value=''; }); }
function normalizeFavoriteType(type){
  const safe = String(type || '').trim().toLowerCase();
  if(safe === 'rich_html' || safe === 'richhtml' || safe === 'html_card') return 'richhtml';
  if(safe === 'voice_message' || safe === 'voice') return 'voice';
  if(safe === 'image_message' || safe === 'image') return 'image';
  if(safe === 'meme_message' || safe === 'meme') return 'meme';
  return safe || 'text';
}
function parseFavoriteRichPayload(raw){
  if(!raw) return null;
  let parsed = null;
  if(typeof raw === 'object'){
    parsed = raw;
  }else{
    try{ parsed = JSON.parse(String(raw || '')); }catch(err){ parsed = null; }
  }
  if(!parsed || typeof parsed !== 'object') return null;
  if(parsed.type){
    const safeType = normalizeFavoriteType(parsed.type);
    if(safeType === 'richhtml'){
      return parseFavoriteRichPayload(parsed.content || parsed.richPayload || null);
    }
  }
  const html = String(parsed.html || '').trim();
  const css = String(parsed.css || '').trim();
  const js = String(parsed.js || '').trim();
  const summary = String(parsed.summary || '').trim();
  const text = String(parsed.text || '').trim();
  if(!html && !summary && !text) return null;
  return { html, css, js, summary, text };
}
function buildFavoriteRichSrcdoc(payload){
  const data = payload && typeof payload === 'object' ? payload : { html:'', css:'', js:'', summary:'', text:'' };
  let html = String(data.html || '').trim();
  const css = String(data.css || '').trim();
  const js = String(data.js || '').trim();
  const summary = String(data.summary || data.text || 'SURPRISE').trim() || 'SURPRISE';
  if(!html){
    html = '<section style="padding:16px 14px;display:flex;align-items:center;justify-content:center;min-height:120px;border:2px solid #111;border-radius:16px;background:linear-gradient(180deg,#fff,#f2f2f2);font-family:-apple-system,BlinkMacSystemFont,\'SF Pro Text\',\'PingFang SC\',sans-serif;font-size:14px;font-weight:800;color:#111;">'
      + esc(summary) + '</section>';
  }
  return '<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">'
    + '<style>html,body{margin:0;padding:0;background:#fff;color:#111;font-family:-apple-system,BlinkMacSystemFont,\'SF Pro Text\',\'PingFang SC\',sans-serif;overflow:auto}*,*:before,*:after{box-sizing:border-box}'
    + css + '</style></head><body>' + html + (js ? ('<script>' + js + '<\/script>') : '') + '</body></html>';
}
function getFavoritePreviewText(fav){
  const item = fav && typeof fav === 'object' ? fav : {};
  const previewText = String(item.previewText || '').trim();
  if(previewText) return previewText;
  const kind = normalizeFavoriteType(item.type || 'text');
  if(kind === 'richhtml') return '【SURPRISE】';
  if(kind === 'voice') return '【语音消息】';
  if(kind === 'image') return '【图片】';
  if(kind === 'meme') return '【表情包】';
  if(kind === 'text' && String(item.text || '').trim().startsWith('{')){
    const maybeRich = parseFavoriteRichPayload(item.text);
    if(maybeRich) return '【SURPRISE】';
    try{
      const parsed = JSON.parse(String(item.text || ''));
      if(parsed && typeof parsed === 'object' && parsed.content){
        const parsedKind = normalizeFavoriteType(parsed.type || 'text');
        if(parsedKind === 'richhtml') return '【SURPRISE】';
        return String(parsed.content || '').trim() || '空消息';
      }
    }catch(err){}
  }
  return String(item.text || '').trim() || '空消息';
}
function openFavoriteRichFullscreen(frameId){
  const overlay = document.getElementById('favRichFullOverlay');
  const fullFrame = document.getElementById('favRichFullFrame');
  const sourceFrame = frameId ? document.getElementById(frameId) : null;
  if(!overlay || !fullFrame || !sourceFrame) return;
  fullFrame.srcdoc = String(sourceFrame.srcdoc || '');
  overlay.classList.add('open');
}
function closeFavoriteRichFullscreen(){
  const overlay = document.getElementById('favRichFullOverlay');
  const fullFrame = document.getElementById('favRichFullFrame');
  if(overlay) overlay.classList.remove('open');
  if(fullFrame) fullFrame.srcdoc = '';
}
function renderFavoriteBody(fav, frameId){
  const item = fav && typeof fav === 'object' ? fav : {};
  const kind = normalizeFavoriteType(item.type || 'text');
  const richKey = String(item.richPayloadAssetKey || '').trim();
  const richPayload = kind === 'richhtml'
    ? (parseFavoriteRichPayload(item.richPayload || item.text) || parseFavoriteRichPayload(item.text))
    : parseFavoriteRichPayload(item.richPayload || '');
  if(kind === 'richhtml' || richPayload || richKey){
    const fallbackPayload = { html:'', css:'', js:'', summary:'SURPRISE', text:'SURPRISE' };
    const srcdoc = buildFavoriteRichSrcdoc(richPayload || fallbackPayload);
    const keyAttr = richKey ? (' data-rich-key="' + escAttr(richKey) + '"') : '';
    return '<div class="fav-rich-wrap"><div class="fav-rich-head"><span class="fav-rich-tag">SURPRISE</span><button class="fav-rich-expand" type="button" onclick="openFavoriteRichFullscreen(\'' + escAttr(frameId || '') + '\')"><img src="assets/屏幕放大.png" alt="放大"></button></div><iframe id="' + escAttr(frameId || '') + '" class="fav-rich-frame" loading="lazy" sandbox="allow-scripts"' + keyAttr + ' srcdoc="' + escAttr(srcdoc) + '"></iframe></div><div class="fav-rich-hint">【SURPRISE】</div>';
  }
  return '<div class="fav-text">' + esc(getFavoritePreviewText(item)) + '</div>';
}
function hydrateFavoriteRichFrames(){
  const list = document.getElementById('favList');
  if(!list || !window.assetStore || typeof window.assetStore.load !== 'function') return;
  list.querySelectorAll('.fav-rich-frame[data-rich-key]').forEach((frame)=>{
    const key = String(frame.getAttribute('data-rich-key') || '').trim();
    if(!key) return;
    window.assetStore.load(key).then((raw)=>{
      const payload = parseFavoriteRichPayload(raw);
      if(!payload) return;
      frame.srcdoc = buildFavoriteRichSrcdoc(payload);
      frame.removeAttribute('data-rich-key');
    }).catch(()=>{});
  });
}
function renderFavorites(){
  const list = document.getElementById('favList');
  const favs = getCurrentFavorites();
  if(!favs.length){
    list.innerHTML = '<div class="sub">还没有收藏，去聊天里长按消息收藏吧。</div>';
    return;
  }
  try{
    list.innerHTML = favs.map((f)=>{
      const frameId = 'favRichFrame_' + (String(f.id || '').replace(/[^a-zA-Z0-9_-]/g, '') || Math.random().toString(36).slice(2,8));
      return '<article class="fav-item" data-fav-id="' + escAttr(f.id || '') + '">' + renderFavoriteAvatar(f) + '<div class="fav-meta"><div class="fav-name">' + esc(f.name || '未命名') + '</div><div class="fav-time">' + fmtTime(f.at) + '</div>' + renderFavoriteBody(f, frameId) + '</div></article>';
    }).join('');
  }catch(err){
    list.innerHTML = favs.map((f)=>{
      const preview = getFavoritePreviewText(f);
      return '<article class="fav-item" data-fav-id="' + escAttr(f.id || '') + '">' + renderFavoriteAvatar(f) + '<div class="fav-meta"><div class="fav-name">' + esc(f.name || '未命名') + '</div><div class="fav-time">' + fmtTime(f.at) + '</div><div class="fav-text">' + esc(preview) + '</div></div></article>';
    }).join('');
  }
  bindFavoriteSwipeDelete();
  hydrateFavoriteRichFrames();
  hydrateFavoriteAvatarNodes();
}
async function openFavorites(){ await hydrateFavoritesCache(); renderFavorites(); document.getElementById('favOverlay').classList.add('open'); }
function removeFavoriteById(id){
  if(!id) return;
  const next = getCurrentFavorites().filter((it)=>String(it&&it.id||'')!==String(id));
  saveFavoritesEverywhere(next);
  renderProfile();
  renderFavorites();
}
function confirmRemoveFavorite(id){ confirmModal('取消收藏','确定取消收藏？',()=>{ removeFavoriteById(id); }); }
function bindFavoriteSwipeDelete(){ const list=document.getElementById('favList'); if(!list) return; list.querySelectorAll('.fav-item').forEach((item)=>{ let startX=0,startY=0,dx=0,dragging=false,pointerId=null; const reset=()=>{ item.classList.remove('swiping'); item.style.transform=''; dragging=false; pointerId=null; }; item.addEventListener('pointerdown',(e)=>{ if(e.pointerType==='mouse'&&e.button!==0) return; pointerId=e.pointerId; startX=e.clientX; startY=e.clientY; dx=0; dragging=true; item.classList.add('swiping'); try{ item.setPointerCapture(pointerId); }catch(err){} }); item.addEventListener('pointermove',(e)=>{ if(!dragging || (pointerId!==null&&e.pointerId!==pointerId)) return; const moveX=e.clientX-startX; const moveY=e.clientY-startY; if(Math.abs(moveY)>16 && Math.abs(moveY)>Math.abs(moveX)){ reset(); return; } dx=Math.min(0,Math.max(-68,moveX)); item.style.transform='translateX(' + dx + 'px)'; }); item.addEventListener('pointerup',(e)=>{ if(!dragging || (pointerId!==null&&e.pointerId!==pointerId)) return; const swipe=dx; const id=item.getAttribute('data-fav-id')||''; reset(); if(swipe<=-42){ confirmRemoveFavorite(id); } }); item.addEventListener('pointercancel',reset); item.addEventListener('lostpointercapture',reset); }); }
function renderAccountList(){ const list=document.getElementById('accountList'); const accounts=window.AccountManager.ensure(); const activeId=active().id; const defaultId=window.AccountManager.getDefaultId(); list.innerHTML=accounts.map((a)=>'<div class="account-item"><div class="account-main"><strong>'+esc(a.name||'未命名')+'</strong><div class="badges">'+(a.id===activeId?'<span class="badge">当前</span>':'')+(a.id===defaultId?'<span class="badge">默认</span>':'')+'</div></div><div class="actions"><button type="button" onclick="switchAccount(\''+escAttr(a.id)+'\')">切换</button><button type="button" onclick="setDefaultAccount(\''+escAttr(a.id)+'\')">设为默认</button></div></div>').join(''); }
function openAccountCenter(){ renderAccountList(); document.getElementById('accountOverlay').classList.add('open'); }
function confirmModal(title,desc,onConfirm){ const m=document.getElementById('confirmModal'); m.innerHTML='<h3>'+esc(title)+'</h3><div class="sub">'+esc(desc)+'</div><div class="actions"><button type="button" onclick="closeOverlay(\'confirmOverlay\')">取消</button><button type="button" id="confirmYesBtn">确认</button></div>'; document.getElementById('confirmOverlay').classList.add('open'); document.getElementById('confirmYesBtn').onclick=function(){ closeOverlay('confirmOverlay'); onConfirm&&onConfirm(); }; }
function createAccountAction(){ const accounts=window.AccountManager.ensure(); if(accounts.length>=2){ showToast('最多只能拥有两个账号'); return; } confirmModal('创建新账号','创建后将切换到新账号并重置为默认头像与名字，继续吗？',()=>{ const res=window.AccountManager.createAccount(); if(!res){ showToast('创建失败'); return; } location.reload(); }); }

function confirmDeleteAccount(){ const acc=active(); confirmModal('删除账号','删除后该账号的聊天与朋友圈数据会被清空，确认删除？',()=>{ const res=window.AccountManager.deleteAccount(acc.id); if(!res.ok){ if(res.reason==='default') showToast('不能删除默认账号，请先切换默认账号'); else if(res.reason==='need_one') showToast('至少要保留一个账号'); else showToast('删除失败'); return; } location.reload(); }); }

function esc(s){ return String(s||'').replace(/[&<>\"]/g,(m)=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[m])); }
function escAttr(s){ return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtTime(ts){ const d=new Date(ts||Date.now()); const p=(n)=>String(n).padStart(2,'0'); return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())+' '+p(d.getHours())+':'+p(d.getMinutes()); }

['accountOverlay','favOverlay','confirmOverlay','favRichFullOverlay'].forEach((id)=>{ const el=document.getElementById(id); if(!el) return; el.addEventListener('click',(evt)=>{ if(evt.target!==el) return; if(id==='favRichFullOverlay') closeFavoriteRichFullscreen(); else el.classList.remove('open'); }); });
