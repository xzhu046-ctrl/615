<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--b:#0a0a0a;--w:#fff;--off:#f5f5f5;--g:#666;--bd:2px solid #0a0a0a;--sh:2px 2px 0 #0a0a0a;--font:'Quicksand',sans-serif;--fontd:'Nunito',sans-serif;--safe-top:max(env(safe-area-inset-top),0px);--safe-bottom:max(env(safe-area-inset-bottom),0px)}

.profile-topbar{position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:center;min-height:48px;margin-bottom:10px;background:linear-gradient(180deg,rgba(255,255,255,.96),rgba(255,255,255,0));backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}

.card{border:1px solid rgba(17,17,17,.14);border-radius:8px;background:rgba(255,255,255,.96);box-shadow:0 18px 40px rgba(0,0,0,.1);overflow:hidden}
.id{position:relative;padding:16px;background:linear-gradient(180deg,#fff 0%,#f7f7f7 100%)}
.id::before{content:'';position:absolute;left:0;top:14px;bottom:14px;width:3px;background:linear-gradient(180deg,rgba(17,17,17,.12) 0%,rgba(17,17,17,.9) 24%,rgba(17,17,17,.9) 76%,rgba(17,17,17,.12) 100%)}
.id-row{position:relative;z-index:1;display:flex;gap:14px;align-items:center}
.avatar{width:92px;height:92px;border:1.5px solid rgba(17,17,17,.86);border-radius:999px;background:#eee center/cover no-repeat;display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:900;cursor:pointer;box-shadow:0 0 0 5px #fff,0 14px 28px rgba(0,0,0,.14);color:#0a0a0a;overflow:hidden}
.name-wrap{flex:1;display:flex;flex-direction:column;gap:7px;min-width:0}
.label{font-size:10px;font-weight:900;color:#777;letter-spacing:.16em;text-transform:uppercase}
.name-input{width:100%;border:none;border-radius:0 18px 18px 0;padding:12px 13px 10px 18px;font-family:var(--fontd);font-size:15px;font-weight:900;background:linear-gradient(180deg,rgba(255,255,255,.82),rgba(238,238,238,.42)),linear-gradient(180deg,rgba(17,17,17,.12) 0%,rgba(17,17,17,.82) 25%,rgba(17,17,17,.82) 75%,rgba(17,17,17,.12) 100%);background-repeat:no-repeat,no-repeat;background-size:100% 100%,3px 100%;outline:none;text-decoration-line:underline;text-decoration-style:dashed;text-decoration-color:rgba(85,85,85,.42);text-decoration-thickness:1.2px;text-underline-offset:4px}
.hint{display:none}
.section{margin-top:14px;padding:12px;background:#fff}

.row-sub{font-size:11px;color:#666;font-weight:900;border-bottom:2px dashed rgba(17,17,17,.34)}
.del-wrap{margin-top:18px;display:flex;justify-content:center}

.overlay{position:fixed;inset:0;background:rgba(245,245,245,.72);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);display:none;align-items:center;justify-content:center;padding:18px;z-index:160}

.fav-item::before{content:'';position:absolute;left:10px;top:10px;bottom:10px;width:3px;background:linear-gradient(180deg,rgba(17,17,17,.16) 0%,rgba(17,17,17,.9) 23%,rgba(17,17,17,.9) 77%,rgba(17,17,17,.16) 100%);opacity:.92}

.fav-item.swiping{transition:none}
.fav-av{width:28px;height:28px;border:1.5px solid rgba(17,17,17,.64);border-radius:999px;background:linear-gradient(180deg,#fff 0%,#ececec 100%);flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden;font-family:var(--fontd);font-size:10px;font-weight:900;color:#555;box-shadow:0 0 0 3px rgba(255,255,255,.82)}
.fav-av img{width:100%;height:100%;object-fit:cover;display:block}
.fav-meta{min-width:0;flex:1}
.fav-name{font-family:var(--fontd);font-size:11px;font-weight:900;color:#555;letter-spacing:.04em;text-decoration-line:underline;text-decoration-style:dashed;text-decoration-thickness:1.3px;text-decoration-color:rgba(109,109,109,.62);text-underline-offset:4px}
.fav-time{margin-top:2px;font-size:9px;color:#888;font-weight:900;letter-spacing:.08em;text-transform:uppercase}
.fav-text{position:relative;margin-top:7px;padding-right:13px;font-size:12px;font-weight:750;line-height:1.68;color:#6d6d6d;word-break:break-word;white-space:pre-wrap;text-decoration-line:underline;text-decoration-style:dashed;text-decoration-color:rgba(109,109,109,.68);text-decoration-thickness:1.25px;text-underline-offset:4px}
.fav-text::after{content:'”';position:absolute;right:-2px;bottom:-27px;font-family:Georgia,'Times New Roman',serif;font-size:44px;line-height:1;color:rgba(17,17,17,.42);font-weight:900;pointer-events:none;text-decoration:none}
.fav-rich-wrap{position:relative;margin-top:9px;border:none;border-radius:0 14px 14px 0;background:rgba(255,255,255,.48);box-shadow:none;padding:7px 7px 7px 12px}
.fav-rich-wrap::before{content:'';position:absolute;left:0;top:7px;bottom:7px;width:2px;background:linear-gradient(180deg,rgba(17,17,17,.12),rgba(17,17,17,.72),rgba(17,17,17,.12))}

.fav-rich-full-close{width:34px;height:34px;border:var(--bd);border-radius:999px;background:#fff;box-shadow:var(--sh);display:inline-flex;align-items:center;justify-content:center;cursor:pointer}

.fav-rich-full-frame{width:100%;flex:1 1 auto;border:none;border-radius:12px;background:#fff;box-shadow:inset 0 0 0 1px rgba(0,0,0,.12)}
.toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(10px);background:#111;color:#fff;padding:8px 14px;border-radius:999px;font-size:12px;font-weight:800;opacity:0;transition:all .2s;pointer-events:none;z-index:99}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#avatarInput{display:none}
.wallet-page{position:fixed;inset:0;display:none;flex-direction:column;background:linear-gradient(180deg,#fff 0%,#f1f1f1 100%);padding:calc(10px + var(--safe-top)) 14px 16px;z-index:90}

.wallet-record-amount{font-family:var(--fontd);font-size:22px;font-weight:900;flex-shrink:0}

.wallet-input{width:100%;border:none;border-left:3px solid transparent;border-radius:0 16px 16px 0;background:linear-gradient(180deg,rgba(255,255,255,.84),rgba(238,238,238,.42)),linear-gradient(180deg,rgba(17,17,17,.12) 0%,rgba(17,17,17,.84) 25%,rgba(17,17,17,.84) 75%,rgba(17,17,17,.12) 100%);background-repeat:no-repeat,no-repeat;background-size:100% 100%,3px 100%;box-shadow:none;padding:12px 14px 12px 18px;font-family:var(--fontd);font-size:22px;font-weight:900;outline:none}

.wallet-note{font-size:12px;color:#666;font-weight:700;line-height:1.5}
.couple-page{position:fixed;inset:0;display:none;flex-direction:column;background:
  radial-gradient(circle at 18px 18px,rgba(17,17,17,.12) 0 1px,transparent 1.5px) 0 0/18px 18px,
  linear-gradient(180deg,#f8f8f8 0%,#ececec 100%);padding:0 0 calc(82px + var(--safe-bottom));z-index:92;overflow:hidden}

.couple-head-title{display:grid;grid-template-columns:minmax(0,1fr) auto minmax(0,1fr);align-items:center;gap:6px;width:min(216px,calc(100vw - 120px));margin:0 auto;font-family:var(--fontd);font-size:12px;font-weight:900;line-height:1;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.32)}
.couple-head-name{min-width:0;max-width:92px;display:inline-flex;align-items:center;justify-content:center;min-height:24px;padding:0 8px;border-radius:999px;background:rgba(17,17,17,.78);box-shadow:0 6px 12px rgba(0,0,0,.12);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.couple-head-x{width:24px;height:24px;display:inline-flex;align-items:center;justify-content:center;border-radius:999px;background:#111;color:#fff;box-shadow:2px 2px 0 rgba(17,17,17,.18);font-size:14px}
.couple-scroll{min-height:0;flex:1;overflow:auto;padding:0 14px 18px;-webkit-overflow-scrolling:touch}
.couple-strip{display:flex;gap:12px;overflow-x:auto;padding:8px 2px 14px;margin-top:-2px;scroll-snap-type:x proximity;-webkit-overflow-scrolling:touch}
.couple-char-chip{position:relative;min-width:78px;width:78px;height:78px;border:2px solid #111;border-radius:0;background:#fff;box-shadow:2px 2px 0 #111;padding:5px;display:flex;align-items:center;justify-content:center;cursor:pointer;scroll-snap-align:start}
.couple-char-chip.active{background:#111;color:#fff;box-shadow:2px 2px 0 #fff,4px 4px 0 #111}
.couple-chip-av{width:100%;height:100%;border:2px solid currentColor;border-radius:0;background:#eee;display:flex;align-items:center;justify-content:center;overflow:hidden;font-family:var(--fontd);font-size:11px;font-weight:900}
.couple-chip-av img{width:100%;height:100%;object-fit:cover;display:block}
.couple-chip-name{position:absolute;left:5px;right:5px;bottom:5px;min-height:18px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.88);color:#111;font-family:var(--fontd);font-size:9px;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:center;padding:0 4px}
.couple-char-chip.active .couple-chip-name{background:#111;color:#fff;box-shadow:0 0 0 1px #fff inset}
.couple-chip-music{position:absolute;right:-6px;top:-7px;width:24px;height:24px;border:2px solid #111;background:#fff;box-shadow:2px 2px 0 #111;display:flex;align-items:center;justify-content:center;overflow:hidden}
.couple-chip-music img{width:18px;height:18px;object-fit:contain;display:block}
.couple-card{position:relative;border:2px solid #111;border-radius:0;background:#fff;box-shadow:2px 2px 0 #fff,5px 5px 0 #111;padding:12px;margin:0 2px 14px}
.couple-card-title{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;font-family:var(--fontd);font-size:18px;font-weight:900}
.couple-card-title small{font-size:10px;color:#666;font-weight:900;letter-spacing:.04em}
.couple-score-row{display:grid;grid-template-columns:auto 1fr;gap:12px;align-items:center}
.couple-score{font-family:var(--fontd);font-size:48px;line-height:.92;font-weight:900;letter-spacing:-.05em}
.couple-meter{height:16px;border:2px solid #111;background:#f1f1f1;box-shadow:inset 0 0 0 2px #fff;overflow:hidden}
.couple-meter-fill{height:100%;width:0;background:#111;transition:width .25s ease}
.couple-unlock-now{margin-top:8px;font-size:11px;font-weight:900;color:#555;line-height:1.35}
.couple-task-list{display:grid;gap:9px}
.couple-task{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;border-top:2px dashed rgba(17,17,17,.5);padding-top:9px}
.couple-task:first-child{border-top:none;padding-top:0}
.couple-task-name{font-family:var(--fontd);font-size:14px;font-weight:900}
.couple-task-sub{margin-top:2px;font-size:11px;color:#666;font-weight:800;line-height:1.35}
.couple-task-btn{min-width:54px;height:32px;border:2px solid #111;border-radius:0;background:#fff;box-shadow:2px 2px 0 #111;font-family:var(--fontd);font-size:12px;font-weight:900;cursor:pointer}
.couple-task-btn.done{background:#111;color:#fff;box-shadow:2px 2px 0 #fff,4px 4px 0 #111}
.couple-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:9px}
.couple-badge{min-height:84px;border:2px dashed rgba(17,17,17,.55);background:#f8f8f8;padding:10px;display:flex;flex-direction:column;justify-content:space-between;gap:8px}
.couple-badge.earned{border-style:solid;background:#fff;box-shadow:2px 2px 0 rgba(17,17,17,.14)}
.couple-badge-title{font-family:var(--fontd);font-size:14px;font-weight:900;line-height:1.2}
.couple-badge-sub{font-size:10px;color:#666;font-weight:800;line-height:1.35}
.couple-lock{display:flex;align-items:center;justify-content:space-between;gap:10px;border-top:2px dashed rgba(17,17,17,.45);padding-top:9px}
.couple-lock:first-child{border-top:none;padding-top:0}
.couple-lock-name{font-family:var(--fontd);font-size:14px;font-weight:900}
.couple-lock-state{display:inline-flex;align-items:center;justify-content:center;min-height:24px;padding:0 9px;border:2px solid #111;background:#111;color:#fff;font-family:var(--fontd);font-size:10px;font-weight:900;white-space:nowrap}
.couple-lock.locked .couple-lock-state{background:#fff;color:#111}
.couple-anniv-list{display:flex;flex-direction:column;gap:8px}
.couple-anniv{display:grid;grid-template-columns:auto 1fr;gap:10px;align-items:flex-start;border-top:2px dashed rgba(17,17,17,.45);padding-top:8px}
.couple-anniv:first-child{border-top:none;padding-top:0}
.couple-anniv-date{min-width:58px;border:2px solid #111;background:#111;color:#fff;text-align:center;font-family:var(--fontd);font-size:12px;font-weight:900;padding:4px 6px}
.couple-anniv-title{font-family:var(--fontd);font-size:14px;font-weight:900}
.couple-anniv-note{margin-top:2px;font-size:11px;color:#666;font-weight:800;line-height:1.4}
.couple-empty{border:2px dashed rgba(17,17,17,.45);padding:14px;font-size:12px;font-weight:900;color:#666;text-align:center}
.family-card-modal{display:flex;flex-direction:column;gap:12px}
.family-card-title{position:relative;align-self:center;width:max-content;max-width:100%;padding:0 2px 5px;font-family:var(--fontd);font-size:22px;font-weight:900;text-align:center}
.family-card-title::after{content:'';position:absolute;left:0;right:0;bottom:0;border-bottom:3px dashed rgba(17,17,17,.64)}
.family-select{width:100%;border:1.5px solid rgba(17,17,17,.84);border-radius:8px;background:#fff;box-shadow:0 8px 18px rgba(0,0,0,.08);padding:12px 13px;font-family:var(--fontd);font-size:15px;font-weight:900;outline:none}
.family-mode-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.family-mode-btn{border:1.5px solid #111;border-radius:999px;background:#fff;box-shadow:0 8px 18px rgba(0,0,0,.08);padding:10px 13px;display:flex;align-items:center;justify-content:space-between;font-family:var(--fontd);font-size:16px;font-weight:900;cursor:pointer}
.family-mode-btn .check{font-size:18px;line-height:1}
.family-line{height:1px;border-top:2px dashed rgba(17,17,17,.36);background:transparent}
.family-amount-wrap{display:flex;flex-direction:column;gap:6px;padding-top:2px}
.family-amount-label{font-family:var(--fontd);font-size:15px;font-weight:900;color:#666}
.family-amount-input{width:100%;border:none;border-bottom:2px solid #0a0a0a;background:transparent;padding:8px 4px 10px;font-family:var(--fontd);font-size:44px;font-weight:900;text-align:center;outline:none}
.family-active-list{display:flex;flex-direction:column;gap:10px}
.family-active-card{border:1.5px solid rgba(17,17,17,.84);border-radius:8px;background:rgba(255,255,255,.96);box-shadow:0 10px 24px rgba(0,0,0,.08);padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.family-active-title{font-family:var(--fontd);font-size:15px;font-weight:900}
.family-active-sub{margin-top:4px;font-size:11px;color:#666;font-weight:800}
.family-unlink-btn{min-width:58px;height:32px;border:1.5px solid #111;border-radius:999px;background:#111;color:#fff;-webkit-text-fill-color:#fff;box-shadow:0 8px 18px rgba(0,0,0,.1);font-family:var(--fontd);font-size:12px;font-weight:900;cursor:pointer}
.qq-bottom-nav{position:fixed;left:12px;right:12px;bottom:calc(10px + var(--safe-bottom));z-index:95;display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
.qq-bottom-btn > span:not(.nav-icon){display:none}
.qq-bottom-btn{gap:0;font-size:0}
.qq-bottom-btn{border:none;background:transparent;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:#7a7a80;font-family:var(--fontd);font-size:10px;font-weight:900;cursor:pointer}
.qq-bottom-btn:active{transform:translateY(1px)}
.qq-bottom-btn .nav-icon{width:46px;height:46px;border:2px solid #111;border-radius:999px;background:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 10px 20px rgba(0,0,0,.12)}
.qq-bottom-btn .nav-icon img{width:28px;height:28px;object-fit:contain;display:block;filter:brightness(0)}
.qq-bottom-btn.active{color:#111}
.qq-bottom-btn.active .nav-icon{background:#111}
.qq-bottom-btn.active .nav-icon img{filter:brightness(0) invert(1)}
</style>
</head>

<script>
let toastTimer = null;

function goBackQQ(){ window.location.href = 'qq.html'; }
function openChatHub(){ window.location.href = 'qq.html'; }
function openMomentsPage(){ window.location.href = 'qq_moments.html'; }
async function openArchivePage(){ await openCouplePage(); }
function shouldAutoOpenCouplePage(){
  try{ return new URLSearchParams(window.location.search || '').get('couple') === '1'; }catch(err){ return false; }
}
function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),1700); }
function toast(msg){ showToast(msg); }
function closeOverlay(id){ const el=document.getElementById(id); if(el) el.classList.remove('open'); }
function setArchiveNavActive(activeState){
  const archive=document.getElementById('archiveNavBtn');
  const profile=document.getElementById('profileNavBtn');
  if(archive) archive.classList.toggle('active', !!activeState);
  if(profile) profile.classList.toggle('active', !activeState);
}

function hideParentTopbar(){
  const docs=[];
  try{ if(window.parent && window.parent!==window && window.parent.document) docs.push(window.parent.document); }catch(e){}
  try{ if(window.top && window.top!==window && window.top.document) docs.push(window.top.document); }catch(e){}
  docs.forEach((doc)=>{ try{ const bar=doc.querySelector('.app-topbar'); if(bar){ bar.dataset.prevDisplay=bar.style.display||''; bar.style.display='none'; } const frame=doc.getElementById('app-iframe'); if(frame){ frame.dataset.prevMarginTop=frame.style.marginTop||''; frame.style.marginTop='0'; } }catch(err){} });
}
function restoreParentTopbar(){
  const docs=[];
  try{ if(window.parent && window.parent!==window && window.parent.document) docs.push(window.parent.document); }catch(e){}
  try{ if(window.top && window.top!==window && window.top.document) docs.push(window.top.document); }catch(e){}
  docs.forEach((doc)=>{ try{ const bar=doc.querySelector('.app-topbar'); if(bar) bar.style.display=bar.dataset.prevDisplay||''; const frame=doc.getElementById('app-iframe'); if(frame) frame.style.marginTop=frame.dataset.prevMarginTop||''; }catch(err){} });
}

function loadStoredAsset(key){ if(window.assetStore) return window.assetStore.load(key); try{ return Promise.resolve(localStorage.getItem(key)||''); }catch(e){ return Promise.resolve(''); } }
function saveStoredAsset(key, value){ if(window.assetStore) return window.assetStore.saveOrFallback(key, value); try{ if(value) localStorage.setItem(key, value); else localStorage.removeItem(key); return Promise.resolve(true);}catch(e){ return Promise.resolve(false);} }

function active(){ return window.AccountManager.getActive(); }
function walletKey(){ return window.AccountManager.scopedKey('qq_wallet_state'); }
function familyQueueKey(){ return window.AccountManager.scopedKey('qq_family_card_queue'); }
function familyActiveKey(){ return window.AccountManager.scopedKey('qq_family_card_active'); }
function moneyStateStorageId(){ return window.AccountManager.scopedKey('chat_money_state'); }
let profileMoneyStateCache = { walletState:{ balance:0, records:[] }, familyQueue:[], familyActive:[] };
let profileFavoritesCache = [];

function favoritesStoreId(){ return window.AccountManager.scopedKey('favorites_store'); }
function normalizeFavoriteEntries(list){
  return (Array.isArray(list) ? list : []).filter((item)=>item && typeof item==='object').map((item)=>({
    id:String(item.id||'').trim() || ('fav_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,7)),
    from:String(item.from||'').trim(),
    charId:String(item.charId||'').trim(),
    name:String(item.name||'').trim(),
    avatar:String(item.avatar||'').trim(),
    text:String(item.text||'').trim(),
    previewText:String(item.previewText||'').trim(),
    type:normalizeFavoriteType(item.type||'text'),
    richPayload:String(item.richPayload||'').trim(),
    richPayloadAssetKey:String(item.richPayloadAssetKey||'').trim(),
    at:Number(item.at||Date.now())||Date.now()
  }));
}
function getCurrentFavorites(){ return normalizeFavoriteEntries(profileFavoritesCache.length ? profileFavoritesCache : ((active()&&active().favorites)||[])); }
function syncFavoriteCount(){ const el=document.getElementById('favCount'); if(el) el.textContent = getCurrentFavorites().length + '条'; }
async function hydrateFavoritesCache(){
  let accountFavs = normalizeFavoriteEntries((active() && active().favorites) || []);
  let finalFavs = accountFavs.slice();
  if(window.PhoneStorage && typeof window.PhoneStorage.getJson === 'function'){
    try{
      const stored = normalizeFavoriteEntries(await window.PhoneStorage.getJson(favoritesStoreId()));
      if(stored.length){
        finalFavs = stored.slice();
        if(stored.length !== accountFavs.length){
          try{ window.AccountManager.updateActive((a)=>{ a.favorites = stored.slice(0, 200); }); }catch(syncErr){}
        }
      }else if(accountFavs.length && typeof window.PhoneStorage.putJson === 'function'){
        window.PhoneStorage.putJson(favoritesStoreId(), accountFavs.slice(0, 200)).catch(()=>{});
      }
    }catch(err){}
  }
  profileFavoritesCache = finalFavs.slice(0, 200);
  syncFavoriteCount();
  return profileFavoritesCache.slice();
}
function saveFavoritesEverywhere(nextList){
  const safe = normalizeFavoriteEntries(nextList).slice(0, 200);
  profileFavoritesCache = safe;
  try{ window.AccountManager.updateActive((a)=>{ a.favorites = safe.slice(); }); }catch(err){}
  if(window.PhoneStorage && typeof window.PhoneStorage.putJson === 'function'){
    window.PhoneStorage.putJson(favoritesStoreId(), safe).catch(()=>{});
  }
  syncFavoriteCount();

function chooseCoupleHistory(best, next){

function loadFirstRenderableAvatar(keys){

function bindAvatarInput(){ document.getElementById('avatarInput').addEventListener('change', async (e)=>{ const f=e.target.files&&e.target.files[0]; if(!f) return; const r=new FileReader(); r.onload=async ()=>{ const data=String(r.result||''); const av=document.getElementById('avatarBtn'); if(av){ av.style.backgroundImage='url(' + JSON.stringify(data).slice(1,-1) + ')'; av.textContent=''; } try{ window.AccountManager.updateActive(a=>{ a.avatar=data; }); }catch(accountErr){} const scopedProfileKey=window.AccountManager.scopedKey('qq_profile_avatar_asset'); const scopedUserKey=window.AccountManager.scopedKey('user_avatar'); const scopedMomentsAvatarKey=window.AccountManager.scopedKey('qq_moments_hero_avatar_asset'); const scopedMomentsLegacyKey=window.AccountManager.scopedKey('qq_moments_hero_avatar'); try{ localStorage.setItem(scopedProfileKey, data); localStorage.setItem(scopedUserKey, data); localStorage.setItem(scopedMomentsAvatarKey, data); localStorage.setItem(scopedMomentsLegacyKey, data); localStorage.setItem('qq_profile_avatar_asset', data); localStorage.setItem('qq_moments_hero_avatar_asset', data); localStorage.setItem('qq_moments_hero_avatar', data); localStorage.setItem('user_avatar', data); }catch(storageErr){} await Promise.all([ saveStoredAsset(scopedProfileKey, data), saveStoredAsset(scopedUserKey, data), saveStoredAsset(scopedMomentsAvatarKey, data), saveStoredAsset(scopedMomentsLegacyKey, data), saveStoredAsset('qq_profile_avatar_asset', data), saveStoredAsset('qq_moments_hero_avatar_asset', data), saveStoredAsset('qq_moments_hero_avatar', data), saveStoredAsset('user_avatar', data) ]); renderProfile(); postProfilePreviewUpdate(); try{ window.parent.postMessage({ type:'USER_AVATAR_UPDATED', payload:{ src:data } }, '*'); }catch(err){} showToast('头像已更新'); }; r.readAsDataURL(f); e.target.value=''; }); }
function normalizeFavoriteType(type){
  const safe = String(type || '').trim().toLowerCase();
  if(safe === 'rich_html' || safe === 'richhtml' || safe === 'html_card') return 'richhtml';
  if(safe === 'voice_message' || safe === 'voice') return 'voice';
  if(safe === 'image_message' || safe === 'image') return 'image';
  if(safe === 'meme_message' || safe === 'meme') return 'meme';
  return safe || 'text';
}
function parseFavoriteRichPayload(raw){
  if(!raw) return null;
  let parsed = null;
  if(typeof raw === 'object'){
    parsed = raw;
  }else{
    try{ parsed = JSON.parse(String(raw || '')); }catch(err){ parsed = null; }
  }
  if(!parsed || typeof parsed !== 'object') return null;
  if(parsed.type){
    const safeType = normalizeFavoriteType(parsed.type);
    if(safeType === 'richhtml'){
      return parseFavoriteRichPayload(parsed.content || parsed.richPayload || null);
    }
  }
  const html = String(parsed.html || '').trim();
  const css = String(parsed.css || '').trim();
  const js = String(parsed.js || '').trim();
  const summary = String(parsed.summary || '').trim();
  const text = String(parsed.text || '').trim();
  if(!html && !summary && !text) return null;
  return { html, css, js, summary, text };
}
function buildFavoriteRichSrcdoc(payload){
  const data = payload && typeof payload === 'object' ? payload : { html:'', css:'', js:'', summary:'', text:'' };
  let html = String(data.html || '').trim();
  const css = String(data.css || '').trim();
  const js = String(data.js || '').trim();
  const summary = String(data.summary || data.text || 'SURPRISE').trim() || 'SURPRISE';
  if(!html){
    html = '<section style="padding:16px 14px;display:flex;align-items:center;justify-content:center;min-height:120px;border:2px solid #111;border-radius:16px;background:linear-gradient(180deg,#fff,#f2f2f2);font-family:-apple-system,BlinkMacSystemFont,\'SF Pro Text\',\'PingFang SC\',sans-serif;font-size:14px;font-weight:800;color:#111;">'
      + esc(summary) + '</section>';
  }
  return '<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">'
    + '<style>html,body{margin:0;padding:0;background:#fff;color:#111;font-family:-apple-system,BlinkMacSystemFont,\'SF Pro Text\',\'PingFang SC\',sans-serif;overflow:auto}*,*:before,*:after{box-sizing:border-box}'
    + css + '</style></head><body>' + html + (js ? ('<script>' + js + '<\/script>') : '') + '</body></html>';
}
function getFavoritePreviewText(fav){
  const item = fav && typeof fav === 'object' ? fav : {};
  const previewText = String(item.previewText || '').trim();
  if(previewText) return previewText;
  const kind = normalizeFavoriteType(item.type || 'text');
  if(kind === 'richhtml') return '【SURPRISE】';
  if(kind === 'voice') return '【语音消息】';
  if(kind === 'image') return '【图片】';
  if(kind === 'meme') return '【表情包】';
  if(kind === 'text' && String(item.text || '').trim().startsWith('{')){
    const maybeRich = parseFavoriteRichPayload(item.text);
    if(maybeRich) return '【SURPRISE】';
    try{
      const parsed = JSON.parse(String(item.text || ''));
      if(parsed && typeof parsed === 'object' && parsed.content){
        const parsedKind = normalizeFavoriteType(parsed.type || 'text');
        if(parsedKind === 'richhtml') return '【SURPRISE】';
        return String(parsed.content || '').trim() || '空消息';
      }
    }catch(err){}
  }
  return String(item.text || '').trim() || '空消息';
}
function openFavoriteRichFullscreen(frameId){
  const overlay = document.getElementById('favRichFullOverlay');
  const fullFrame = document.getElementById('favRichFullFrame');
  const sourceFrame = frameId ? document.getElementById(frameId) : null;
  if(!overlay || !fullFrame || !sourceFrame) return;
  fullFrame.srcdoc = String(sourceFrame.srcdoc || '');
  overlay.classList.add('open');
}
function closeFavoriteRichFullscreen(){
  const overlay = document.getElementById('favRichFullOverlay');
  const fullFrame = document.getElementById('favRichFullFrame');
  if(overlay) overlay.classList.remove('open');
  if(fullFrame) fullFrame.srcdoc = '';
}
function renderFavoriteBody(fav, frameId){
  const item = fav && typeof fav === 'object' ? fav : {};
  const kind = normalizeFavoriteType(item.type || 'text');
  const richKey = String(item.richPayloadAssetKey || '').trim();
  const richPayload = kind === 'richhtml'
    ? (parseFavoriteRichPayload(item.richPayload || item.text) || parseFavoriteRichPayload(item.text))
    : parseFavoriteRichPayload(item.richPayload || '');
  if(kind === 'richhtml' || richPayload || richKey){
    const fallbackPayload = { html:'', css:'', js:'', summary:'SURPRISE', text:'SURPRISE' };
    const srcdoc = buildFavoriteRichSrcdoc(richPayload || fallbackPayload);
    const keyAttr = richKey ? (' data-rich-key="' + escAttr(richKey) + '"') : '';
    return '<div class="fav-rich-wrap"><div class="fav-rich-head"><span class="fav-rich-tag">SURPRISE</span><button class="fav-rich-expand" type="button" onclick="openFavoriteRichFullscreen(\'' + escAttr(frameId || '') + '\')"><img src="assets/屏幕放大.png" alt="放大"></button></div><iframe id="' + escAttr(frameId || '') + '" class="fav-rich-frame" loading="lazy" sandbox="allow-scripts"' + keyAttr + ' srcdoc="' + escAttr(srcdoc) + '"></iframe></div><div class="fav-rich-hint">【SURPRISE】</div>';
  }
  return '<div class="fav-text">' + esc(getFavoritePreviewText(item)) + '</div>';
}
function hydrateFavoriteRichFrames(){
  const list = document.getElementById('favList');
  if(!list || !window.assetStore || typeof window.assetStore.load !== 'function') return;
  list.querySelectorAll('.fav-rich-frame[data-rich-key]').forEach((frame)=>{
    const key = String(frame.getAttribute('data-rich-key') || '').trim();
    if(!key) return;
    window.assetStore.load(key).then((raw)=>{
      const payload = parseFavoriteRichPayload(raw);
      if(!payload) return;
      frame.srcdoc = buildFavoriteRichSrcdoc(payload);
      frame.removeAttribute('data-rich-key');
    }).catch(()=>{});
  });
}
function renderFavorites(){
  const list = document.getElementById('favList');
  const favs = getCurrentFavorites();
  if(!favs.length){
    list.innerHTML = '<div class="sub">还没有收藏，去聊天里长按消息收藏吧。</div>';
    return;
  }
  try{
    list.innerHTML = favs.map((f)=>{
      const frameId = 'favRichFrame_' + (String(f.id || '').replace(/[^a-zA-Z0-9_-]/g, '') || Math.random().toString(36).slice(2,8));
      return '<article class="fav-item" data-fav-id="' + escAttr(f.id || '') + '">' + renderFavoriteAvatar(f) + '<div class="fav-meta"><div class="fav-name">' + esc(f.name || '未命名') + '</div><div class="fav-time">' + fmtTime(f.at) + '</div>' + renderFavoriteBody(f, frameId) + '</div></article>';
    }).join('');
  }catch(err){
    list.innerHTML = favs.map((f)=>{
      const preview = getFavoritePreviewText(f);
      return '<article class="fav-item" data-fav-id="' + escAttr(f.id || '') + '">' + renderFavoriteAvatar(f) + '<div class="fav-meta"><div class="fav-name">' + esc(f.name || '未命名') + '</div><div class="fav-time">' + fmtTime(f.at) + '</div><div class="fav-text">' + esc(preview) + '</div></div></article>';
    }).join('');
  }
  bindFavoriteSwipeDelete();
  hydrateFavoriteRichFrames();
  hydrateFavoriteAvatarNodes();
}
async function openFavorites(){ await hydrateFavoritesCache(); renderFavorites(); document.getElementById('favOverlay').classList.add('open'); }
function removeFavoriteById(id){
  if(!id) return;
  const next = getCurrentFavorites().filter((it)=>String(it&&it.id||'')!==String(id));
  saveFavoritesEverywhere(next);
  renderProfile();
  renderFavorites();
}
function confirmRemoveFavorite(id){ confirmModal('取消收藏','确定取消收藏？',()=>{ removeFavoriteById(id); }); }
function bindFavoriteSwipeDelete(){ const list=document.getElementById('favList'); if(!list) return; list.querySelectorAll('.fav-item').forEach((item)=>{ let startX=0,startY=0,dx=0,dragging=false,pointerId=null; const reset=()=>{ item.classList.remove('swiping'); item.style.transform=''; dragging=false; pointerId=null; }; item.addEventListener('pointerdown',(e)=>{ if(e.pointerType==='mouse'&&e.button!==0) return; pointerId=e.pointerId; startX=e.clientX; startY=e.clientY; dx=0; dragging=true; item.classList.add('swiping'); try{ item.setPointerCapture(pointerId); }catch(err){} }); item.addEventListener('pointermove',(e)=>{ if(!dragging || (pointerId!==null&&e.pointerId!==pointerId)) return; const moveX=e.clientX-startX; const moveY=e.clientY-startY; if(Math.abs(moveY)>16 && Math.abs(moveY)>Math.abs(moveX)){ reset(); return; } dx=Math.min(0,Math.max(-68,moveX)); item.style.transform='translateX(' + dx + 'px)'; }); item.addEventListener('pointerup',(e)=>{ if(!dragging || (pointerId!==null&&e.pointerId!==pointerId)) return; const swipe=dx; const id=item.getAttribute('data-fav-id')||''; reset(); if(swipe<=-42){ confirmRemoveFavorite(id); } }); item.addEventListener('pointercancel',reset); item.addEventListener('lostpointercapture',reset); }); }
function renderAccountList(){ const list=document.getElementById('accountList'); const accounts=window.AccountManager.ensure(); const activeId=active().id; const defaultId=window.AccountManager.getDefaultId(); list.innerHTML=accounts.map((a)=>'<div class="account-item"><div class="account-main"><strong>'+esc(a.name||'未命名')+'</strong><div class="badges">'+(a.id===activeId?'<span class="badge">当前</span>':'')+(a.id===defaultId?'<span class="badge">默认</span>':'')+'</div></div><div class="actions"><button type="button" onclick="switchAccount(\''+escAttr(a.id)+'\')">切换</button><button type="button" onclick="setDefaultAccount(\''+escAttr(a.id)+'\')">设为默认</button></div></div>').join(''); }
function openAccountCenter(){ renderAccountList(); document.getElementById('accountOverlay').classList.add('open'); }
function confirmModal(title,desc,onConfirm){ const m=document.getElementById('confirmModal'); m.innerHTML='<h3>'+esc(title)+'</h3><div class="sub">'+esc(desc)+'</div><div class="actions"><button type="button" onclick="closeOverlay(\'confirmOverlay\')">取消</button><button type="button" id="confirmYesBtn">确认</button></div>'; document.getElementById('confirmOverlay').classList.add('open'); document.getElementById('confirmYesBtn').onclick=function(){ closeOverlay('confirmOverlay'); onConfirm&&onConfirm(); }; }
function createAccountAction(){ const accounts=window.AccountManager.ensure(); if(accounts.length>=2){ showToast('最多只能拥有两个账号'); return; } confirmModal('创建新账号','创建后将切换到新账号并重置为默认头像与名字，继续吗？',()=>{ const res=window.AccountManager.createAccount(); if(!res){ showToast('创建失败'); return; } location.reload(); }); }
function switchAccount(id){ window.AccountManager.setActive(id); location.reload(); }
function setDefaultAccount(id){ window.AccountManager.setDefault(id); renderAccountList(); showToast('已设为默认账号'); }
function confirmDeleteAccount(){ const acc=active(); confirmModal('删除账号','删除后该账号的聊天与朋友圈数据会被清空，确认删除？',()=>{ const res=window.AccountManager.deleteAccount(acc.id); if(!res.ok){ if(res.reason==='default') showToast('不能删除默认账号，请先切换默认账号'); else if(res.reason==='need_one') showToast('至少要保留一个账号'); else showToast('删除失败'); return; } location.reload(); }); }

function esc(s){ return String(s||'').replace(/[&<>\"]/g,(m)=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[m])); }
function escAttr(s){ return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtTime(ts){ const d=new Date(ts||Date.now()); const p=(n)=>String(n).padStart(2,'0'); return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())+' '+p(d.getHours())+':'+p(d.getMinutes()); }

document.getElementById('nameInput').addEventListener('change', saveName);
document.getElementById('nameInput').addEventListener('blur', saveName);
['accountOverlay','favOverlay','confirmOverlay','favRichFullOverlay'].forEach((id)=>{ const el=document.getElementById(id); if(!el) return; el.addEventListener('click',(evt)=>{ if(evt.target!==el) return; if(id==='favRichFullOverlay') closeFavoriteRichFullscreen(); else el.classList.remove('open'); }); });

window.AccountManager.ensure();
bindAvatarInput();
hideParentTopbar();

window.addEventListener('pagehide', restoreParentTopbar);
Promise.all([
  hydrateMoneyStateCache(),
  hydrateFavoritesCache(),
  resolveProfileAvatar()
]).then((results)=>{ const src=results[2]; if(src){ try{ window.AccountManager.updateActive((a)=>{ a.avatar=src; }); }catch(err){} } renderProfile(); renderWallet(); if(shouldAutoOpenCouplePage()) openCouplePage(); }).catch(()=>{ renderProfile(); renderWallet(); if(shouldAutoOpenCouplePage()) openCouplePage(); });
