<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>个人中心</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<script src="../accountManager.js"></script>
<script src="../assetStore.js"></script>
<script src="./paymentCommon.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--b:#0a0a0a;--w:#fff;--off:#f5f5f5;--g:#666;--bd:2px solid #0a0a0a;--sh:2px 2px 0 #0a0a0a;--font:'Quicksand',sans-serif;--fontd:'Nunito',sans-serif;--safe-top:max(env(safe-area-inset-top),0px)}
html,body{width:100%;height:100%}
body{font-family:var(--font);background:var(--off);color:var(--b);padding:calc(8px + var(--safe-top)) 12px 14px;overflow:auto}
button,input,textarea{color:var(--b);-webkit-text-fill-color:var(--b)}
.profile-topbar{position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:center;height:48px;border:var(--bd);border-radius:14px;background:linear-gradient(180deg,#fff 0%,#efefef 100%);box-shadow:var(--sh);margin-bottom:10px}
.top-heart{position:absolute;left:8px;top:50%;transform:translateY(-50%);width:34px;height:34px;border:var(--bd);border-radius:10px;background:#fff;display:flex;align-items:center;justify-content:center;box-shadow:var(--sh);cursor:pointer}
.top-heart:active{transform:translateY(-50%) translate(1px,1px);box-shadow:1px 1px 0 #0a0a0a}
.top-heart svg{width:18px;height:18px;display:block;fill:#0a0a0a}
.top-title{font-family:var(--fontd);font-size:17px;font-weight:900;letter-spacing:.02em}
.card{border:var(--bd);border-radius:22px;background:linear-gradient(180deg,#fff 0%,#f0f0f0 100%);box-shadow:var(--sh)}
.id{padding:12px}
.id-row{display:flex;gap:12px;align-items:center}
.avatar{width:92px;height:92px;border:var(--bd);border-radius:18px;background:#eee center/cover no-repeat;display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:900;cursor:pointer;box-shadow:var(--sh);color:#0a0a0a}
.name-wrap{flex:1;display:flex;flex-direction:column;gap:6px}
.label{font-size:10px;font-weight:800;color:var(--g);letter-spacing:.06em;text-transform:uppercase}
.name-input{width:100%;border:var(--bd);border-radius:12px;padding:10px 12px;font-family:var(--fontd);font-size:15px;font-weight:900;background:#fff;outline:none}
.hint{font-size:11px;color:#555;font-weight:700;line-height:1.5;margin-top:8px}
.section{margin-top:12px;padding:10px 12px}
.row-btn{width:100%;display:flex;align-items:center;justify-content:space-between;border:var(--bd);border-radius:14px;background:#fff;padding:12px 12px;box-shadow:var(--sh);font-family:var(--fontd);font-weight:900;font-size:14px;cursor:pointer}
.row-btn + .row-btn{margin-top:8px}
.row-btn:active{transform:translate(1px,1px);box-shadow:1px 1px 0 #0a0a0a}
.row-sub{font-size:11px;color:#666;font-weight:700}
.del-wrap{margin-top:18px}
.del-btn{width:100%;border:var(--bd);border-radius:14px;background:#e55;color:#fff;padding:12px 10px;box-shadow:var(--sh);font-family:var(--fontd);font-size:14px;font-weight:900;cursor:pointer}
.del-btn:active{transform:translate(1px,1px);box-shadow:1px 1px 0 #0a0a0a}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.28);display:none;align-items:center;justify-content:center;padding:18px;z-index:80}
.overlay.open{display:flex}
.modal{width:min(330px,100%);border:var(--bd);border-radius:20px;background:#fff;box-shadow:4px 4px 0 #0a0a0a;padding:14px;display:flex;flex-direction:column;gap:10px}
.modal h3{font-family:var(--fontd);font-size:16px;font-weight:900}
.modal .sub{font-size:12px;color:#666;font-weight:700;line-height:1.5}
.actions{display:flex;gap:8px}
.actions button,.account-item button{flex:1;border:var(--bd);border-radius:12px;background:#fff;box-shadow:var(--sh);padding:10px;font-family:var(--fontd);font-size:12px;font-weight:900;cursor:pointer}
.actions button:active,.account-item button:active{transform:translate(1px,1px);box-shadow:1px 1px 0 #0a0a0a}
.account-list{display:flex;flex-direction:column;gap:8px;max-height:280px;overflow:auto}
.account-item{border:var(--bd);border-radius:14px;background:#f7f7f7;padding:10px;display:flex;flex-direction:column;gap:8px}
.account-main{display:flex;align-items:center;justify-content:space-between;gap:8px}
.badges{display:flex;gap:6px;flex-wrap:wrap}
.badge{font-size:9px;border:var(--bd);border-radius:999px;padding:2px 7px;font-weight:900;background:#111;color:#fff}
.fav-list{display:flex;flex-direction:column;gap:8px;max-height:360px;overflow:auto;padding:2px 0 2px 0;-webkit-overflow-scrolling:touch}
.fav-item{width:calc(100% - 6px);margin:0 auto;border:var(--bd);border-radius:14px;background:#f8f8f8;box-shadow:var(--sh);padding:10px;display:flex;gap:10px;touch-action:pan-y;transition:transform .15s ease}
.fav-item.swiping{transition:none}
.fav-av{width:36px;height:36px;border:var(--bd);border-radius:10px;background:#eee center/cover no-repeat;flex-shrink:0}
.fav-meta{min-width:0;flex:1}
.fav-name{font-family:var(--fontd);font-size:12px;font-weight:900}
.fav-time{font-size:10px;color:#666;font-weight:700}
.fav-text{font-size:12px;font-weight:700;line-height:1.5;word-break:break-word;white-space:pre-wrap}
.toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(10px);background:#111;color:#fff;padding:8px 14px;border-radius:999px;font-size:12px;font-weight:800;opacity:0;transition:all .2s;pointer-events:none;z-index:99}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#avatarInput{display:none}
.wallet-page{position:fixed;inset:0;background:var(--off);display:none;flex-direction:column;padding:calc(10px + var(--safe-top)) 12px 14px;z-index:90;overflow:auto}
.wallet-page.open{display:flex}
.wallet-topbar{position:sticky;top:0;z-index:5;display:flex;align-items:center;justify-content:center;min-height:48px;margin-bottom:14px}
.wallet-title{font-family:var(--fontd);font-size:28px;font-weight:900;letter-spacing:.02em}
.wallet-heart{position:absolute;left:0;top:0;width:40px;height:40px;border:var(--bd);border-radius:12px;background:#fff;display:flex;align-items:center;justify-content:center;box-shadow:var(--sh);cursor:pointer}
.wallet-heart:active{transform:translate(1px,1px);box-shadow:1px 1px 0 #0a0a0a}
.wallet-heart svg{width:18px;height:18px;display:block;fill:#0a0a0a}
.wallet-balance-card{border:var(--bd);border-radius:34px;background:linear-gradient(180deg,#f7f7f7 0%,#ececec 100%);padding:22px 18px 18px;box-shadow:var(--sh);position:relative}
.wallet-badge{display:inline-flex;align-items:center;justify-content:center;min-width:94px;height:52px;border:var(--bd);border-radius:999px;background:#fff;font-family:var(--fontd);font-size:22px;font-weight:900;padding:0 18px}
.wallet-amount{font-family:var(--fontd);font-size:54px;line-height:1;font-weight:900;margin:24px 0 34px;letter-spacing:-.03em}
.wallet-recharge-btn{position:absolute;right:18px;bottom:18px;min-width:116px;height:52px;border:var(--bd);border-radius:999px;background:#fff;box-shadow:var(--sh);font-family:var(--fontd);font-size:24px;font-weight:900;cursor:pointer}
.wallet-strip{margin-top:14px;border:var(--bd);border-radius:16px;background:#fff;box-shadow:var(--sh);padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.wallet-strip-title{font-family:var(--fontd);font-size:18px;font-weight:900}
.wallet-plus{width:42px;height:42px;border:var(--bd);border-radius:999px;background:#fff;box-shadow:var(--sh);font-family:var(--fontd);font-size:28px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center}
.wallet-divider{height:2px;background:#9a9a9a;margin:18px 6px 16px;opacity:.8}
.wallet-records{display:flex;flex-direction:column;gap:12px}
.wallet-record{border:var(--bd);border-radius:20px;background:#f4f4f4;box-shadow:var(--sh);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;cursor:pointer}
.wallet-record:active{transform:translate(1px,1px);box-shadow:1px 1px 0 #0a0a0a}
.wallet-record-title{font-size:16px;font-weight:900;line-height:1.3}
.wallet-record-sub{font-size:11px;color:#666;font-weight:700;margin-top:4px}
.wallet-record-amount{font-family:var(--fontd);font-size:18px;font-weight:900}
.wallet-empty{padding:22px 10px;color:#666;font-size:12px;font-weight:700;text-align:center}
.wallet-input{width:100%;border:var(--bd);border-radius:14px;background:#fff;padding:12px 14px;font-family:var(--font);font-size:16px;font-weight:700;outline:none}
.family-sheet{border:var(--bd);border-radius:34px;background:linear-gradient(180deg,#f7f7f7 0%,#ececec 100%);padding:18px 16px;display:flex;flex-direction:column;gap:12px}
.family-title{font-family:var(--fontd);font-size:26px;font-weight:900;text-align:center}
.family-target{border:var(--bd);border-radius:18px;background:#fff;padding:16px 12px;font-size:17px;font-weight:900;text-align:center}
.family-mode-row{display:flex;align-items:center;justify-content:space-between;padding:6px 10px 2px;border-bottom:2px solid #999}
.family-mode{display:flex;align-items:center;gap:10px;font-family:var(--fontd);font-size:18px;font-weight:900;color:#666}
.family-dot{width:24px;height:24px;border:var(--bd);border-radius:999px;background:#fff;cursor:pointer}
.family-dot.on{background:#111}
.family-dot.on::after{content:'';display:block;width:10px;height:10px;border-radius:999px;background:#fff;margin:5px auto 0}
.family-limit-label{font-family:var(--fontd);font-size:18px;font-weight:900;color:#666}
.family-amount{border-bottom:2px solid #999;padding:18px 8px 10px;text-align:center}
.family-amount input{width:100%;border:none;background:transparent;font-family:var(--fontd);font-size:54px;font-weight:900;text-align:center;outline:none}
.payment-preview-list{display:flex;flex-direction:column;gap:12px;margin-top:6px}
.payment-preview-card{border:var(--bd);border-radius:22px;background:#f4f4f4;box-shadow:var(--sh);padding:10px 12px;display:flex;align-items:center;gap:10px}
.payment-preview-card.alt{margin-left:34px}
.payment-preview-avatar{width:54px;height:54px;border:var(--bd);border-radius:999px;background:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--fontd);font-size:18px;font-weight:900;flex-shrink:0}
.payment-preview-text{flex:1;font-size:16px;line-height:1.35;font-weight:900;color:#666}
.record-detail{display:flex;flex-direction:column;gap:8px;font-size:13px;font-weight:700;line-height:1.5}
</style>
</head>
<body>
  <div class="profile-topbar">
    <button class="top-heart" type="button" title="返回QQ" onclick="goBackQQ()">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09A6 6 0 0 1 16.5 3C19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54z"/></svg>
    </button>
    <div class="top-title">个人设置</div>
  </div>
  <section class="card id">
    <div class="id-row">
      <button class="avatar" id="avatarBtn" type="button" onclick="pickAvatar()">+</button>
      <div class="name-wrap">
        <div class="label">Display Name</div>
        <input class="name-input" id="nameInput" maxlength="24" placeholder="我哥天下第一好">
      </div>
    </div>
    <div class="hint">这里修改会同步到朋友圈头像和名字。</div>
  </section>

  <section class="card section">
    <button class="row-btn" type="button" onclick="openWalletPage()">
      <span>支付与服务</span><span class="row-sub" id="walletSub">钱包</span>
    </button>
    <button class="row-btn" type="button" onclick="openFavorites()">
      <span>收藏</span><span class="row-sub" id="favCount">0条</span>
    </button>
    <button class="row-btn" type="button" onclick="openAccountCenter()">
      <span>账号</span><span class="row-sub">切换 / 创建</span>
    </button>
  </section>

  <div class="del-wrap">
    <button class="del-btn" type="button" onclick="confirmDeleteAccount()">删除当前账号</button>
  </div>

  <input id="avatarInput" type="file" accept="image/*,.png,.jpg,.jpeg,.webp,.gif,.bmp,.svg">

  <div class="overlay" id="accountOverlay">
    <div class="modal">
      <h3>账号中心</h3>
      <div class="account-list" id="accountList"></div>
      <div class="actions">
        <button type="button" onclick="createAccountAction()">创建账号</button>
        <button type="button" onclick="closeOverlay('accountOverlay')">关闭</button>
      </div>
    </div>
  </div>

  <div class="overlay" id="favOverlay">
    <div class="modal">
      <h3>收藏</h3>
      <div class="fav-list" id="favList"></div>
      <div class="actions"><button type="button" onclick="closeOverlay('favOverlay')">关闭</button></div>
    </div>
  </div>

  <div class="overlay" id="confirmOverlay">
    <div class="modal" id="confirmModal"></div>
  </div>

  <div class="wallet-page" id="walletPage">
    <div class="wallet-topbar">
      <button class="wallet-heart" type="button" onclick="closeWalletPage()">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09A6 6 0 0 1 16.5 3C19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54z"/></svg>
      </button>
      <div class="wallet-title">钱包</div>
    </div>
    <section class="wallet-balance-card">
      <div class="wallet-badge">余额</div>
      <div class="wallet-amount" id="walletAmount">¥0.00</div>
      <button class="wallet-recharge-btn" type="button" onclick="openRechargeModal()">充值</button>
    </section>
    <section class="wallet-strip">
      <div class="wallet-strip-title">开通亲密付</div>
      <button class="wallet-plus" type="button" onclick="openFamilyModal()">+</button>
    </section>
    <div class="wallet-divider"></div>
    <section class="wallet-records" id="walletRecords"></section>
  </div>

  <div class="toast" id="toast"></div>

<script>
let toastTimer = null;
function goBackQQ(){ window.location.href = 'qq.html'; }

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 1700);
}
function toast(msg){ showToast(msg); }
function closeOverlay(id){ const el=document.getElementById(id); if(el) el.classList.remove('open'); }

function hideParentTopbar(){
  const docs = [];
  try{ if(window.parent && window.parent !== window && window.parent.document) docs.push(window.parent.document); }catch(e){}
  try{ if(window.top && window.top !== window && window.top.document) docs.push(window.top.document); }catch(e){}
  docs.forEach((doc)=>{
    try{
      const bar = doc.querySelector('.app-topbar');
      if(bar){
        bar.dataset.prevDisplay = bar.style.display || '';
        bar.style.display = 'none';
      }
      const frame = doc.getElementById('app-iframe');
      if(frame){
        frame.dataset.prevMarginTop = frame.style.marginTop || '';
        frame.style.marginTop = '0';
      }
    }catch(err){}
  });
}
function restoreParentTopbar(){
  const docs = [];
  try{ if(window.parent && window.parent !== window && window.parent.document) docs.push(window.parent.document); }catch(e){}
  try{ if(window.top && window.top !== window && window.top.document) docs.push(window.top.document); }catch(e){}
  docs.forEach((doc)=>{
    try{
      const bar = doc.querySelector('.app-topbar');
      if(bar) bar.style.display = bar.dataset.prevDisplay || '';
      const frame = doc.getElementById('app-iframe');
      if(frame) frame.style.marginTop = frame.dataset.prevMarginTop || '';
    }catch(err){}
  });
}

function loadStoredAsset(key){
  if(window.assetStore) return window.assetStore.load(key);
  try{ return Promise.resolve(localStorage.getItem(key)||''); }catch(e){ return Promise.resolve(''); }
}
function saveStoredAsset(key, value){
  if(window.assetStore) return window.assetStore.saveOrFallback(key, value);
  try{ if(value) localStorage.setItem(key, value); else localStorage.removeItem(key); return Promise.resolve(true);}catch(e){return Promise.resolve(false);} }

function active(){ return window.AccountManager.getActive(); }

function renderProfile(){
  const acc = active();
  const nameIn = document.getElementById('nameInput');
  const curName = (acc.name || '').trim();
  if(curName && curName !== '我哥天下第一好'){
    nameIn.value = curName;
    nameIn.placeholder = '';
  }else{
    nameIn.value = '';
    nameIn.placeholder = '我哥天下第一好';
  }
  const av = document.getElementById('avatarBtn');
  if(acc.avatar){
    av.style.backgroundImage = 'url(' + JSON.stringify(acc.avatar).slice(1,-1) + ')';
    av.textContent = '';
  }else{
    av.style.backgroundImage = '';
    av.textContent = '+';
  }
  document.getElementById('favCount').textContent = ((acc.favorites||[]).length) + '条';
}

function saveName(){
  const v = (document.getElementById('nameInput').value || '').trim();
  window.AccountManager.updateActive(a=>{ a.name = v; });
  renderProfile();
  showToast('名称已保存');
}

function activeCharTarget(){
  try{
    var raw = localStorage.getItem('activeCharacter') || '';
    var scoped = window.AccountManager ? localStorage.getItem(window.AccountManager.scopedKey('activeCharacter')) || '' : '';
    var obj = JSON.parse(raw || scoped || 'null');
    return obj && obj.id ? obj : null;
  }catch(e){
    return null;
  }
}

function paymentAccountId(){
  var acc = active();
  return acc && acc.id ? acc.id : '';
}

function formatCnyText(val){
  return '¥' + (window.PaymentService ? window.PaymentService.formatCny(val) : '0.00');
}

function refreshWalletSummary(){
  var accId = paymentAccountId();
  if(!accId || !window.PaymentService) return;
  document.getElementById('walletAmount').textContent = formatCnyText(window.PaymentService.getBalance(accId));
  document.getElementById('walletSub').textContent = '余额 ' + formatCnyText(window.PaymentService.getBalance(accId));
  renderWalletRecords();
}

function walletRecordAmount(log){
  var sign = String(log.direction || 'in') === 'out' ? '-' : '+';
  var num = window.PaymentService ? window.PaymentService.formatCny(log.amount || 0) : Number(log.amount || 0).toFixed(2);
  return sign + num;
}

function renderWalletRecords(){
  var host = document.getElementById('walletRecords');
  if(!host || !window.PaymentService) return;
  var logs = window.PaymentService.logsForAccount(paymentAccountId());
  if(!logs.length){
    host.innerHTML = '<div class="wallet-empty">还没有支付记录。</div>';
    return;
  }
  host.innerHTML = logs.map(function(log){
    var amount = walletRecordAmount(log);
    return '<button class="wallet-record" type="button" onclick="openPaymentRecordDetail(\'' + escAttr(log.id) + '\')">'
      + '<div><div class="wallet-record-title">' + esc(log.title || '支付记录') + '</div><div class="wallet-record-sub">' + esc(fmtTime(log.createdAt)) + '</div></div>'
      + '<div class="wallet-record-amount">' + esc(String(amount)) + '</div></button>';
  }).join('');
}

function openWalletPage(){
  refreshWalletSummary();
  document.getElementById('walletPage').classList.add('open');
}

function closeWalletPage(){
  document.getElementById('walletPage').classList.remove('open');
}

function openRechargeModal(){
  var html = '<h3>充值余额</h3><input class="wallet-input" id="rechargeAmountInput" type="number" min="0" step="0.01" placeholder="输入金额">'
    + '<div class="actions"><button type="button" onclick="closeOverlay(\'confirmOverlay\')">取消</button><button type="button" id="confirmYesBtn">确认</button></div>';
  var m = document.getElementById('confirmModal');
  m.innerHTML = html;
  document.getElementById('confirmOverlay').classList.add('open');
  document.getElementById('confirmYesBtn').onclick = function(){
    var amount = Number(document.getElementById('rechargeAmountInput').value || 0);
    if(!Number.isFinite(amount) || amount < 0){ showToast('金额无效'); return; }
    var accId = paymentAccountId();
    window.PaymentService.setBalance(accId, amount);
    window.PaymentService.appendLog({
      accountId: accId,
      kind: 'recharge',
      title: '余额充值',
      amount: amount,
      direction: 'in',
      status: 'done'
    });
    closeOverlay('confirmOverlay');
    refreshWalletSummary();
    showToast('余额已更新');
  };
}

function familyModeMarkup(mode){
  return '<div class="family-mode-row">'
    + '<div class="family-mode">赠送 <button class="family-dot' + (mode === 'gift' ? ' on' : '') + '" type="button" onclick="switchFamilyMode(\'gift\')"></button></div>'
    + '<div class="family-mode">索要 <button class="family-dot' + (mode === 'request' ? ' on' : '') + '" type="button" onclick="switchFamilyMode(\'request\')"></button></div>'
    + '</div>';
}

let familyDraftMode = 'gift';

function buildFamilyModal(){
  var target = activeCharTarget();
  var targetName = target ? (target.nickname || target.name || 'Char') : '未选择角色';
  return '<div class="family-sheet"><div class="family-title">亲属卡</div>'
    + '<div class="family-target">' + esc(targetName) + '</div>'
    + familyModeMarkup(familyDraftMode)
    + '<div class="family-limit-label">额度（月）</div>'
    + '<div class="family-amount"><input id="familyAmountInput" type="number" min="0" step="0.01" value="0.00"></div>'
    + '<div class="actions"><button type="button" onclick="closeOverlay(\'confirmOverlay\')">取消</button><button type="button" id="confirmYesBtn">确认</button></div></div>'
    + '<div class="payment-preview-list">'
    + '<div class="payment-preview-card"><div class="payment-preview-avatar">U</div><div class="payment-preview-text">user邀请Char来花钱/掏钱</div><div class="payment-preview-avatar">U</div></div>'
    + '<div class="payment-preview-card alt"><div class="payment-preview-avatar">C</div><div class="payment-preview-text">Char同意/不同意User 来花钱/掏钱</div><div class="payment-preview-avatar">C</div></div>'
    + '</div>';
}

function switchFamilyMode(mode){
  familyDraftMode = mode === 'request' ? 'request' : 'gift';
  openFamilyModal(true);
}

function appendPaymentMessageToChat(charObj, role, type, payload){
  if(!charObj || !charObj.id) return;
  var key = window.AccountManager ? window.AccountManager.scopedKey('chat_' + charObj.id) : ('chat_' + charObj.id);
  var legacyKey = 'chat_' + charObj.id;
  var store = null;
  try{ store = JSON.parse(localStorage.getItem(key) || localStorage.getItem(legacyKey) || 'null'); }catch(e){ store = null; }
  var list = store && (store.history || store.messages);
  if(!Array.isArray(list)) list = [];
  var entry = {
    id: 'msg_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 7),
    role: role,
    content: JSON.stringify(payload),
    type: type,
    replyToId: null,
    sentAt: Date.now(),
    readAt: role === 'assistant' ? Date.now() : null
  };
  list.push(entry);
  var next = { history: list, messages: list };
  try{ localStorage.setItem(key, JSON.stringify(next)); }catch(e){}
  try{ localStorage.setItem(legacyKey, JSON.stringify(next)); }catch(e){}
  try{
    window.parent.postMessage({ type:'CHAT_UPDATED', payload:{ id: charObj.id, data: charObj, last: payload.summary || payload.title || '', lastType: 'payment' } }, '*');
  }catch(e){}
}

function openFamilyModal(isRefresh){
  var target = activeCharTarget();
  if(!target){
    showToast('请先在聊天里选中角色');
    return;
  }
  var m = document.getElementById('confirmModal');
  m.innerHTML = buildFamilyModal();
  document.getElementById('confirmOverlay').classList.add('open');
  document.getElementById('confirmYesBtn').onclick = function(){
    var amount = Number(document.getElementById('familyAmountInput').value || 0);
    if(!Number.isFinite(amount) || amount < 0){
      showToast('金额无效');
      return;
    }
    var accId = paymentAccountId();
    var targetName = target.nickname || target.name || 'Char';
    var isGift = familyDraftMode === 'gift';
    var payload = {
      cardType: 'family',
      title: isGift ? ('开通亲密付给' + targetName) : ('向' + targetName + '索要亲密付'),
      amount: amount,
      summary: isGift ? ('赠送亲密付 ¥' + window.PaymentService.formatCny(amount)) : ('索要亲密付 ¥' + window.PaymentService.formatCny(amount)),
      status: 'pending',
      mode: familyDraftMode,
      accountId: accId,
      charId: target.id,
      charName: targetName
    };
    var log = window.PaymentService.appendLog({
      accountId: accId,
      kind: 'family_' + familyDraftMode,
      title: payload.title,
      amount: amount,
      direction: isGift ? 'out' : 'in',
      status: 'pending',
      targetId: target.id,
      targetName: targetName,
      detail: payload.summary
    });
    payload.logId = log.id;
    appendPaymentMessageToChat(target, 'user', 'payment', payload);
    window.PaymentService.enqueueEvent({
      charId: target.id,
      eventType: 'family',
      payload: payload
    });
    closeOverlay('confirmOverlay');
    refreshWalletSummary();
    showToast('已发送亲密付邀请');
  };
}

function openPaymentRecordDetail(logId){
  var logs = window.PaymentService.logsForAccount(paymentAccountId());
  var log = logs.find(function(item){ return String(item.id) === String(logId); });
  if(!log) return;
  var detail = '<h3>' + esc(log.title || '支付记录') + '</h3><div class="record-detail">'
    + '<div>金额：' + esc(String(walletRecordAmount(log))) + '</div>'
    + '<div>状态：' + esc(log.status || 'done') + '</div>'
    + '<div>对象：' + esc(log.targetName || '无') + '</div>'
    + '<div>时间：' + esc(fmtTime(log.createdAt)) + '</div>'
    + '<div>备注：' + esc(log.detail || log.note || '无') + '</div></div>'
    + '<div class="actions"><button type="button" onclick="closeOverlay(\'confirmOverlay\')">关闭</button></div>';
  document.getElementById('confirmModal').innerHTML = detail;
  document.getElementById('confirmOverlay').classList.add('open');
}

function pickAvatar(){ document.getElementById('avatarInput').click(); }

function bindAvatarInput(){
  document.getElementById('avatarInput').addEventListener('change', async (e)=>{
    const f = e.target.files && e.target.files[0];
    if(!f) return;
    const r = new FileReader();
    r.onload = async ()=>{
      const data = String(r.result || '');
      window.AccountManager.updateActive(a=>{ a.avatar = data; });
      await saveStoredAsset(window.AccountManager.scopedKey('qq_profile_avatar_asset'), data);
      renderProfile();
      showToast('头像已更新');
    };
    r.readAsDataURL(f);
    e.target.value='';
  });
}

function renderFavorites(){
  const list = document.getElementById('favList');
  const acc = active();
  const favs = Array.isArray(acc.favorites) ? acc.favorites : [];
  if(!favs.length){ list.innerHTML = '<div class="sub">还没有收藏，去聊天里长按消息收藏吧。</div>'; return; }
  list.innerHTML = favs.map(f=>{
    const av = f.avatar ? 'style="background-image:url(' + escAttr(f.avatar) + ')"' : '';
    return '<article class="fav-item" data-fav-id="'+escAttr(f.id||'')+'">'
      + '<div class="fav-av" '+av+'></div>'
      + '<div class="fav-meta">'
      + '<div class="fav-name">'+esc(f.name||'未命名')+'</div>'
      + '<div class="fav-time">'+fmtTime(f.at)+'</div>'
      + '<div class="fav-text">'+esc(f.text||'')+'</div>'
      + '</div></article>';
  }).join('');
  bindFavoriteSwipeDelete();
}

function openFavorites(){ renderFavorites(); document.getElementById('favOverlay').classList.add('open'); }

function removeFavoriteById(id){
  if(!id) return;
  window.AccountManager.updateActive((a)=>{
    const arr = Array.isArray(a.favorites) ? a.favorites : [];
    a.favorites = arr.filter((it)=>String(it && it.id || '') !== String(id));
  });
  renderProfile();
  renderFavorites();
}

function confirmRemoveFavorite(id){
  confirmModal('取消收藏', '确定取消收藏？', ()=>{ removeFavoriteById(id); });
}

function bindFavoriteSwipeDelete(){
  const list = document.getElementById('favList');
  if(!list) return;
  list.querySelectorAll('.fav-item').forEach((item)=>{
    let startX = 0;
    let startY = 0;
    let dx = 0;
    let dragging = false;
    let pointerId = null;
    const reset = ()=>{ item.classList.remove('swiping'); item.style.transform = ''; dragging = false; pointerId = null; };
    item.addEventListener('pointerdown', (e)=>{
      if(e.pointerType === 'mouse' && e.button !== 0) return;
      pointerId = e.pointerId;
      startX = e.clientX;
      startY = e.clientY;
      dx = 0;
      dragging = true;
      item.classList.add('swiping');
      try{ item.setPointerCapture(pointerId); }catch(err){}
    });
    item.addEventListener('pointermove', (e)=>{
      if(!dragging || (pointerId !== null && e.pointerId !== pointerId)) return;
      const moveX = e.clientX - startX;
      const moveY = e.clientY - startY;
      if(Math.abs(moveY) > 16 && Math.abs(moveY) > Math.abs(moveX)){ reset(); return; }
      dx = Math.min(0, Math.max(-68, moveX));
      item.style.transform = 'translateX(' + dx + 'px)';
    });
    item.addEventListener('pointerup', (e)=>{
      if(!dragging || (pointerId !== null && e.pointerId !== pointerId)) return;
      const swipe = dx;
      const id = item.getAttribute('data-fav-id') || '';
      reset();
      if(swipe <= -42){ confirmRemoveFavorite(id); }
    });
    item.addEventListener('pointercancel', reset);
    item.addEventListener('lostpointercapture', reset);
  });
}

function renderAccountList(){
  const list = document.getElementById('accountList');
  const accounts = window.AccountManager.ensure();
  const activeId = active().id;
  const defaultId = window.AccountManager.getDefaultId();
  list.innerHTML = accounts.map(a=>{
    return '<div class="account-item">'
      + '<div class="account-main"><strong>'+esc(a.name||'未命名')+'</strong><div class="badges">'
      + (a.id===activeId?'<span class="badge">当前</span>':'')
      + (a.id===defaultId?'<span class="badge">默认</span>':'')
      + '</div></div>'
      + '<div class="actions">'
      + '<button type="button" onclick="switchAccount(\''+escAttr(a.id)+'\')">切换</button>'
      + '<button type="button" onclick="setDefaultAccount(\''+escAttr(a.id)+'\')">设为默认</button>'
      + '</div></div>';
  }).join('');
}

function openAccountCenter(){ renderAccountList(); document.getElementById('accountOverlay').classList.add('open'); }

function confirmModal(title, desc, onConfirm){
  const m = document.getElementById('confirmModal');
  m.innerHTML = '<h3>'+esc(title)+'</h3><div class="sub">'+esc(desc)+'</div><div class="actions"><button type="button" onclick="closeOverlay(\'confirmOverlay\')">取消</button><button type="button" id="confirmYesBtn">确认</button></div>';
  document.getElementById('confirmOverlay').classList.add('open');
  document.getElementById('confirmYesBtn').onclick = function(){ closeOverlay('confirmOverlay'); onConfirm && onConfirm(); };
}

function createAccountAction(){
  const accounts = window.AccountManager.ensure();
  if(accounts.length >= 2){ showToast('最多只能拥有两个账号'); return; }
  confirmModal('创建新账号', '创建后将切换到新账号并重置为默认头像与名字，继续吗？', ()=>{
    const res = window.AccountManager.createAccount();
    if(!res){ showToast('创建失败'); return; }
    location.reload();
  });
}

function switchAccount(id){
  window.AccountManager.setActive(id);
  location.reload();
}

function setDefaultAccount(id){
  window.AccountManager.setDefault(id);
  renderAccountList();
  showToast('已设为默认账号');
}

function confirmDeleteAccount(){
  const acc = active();
  confirmModal('删除账号', '删除后该账号的聊天与朋友圈数据会被清空，确认删除？', ()=>{
    const res = window.AccountManager.deleteAccount(acc.id);
    if(!res.ok){
      if(res.reason === 'default') showToast('不能删除默认账号，请先切换默认账号');
      else if(res.reason === 'need_one') showToast('至少要保留一个账号');
      else showToast('删除失败');
      return;
    }
    location.reload();
  });
}

function esc(s){ return String(s||'').replace(/[&<>\"]/g, m=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[m])); }
function escAttr(s){ return String(s||'').replace(/"/g,'&quot;'); }
function fmtTime(ts){
  const d = new Date(ts || Date.now());
  const p = (n)=> String(n).padStart(2,'0');
  return d.getFullYear() + '-' + p(d.getMonth()+1) + '-' + p(d.getDate()) + ' ' + p(d.getHours()) + ':' + p(d.getMinutes());
}

document.getElementById('nameInput').addEventListener('change', saveName);
document.getElementById('nameInput').addEventListener('blur', saveName);
['accountOverlay','favOverlay','confirmOverlay'].forEach(id=>{
  const el = document.getElementById(id);
  el.addEventListener('click', (evt)=>{ if(evt.target===el) el.classList.remove('open'); });
});

window.AccountManager.ensure();
bindAvatarInput();
hideParentTopbar();
window.addEventListener('beforeunload', restoreParentTopbar);
window.addEventListener('pagehide', restoreParentTopbar);
loadStoredAsset(window.AccountManager.scopedKey('qq_profile_avatar_asset')).then((src)=>{
  if(src){
    window.AccountManager.updateActive(a=>{ if(!a.avatar) a.avatar = src; });
  }
renderProfile();
refreshWalletSummary();
});
