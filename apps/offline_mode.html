<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,viewport-fit=cover">
<title>线下模式</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Nunito:wght@700;900&family=Caveat:wght@600;700&family=Ma+Shan+Zheng&family=Zhi+Mang+Xing&display=swap" rel="stylesheet">
<script src="../promptManager.js"></script>
<script src="../accountManager.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --b:#0a0a0a;--w:#fff;--off:#f4f4f1;--g:#6f6f6f;--bd:2px solid #0a0a0a;--sh:2px 2px 0 #0a0a0a;
  --font:'Quicksand',sans-serif;--fontd:'Nunito',sans-serif;--fontc:'Caveat',cursive;
}
html,body{width:100%;height:100%;overflow:hidden}
body{font-family:var(--font);background:linear-gradient(180deg,#efefeb 0%,#f8f8f4 100%);color:var(--b);position:relative}
.paper-bg,.paper-bg::before,.paper-bg::after{position:absolute;inset:0;pointer-events:none}
.paper-bg{background:radial-gradient(circle at 18% 12%,rgba(255,255,255,.8),transparent 28%),radial-gradient(circle at 82% 24%,rgba(255,255,255,.65),transparent 24%),linear-gradient(180deg,#ecece8 0%,#f9f9f5 100%)}
.paper-bg::before{display:none}
.paper-bg::after{content:'';background:url('assets/边框花.png') right 26px bottom 88px/108px auto no-repeat,url('assets/边框花.png') left 18px top 180px/88px auto no-repeat;opacity:.95}
.shell{position:relative;z-index:1;height:100%;display:flex;flex-direction:column}
.topbar{padding:12px 14px 8px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.top-pill{padding:8px 12px;border:var(--bd);border-radius:999px;background:rgba(255,255,255,.86);box-shadow:var(--sh);font-family:var(--fontd);font-size:12px;font-weight:900}
.top-heart{width:48px;height:48px;border:none;border-radius:999px;background:#d91c1c;color:#fff;box-shadow:var(--sh);display:flex;align-items:center;justify-content:center;font-size:24px;font-family:var(--fontd);font-weight:900;cursor:pointer}
.story-wrap{flex:1;min-height:0;overflow:auto;padding:2px 14px 132px;display:flex;flex-direction:column;gap:18px;scrollbar-width:none}
.story-wrap::-webkit-scrollbar{display:none}
.story-card{position:relative;min-height:320px;border:var(--bd);border-radius:34px;background:rgba(255,255,255,.82);box-shadow:3px 4px 0 #0a0a0a;padding:22px 18px 20px;overflow:hidden}
.story-card::before{content:'';position:absolute;inset:18px;border:1.5px solid rgba(10,10,10,.48);border-radius:26px;pointer-events:none}
.story-card.char .card-flower{right:-10px;bottom:22px}
.story-card.user .card-flower{left:-12px;bottom:16px;transform:scaleX(-1)}
.story-card.char{padding:0;background:transparent;border:none;box-shadow:none;overflow:visible;min-height:380px}
.story-card.char::before{display:none}
.char-layout{position:relative;min-height:430px;padding:6px 0 10px}
.char-paper-layer{position:absolute;width:286px;height:340px;border:1px solid rgba(10,10,10,.24);background-position:center;background-repeat:no-repeat;background-size:cover;box-shadow:none}
.char-paper-layer::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,.16)}
.char-paper-layer.back-one{left:58px;top:-4px;background-image:url('assets/报纸1.jpg');transform:rotate(4.2deg);z-index:1;opacity:1}
.char-paper-layer.back-two{left:10px;top:58px;background-image:url('assets/报纸2.jpg');transform:rotate(-5.2deg);z-index:1;opacity:1}
.char-main-sheet{position:absolute;left:48px;top:28px;width:286px;height:340px;background:#fdfdf8;border:1.8px solid rgba(10,10,10,.56);box-shadow:none;z-index:2}
.char-main-sheet::before{content:'';position:absolute;inset:0;border:1px solid rgba(255,255,255,.78);pointer-events:none}
.char-flower{position:absolute;right:-8px;top:176px;width:98px;height:166px;z-index:4;pointer-events:none;transform:rotate(18deg)}
.char-flower img{display:block;width:100%;height:100%;object-fit:contain;filter:grayscale(1) contrast(1.08)}
.char-heart-pin{display:none}
.char-polaroid-stack{position:absolute;left:-10px;top:4px;width:116px;height:138px;z-index:6}
.char-polaroid-main{position:absolute;left:18px;top:0;width:82px;height:82px;border:none;border-radius:0;background:transparent;box-shadow:none;padding:0;transform:rotate(8deg)}
.char-polaroid-main::before{content:'';position:absolute;inset:-6px;border:3px dashed rgba(10,10,10,.72);border-radius:18px;transform:rotate(-12deg);z-index:-1}
.char-polaroid-frame{width:100%;height:100%;border:none;border-radius:22px;background:#111;box-shadow:0 0 0 3px #fff,3px 4px 0 rgba(0,0,0,.82);display:flex;align-items:center;justify-content:center;overflow:hidden;font-family:'Zhi Mang Xing',cursive;font-size:24px;font-weight:400;text-align:center;color:#fff;line-height:1}
.char-polaroid-frame img{width:100%;height:100%;object-fit:cover}
.char-camera{position:absolute;left:-22px;top:36px;width:102px;height:72px;background:url('assets/相机.png') center/contain no-repeat;filter:drop-shadow(1px 2px 0 rgba(0,0,0,.24));z-index:7;transform:rotate(-16deg)}
.char-sheet-content{position:absolute;left:70px;top:38px;width:226px;z-index:3;padding:4px 14px 4px 10px;background:transparent;border:none;box-shadow:none}
.char-sheet-actline{font-family:'Ma Shan Zheng',cursive;font-size:44px;line-height:1;color:#111;text-align:center;margin-bottom:12px}
.char-sheet-rule,.char-sheet-heart,.char-sheet-note{display:none}
.char-sheet-text{width:100%;font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;font-size:14px;font-weight:600;line-height:1.86;letter-spacing:0;white-space:pre-wrap;word-break:break-word;color:#111}
.char-sheet-sign{display:block;margin-top:28px;margin-left:-12px;max-width:156px;font-family:'Zhi Mang Xing',cursive;font-size:32px;font-weight:400;color:#111;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-decoration:none}
.char-act-badge{position:absolute;left:132px;top:42px;z-index:5;padding:0;border:none;border-radius:0;background:transparent;box-shadow:none;font-family:'Ma Shan Zheng',cursive;font-size:36px;font-weight:400;color:#1b1b1b;text-decoration:none;display:none}
.card-paper{position:absolute;inset:26px;border-radius:24px;background:rgba(248,248,244,.88)}
.card-paper::before{content:'';position:absolute;left:0;right:0;top:0;height:42px;background:url('assets/报纸1.jpg') center top/cover no-repeat;opacity:.7}
.card-flower{position:absolute;width:108px;height:108px;background:url('assets/边框花.png') center/contain no-repeat;opacity:.98}
.camera-sticker{position:absolute;width:118px;height:84px;background:url('assets/相机.png') center/contain no-repeat;filter:drop-shadow(1px 2px 0 rgba(0,0,0,.35))}
.story-card.char .camera-sticker{left:14px;top:92px;transform:rotate(-10deg)}
.story-card.user .camera-sticker{right:18px;top:92px;transform:rotate(9deg)}
.polaroid{position:absolute;width:118px;height:148px;border:var(--bd);background:#fafaf6;box-shadow:var(--sh);padding:12px 10px 42px;display:flex;align-items:center;justify-content:center;text-align:center;font-family:var(--fontd);font-size:13px;font-weight:900}
.story-card.char .polaroid{left:18px;top:26px;transform:rotate(-8deg)}
.story-card.user .polaroid{right:18px;top:26px;transform:rotate(10deg)}
.polaroid::after{content:'+';position:absolute;left:50%;bottom:12px;transform:translateX(-50%);font-size:26px;font-weight:900}
.polaroid .avatar{width:88px;height:88px;border:var(--bd);background:#efefef;border-radius:2px;overflow:hidden;display:flex;align-items:center;justify-content:center;cursor:pointer}
.polaroid .avatar img{width:100%;height:100%;object-fit:cover}
.heart-pin{position:absolute;top:20px;right:18px;width:62px;height:62px;border:var(--bd);border-radius:999px;background:rgba(255,255,255,.94);box-shadow:var(--sh);display:flex;align-items:center;justify-content:center;font-size:32px}
.act-badge{position:absolute;bottom:18px;padding:10px 18px;border:var(--bd);border-radius:24px;background:rgba(245,245,241,.95);box-shadow:var(--sh);font-family:var(--fontc);font-size:28px;font-weight:700;text-decoration:underline}
.story-card.char .act-badge{left:18px}
.story-card.user .act-badge{right:18px}
.char-sign,.user-sign{position:absolute;bottom:34px;font-family:var(--fontc);font-size:30px;font-weight:700;color:#5e5e5e;text-decoration:underline}
.story-card.char .char-sign{right:116px}
.story-card.user .user-sign{left:116px}
.story-content{position:relative;z-index:2;margin:56px 54px 54px;padding:18px 18px 12px;line-height:1.9;font-size:14px;font-weight:700;white-space:pre-wrap;word-break:break-word}
.story-card.user .story-content{margin:56px 72px 54px 34px}
.story-card.char .story-content{margin:56px 34px 54px 72px}
.meta-row{position:relative;z-index:2;display:flex;align-items:center;justify-content:space-between;gap:12px;margin:0 58px}
.meta-label{font-family:var(--fontd);font-size:12px;font-weight:900;color:var(--g);letter-spacing:.08em;text-transform:uppercase}
.meta-heart{font-size:14px;font-weight:900;max-width:58%;text-align:right}
.thought-clouds{position:fixed;left:18px;right:18px;top:84px;z-index:35;display:none;flex-wrap:wrap;gap:10px;justify-content:center}
.thought-clouds.show{display:flex}
.thought-pill{padding:10px 14px;border:var(--bd);border-radius:999px;background:#fff;box-shadow:var(--sh);font-size:12px;font-weight:900;max-width:220px}
.composer{position:fixed;left:14px;right:14px;bottom:14px;z-index:25;display:flex;gap:10px;align-items:flex-end}
.composer-box{flex:1;border:var(--bd);border-radius:24px;background:rgba(255,255,255,.95);box-shadow:var(--sh);padding:10px 12px}
.composer-box textarea{width:100%;border:none;outline:none;background:transparent;min-height:54px;max-height:140px;resize:none;font-family:var(--font);font-size:14px;font-weight:700;line-height:1.6}
.composer-btn{width:54px;height:54px;border:var(--bd);border-radius:20px;background:#fff;box-shadow:var(--sh);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;cursor:pointer}
.composer-btn.primary{background:#0a0a0a;color:#fff}
.exit-btn{position:fixed;left:14px;bottom:94px;z-index:30;width:58px;height:58px;border:none;border-radius:999px;background:#d91c1c;color:#fff;box-shadow:var(--sh);font-family:var(--fontd);font-size:28px;font-weight:900;cursor:pointer}
.shell.minimized{display:none}
.offline-mini-launcher{position:fixed;left:16px;bottom:22px;z-index:95;display:none;width:68px;height:68px;border:var(--bd);border-radius:999px;background:#fff;box-shadow:var(--sh);align-items:center;justify-content:center;cursor:pointer}
.offline-mini-launcher.show{display:flex}
.offline-mini-launcher img{width:42px;height:42px;object-fit:contain;filter:grayscale(1) contrast(1.06)}
.exit-menu{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:110;background:rgba(255,255,255,.24);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.exit-menu.open{display:flex}
.exit-menu-card{width:min(280px,calc(100vw - 36px));border:var(--bd);border-radius:28px;background:#fff;box-shadow:var(--sh);padding:18px;display:flex;flex-direction:column;gap:12px}
.exit-menu-title{font-family:var(--fontd);font-size:16px;font-weight:900}
.exit-menu-sub{font-size:12px;line-height:1.6;color:var(--g)}
.exit-menu-actions{display:flex;flex-direction:column;gap:10px}
.exit-menu-btn{width:100%;padding:12px 14px;border:var(--bd);border-radius:16px;background:#fff;color:#0a0a0a;box-shadow:var(--sh);font-family:var(--fontd);font-size:13px;font-weight:900;cursor:pointer}
.exit-menu-btn:active{transform:translate(1px,1px);box-shadow:1px 1px 0 #0a0a0a}
.char-photo-input{display:none}
.flight-overlay{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(244,244,240,.16);backdrop-filter:blur(18px) saturate(115%);-webkit-backdrop-filter:blur(18px) saturate(115%);z-index:60}
.flight-overlay.show{display:flex}
.flight-card{width:min(338px,calc(100vw - 32px));border:1.5px solid rgba(10,10,10,.55);border-radius:30px;background:linear-gradient(180deg,rgba(255,255,255,.68) 0%,rgba(250,250,247,.56) 100%);box-shadow:0 20px 48px rgba(0,0,0,.14),0 1px 0 rgba(255,255,255,.7) inset;padding:18px 18px 16px;display:flex;flex-direction:column;gap:14px}
.flight-map{position:relative;height:176px;border:1.5px solid rgba(10,10,10,.18);border-radius:24px;background:radial-gradient(circle at 20% 18%,rgba(255,255,255,.88),transparent 26%),linear-gradient(180deg,rgba(255,255,255,.76) 0%,rgba(238,238,233,.58) 100%);overflow:hidden}
.flight-game{position:absolute;inset:0;width:100%;height:100%;display:block;touch-action:manipulation;cursor:pointer}
.flight-copy{font-family:var(--fontd);font-size:17px;font-weight:900;text-align:center}
.flight-subcopy{font-size:12px;line-height:1.6;color:#4f4f4f;text-align:center}
.flight-tip{font-size:11px;line-height:1.4;color:#5b5b5b;text-align:center}
.toast{position:fixed;bottom:164px;left:50%;transform:translateX(-50%) translateY(16px);background:#0a0a0a;color:#fff;padding:9px 16px;border-radius:999px;font-size:12px;font-weight:800;opacity:0;transition:.24s;z-index:80}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="paper-bg" aria-hidden="true"></div>
<div class="shell">
  <div class="topbar">
    <div class="top-pill" id="offlineStatus">线下模式</div>
    <button class="top-heart" id="offlineHeart" type="button" onclick="openExitMenu()">×</button>
  </div>
  <div class="thought-clouds" id="thoughtClouds"></div>
  <div class="story-wrap" id="storyList"></div>
  <div class="composer">
    <div class="composer-box">
      <textarea id="offlineInput" placeholder="写下你此刻线下想说的话..."></textarea>
    </div>
    <button class="composer-btn primary" type="button" onclick="sendOfflineTurn()">➤</button>
  </div>
</div>

<div class="flight-overlay" id="flightOverlay">
  <div class="flight-card">
    <div class="flight-copy">正在赶往这场见面</div>
    <div class="flight-subcopy">第一幕在认真写啦，点一下屏幕让小恐龙跳起来</div>
    <div class="flight-map">
      <canvas class="flight-game" id="flightGame" width="300" height="176" aria-label="等待中的小兔子跳跃游戏"></canvas>
    </div>
    <div class="flight-tip" id="flightGameTip">轻点屏幕或按空格让小兔子跳跃</div>
  </div>
</div>

<div class="toast" id="toast"></div>
<button class="offline-mini-launcher" id="offlineMiniLauncher" type="button" onclick="restoreOfflineMeet()"><img src="assets/线下模式图标.png" alt="线下模式"></button>
<div class="exit-menu" id="exitMenu">
  <div class="exit-menu-card">
    <div class="exit-menu-title">要先离开一下吗</div>
    <div class="exit-menu-sub">你可以把这次约会暂时缩起来，或者认真说完再见后退出。</div>
    <div class="exit-menu-actions">
      <button class="exit-menu-btn" type="button" onclick="minimizeOfflineMeet()">暂时离开</button>
      <button class="exit-menu-btn" type="button" onclick="confirmExitOfflineMeet()">先说再见</button>
      <button class="exit-menu-btn" type="button" onclick="closeExitMenu()">再待一会</button>
    </div>
  </div>
</div>

<script>
var promptManager = new (window.PromptManager || function(){})();
var session = null;
var character = null;
var sending = false;
var flightGameState = null;

function activeAccountId(){
  try{ return window.AccountManager && window.AccountManager.getActive ? ((window.AccountManager.getActive() || {}).id || '') : ''; }catch(e){ return ''; }
}
function scopedKey(base){
  var accountId = activeAccountId();
  return accountId ? (base + '__acct_' + accountId) : base;
}
function activeCharacterKey(){
  return scopedKey('activeCharacter');
}
function offlineSessionKey(charId){
  return scopedKey('offline_meet_session_' + String(charId || ''));
}
function pendingOfflineMemoryKey(charId){
  return scopedKey('offline_memory_pending_' + String(charId || ''));
}
function pendingOfflineNoticeKey(charId){
  return scopedKey('offline_notice_pending_' + String(charId || ''));
}
function toast(msg){
  var el = document.getElementById('toast');
  if(!el) return;
  el.textContent = String(msg || '');
  el.classList.add('show');
  clearTimeout(toast._timer);
  toast._timer = setTimeout(function(){ el.classList.remove('show'); }, 1800);
}
function esc(s){
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function loadCharacter(){
  var raw = localStorage.getItem(activeCharacterKey()) || localStorage.getItem('activeCharacter') || '';
  if(!raw) return null;
  try{ return JSON.parse(raw); }catch(e){ return null; }
}
function loadCharactersList(){
  try{
    var list = JSON.parse(localStorage.getItem('characters') || '[]');
    return Array.isArray(list) ? list : [];
  }catch(e){
    return [];
  }
}
function findCharacterById(charId){
  var safeId = String(charId || '').trim();
  if(!safeId) return null;
  var list = loadCharactersList();
  for(var i = 0; i < list.length; i += 1){
    var item = list[i];
    if(item && String(item.id || '').trim() === safeId) return item;
  }
  return null;
}
function findLatestOfflineSessionRecord(){
  var best = null;
  try{
    for(var i = 0; i < localStorage.length; i += 1){
      var key = localStorage.key(i);
      if(!key || key.indexOf('offline_meet_session_') === -1) continue;
      var raw = localStorage.getItem(key);
      if(!raw) continue;
      var parsed = JSON.parse(raw);
      if(!parsed || parsed.active === false) continue;
      var charId = String(key.split('offline_meet_session_').pop() || '').trim();
      if(!charId) continue;
      if(!best || Number(parsed.updatedAt || 0) >= Number(best.session && best.session.updatedAt || 0)){
        best = { charId: charId, session: parsed };
      }
    }
  }catch(e){}
  return best;
}
function saveSession(){
  if(!session || !character || !character.id) return;
  session.updatedAt = Date.now();
  localStorage.setItem(offlineSessionKey(character.id), JSON.stringify(session));
}
function loadSession(){
  if(character && character.id){
    var raw = localStorage.getItem(offlineSessionKey(character.id)) || '';
    if(raw){
      try{ return JSON.parse(raw); }catch(e){}
    }
  }
  var fallback = findLatestOfflineSessionRecord();
  if(!fallback) return null;
  if((!character || !character.id) && fallback.charId){
    var matched = findCharacterById(fallback.charId);
    if(matched) character = matched;
  }
  return fallback.session || null;
}
function resolveCharAvatar(){
  if(character && character.imageData) return character.imageData;
  return '';
}
function resolveUserName(){
  return localStorage.getItem(scopedKey('user_name')) || localStorage.getItem('user_name') || 'User';
}
function resolveUserAvatar(){
  return localStorage.getItem(scopedKey('user_avatar')) || localStorage.getItem('user_avatar') || '';
}
function extraCharPhotoKey(){
  return character && character.id ? scopedKey('offline_char_extra_photo_' + String(character.id)) : '';
}
function getCharDisplayName(){
  return String((character && (character.name || character.nickname)) || 'Char').trim() || 'Char';
}
function renderStory(){
  var wrap = document.getElementById('storyList');
  if(!wrap) return;
  var list = Array.isArray(session && session.entries) ? session.entries : [];
  if(!list.length){
    var emptyHeight = sheetHeightForText('这场线下见面还没正式开始。', getCharDisplayName());
    var emptyBackTwoTop = charBackTwoTop(emptyHeight);
    var emptyFlowerTop = charFlowerTop(emptyHeight);
    wrap.innerHTML = '<div class="story-card char"><div class="char-layout" style="min-height:' + (emptyHeight + 84) + 'px"><div class="char-paper-layer back-one" style="height:' + emptyHeight + 'px"></div><div class="char-paper-layer back-two" style="height:' + emptyHeight + 'px;top:' + emptyBackTwoTop + 'px"></div><div class="char-main-sheet" style="height:' + emptyHeight + 'px"></div><div class="char-polaroid-stack"><div class="char-polaroid-main"><div class="char-polaroid-frame">' + esc(getCharDisplayName()) + '</div></div><div class="char-camera"></div></div><div class="char-sheet-content"><div class="char-sheet-actline">第1幕</div><div class="char-sheet-text">这场线下见面还没正式开始。</div><div class="char-sheet-sign">' + esc(getCharDisplayName()) + '</div></div><div class="char-flower" style="top:' + emptyFlowerTop + 'px"><img src="assets/floral-border-1.png" alt=""></div></div></div>';
    return;
  }
  wrap.innerHTML = list.map(function(entry, idx){
    var isChar = entry.role !== 'user';
    var avatar = isChar ? resolveCharAvatar() : resolveUserAvatar();
    var label = isChar ? 'Char' : resolveUserName();
    var bubbles = encodeURIComponent(JSON.stringify(entry.bubbles || []));
    if(isChar){
      var sheetHeight = sheetHeightForText(entry.text || '', getCharDisplayName());
      var backTwoTop = charBackTwoTop(sheetHeight);
      var flowerTop = charFlowerTop(sheetHeight);
      return '<div class="story-card char">' +
        '<div class="char-layout" style="min-height:' + (sheetHeight + 84) + 'px">' +
        '<div class="char-paper-layer back-one" style="height:' + sheetHeight + 'px"></div>' +
        '<div class="char-paper-layer back-two" style="height:' + sheetHeight + 'px;top:' + backTwoTop + 'px"></div>' +
        '<div class="char-main-sheet" style="height:' + sheetHeight + 'px"></div>' +
        '<div class="char-polaroid-stack">' +
        '<div class="char-polaroid-main"><div class="char-polaroid-frame" onclick="toggleThoughtBubbles(' + idx + ')" data-bubbles="' + bubbles + '">' +
        (avatar ? ('<img src="' + esc(avatar) + '" alt="">') : esc(getCharDisplayName())) +
        '</div></div>' +

function ensureFlightGameState(){

    lastAt: 0,
    score: 0,
    best: 0,
    speed: 210,
    gravity: 1680,
    jumpVelocity: 580,

function resizeFlightCanvas(){
  var state = ensureFlightGameState();

  state.ctx = canvas.getContext('2d');
  var dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
  var rect = canvas.getBoundingClientRect();
  var width = Math.max(280, Math.round(rect.width || 300));
  var height = Math.max(160, Math.round(rect.height || 176));
  canvas.width = Math.round(width * dpr);
  canvas.height = Math.round(height * dpr);
  state.ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  state.spawnAt = 0;

function flightGameJump(){

  state.bunny.jumping = true;
  state.bunny.vy = -state.jumpVelocity;

function drawFlightGame(){
  var state = ensureFlightGameState();
  if(!state.ctx || !state.canvas) return;
  var ctx = state.ctx;
  var width = state.canvas.width / (Math.max(1, Math.min(2, window.devicePixelRatio || 1)));
  var height = state.canvas.height / (Math.max(1, Math.min(2, window.devicePixelRatio || 1)));
  ctx.clearRect(0, 0, width, height);

  ctx.save();
  ctx.strokeStyle = 'rgba(10,10,10,.24)';
  ctx.lineWidth = 1.2;
  ctx.setLineDash([7, 7]);
  ctx.beginPath();
  ctx.moveTo(0, state.groundY + 0.5);
  ctx.lineTo(width, state.groundY + 0.5);
  ctx.stroke();
  ctx.restore();

  ctx.fillStyle = '#0a0a0a';
  state.obstacles.forEach(function(obs){
    ctx.fillRect(obs.x, state.groundY - obs.h, obs.w, obs.h);
    if(obs.w > 16){
      ctx.fillRect(obs.x + 8, state.groundY - obs.h - 10, 6, 10);
    }
  });

  var d = state.bunny;
  ctx.save();
  ctx.translate(d.x, d.y);
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(4, 12, 18, 14);
  ctx.fillRect(16, 8, 8, 10);
  ctx.fillRect(18, 0, 4, 12);
  ctx.fillRect(23, 2, 4, 10);
  ctx.fillRect(8, 24, 4, 10);
  ctx.fillRect(18, 24, 4, 10);
  ctx.fillRect(0, 16, 6, 4);
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(18, 11, 2, 2);
  ctx.restore();

  ctx.save();
  ctx.fillStyle = '#0a0a0a';
  ctx.font = '700 12px Quicksand';
  ctx.textAlign = 'left';
  ctx.fillText('SCORE ' + String(Math.floor(state.score)).padStart(4, '0'), 12, 18);
  ctx.textAlign = 'right';
  ctx.fillText('BEST ' + String(Math.floor(state.best)).padStart(4, '0'), width - 12, 18);
  ctx.restore();
}
function stepFlightGame(ts){
  var state = ensureFlightGameState();
  if(!state.running) return;
  if(!state.lastAt) state.lastAt = ts;
  var dt = Math.min(0.032, Math.max(0.001, (ts - state.lastAt) / 1000));
  state.lastAt = ts;

  state.score += dt * 12;
  state.speed = Math.min(360, state.speed + dt * 6);
  state.best = Math.max(state.best, state.score);

  if(!state.spawnAt) state.spawnAt = ts + 650;
  if(ts >= state.spawnAt){
    var width = state.canvas ? state.canvas.width / (Math.max(1, Math.min(2, window.devicePixelRatio || 1))) : 300;
    var h = 22 + Math.round(Math.random() * 18);
    var w = h > 30 ? 18 : 14;
    state.obstacles.push({ x: width + 20, w: w, h: h });
    state.spawnAt = ts + 850 + Math.random() * 700;
  }

  state.bunny.vy += state.gravity * dt;
  state.bunny.y += state.bunny.vy * dt;
  var floorY = state.groundY - state.bunny.h;
  if(state.bunny.y >= floorY){
    state.bunny.y = floorY;
    state.bunny.vy = 0;
    state.bunny.jumping = false;
  }

  state.obstacles.forEach(function(obs){ obs.x -= state.speed * dt; });
  state.obstacles = state.obstacles.filter(function(obs){ return obs.x + obs.w > -20; });

  var hit = state.obstacles.some(function(obs){
    var dx = state.bunny.x + 4;
    var dy = state.bunny.y + 6;
    var dw = state.bunny.w - 8;
    var dh = state.bunny.h - 6;
    var ox = obs.x;
    var oy = state.groundY - obs.h;
    return dx < ox + obs.w && dx + dw > ox && dy < oy + obs.h && dy + dh > oy;
  });
  if(hit){
    resetFlightGame();
  }

  drawFlightGame();
  state.frameId = requestAnimationFrame(stepFlightGame);
}

    document.body.dataset.flightGameKeyBound = '1';
    window.addEventListener('keydown', function(evt){
      if(evt.code === 'Space' || evt.code === 'ArrowUp'){
        var overlay = document.getElementById('flightOverlay');
        if(overlay && overlay.classList.contains('show')){
          evt.preventDefault();
          flightGameJump();
        }
      }
    });
    window.addEventListener('resize', function(){
      var overlay = document.getElementById('flightOverlay');
      if(overlay && overlay.classList.contains('show')){
        resizeFlightCanvas();
      }
    });
  }
}
function shouldBootOpeningFlow(){
  if(!session) return false;
  if(session.active === false) return false;
  if(!session.invite) return false;
  return !hasAssistantOpeningEntry();
}
async function generateOpeningIfNeeded(){
  if(!session || (!session.pendingOpening && !shouldBootOpeningFlow())) return;
  var openingText = '';
  try{
    var openingPrompt = [
      '请写这场线下见面的第一个场景。',
      session && session.invite ? ('邀约信息：' + JSON.stringify(session.invite)) : '',
      '最近线上聊天：' + (session.chatHistory || '无'),
      '请一次性直接写完整第一幕正文，不要分段返回。'
    ].filter(Boolean).join('\n\n');
    for(var attempt = 0; attempt < 2; attempt += 1){
      try{
        var raw = await callAIWithTimeout(buildOfflineOpeningChunkSystemPrompt(), openingPrompt, 45000);
        openingText = String(raw || '').replace(/^```[a-zA-Z]*\s*/,'').replace(/```$/,'').trim();
      }catch(err){
        if(openingTextLength(openingText) >= 320){
          break;
        }
        throw err;
      }
      if(openingTextLength(openingText) >= 300 && !containsOpeningViolation(openingText)){
        break;
      }
    }
    var labels = nowLabels();
    session.entries.push({
      role:'assistant',
      text:String(openingText || '').trim() || '他真的来了，站在离你很近的地方，声音轻得像怕惊扰你。',
      heart:'♥',
      bubbles:['终于见到你','过来一点'],
      timeLabel:labels.timeLabel,
      meta:labels.meta
    });
    session.pendingOpening = false;
    saveSession();
  }catch(e){
    if(openingTextLength(openingText) >= 120){
      var partial = nowLabels();
      session.entries.push({
        role:'assistant',
        text:String(openingText || '').trim(),
        heart:'♥',
        bubbles:['终于见到你','过来一点'],
        timeLabel:partial.timeLabel,
        meta:partial.meta
      });
    }else{
      var fallback = nowLabels();
      session.entries.push({ role:'assistant', text:'他真的来了，站在你面前时连呼吸都轻了下来，像是怕把这场见面碰碎。', heart:'♥', bubbles:['终于见到你','别赶我走'], timeLabel:fallback.timeLabel, meta:fallback.meta });
    }
    session.pendingOpening = false;
    saveSession();
  }
  hideFlightOverlay();
}
async function sendOfflineTurn(){
  if(sending) return;
  var input = document.getElementById('offlineInput');
  var text = String((input && input.value) || '').trim();
  if(!text){
    toast('先写点什么吧');
    return;
  }
  sending = true;
  closeThoughtBubbles();
  var labels = nowLabels();
  session.entries.push({ role:'user', text:text, heart:'♥', bubbles:[], timeLabel:labels.timeLabel, meta:labels.meta });
  if(input) input.value = '';
  saveSession();
  renderStory();
  try{
    var raw = await callAI(buildOfflineSystemPrompt(), buildOfflineUserPrompt(text));
    var parsed = parseOfflineReply(raw);
    var nextLabels = nowLabels();
    session.entries.push({
      role:'assistant',
      text:String(parsed.text || '').trim() || '他安静地看着你，慢慢接上了你刚才的话。',
      heart:String(parsed.heart || '♥').trim() || '♥',
      bubbles:Array.isArray(parsed.bubbles) ? parsed.bubbles.slice(0,3) : [],
      timeLabel:nextLabels.timeLabel,
      meta:nextLabels.meta
    });
    saveSession();
    renderStory();
  }catch(e){
    toast('线下剧情生成失败，稍后再试');
  }finally{
    sending = false;
  }
}
async function summarizeOfflineMemory(){
  var list = Array.isArray(session && session.entries) ? session.entries : [];
  var lines = list.map(function(entry){
    return (entry.role === 'user' ? '用户' : '角色') + '：' + String(entry.text || '').replace(/\s+/g, ' ').trim();
  }).join('\n');
  if(!lines) return '';
  var systemPrompt = promptManager && typeof promptManager.memorySummarySystemPrompt === 'function'
    ? promptManager.memorySummarySystemPrompt()
    : '你是聊天记忆压缩器，只返回一段纯文本总结。';
  var userPrompt = promptManager && typeof promptManager.memorySummaryUserPrompt === 'function'
    ? promptManager.memorySummaryUserPrompt(lines)
    : ('请总结以下线下见面记录：\n\n' + lines);
  try{
    var raw = await callAI(systemPrompt, userPrompt);
    return String(raw || '').replace(/^```[a-zA-Z]*\s*/,'').replace(/```$/,'').trim();
  }catch(e){
    return '线下见面中，两人的互动进一步推进了关系，并围绕当下氛围展开了更贴近现实的交流。';
  }
}
async function exitOfflineMeet(){
  if(!session || !character || !character.id){
    try{ window.parent.postMessage({ type:'OFFLINE_EXITED' }, '*'); }catch(e){}
    window.parent.postMessage({ type:'OPEN_APP', payload:'chat' }, '*');
    return;
  }
  var memoryText = await summarizeOfflineMemory();
  if(memoryText){
    localStorage.setItem(pendingOfflineMemoryKey(character.id), JSON.stringify({
      text: memoryText,
      createdAt: Date.now()
    }));
  }
  localStorage.setItem(pendingOfflineNoticeKey(character.id), JSON.stringify({
    text: '[系统提示：这次线下见面结束了，你们回到了线上聊天。]',
    createdAt: Date.now()
  }));
  session.active = false;
  session.minimized = false;
  saveSession();
  try{ window.parent.postMessage({ type:'OFFLINE_EXITED' }, '*'); }catch(e){}
  window.parent.postMessage({ type:'OPEN_APP', payload:'chat' }, '*');
}
function openExitMenu(){
  document.getElementById('exitMenu')?.classList.add('open');
}
function closeExitMenu(){
  document.getElementById('exitMenu')?.classList.remove('open');
}
function minimizeOfflineMeet(){
  closeExitMenu();
  if(session){
    session.minimized = true;
    saveSession();
  }
  try{
    window.parent.postMessage({ type:'OFFLINE_MINIMIZED', payload:{ charId: character && character.id } }, '*');
  }catch(e){}
  window.parent.postMessage({ type:'OPEN_APP', payload:'chat' }, '*');
}
function restoreOfflineMeet(){
  if(session){
    session.minimized = false;
    saveSession();
  }
  document.querySelector('.shell')?.classList.remove('minimized');
  document.getElementById('offlineMiniLauncher')?.classList.remove('show');
}
async function confirmExitOfflineMeet(){
  closeExitMenu();
  await exitOfflineMeet();
}
function showFlightIfNeeded(){
  var overlay = document.getElementById('flightOverlay');
  if(!overlay || !session) return;
  if(!session.pendingAnimation && !shouldBootOpeningFlow()) return;
  overlay.classList.add('show');
  bindFlightGameControls();
  startFlightGame();
}
function hideFlightOverlay(){
  var overlay = document.getElementById('flightOverlay');
  if(!overlay) return;
  overlay.classList.remove('show');
  stopFlightGame();
  if(session){
    session.pendingAnimation = false;
    saveSession();
  }
}
async function init(){
  character = loadCharacter();
  session = loadSession();
  if((!character || !character.id) && session && session.invite){
    var fallbackRecord = findLatestOfflineSessionRecord();
    if(fallbackRecord && fallbackRecord.charId){
      var fallbackChar = findCharacterById(fallbackRecord.charId);
      if(fallbackChar) character = fallbackChar;
    }
  }
  if(!session){
    session = { active:false, entries:[] };
  }
  if(shouldBootOpeningFlow()){
    session.active = true;
    if(!session.pendingOpening) session.pendingOpening = true;
    if(!session.pendingAnimation) session.pendingAnimation = true;
    saveSession();
  }
  if(session && session.minimized){
    document.querySelector('.shell')?.classList.add('minimized');
    document.getElementById('offlineMiniLauncher')?.classList.add('show');
  }
  renderStory();
  showFlightIfNeeded();
  await generateOpeningIfNeeded();
  renderStory();
}
document.addEventListener('click', function(e){
  var avatar = e.target && e.target.closest ? e.target.closest('.avatar,.char-polaroid-frame') : null;
  var exitCard = e.target && e.target.closest ? e.target.closest('.exit-menu-card') : null;
  if(e.target === document.getElementById('exitMenu') && !exitCard){
    closeExitMenu();
  }
  if(!avatar) closeThoughtBubbles();
});
init();
</script>
