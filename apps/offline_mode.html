<script>
var promptManager = new (window.PromptManager || function(){})();
var session = null;
var character = null;
var desiredOfflineCharId = '';
var sending = false;
var exitingOfflineMeet = false;
var archivingOfflineMeet = false;
var offlineCloseIntent = '';
var flightGameState = null;
var runtimeUserAvatar = '';
var runtimeCharAvatar = '';
var offlineMemorySnippetCache = '';
var offlineEditingIndex = -1;
var offlineMoodFaces = {
  soft:['(ЋґбµФ бµХ бµФЋґ)','(вЧНвАҐбіЧвАҐвЧН)','(Ћµ¬ѓЌТгА∞¬ѓЌТЋµ)','(пљ°вАҐгЕЕвАҐпљ°)'],
  moody:['(¬ђ_¬ђ )','(вЧФ_вЧФ)','( пЉН–Ј)','(лИИ_лИИ)'],
  bright:['(аєСЋГћµбіЧЋВћµ)ўИ','(пЊЙ¬ігГЃ`)пЊЙ*: пљ•пЊЯ','(вЙІвЦљвЙ¶)','(аєСвАҐћАгЕВвАҐћБ)ўИ'],
  sleepy:['(вИ™пљ°вИ™)пљ°пљ°пљ°','( пљ°вАҐћБ - вАҐћАпљ°)','(=-ѕЙ-)=','(гБ§ .вАҐћБ _ Ц вАҐћА.)гБ§']
};

function activeAccountId(){
  try{ return window.AccountManager && window.AccountManager.getActive ? ((window.AccountManager.getActive() || {}).id || '') : ''; }catch(e){ return ''; }
}
function scopedKey(base){
  var accountId = activeAccountId();
  return accountId ? (base + '__acct_' + accountId) : base;
}
function activeCharacterKey(){
  return scopedKey('activeCharacter');
}
function offlineSessionKey(charId){
  return scopedKey('offline_meet_session_' + String(charId || ''));
}
function offlineSessionKeyCandidates(charId){
  var safeId = String(charId || '').trim();
  if(!safeId) return [];
  var keys = [offlineSessionKey(safeId), 'offline_meet_session_' + safeId];
  try{
    var acctId = activeAccountId();
    if(acctId){
      keys.unshift('offline_meet_session_' + safeId + '__acct_' + acctId);
    }
  }catch(e){}
  return Array.from(new Set(keys.filter(Boolean)));
}
function pendingOfflineMemoryKey(charId){
  return scopedKey('offline_memory_pending_' + String(charId || ''));
}
function pendingOfflineNoticeKey(charId){
  return scopedKey('offline_notice_pending_' + String(charId || ''));
}
function pendingOfflineBootstrapKey(charId){
  return scopedKey('offline_bootstrap_' + String(charId || ''));
}
function pendingOfflineLaunchKey(charId){
  return scopedKey('offline_launch_' + String(charId || ''));
}
function pendingOfflineResumeKey(charId){
  return scopedKey('offline_resume_' + String(charId || ''));
}
function offlineArchiveListKey(){
  return scopedKey('offline_meet_archives');
}
function loadOfflineArchives(){
  try{
    var parsed = JSON.parse(localStorage.getItem(offlineArchiveListKey()) || '[]');
    return Array.isArray(parsed) ? parsed : [];
  }catch(e){
    return [];
  }
}
function saveOfflineArchives(list){
  try{
    localStorage.setItem(offlineArchiveListKey(), JSON.stringify(Array.isArray(list) ? list : []));
  }catch(e){}
}
function snapshotOfflineSessionState(source){
  var base = source || session || null;
  if(!base) return null;
  try{
    return JSON.parse(JSON.stringify(base));
  }catch(e){
    return null;
  }
}
function hasMeaningfulOfflineSession(snapshot){
  if(!snapshot || typeof snapshot !== 'object') return false;
  if(Array.isArray(snapshot.entries) && snapshot.entries.length) return true;
  if(snapshot.pendingOpening || snapshot.pendingAnimation) return true;
  if(snapshot.invite && snapshot.active !== false) return true;
  return false;
}
function buildOfflineArchivePreview(snapshot){
  var list = Array.isArray(snapshot && snapshot.entries) ? snapshot.entries.slice().reverse() : [];
  for(var i = 0; i < list.length; i += 1){
    var entry = list[i];
    var text = String(entry && entry.text || '').replace(/\s+/g, ' ').trim();
    if(text) return text.slice(0, 72);
  }
  return 'ињЩжђ°зЇ¶дЉЪињШж≤°жЬЙеЖЩдЄЛе§™е§ЪеЖЕеЃєгАВ';
}
function upsertOfflineArchive(snapshot, options){
  if(!snapshot || !character || !character.id) return '';
  var opts = options || {};
  var list = loadOfflineArchives();
  var now = Date.now();
  var archiveId = String(opts.archiveId || snapshot.archiveId || ('offline_archive_' + now + '_' + Math.random().toString(36).slice(2, 8)));
  var existingIndex = list.findIndex(function(item){ return item && item.id === archiveId; });
  var existing = existingIndex >= 0 ? list[existingIndex] : null;
  var charSnapshot = Object.assign({}, existing && existing.characterSnapshot || {}, character || {});
  var archiveSnapshot = snapshotOfflineSessionState(snapshot) || { active:false, entries:[] };
  archiveSnapshot.archiveId = archiveId;
  archiveSnapshot.minimized = false;
  archiveSnapshot.active = opts.status === 'pending';
  var entry = Object.assign({}, existing || {}, {
    id: archiveId,
    charId: String(character.id || ''),
    charName: String((character.nickname || character.name || 'жЬ™еСљеРНиІТиЙ≤')).trim() || 'жЬ™еСљеРНиІТиЙ≤',
    charAvatar: resolveCharAvatar() || charSnapshot.imageData || '',
    userName: resolveUserName(),
    status: opts.status === 'ended' ? 'ended' : 'pending',
    statusLabel: opts.status === 'ended' ? 'еЈ≤зїУжЭЯ' : 'еЊЕзї≠',
    reason: String(opts.reason || '').trim(),
    createdAt: Number(existing && existing.createdAt || archiveSnapshot.createdAt || archiveSnapshot.updatedAt || now) || now,
    updatedAt: now,
    preview: buildOfflineArchivePreview(archiveSnapshot),
    entryCount: Array.isArray(archiveSnapshot.entries) ? archiveSnapshot.entries.length : 0,
    characterSnapshot: charSnapshot,
    snapshot: archiveSnapshot
  });
  if(opts.status === 'ended'){
    entry.endedAt = now;
  }else{
    entry.endedAt = 0;
  }
  if(existingIndex >= 0) list.splice(existingIndex, 1);
  list.unshift(entry);
  saveOfflineArchives(list);
  return archiveId;
}
function queueOfflineEndArtifacts(targetCharId, snapshot){
  if(!targetCharId || !snapshot) return;
  localStorage.setItem(pendingOfflineNoticeKey(targetCharId), JSON.stringify({
    text: '[з≥їзїЯжПРз§ЇпЉЪињЩжђ°зЇњдЄЛиІБйЭҐзїУжЭЯдЇЖпЉМдљ†дїђеЫЮеИ∞дЇЖзЇњдЄКиБКе§©гАВ]',
    createdAt: Date.now()
  }));
  try{
    var memoryText = summarizeOfflineMemoryLocally(snapshot);
    if(memoryText){
      localStorage.setItem(pendingOfflineMemoryKey(targetCharId), JSON.stringify({
        text: memoryText,
        createdAt: Date.now()
      }));
    }
  }catch(e){}
}
function clearLiveOfflineSession(targetCharId){
  if(!targetCharId) return;
  try{ localStorage.removeItem(offlineSessionKey(targetCharId)); }catch(e){}
}
function archiveCurrentOfflineMeet(status, reason){
  if(archivingOfflineMeet) return '';
  if(!session || !character || !character.id) return '';
  var snapshot = snapshotOfflineSessionState(session);
  if(!hasMeaningfulOfflineSession(snapshot)) return '';
  archivingOfflineMeet = true;
  try{
    var archiveId = upsertOfflineArchive(snapshot, {
      status: status,
      reason: reason,
      archiveId: snapshot && snapshot.archiveId
    });
    if(archiveId){
      session.archiveId = archiveId;
    }
    if(status === 'ended'){
      queueOfflineEndArtifacts(character.id, snapshot);
      clearLiveOfflineSession(character.id);
      session = { active:false, entries:[], minimized:false, archiveId:archiveId || '' };
    }else{
      clearLiveOfflineSession(character.id);
      session = { active:false, entries:[], minimized:false, archiveId:archiveId || '' };
    }
    return archiveId;
  }finally{
    archivingOfflineMeet = false;
  }
}
function autoArchiveOfflineMeetIfNeeded(reason){
  if(offlineCloseIntent || exitingOfflineMeet || archivingOfflineMeet) return;
  if(!session || !character || !character.id) return;
  if(session.minimized) return;
  archiveCurrentOfflineMeet('pending', reason || 'interrupted');
}
function loadStoredAsset(key){
  if(window.assetStore && typeof window.assetStore.load === 'function'){
    return window.assetStore.load(key);
  }
  return Promise.resolve(localStorage.getItem(key) || '');
}
function toast(msg, options){
  var el = document.getElementById('toast');
  if(!el) return;
  el.textContent = String(msg || '');
  clearTimeout(toast._timer);
  var sticky = !!(options && options.sticky);
  if(!sticky){
    var raw = String(msg || '');
    sticky = /е§±иі•|йФЩиѓѓ|иґЕжЧґ|иґЕињЗ|quota|context|жЧ†ж≥Х|дЄНжИРеКЯ|жЛ¶жИ™/.test(raw);
  }
  el.classList.toggle('sticky', sticky);
  el.onclick = sticky ? function(){
    el.classList.remove('show');
    el.classList.remove('sticky');
    el.onclick = null;
  } : null;
  el.classList.add('show');
  if(!sticky){
    toast._timer = setTimeout(function(){ el.classList.remove('show'); }, 2200);
  }
}
function esc(s){
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function loadCharacter(charIdOverride){
  var forcedId = String(charIdOverride || '').trim();
  if(forcedId){
    var forcedCharacter = findCharacterById(forcedId);
    if(forcedCharacter) return Object.assign({}, forcedCharacter);

function drawFlightGame(){

  var width = state.canvas.width / (Math.max(1, Math.min(2, window.devicePixelRatio || 1)));
  var height = state.canvas.height / (Math.max(1, Math.min(2, window.devicePixelRatio || 1)));

function stepFlightGame(ts){
  var state = ensureFlightGameState();
  if(!state.running) return;
  if(!state.lastAt) state.lastAt = ts;
  var dt = Math.min(0.032, Math.max(0.001, (ts - state.lastAt) / 1000));
  state.lastAt = ts;

  state.score += dt * 12;
  state.speed = Math.min(360, state.speed + dt * 6);
  state.best = Math.max(state.best, state.score);

  if(!state.spawnAt) state.spawnAt = ts + 650;
  if(ts >= state.spawnAt){
    var width = state.canvas ? state.canvas.width / (Math.max(1, Math.min(2, window.devicePixelRatio || 1))) : 300;
    var h = 22 + Math.round(Math.random() * 18);
    var w = h > 30 ? 18 : 14;
    state.obstacles.push({ x: width + 20, w: w, h: h });
    state.spawnAt = ts + 850 + Math.random() * 700;
  }

  state.bunny.vy += state.gravity * dt;
  state.bunny.y += state.bunny.vy * dt;
  var floorY = state.groundY - state.bunny.h;
  if(state.bunny.y >= floorY){
    state.bunny.y = floorY;
    state.bunny.vy = 0;
    state.bunny.jumping = false;
  }

  state.obstacles.forEach(function(obs){ obs.x -= state.speed * dt; });
  state.obstacles = state.obstacles.filter(function(obs){ return obs.x + obs.w > -20; });

  var hit = state.obstacles.some(function(obs){
    var dx = state.bunny.x + 4;
    var dy = state.bunny.y + 6;
    var dw = state.bunny.w - 8;
    var dh = state.bunny.h - 6;
    var ox = obs.x;
    var oy = state.groundY - obs.h;
    return dx < ox + obs.w && dx + dw > ox && dy < oy + obs.h && dy + dh > oy;
  });
  if(hit){
    resetFlightGame();
  }

  drawFlightGame();
  state.frameId = requestAnimationFrame(stepFlightGame);
}
function startFlightGame(){
  var state = ensureFlightGameState();
  resizeFlightCanvas();
  resetFlightGame();
  state.running = true;
  cancelAnimationFrame(state.frameId);
  state.frameId = requestAnimationFrame(stepFlightGame);
}
function stopFlightGame(){
  var state = ensureFlightGameState();
  state.running = false;
  cancelAnimationFrame(state.frameId);
  state.frameId = 0;
}
function bindFlightGameControls(){
  var canvas = document.getElementById('flightGame');
  if(canvas && !canvas.dataset.bound){
    canvas.dataset.bound = '1';
    canvas.addEventListener('pointerdown', function(evt){
      evt.preventDefault();
      flightGameJump();
    });
  }
  if(!document.body.dataset.flightGameKeyBound){
    document.body.dataset.flightGameKeyBound = '1';
    window.addEventListener('keydown', function(evt){
      if(evt.code === 'Space' || evt.code === 'ArrowUp'){
        var overlay = document.getElementById('flightOverlay');
        if(overlay && overlay.classList.contains('show')){
          evt.preventDefault();
          flightGameJump();
        }
      }
    });
    window.addEventListener('resize', function(){
      var overlay = document.getElementById('flightOverlay');
      if(overlay && overlay.classList.contains('show')){
        resizeFlightCanvas();
      }
    });
  }
}

          thought_chain: parsed.thought_chain,
          status_card: parsed.status_card
        })){
          lastError = new Error('еЫЮе§Не≠ЧжХ∞дЄНиґ≥пЉИ' + openingTextLength(replyText) + '/' + minChars + 'пЉЙ');
          if(quotaRetry < 2) continue;
          throw lastError;
        }
        lastError = null;
        break;
      }catch(retryErr){
        lastError = retryErr;
        if(isOfflineQuotaLikeError(retryErr) && quotaRetry < 2) continue;
        throw retryErr;
      }
    }
    if(lastError){
      throw lastError;
    }
    var nextLabels = nowLabels();
    var replyEntry = {
      role:'assistant',
      text:replyText,
      title:String(parsed.title || '').trim(),
      quote:String(parsed.quote || '').trim(),
      asides: normalizeOfflineAsides(parsed.asides),
      heart:String(parsed.heart || 'вЩ•').trim() || 'вЩ•',
      thoughtChain: normalizeOfflineThoughtChain(parsed.thought_chain || null, parsed.text),
      statusCard: normalizeOfflineStatusCard(parsed.status_card, parsed.text),
      bubbles:Array.isArray(parsed.bubbles) ? parsed.bubbles.slice(0,3) : [],
      timeLabel:nextLabels.timeLabel,
      meta:nextLabels.meta,
      fullLabel: nextLabels.fullLabel,
      createdAt: nextLabels.createdAt
    };
    Object.assign(replyEntry, buildOfflineEntryMeta(replyEntry, 'assistant', nextLabels, {
      generationMs: Date.now() - replyStartedAt
    }));
    session.entries.push(replyEntry);
    saveSession();
    queueOfflineStatusCardGeneration(replyEntry);
    setTimeout(function(){ queueOfflineStatusCardGeneration(replyEntry); }, 120);
    renderStory();
    keepOfflineComposerVisible();
  }catch(e){
    toast('зЇњдЄЛеЫЮе§НзФЯжИРе§±иі•пЉЪ' + summarizeOfflineError(e), { sticky:true });
  }finally{
    setOfflineComposerBusy(false);
  }
}
async function rerollOfflineTurn(){
  if(sending || !session || !Array.isArray(session.entries) || !session.entries.length) return;
  var lastAssistantIndex = -1;
  for(var i = session.entries.length - 1; i >= 0; i -= 1){
    if(session.entries[i] && session.entries[i].role === 'assistant'){
      lastAssistantIndex = i;
      break;
    }
  }
  if(lastAssistantIndex === -1){
    toast('ињШж≤°жЬЙеПѓдї•йЗНзФЯжИРзЪДеЫЮе§Н');
    return;
  }
  session.entries = session.entries.slice(0, lastAssistantIndex);
  var hasAnyAssistant = session.entries.some(function(entry){
    return entry && entry.role === 'assistant' && String(entry.text || '').trim();
  });
  if(!hasAnyAssistant && session.invite){
    session.active = true;
    session.pendingOpening = true;
    session.pendingAnimation = true;
  }
  saveSession();
  renderStory();
  if(!hasAnyAssistant && session.invite){
    showFlightIfNeeded();
    await generateOpeningIfNeeded();
    renderStory();
    return;
  }
  await requestOfflineReply();
}
async function summarizeOfflineMemory(){
  var list = Array.isArray(session && session.entries) ? session.entries : [];
  var lines = list.map(function(entry){
    return (entry.role === 'user' ? 'зФ®жИЈ' : 'иІТиЙ≤') + 'пЉЪ' + String(entry.text || '').replace(/\s+/g, ' ').trim();
  }).join('\n');
  if(!lines) return '';
  var systemPrompt = promptManager && typeof promptManager.memorySummarySystemPrompt === 'function'
    ? promptManager.memorySummarySystemPrompt()
    : 'дљ†жШѓиБКе§©иЃ∞ењЖеОЛзЉ©еЩ®пЉМеП™ињФеЫЮдЄАжЃµзЇѓжЦЗжЬђжАїзїУгАВ';
  var userPrompt = promptManager && typeof promptManager.memorySummaryUserPrompt === 'function'
    ? promptManager.memorySummaryUserPrompt(lines)
    : ('иѓЈжАїзїУдї•дЄЛзЇњдЄЛиІБйЭҐиЃ∞ељХпЉЪ\n\n' + lines);
  try{
    var raw = await callAIWithTimeout(systemPrompt, userPrompt, 6000);
    return String(raw || '').replace(/^```[a-zA-Z]*\s*/,'').replace(/```$/,'').trim();
  }catch(e){
    return 'зЇњдЄЛиІБйЭҐдЄ≠пЉМдЄ§дЇЇзЪДдЇТеК®ињЫдЄАж≠•жО®ињЫдЇЖеЕ≥з≥їпЉМеєґеЫізїХељУдЄЛж∞ЫеЫіе±ХеЉАдЇЖжЫіиііињСзО∞еЃЮзЪДдЇ§жµБгАВ';
  }
}
function summarizeOfflineMemoryLocally(snapshot){
  var list = Array.isArray(snapshot && snapshot.entries) ? snapshot.entries : [];
  if(!list.length) return '';
  var lastUser = '';
  var lastAssistant = '';
  for(var i = list.length - 1; i >= 0; i -= 1){
    var entry = list[i];
    if(!entry) continue;
    var text = String(entry.text || '').replace(/\s+/g, ' ').trim();
    if(!text) continue;
    if(!lastAssistant && entry.role === 'assistant') lastAssistant = text;
    if(!lastUser && entry.role === 'user') lastUser = text;
    if(lastUser && lastAssistant) break;
  }
  var parts = ['ињЩжђ°зЇњдЄЛиІБйЭҐеЈ≤зїПзїУжЭЯпЉМдЄ§дЇЇзЪДеЕ≥з≥їеЬ®ињЩжђ°иІБйЭҐйЗМзїІзї≠жО®ињЫгАВ'];
  if(lastUser) parts.push('зФ®жИЈжЬАеРОи°®иЊЊдЇЖпЉЪ' + lastUser.slice(0, 60) + 'гАВ');
  if(lastAssistant) parts.push('иІТиЙ≤жЬАеРОеЫЮеЇФдЇЖпЉЪ' + lastAssistant.slice(0, 60) + 'гАВ');
  return parts.join('');
}
function setExitMenuBusy(busy){
  var btn = document.getElementById('exitMenuConfirmBtn');
  if(!btn) return;
  btn.disabled = !!busy;
  btn.textContent = busy ? 'ж≠£еЬ®йААеЗЇ...' : 'еЕИиѓіеЖНиІБ';
}
async function exitOfflineMeet(){
  if(exitingOfflineMeet) return;
  exitingOfflineMeet = true;
  offlineCloseIntent = 'ended';
  setExitMenuBusy(true);
  if(!session || !character || !character.id){
    try{ window.parent.postMessage({ type:'OFFLINE_EXITED' }, '*'); }catch(e){}
    window.parent.postMessage({ type:'OPEN_APP_REPLACE', payload:'chat' }, '*');
    setTimeout(function(){
      exitingOfflineMeet = false;
      offlineCloseIntent = '';
      setExitMenuBusy(false);
    }, 120);
    return;
  }
  archiveCurrentOfflineMeet('ended', 'goodbye');
  try{ window.parent.postMessage({ type:'OFFLINE_EXITED' }, '*'); }catch(e){}
  window.parent.postMessage({ type:'OPEN_APP_REPLACE', payload:'chat' }, '*');
  setTimeout(function(){
    exitingOfflineMeet = false;
    offlineCloseIntent = '';
    setExitMenuBusy(false);
  }, 120);
}
function openExitMenu(){
  document.getElementById('exitMenu')?.classList.add('open');
}
function closeExitMenu(){
  document.getElementById('exitMenu')?.classList.remove('open');
}
function minimizeOfflineMeet(){
  closeExitMenu();
  offlineCloseIntent = 'minimize';
  if(session){
    session.minimized = true;
    saveSession();
  }
  try{
    window.parent.postMessage({ type:'OFFLINE_MINIMIZED', payload:{ charId: character && character.id } }, '*');
  }catch(e){}
  window.parent.postMessage({ type:'OPEN_APP', payload:'chat' }, '*');
}
function restoreOfflineMeet(){
  offlineCloseIntent = '';
  if(session){
    session.minimized = false;
    saveSession();
  }
  document.querySelector('.shell')?.classList.remove('minimized');
  document.getElementById('offlineMiniLauncher')?.classList.remove('show');
}
async function confirmExitOfflineMeet(){
  if(exitingOfflineMeet) return;
  closeExitMenu();
  await exitOfflineMeet();
}
function showFlightIfNeeded(){
  var overlay = document.getElementById('flightOverlay');
  if(!overlay || !session) return;
  if(!session.pendingAnimation && !shouldBootOpeningFlow()) return;
  overlay.classList.add('show');
  bindFlightGameControls();
  startFlightGame();
}
function hideFlightOverlay(){
  var overlay = document.getElementById('flightOverlay');
  if(!overlay) return;
  overlay.classList.remove('show');
  stopFlightGame();
  if(session){
    session.pendingAnimation = false;
    saveSession();
  }
}
async function init(){
  try{
    var initUrl = new URL(window.location.href);
    desiredOfflineCharId = String(initUrl.searchParams.get('char') || localStorage.getItem(scopedKey('activeOfflineCharacterId')) || localStorage.getItem('activeOfflineCharacterId') || '').trim();
  }catch(err){
    desiredOfflineCharId = String(localStorage.getItem(scopedKey('activeOfflineCharacterId')) || localStorage.getItem('activeOfflineCharacterId') || '').trim();
  }
  character = loadCharacter(desiredOfflineCharId);
  var resumeSession = desiredOfflineCharId ? consumePendingOfflineResume(desiredOfflineCharId) : null;
  var bootSession = desiredOfflineCharId ? consumePendingOfflineBootstrap(desiredOfflineCharId) : null;
  var launchSeed = desiredOfflineCharId ? consumePendingOfflineLaunch(desiredOfflineCharId) : null;
  if(resumeSession && hasMeaningfulOfflineSession(resumeSession)){
    session = resumeSession;
  }else if(bootSession && (hasMeaningfulOfflineSession(bootSession) || (bootSession.invite && bootSession.active !== false))){
    session = bootSession;
    if(character && character.id) saveSession();
  }else{
    session = loadSession();
  }
  if((!session || !hasMeaningfulOfflineSession(session) || session.active === false) && launchSeed){
    session = {
      active: true,
      invite: launchSeed.payload || null,
      entries: [],
      pendingAnimation: true,
      pendingOpening: true,
      chatHistory: String(launchSeed.chatHistory || ''),
      updatedAt: Date.now()
    };
    if(character && character.id) saveSession();
  }
  await hydrateOfflineMemorySnippet();
  refreshOfflineAvatarAssets();
  if((!character || !character.id) && session && session.invite){
    var fallbackRecord = findLatestOfflineSessionRecord();
    if(fallbackRecord && fallbackRecord.charId){
      var fallbackChar = findCharacterById(fallbackRecord.charId);
      if(fallbackChar) character = fallbackChar;
    }
  }
  if(!session){
    session = { active:false, entries:[] };
  }
  if(session && session.invite && (!Array.isArray(session.entries) || !session.entries.length)){
    session.active = true;
    if(!session.pendingOpening) session.pendingOpening = true;
    if(!session.pendingAnimation) session.pendingAnimation = true;
  }
  if(shouldBootOpeningFlow()){
    session.active = true;
    if(!session.pendingOpening) session.pendingOpening = true;
    if(!session.pendingAnimation) session.pendingAnimation = true;
    saveSession();
  }
  if(session && session.minimized){
    document.querySelector('.shell')?.classList.add('minimized');
    document.getElementById('offlineMiniLauncher')?.classList.add('show');
  }
  renderStory();
  primeOfflineStatusCards();
  showFlightIfNeeded();
  await generateOpeningIfNeeded();
  renderStory();
  syncOfflineViewport();
  var input = document.getElementById('offlineInput');
  if(input && !input.dataset.boundEnter){
    input.dataset.boundEnter = '1';
    ['keydown','keypress','keyup'].forEach(function(evtName){
      input.addEventListener(evtName, function(evt){
        if(evt.key === 'Enter' && !evt.shiftKey){
          evt.preventDefault();
          evt.stopPropagation();
          if(typeof evt.stopImmediatePropagation === 'function') evt.stopImmediatePropagation();
          if(evtName === 'keydown') sendOfflineTurn();
        }
      });
    });
    input.addEventListener('keydown', function(evt){
      if(evt.key === 'Enter' && !evt.shiftKey){
        evt.preventDefault();
        evt.stopPropagation();
        if(typeof evt.stopImmediatePropagation === 'function') evt.stopImmediatePropagation();
      }
    });
    input.addEventListener('input', keepOfflineComposerVisible);
  }
}
document.addEventListener('click', function(e){
  var avatar = e.target && e.target.closest ? e.target.closest('.avatar,.char-polaroid-frame,.offline-story-avatar') : null;
  var exitCard = e.target && e.target.closest ? e.target.closest('.exit-menu-card') : null;
  var editCard = e.target && e.target.closest ? e.target.closest('.offline-edit-card') : null;
  var statusCard = e.target && e.target.closest ? e.target.closest('.offline-status-card') : null;
  if(e.target === document.getElementById('exitMenu') && !exitCard){
    closeExitMenu();
  }
  if(e.target === document.getElementById('offlineEditOverlay') && !editCard){
    closeOfflineEditModal();
  }
  if(e.target === document.getElementById('offlineStatusOverlay') && !statusCard){
    closeOfflineStatusModal();
  }
  if(!avatar) closeThoughtBubbles();
});
window.addEventListener('message', function(e){
  var data = e.data || {};
  if(data.type === 'APP_CLOSING'){
    autoArchiveOfflineMeetIfNeeded('app_closing');
  }
});
window.addEventListener('pagehide', function(){
  autoArchiveOfflineMeetIfNeeded('pagehide');
});
window.addEventListener('beforeunload', function(){
  autoArchiveOfflineMeetIfNeeded('beforeunload');
});
window.addEventListener('resize', syncOfflineViewport);
window.addEventListener('orientationchange', syncOfflineViewport);
window.addEventListener('focusin', function(e){
  if(e.target && (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT')){
    keepOfflineComposerVisible();
  }
});
window.addEventListener('load', syncOfflineViewport);
if(window.visualViewport){
  window.visualViewport.addEventListener('resize', function(){
    syncOfflineViewport();

  });
  window.visualViewport.addEventListener('scroll', syncOfflineViewport);
}
init();
