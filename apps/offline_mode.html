<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,viewport-fit=cover,interactive-widget=overlays-content">
<title>线下模式</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Nunito:wght@700;900&family=Caveat:wght@600;700&family=Ma+Shan+Zheng&family=Zhi+Mang+Xing&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
<script src="../assetStore.js"></script>
<script src="../promptManager.js"></script>
<script src="../accountManager.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --b:#0a0a0a;--w:#fff;--off:#f4f4f1;--g:#6f6f6f;--bd:2px solid #0a0a0a;--sh:2px 2px 0 #0a0a0a;
  --font:'Quicksand',sans-serif;--fontd:'Nunito',sans-serif;--fontc:'Caveat',cursive;
  --offline-safe-bottom:max(env(safe-area-inset-bottom),0px);
  --offline-app-height:100dvh;
  --offline-keyboard-inset:0px;
  --offline-composer-height:64px;
}
html,body{width:100%;height:100%;overflow:hidden}
body{font-family:var(--font);background:#f5f1e8;color:var(--b);position:relative;height:var(--offline-app-height);min-height:var(--offline-app-height)}
.paper-bg,.paper-bg::before,.paper-bg::after{position:absolute;inset:0;pointer-events:none}
.paper-bg{background:#f5f1e8}
.paper-bg::before{display:none}
.paper-bg::after{display:none}
.shell{position:relative;z-index:1;height:100%;display:flex;flex-direction:column}
.topbar{display:none}
.top-pill{display:none}
.top-heart{display:none}
.story-wrap{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;padding:calc(68px + env(safe-area-inset-top)) 14px calc(var(--offline-composer-height) + 2px) 14px;display:flex;flex-direction:column;gap:6px;scrollbar-width:none;overscroll-behavior-y:contain;-webkit-overflow-scrolling:touch}
.story-wrap::-webkit-scrollbar{display:none}
.story-card{position:relative;min-height:320px;border:var(--bd);border-radius:34px;background:rgba(255,255,255,.82);box-shadow:3px 4px 0 #0a0a0a;padding:22px 18px 20px;overflow:hidden}
.story-card::before{content:'';position:absolute;inset:18px;border:1.5px solid rgba(10,10,10,.48);border-radius:26px;pointer-events:none}
.story-card.char .card-flower{right:-10px;bottom:22px}
.story-card.user .card-flower{left:-12px;bottom:16px;transform:scaleX(-1)}
.story-card.char{padding:0 0 150px;background:transparent;border:none;box-shadow:none;overflow:visible;min-height:380px;width:100%}
.story-card.char::before{display:none}
.char-layout{position:relative;min-height:0;padding:6px 0 10px}
.char-paper-layer{position:absolute;width:326px;height:340px;border:1px solid rgba(10,10,10,.24);background-position:center;background-repeat:no-repeat;background-size:cover;box-shadow:none}
.char-paper-layer::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,.16)}
.char-paper-layer.back-one{left:48px;top:-10px;background-image:url('assets/报纸1.jpg');transform:rotate(3.1deg);z-index:1;opacity:1}
.char-paper-layer.back-two{left:-6px;top:38px;background-image:url('assets/报纸2.jpg');transform:rotate(-3.8deg);z-index:1;opacity:1}
.char-main-sheet{position:absolute;left:14px;top:28px;width:326px;height:340px;background:#fdfdf8;border:1.8px solid rgba(10,10,10,.56);box-shadow:none;z-index:2}
.char-main-sheet::before{content:'';position:absolute;inset:0;border:1px solid rgba(255,255,255,.78);pointer-events:none}
.char-flower{position:absolute;right:-24px;top:158px;width:98px;height:166px;z-index:4;pointer-events:none;transform:rotate(14deg);opacity:1}
.char-flower img{display:block;width:100%;height:100%;object-fit:contain;filter:grayscale(1) brightness(0) contrast(1.2)}
.char-heart-pin{display:none}
.char-polaroid-stack{position:absolute;left:-14px;top:-4px;width:116px;height:138px;z-index:6}
.char-polaroid-main{position:absolute;left:18px;top:0;width:86px;height:86px;border:none;border-radius:0;background:transparent;box-shadow:none;padding:0;transform:rotate(7deg)}
.char-polaroid-main::before{display:none}
.char-polaroid-frame{width:100%;height:100%;border:2px solid #111;border-radius:18px;background:#fff;box-shadow:4px 4px 0 rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;overflow:hidden;font-family:'Zhi Mang Xing',cursive;font-size:23px;font-weight:400;text-align:center;color:#111;line-height:1.04}
.char-polaroid-frame img{width:100%;height:100%;object-fit:cover}
.char-camera{position:absolute;left:-6px;top:52px;width:96px;height:68px;background:url('assets/相机.png') center/contain no-repeat;filter:drop-shadow(1px 2px 0 rgba(0,0,0,.24));z-index:7;transform:rotate(-11deg)}
.char-sheet-content{position:absolute;left:34px;top:38px;width:282px;z-index:3;padding:4px 12px 16px 8px;background:transparent;border:none;box-shadow:none}
.char-sheet-actline{font-family:'Ma Shan Zheng',cursive;font-size:44px;line-height:1;color:#111;text-align:center;margin-bottom:12px}
.char-sheet-rule,.char-sheet-heart,.char-sheet-note{display:none}
.char-sheet-text{width:100%;font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;font-size:14px;font-weight:600;line-height:1.86;letter-spacing:0;white-space:pre-wrap;word-break:break-word;color:#111}
.char-sheet-text p{margin:0 0 12px}
.char-sheet-text p:last-child{margin-bottom:0}
.char-sheet-text .sheet-quote-inline,.offline-story-body .sheet-quote-inline{display:inline-block;padding:1px 9px 3px;margin:0 4px 2px;border:2px solid #0a0a0a;background:#fff !important;color:#111 !important;box-shadow:3px 3px 0 #0a0a0a;line-height:1.62;vertical-align:baseline;font-weight:900;border-radius:2px}
.char-sheet-aside,.offline-story-body .char-sheet-aside{margin:4px 0 14px;color:#6f8fd8;font-style:italic;font-weight:600;text-align:left}
.char-sheet-aside::before,.offline-story-body .char-sheet-aside::before{display:none}
.char-sheet-sign{display:block;margin-top:10px;margin-left:0;max-width:198px;font-family:'Zhi Mang Xing',cursive;font-size:30px;font-weight:400;color:#575757;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-decoration:none}
.char-act-badge{position:absolute;left:132px;top:42px;z-index:5;padding:0;border:none;border-radius:0;background:transparent;box-shadow:none;font-family:'Ma Shan Zheng',cursive;font-size:36px;font-weight:400;color:#1b1b1b;text-decoration:none;display:none}
.story-card.user{padding:0;background:transparent;border:none;box-shadow:none;overflow:visible;min-height:0;margin-top:0;width:100%}
.story-card.user::before{display:none}
.story-card.user .char-paper-layer.back-one{left:auto;right:52px;top:20px;transform:rotate(-3.1deg)}
.story-card.user .char-paper-layer.back-two{left:auto;right:0;top:58px;transform:rotate(3.8deg)}
.story-card.user .char-main-sheet{left:auto;right:24px;top:52px}
.story-card.user .char-polaroid-stack{left:auto;right:-10px;top:18px}
.story-card.user .char-polaroid-main{left:auto;right:18px;transform:rotate(-7deg)}
.story-card.user .char-camera{left:auto;right:-6px;top:62px;transform:rotate(11deg)}
.story-card.user .char-sheet-content{left:auto;right:44px;top:62px;padding:4px 8px 8px 12px}
.story-card.user .char-flower{right:auto;left:-40px;top:224px;transform:rotate(-14deg)}
.story-card.user .char-sheet-sign{margin-left:auto;margin-right:0;text-align:right}
.card-paper{position:absolute;inset:26px;border-radius:24px;background:rgba(248,248,244,.88)}
.card-paper::before{content:'';position:absolute;left:0;right:0;top:0;height:42px;background:url('assets/报纸1.jpg') center top/cover no-repeat;opacity:.7}
.card-flower{position:absolute;width:108px;height:108px;background:url('assets/边框花.png') center/contain no-repeat;opacity:.98}
.camera-sticker{position:absolute;width:118px;height:84px;background:url('assets/相机.png') center/contain no-repeat;filter:drop-shadow(1px 2px 0 rgba(0,0,0,.35))}
.story-card.char .camera-sticker{left:14px;top:92px;transform:rotate(-10deg)}
.story-card.user .camera-sticker{right:18px;top:92px;transform:rotate(9deg)}
.polaroid{position:absolute;width:118px;height:148px;border:var(--bd);background:#fafaf6;box-shadow:var(--sh);padding:12px 10px 42px;display:flex;align-items:center;justify-content:center;text-align:center;font-family:var(--fontd);font-size:13px;font-weight:900}
.story-card.char .polaroid{left:18px;top:26px;transform:rotate(-8deg)}
.story-card.user .polaroid{right:18px;top:26px;transform:rotate(10deg)}
.polaroid::after{content:'+';position:absolute;left:50%;bottom:12px;transform:translateX(-50%);font-size:26px;font-weight:900}
.polaroid .avatar{width:88px;height:88px;border:var(--bd);background:#efefef;border-radius:2px;overflow:hidden;display:flex;align-items:center;justify-content:center;cursor:pointer}
.polaroid .avatar img{width:100%;height:100%;object-fit:cover}
.heart-pin{position:absolute;top:20px;right:18px;width:62px;height:62px;border:var(--bd);border-radius:999px;background:rgba(255,255,255,.94);box-shadow:var(--sh);display:flex;align-items:center;justify-content:center;font-size:32px}
.act-badge{position:absolute;bottom:18px;padding:10px 18px;border:var(--bd);border-radius:24px;background:rgba(245,245,241,.95);box-shadow:var(--sh);font-family:var(--fontc);font-size:28px;font-weight:700;text-decoration:underline}
.story-card.char .act-badge{left:18px}
.story-card.user .act-badge{right:18px}
.char-sign,.user-sign{position:absolute;bottom:34px;font-family:var(--fontc);font-size:30px;font-weight:700;color:#5e5e5e;text-decoration:underline}
.story-card.char .char-sign{right:116px}
.story-card.user .user-sign{left:116px}
.story-content{position:relative;z-index:2;margin:56px 54px 54px;padding:18px 18px 12px;line-height:1.9;font-size:14px;font-weight:700;white-space:pre-wrap;word-break:break-word}
.story-card.user .story-content{margin:56px 72px 54px 34px}
.story-card.char .story-content{margin:56px 34px 54px 72px}
.meta-row{position:relative;z-index:2;display:flex;align-items:center;justify-content:space-between;gap:12px;margin:0 58px}
.meta-label{font-family:var(--fontd);font-size:12px;font-weight:900;color:var(--g);letter-spacing:.08em;text-transform:uppercase}
.meta-heart{font-size:14px;font-weight:900;max-width:58%;text-align:right}
.mem-empty{font-size:12px;color:var(--g);line-height:1.6}
.inner-voice-overlay{position:fixed;inset:0;z-index:120;display:none;align-items:center;justify-content:center;padding:20px;background:rgba(255,255,255,.4);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.inner-voice-overlay.open{display:flex}
.inner-voice-card{width:min(380px,100%);max-height:min(82vh,700px);background:var(--w);border:var(--bd);border-radius:18px;box-shadow:var(--sh);overflow:hidden;display:flex;flex-direction:column}
.inner-voice-head{padding:12px 12px 10px;border-bottom:var(--bd);display:flex;align-items:center;justify-content:space-between;gap:10px;background:linear-gradient(180deg,#fff 0%,#f4f4f4 100%)}
.inner-voice-head-left{display:flex;align-items:center;gap:6px;min-width:32px}
.inner-voice-title{font-family:var(--fontd);font-size:16px;font-weight:900;text-align:center;flex:1}
.inner-voice-mini{width:32px;height:32px;border:var(--bd);border-radius:999px;background:#fff;box-shadow:var(--sh);font-family:var(--fontd);font-size:14px;font-weight:900;cursor:pointer}
.inner-voice-mini:active{transform:translate(1px,1px);box-shadow:1px 1px 0 #0a0a0a}
.inner-voice-body{padding:12px;overflow:auto;display:flex;flex-direction:column;gap:10px}
.inner-voice-box{border:var(--bd);border-radius:12px;padding:10px 12px;font-size:12px;font-weight:700;line-height:1.7;white-space:pre-wrap}
.inner-voice-box.normal{background:#fff;color:var(--b)}
.inner-voice-box.desire{background:#505050;color:#fff;border-color:#2f2f2f}
.inner-voice-meta{font-size:11px;color:var(--g);font-weight:800}
.composer{position:fixed;left:14px;right:14px;bottom:calc(var(--offline-keyboard-inset) + 12px);z-index:25;display:flex;gap:8px;align-items:center;padding-bottom:max(2px,var(--offline-safe-bottom))}
.composer-box{flex:1;min-height:34px;border:var(--bd);border-radius:16px;background:rgba(255,255,255,.95);box-shadow:var(--sh);padding:6px 10px;display:flex;align-items:center}
.composer-box textarea{width:100%;border:none;outline:none;background:transparent;height:20px;min-height:20px;max-height:20px;resize:none;font-family:var(--font);font-size:13px;font-weight:600;line-height:20px;color:var(--b);overflow:hidden}
.composer-actions{display:flex;gap:8px;align-items:center}
.composer-btn{width:34px;height:34px;border-radius:50%;border:var(--bd);background:#fff;color:#0a0a0a;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:var(--sh);transition:transform .12s,box-shadow .12s}
.composer-btn:active{transform:translate(2px,2px);box-shadow:0 0 0}
.composer-btn.primary{background:#fff;color:#0a0a0a}
.composer-btn.reply{background:#fff;color:#0a0a0a}
.composer-btn:disabled{background:#d7d7d7;color:#7c7c7c;box-shadow:none;cursor:not-allowed}
.exit-btn{position:fixed;right:14px;top:calc(22px + env(safe-area-inset-top));z-index:30;width:44px;height:44px;border:2px solid #7c1111;border-radius:999px;background:#cf2626;color:#fff;box-shadow:2px 2px 0 rgba(124,17,17,.9);font-family:var(--fontd);font-size:22px;font-weight:900;cursor:pointer}
.shell.minimized{display:none}
.offline-mini-launcher{position:fixed;left:16px;bottom:22px;z-index:95;display:none;width:68px;height:68px;border:var(--bd);border-radius:999px;background:#fff;box-shadow:var(--sh);align-items:center;justify-content:center;cursor:pointer}
.offline-mini-launcher.show{display:flex}
.offline-mini-launcher img{width:42px;height:42px;object-fit:contain;filter:grayscale(1) contrast(1.06)}
.exit-menu{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:110;background:rgba(255,255,255,.24);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.exit-menu.open{display:flex}
.exit-menu-card{width:min(280px,calc(100vw - 36px));border:var(--bd);border-radius:28px;background:#fff;box-shadow:var(--sh);padding:18px;display:flex;flex-direction:column;gap:12px}
.exit-menu-title{font-family:var(--fontd);font-size:16px;font-weight:900}
.exit-menu-sub{font-size:12px;line-height:1.6;color:var(--g)}
.exit-menu-actions{display:flex;flex-direction:column;gap:10px}
.exit-menu-btn{width:100%;padding:12px 14px;border:var(--bd);border-radius:16px;background:#fff;color:#0a0a0a;box-shadow:var(--sh);font-family:var(--fontd);font-size:13px;font-weight:900;cursor:pointer}
.exit-menu-btn:active{transform:translate(1px,1px);box-shadow:1px 1px 0 #0a0a0a}
.char-photo-input{display:none}
.flight-overlay{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(244,244,240,.16);backdrop-filter:blur(18px) saturate(115%);-webkit-backdrop-filter:blur(18px) saturate(115%);z-index:60}
.flight-overlay.show{display:flex}
.flight-card{width:min(338px,calc(100vw - 32px));border:1.5px solid rgba(10,10,10,.55);border-radius:30px;background:linear-gradient(180deg,rgba(255,255,255,.68) 0%,rgba(250,250,247,.56) 100%);box-shadow:0 20px 48px rgba(0,0,0,.14),0 1px 0 rgba(255,255,255,.7) inset;padding:18px 18px 16px;display:flex;flex-direction:column;gap:14px}
.flight-map{position:relative;height:176px;border:1.5px solid rgba(10,10,10,.18);border-radius:24px;background:radial-gradient(circle at 20% 18%,rgba(255,255,255,.88),transparent 26%),linear-gradient(180deg,rgba(255,255,255,.76) 0%,rgba(238,238,233,.58) 100%);overflow:hidden}
.flight-game{position:absolute;inset:0;width:100%;height:100%;display:block;touch-action:manipulation;cursor:pointer}
.flight-copy{font-family:var(--fontd);font-size:17px;font-weight:900;text-align:center}
.flight-subcopy{font-size:12px;line-height:1.6;color:#4f4f4f;text-align:center}
.flight-tip{font-size:11px;line-height:1.4;color:#5b5b5b;text-align:center}
.toast{position:fixed;bottom:164px;left:50%;transform:translateX(-50%) translateY(16px);background:#0a0a0a;color:#fff;padding:9px 16px;border-radius:999px;font-size:12px;font-weight:800;opacity:0;transition:.24s;z-index:80}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.story-wrap{padding:calc(70px + env(safe-area-inset-top)) 14px calc(var(--offline-composer-height) + 8px) 14px;gap:26px;background:
linear-gradient(180deg,rgba(255,255,255,.34),rgba(255,255,255,.06)),
radial-gradient(circle at 12% 20%,rgba(255,255,255,.32),transparent 28%),
radial-gradient(circle at 86% 12%,rgba(255,255,255,.24),transparent 22%),
linear-gradient(180deg,#d9d9d7 0%,#efefed 34%,#d7d7d3 100%)}
.story-card{min-height:0;border:none;border-radius:0;background:transparent;box-shadow:none;padding:0;overflow:visible}
.story-card::before,
.story-card.char::before,
.story-card.user::before{display:none}
.story-card.char,
.story-card.user{padding:0;background:transparent;border:none;box-shadow:none;min-height:0;width:min(100%,352px);display:flex;flex-direction:column;gap:12px;position:relative;flex:0 0 auto}
.story-card.char{align-self:flex-start}
.story-card.user{align-self:flex-end}
.offline-story-strip{position:relative;display:flex;align-items:center;min-height:78px}
.story-card.user .offline-story-strip{justify-content:flex-end}
.offline-story-strip-shell{position:relative;width:calc(100% - 28px);min-height:62px;border:1.5px solid rgba(26,26,26,.72);border-radius:30px;background:linear-gradient(180deg,rgba(255,255,255,.98),rgba(247,247,244,.95));box-shadow:0 0 0 1px rgba(255,255,255,.96) inset,0 12px 26px rgba(0,0,0,.05);display:flex;align-items:center;padding:0 22px 0 88px;overflow:hidden}
.offline-story-strip-shell::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.52),rgba(255,255,255,.68)),url('assets/小狗海边傻乎乎.jpg') center/cover no-repeat;opacity:.9;pointer-events:none}
.offline-story-strip-shell > *{position:relative;z-index:1}
.story-card.user .offline-story-strip-shell{padding:0 88px 0 22px}
.offline-story-avatar{position:absolute;top:0;width:68px;height:68px;border-radius:999px;border:1.5px solid rgba(18,18,18,.74);box-shadow:0 0 0 2px rgba(255,255,255,.95),0 10px 20px rgba(0,0,0,.08);background:#fff;overflow:hidden;display:flex;align-items:center;justify-content:center;font-family:var(--fontd);font-size:18px;font-weight:900;color:#111;flex-shrink:0}
.offline-story-avatar::before,.offline-story-avatar::after{display:none}
.story-card.char .offline-story-avatar{left:0}
.story-card.user .offline-story-avatar{right:0}
.offline-story-avatar img{width:100%;height:100%;object-fit:cover}
.offline-story-stats{display:flex;align-items:center;justify-content:space-between;gap:12px;min-width:0;width:100%}
.story-card.user .offline-story-stats{justify-content:space-between}
.offline-story-stat{display:inline-flex;align-items:center;gap:6px;font-family:var(--fontd);font-size:11px;font-weight:900;color:#555}
.offline-story-stat-icon{font-size:11px;line-height:1}
.offline-story-panel{position:relative;border:1.5px solid rgba(26,26,26,.72);border-radius:30px;background:
linear-gradient(180deg,rgba(255,255,255,.985),rgba(246,246,243,.95)),
radial-gradient(circle at 10% 12%,rgba(255,255,255,.3),transparent 28%);
box-shadow:0 0 0 1px rgba(255,255,255,.97) inset,0 14px 28px rgba(0,0,0,.06);padding:18px 18px 16px;overflow:hidden}
.offline-story-panel::before{display:none}
.offline-story-panel > *{position:relative;z-index:1}
.offline-story-tools{margin-top:12px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.offline-story-tools-left{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.story-card.user .offline-story-tools{display:none}
.offline-story-editbtn{width:30px;height:30px;border:1.5px solid rgba(0,0,0,.12);border-radius:999px;background:rgba(255,255,255,.88);display:flex;align-items:center;justify-content:center;color:#565656;cursor:pointer;box-shadow:0 1px 0 rgba(255,255,255,.85) inset}
.offline-story-editbtn:active{transform:translateY(1px)}
.offline-story-editbtn svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.offline-story-thought-row{display:flex;align-items:center;justify-content:flex-start}
.offline-think{width:100%}
.offline-think[open] .offline-think-toggle{box-shadow:1px 1px 0 #1f1f1f}
.offline-think-toggle{list-style:none;display:inline-flex;align-items:center;gap:10px;padding:10px 16px;border:2px solid rgba(32,32,32,.26);border-radius:999px;background:rgba(255,255,255,.96);box-shadow:3px 3px 0 rgba(0,0,0,.16);font-family:var(--fontd);font-size:12px;font-weight:900;color:#1f1f1f;cursor:pointer}
.offline-think-toggle::-webkit-details-marker{display:none}

<body>
<div class="paper-bg" aria-hidden="true"></div>
<div class="shell">
  <div class="story-wrap" id="storyList"></div>
  <div class="composer">
    <button class="composer-btn reply" id="offlineRerollBtn" type="button" onclick="rerollOfflineTurn()">↻</button>
    <div class="composer-box">
      <textarea id="offlineInput" placeholder="写下你此刻线下想说的话..."></textarea>
    </div>
    <div class="composer-actions">
      <button class="composer-btn reply" id="offlineReplyBtn" type="button" onclick="requestOfflineReply()">✦</button>
      <button class="composer-btn primary" id="offlineSendBtn" type="button" onclick="sendOfflineTurn()">➤</button>
    </div>
  </div>
</div>
<button class="exit-btn" id="offlineExitBtn" type="button" onclick="openExitMenu()">×</button>

<div class="flight-overlay" id="flightOverlay">
  <div class="flight-card">
    <div class="flight-copy">正在赶往这场见面</div>
    <div class="flight-subcopy">第一幕在认真写啦，点一下屏幕让小兔子跳起来</div>
    <div class="flight-map">
      <canvas class="flight-game" id="flightGame" width="300" height="176" aria-label="等待中的小兔子跳跃游戏"></canvas>
    </div>
    <div class="flight-tip" id="flightGameTip">轻点屏幕或按空格让小兔子跳跃</div>
  </div>
</div>

<div class="toast" id="toast"></div>
<button class="offline-mini-launcher" id="offlineMiniLauncher" type="button" onclick="restoreOfflineMeet()"><img src="assets/线下模式图标.png" alt="线下模式"></button>
<div class="exit-menu" id="exitMenu">
  <div class="exit-menu-card">
    <div class="exit-menu-title">要先离开一下吗</div>
    <div class="exit-menu-sub">你可以把这次约会暂时缩起来，或者认真说完再见后退出。</div>
    <div class="exit-menu-actions">
      <button class="exit-menu-btn" type="button" onclick="minimizeOfflineMeet()">暂时离开</button>
      <button class="exit-menu-btn" id="exitMenuConfirmBtn" type="button" onclick="confirmExitOfflineMeet()">先说再见</button>
      <button class="exit-menu-btn" type="button" onclick="closeExitMenu()">再待一会</button>
    </div>
  </div>
</div>
<div class="offline-edit-overlay" id="offlineEditOverlay">
  <div class="offline-edit-card">
    <div class="offline-edit-title">编辑这一幕</div>
    <textarea class="offline-edit-textarea" id="offlineEditTextarea" placeholder="在这里编辑正文..."></textarea>
    <div class="offline-edit-actions">
      <button class="offline-edit-btn" type="button" onclick="closeOfflineEditModal()">取消</button>
      <button class="offline-edit-btn primary" type="button" onclick="saveOfflineEditModal()">保存</button>
    </div>
  </div>
</div>
<div class="offline-status-overlay" id="offlineStatusOverlay">
  <div class="offline-status-card">
    <button class="offline-status-close" type="button" onclick="closeOfflineStatusModal()">×</button>
    <div class="offline-status-top" id="offlineStatusTop"></div>
    <div class="offline-status-grid" id="offlineStatusGrid"></div>
  </div>
</div>

<script>
var promptManager = new (window.PromptManager || function(){})();
var session = null;
var character = null;
var desiredOfflineCharId = '';
var sending = false;
var exitingOfflineMeet = false;
var archivingOfflineMeet = false;
var offlineCloseIntent = '';
var flightGameState = null;
var runtimeUserAvatar = '';
var runtimeCharAvatar = '';
var offlineMemorySnippetCache = '';
var offlineEditingIndex = -1;
var offlineMoodFaces = {
  soft:['(˶ᵔ ᵕ ᵔ˶)','(◍•ᴗ•◍)','(˵¯͒〰¯͒˵)','(｡•ㅅ•｡)'],
  moody:['(¬_¬ )','(◔_◔)','( －з)','(눈_눈)'],
  bright:['(๑˃̵ᴗ˂̵)و','(ﾉ´ヮ`)ﾉ*: ･ﾟ','(≧▽≦)','(๑•̀ㅂ•́)و'],
  sleepy:['(∪｡∪)｡｡｡','( ｡•́ - •̀｡)','(=-ω-)=','(つ .•́ _ʖ •̀.)つ']
};

function activeAccountId(){
  try{ return window.AccountManager && window.AccountManager.getActive ? ((window.AccountManager.getActive() || {}).id || '') : ''; }catch(e){ return ''; }
}
function scopedKey(base){
  var accountId = activeAccountId();
  return accountId ? (base + '__acct_' + accountId) : base;
}
function activeCharacterKey(){
  return scopedKey('activeCharacter');
}
function offlineSessionKey(charId){
  return scopedKey('offline_meet_session_' + String(charId || ''));
}
function pendingOfflineMemoryKey(charId){
  return scopedKey('offline_memory_pending_' + String(charId || ''));
}
function pendingOfflineNoticeKey(charId){
  return scopedKey('offline_notice_pending_' + String(charId || ''));
}
function offlineArchiveListKey(){
  return scopedKey('offline_meet_archives');
}
function loadOfflineArchives(){
  try{
    var parsed = JSON.parse(localStorage.getItem(offlineArchiveListKey()) || '[]');
    return Array.isArray(parsed) ? parsed : [];
  }catch(e){
    return [];
  }
}
function saveOfflineArchives(list){
  try{
    localStorage.setItem(offlineArchiveListKey(), JSON.stringify(Array.isArray(list) ? list : []));
  }catch(e){}
}
function snapshotOfflineSessionState(source){
  var base = source || session || null;
  if(!base) return null;
  try{
    return JSON.parse(JSON.stringify(base));
  }catch(e){
    return null;
  }
}
function hasMeaningfulOfflineSession(snapshot){
  if(!snapshot || typeof snapshot !== 'object') return false;
  if(Array.isArray(snapshot.entries) && snapshot.entries.length) return true;
  if(snapshot.pendingOpening || snapshot.pendingAnimation) return true;
  if(snapshot.invite) return true;
  return !!snapshot.active;
}
function buildOfflineArchivePreview(snapshot){
  var list = Array.isArray(snapshot && snapshot.entries) ? snapshot.entries.slice().reverse() : [];
  for(var i = 0; i < list.length; i += 1){
    var entry = list[i];
    var text = String(entry && entry.text || '').replace(/\s+/g, ' ').trim();
    if(text) return text.slice(0, 72);
  }
  return '这次约会还没有写下太多内容。';
}
function upsertOfflineArchive(snapshot, options){
  if(!snapshot || !character || !character.id) return '';
  var opts = options || {};
  var list = loadOfflineArchives();
  var now = Date.now();
  var archiveId = String(opts.archiveId || snapshot.archiveId || ('offline_archive_' + now + '_' + Math.random().toString(36).slice(2, 8)));
  var existingIndex = list.findIndex(function(item){ return item && item.id === archiveId; });
  var existing = existingIndex >= 0 ? list[existingIndex] : null;
  var charSnapshot = Object.assign({}, existing && existing.characterSnapshot || {}, character || {});
  var archiveSnapshot = snapshotOfflineSessionState(snapshot) || { active:false, entries:[] };
  archiveSnapshot.archiveId = archiveId;
  archiveSnapshot.minimized = false;
  archiveSnapshot.active = opts.status === 'pending';
  var entry = Object.assign({}, existing || {}, {
    id: archiveId,
    charId: String(character.id || ''),
    charName: String((character.nickname || character.name || '未命名角色')).trim() || '未命名角色',
    charAvatar: resolveCharAvatar() || charSnapshot.imageData || '',
    userName: resolveUserName(),
    status: opts.status === 'ended' ? 'ended' : 'pending',
    statusLabel: opts.status === 'ended' ? '已结束' : '待续',
    reason: String(opts.reason || '').trim(),
    createdAt: Number(existing && existing.createdAt || archiveSnapshot.createdAt || archiveSnapshot.updatedAt || now) || now,
    updatedAt: now,
    preview: buildOfflineArchivePreview(archiveSnapshot),
    entryCount: Array.isArray(archiveSnapshot.entries) ? archiveSnapshot.entries.length : 0,
    characterSnapshot: charSnapshot,
    snapshot: archiveSnapshot
  });
  if(opts.status === 'ended'){
    entry.endedAt = now;
  }else{
    entry.endedAt = 0;
  }
  if(existingIndex >= 0) list.splice(existingIndex, 1);
  list.unshift(entry);
  saveOfflineArchives(list);
  return archiveId;
}
function queueOfflineEndArtifacts(targetCharId, snapshot){
  if(!targetCharId || !snapshot) return;
  localStorage.setItem(pendingOfflineNoticeKey(targetCharId), JSON.stringify({
    text: '[系统提示：这次线下见面结束了，你们回到了线上聊天。]',
    createdAt: Date.now()
  }));
  try{
    var memoryText = summarizeOfflineMemoryLocally(snapshot);
    if(memoryText){
      localStorage.setItem(pendingOfflineMemoryKey(targetCharId), JSON.stringify({
        text: memoryText,
        createdAt: Date.now()
      }));
    }
  }catch(e){}
}
function clearLiveOfflineSession(targetCharId){
  if(!targetCharId) return;
  try{ localStorage.removeItem(offlineSessionKey(targetCharId)); }catch(e){}
}
function archiveCurrentOfflineMeet(status, reason){
  if(archivingOfflineMeet) return '';
  if(!session || !character || !character.id) return '';
  var snapshot = snapshotOfflineSessionState(session);
  if(!hasMeaningfulOfflineSession(snapshot)) return '';
  archivingOfflineMeet = true;
  try{
    var archiveId = upsertOfflineArchive(snapshot, {
      status: status,
      reason: reason,
      archiveId: snapshot && snapshot.archiveId
    });
    if(archiveId){
      session.archiveId = archiveId;
    }
    if(status === 'ended'){
      queueOfflineEndArtifacts(character.id, snapshot);
      clearLiveOfflineSession(character.id);
      session = { active:false, entries:[], minimized:false, archiveId:archiveId || '' };
    }else{
      clearLiveOfflineSession(character.id);
      session = { active:false, entries:[], minimized:false, archiveId:archiveId || '' };
    }
    return archiveId;
  }finally{
    archivingOfflineMeet = false;
  }
}
function autoArchiveOfflineMeetIfNeeded(reason){
  if(offlineCloseIntent || exitingOfflineMeet || archivingOfflineMeet) return;
  if(!session || !character || !character.id) return;
  if(session.minimized) return;
  archiveCurrentOfflineMeet('pending', reason || 'interrupted');
}
function loadStoredAsset(key){
  if(window.assetStore && typeof window.assetStore.load === 'function'){
    return window.assetStore.load(key);
  }
  return Promise.resolve(localStorage.getItem(key) || '');
}
function toast(msg){
  var el = document.getElementById('toast');
  if(!el) return;
  el.textContent = String(msg || '');
  el.classList.add('show');
  clearTimeout(toast._timer);
  toast._timer = setTimeout(function(){ el.classList.remove('show'); }, 1800);
}
function esc(s){
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function loadCharacter(charIdOverride){
  var forcedId = String(charIdOverride || '').trim();
  if(forcedId){
    var forcedCharacter = findCharacterById(forcedId);
    if(forcedCharacter) return Object.assign({}, forcedCharacter);
  }
  var raw = localStorage.getItem(activeCharacterKey()) || localStorage.getItem('activeCharacter') || '';
  if(!raw) return forcedId ? findCharacterById(forcedId) : null;
  try{
    var parsed = JSON.parse(raw);
    if(parsed && parsed.id){
      var latest = findCharacterById(parsed.id);
      if(latest && typeof latest === 'object'){
        return Object.assign({}, latest, parsed, {
          offlineInviteMin: Number(latest.offlineInviteMin || parsed.offlineInviteMin || 300),
          offlineInviteMax: Number(latest.offlineInviteMax || parsed.offlineInviteMax || 360),
          offlineInvitePerspective: String(latest.offlineInvitePerspective || parsed.offlineInvitePerspective || 'first'),
          offlineInviteStyle: String(latest.offlineInviteStyle || parsed.offlineInviteStyle || '')
        });
      }
    }
    return parsed;
  }catch(e){
    return forcedId ? findCharacterById(forcedId) : null;
  }
}
function loadCharactersList(){
  try{
    var list = JSON.parse(localStorage.getItem('characters') || '[]');
    return Array.isArray(list) ? list : [];
  }catch(e){
    return [];
  }
}
function findCharacterById(charId){
  var safeId = String(charId || '').trim();
  if(!safeId) return null;
  var list = loadCharactersList();
  for(var i = 0; i < list.length; i += 1){
    var item = list[i];
    if(item && String(item.id || '').trim() === safeId) return item;
  }
  return null;
}
function findLatestOfflineSessionRecord(){
  var best = null;
  try{
    for(var i = 0; i < localStorage.length; i += 1){
      var key = localStorage.key(i);
      if(!key || key.indexOf('offline_meet_session_') === -1) continue;
      var raw = localStorage.getItem(key);
      if(!raw) continue;
      var parsed = JSON.parse(raw);
      if(!parsed || parsed.active === false) continue;
      var charId = String(key.split('offline_meet_session_').pop() || '').trim();
      if(!charId) continue;
      if(!best || Number(parsed.updatedAt || 0) >= Number(best.session && best.session.updatedAt || 0)){
        best = { charId: charId, session: parsed };
      }
    }
  }catch(e){}
  return best;
}
function saveSession(){
  if(!session || !character || !character.id) return;
  session.updatedAt = Date.now();
  localStorage.setItem(offlineSessionKey(character.id), JSON.stringify(session));
}
function loadSession(){
  if(character && character.id){
    var raw = localStorage.getItem(offlineSessionKey(character.id)) || '';
    if(raw){
      try{ return JSON.parse(raw); }catch(e){}
    }
  }
  if(desiredOfflineCharId){
    return null;
  }
  var fallback = findLatestOfflineSessionRecord();
  if(!fallback) return null;
  if(fallback.charId && (!character || !character.id || String(character.id || '').trim() !== String(fallback.charId || '').trim())){
    var matched = findCharacterById(fallback.charId);
    if(matched) character = matched;
  }
  return fallback.session || null;
}
function resolveCharAvatar(){
  if(runtimeCharAvatar) return runtimeCharAvatar;
  if(character && character.imageData) return character.imageData;
  return '';
}
function offlineHashSeed(input){
  var text = String(input || '');
  var hash = 0;
  for(var i = 0; i < text.length; i += 1){
    hash = ((hash << 5) - hash + text.charCodeAt(i)) | 0;
  }
  return Math.abs(hash);
}
function pickOfflineSeeded(list, seed, offset){
  if(!Array.isArray(list) || !list.length) return '';
  return list[Math.abs((Number(seed) || 0) + (Number(offset) || 0)) % list.length];
}
function weatherSettingsStorageKey(role, charId){
  var safeCharId = String(charId || '').trim();
  if(role === 'char') return scopedKey('real_weather_char_' + safeCharId);
  return scopedKey('real_weather_user_' + safeCharId);
}
function getOfflineWeatherSnapshot(role){
  var charId = character && character.id ? String(character.id) : '';

function stepFlightGame(ts){

  state.score += dt * 12;
  state.speed = Math.min(360, state.speed + dt * 6);
  state.best = Math.max(state.best, state.score);

  if(!state.spawnAt) state.spawnAt = ts + 650;

    var h = 22 + Math.round(Math.random() * 18);
    var w = h > 30 ? 18 : 14;

    state.spawnAt = ts + 850 + Math.random() * 700;
  }

  state.bunny.vy += state.gravity * dt;
  state.bunny.y += state.bunny.vy * dt;
  var floorY = state.groundY - state.bunny.h;

    state.bunny.vy = 0;
    state.bunny.jumping = false;
  }

  state.obstacles.forEach(function(obs){ obs.x -= state.speed * dt; });
  state.obstacles = state.obstacles.filter(function(obs){ return obs.x + obs.w > -20; });

  var hit = state.obstacles.some(function(obs){

    var dy = state.bunny.y + 6;
    var dw = state.bunny.w - 8;
    var dh = state.bunny.h - 6;
    var ox = obs.x;
    var oy = state.groundY - obs.h;
    return dx < ox + obs.w && dx + dw > ox && dy < oy + obs.h && dy + dh > oy;

}

  if(sending) return;
  var input = document.getElementById('offlineInput');
  var text = String((input && input.value) || '').trim();
  if(!text){
    toast('先写点什么吧');
    return;
  }
  setOfflineComposerBusy(true);
  closeThoughtBubbles();
  var labels = nowLabels();
  var userEntry = {
    role:'user',
    text:text,
    heart:'♥',
    bubbles:[],
    timeLabel:labels.timeLabel,
    meta:labels.meta,
    fullLabel: labels.fullLabel,
    createdAt: labels.createdAt
  };
  Object.assign(userEntry, buildOfflineEntryMeta(userEntry, 'user', labels, { generationMs: 0 }));
  session.entries.push(userEntry);
  if(input) input.value = '';
  saveSession();
  renderStory();
  keepOfflineComposerVisible();
  setOfflineComposerBusy(false);
}
async function requestOfflineReply(options){
  options = options || {};
  if(sending) return;
  if(!session) return;
  setOfflineComposerBusy(true);
  closeThoughtBubbles();
  try{
    var replyStartedAt = Date.now();
    await hydrateOfflineMemorySnippet();
    var prefs = getOfflineStoryPrefs();
    var minChars = prefs.minChars;
    var replyContextBase = [
      '这是一次已经开始的线下见面，请顺着当前氛围继续。',
      session && session.invite ? ('邀约背景：' + JSON.stringify(session.invite)) : '',
      '最近线上聊天：\n' + (getOfflineRecentOnlineSnippet() || '无'),
      '用户此刻没有说新话，请角色自己顺着当前氛围继续这一幕，并且直接写够完整长度，不要偷成短回复。'
    ].filter(Boolean);
    var thoughtChain = null;
    var parsed = { title:'', quote:'', text:'', asides:[], heart:'♥', thought_chain:null, status_card:null };
    var bestBody = null;
    for(var thoughtAttempt = 0; thoughtAttempt < 3; thoughtAttempt += 1){
      try{
        var thoughtCompact = thoughtAttempt >= 2 ? 2 : thoughtAttempt;
        var thoughtRaw = await callAIWithTimeout(buildOfflineThoughtSystemPrompt({ compactLevel: thoughtCompact }), replyContextBase.join('\n\n'), Math.min(getOfflineReplyTimeoutMs(), 90000));
        var thoughtObj = parseOfflineJsonObject(thoughtRaw);
        if(hasValidOfflineThoughtPayload(thoughtObj)){
          thoughtChain = thoughtObj.thought_chain;
          break;
        }
      }catch(thoughtErr){
        lastError = thoughtErr;
      }
    }
    for(var attempt = 0; attempt < 3; attempt += 1){
      var compactLevel = attempt >= 2 ? 2 : (attempt >= 1 ? 1 : 0);
      try{
        var bodyRaw = await callAIWithTimeout(buildOfflineBodySystemPrompt({ compactLevel: compactLevel }), replyContextBase.concat([
          '最近线下记录：\n' + (clipOfflinePromptText(formatOfflineHistory(compactLevel >= 2 ? 4 : 6) || '无', offlinePromptLimit(isMobileOfflineRuntime() ? 1200 : 1800, compactLevel, 360)) || '无')
        ]).join('\n\n'), getOfflineReplyTimeoutMs());
        var bodyObj = parseOfflineJsonObject(bodyRaw);
        if(!hasValidOfflineBodyPayload(bodyObj)) throw new Error('正文结构不完整');
        if(!bestBody || openingTextLength(bodyObj.text) > openingTextLength(bestBody.text || '')) bestBody = bodyObj;
        if(!violatesOfflinePerspective(bodyObj.text, prefs.perspective) && !containsOfflineStyleViolation(bodyObj.text) && openingTextLength(bodyObj.text) >= minChars){
          parsed = Object.assign(parsed, bodyObj);
          break;
        }
      }catch(bodyErr){
        lastError = bodyErr;
      }
    }
    if(!String(parsed.text || '').trim() && bestBody && !violatesOfflinePerspective(bestBody.text, prefs.perspective) && !containsOfflineStyleViolation(bestBody.text)){
      parsed = Object.assign(parsed, bestBody);
    }
    if(!hasValidOfflineBodyPayload(parsed)){
      throw new Error('正文生成失败或未通过规则校验');
    }
    parsed.thought_chain = thoughtChain;
    var replyText = String(parsed.text || '').trim();
    for(var extendAttempt = 0; extendAttempt < 2; extendAttempt += 1){
      if(openingTextLength(replyText) >= minChars) break;
      var missing = minChars - openingTextLength(replyText);
      var extendCompact = extendAttempt >= 1 ? 1 : 0;
      var extendRaw = await callAIWithTimeout(buildOfflineBodySystemPrompt({ compactLevel: extendCompact }), [
        '这是同一幕线下见面的续写，不要重复前文。',
        '最近线下记录：\n' + (clipOfflinePromptText(formatOfflineHistory(extendCompact >= 1 ? 4 : 6) || '无', offlinePromptLimit(isMobileOfflineRuntime() ? 1200 : 1800, extendCompact, 360)) || '无'),
        '已经写好的正文：\n' + replyText,
        '现在还差至少 ' + missing + ' 个中文字符，请继续补足同一幕的动作、气氛、停顿、对话和身体反应。',
        '只返回新增内容 JSON：{"text":"...","asides":["...","..."]}'
      ].join('\n\n'), getOfflineReplyTimeoutMs());
      var extendParsed = parseOfflineJsonObject(extendRaw) || {};
      var extraText = String(extendParsed && extendParsed.text || '').trim();
      if(!extraText || extraText === replyText) break;
      replyText = mergeOfflineOpeningText(replyText, extraText);
      parsed.asides = mergeOfflineAsides(normalizeOfflineAsides(parsed.asides), normalizeOfflineAsides(extendParsed && extendParsed.asides));
    }
    for(var statusAttempt = 0; statusAttempt < 3; statusAttempt += 1){
      try{
        var statusCompact = statusAttempt >= 2 ? 2 : statusAttempt;
        var statusRaw = await callAIWithTimeout(buildOfflineStatusSystemPrompt({ compactLevel: statusCompact }), replyContextBase.concat([
          '最近线下记录：\n' + (clipOfflinePromptText(formatOfflineHistory(statusCompact >= 2 ? 4 : 6) || '无', offlinePromptLimit(isMobileOfflineRuntime() ? 1200 : 1800, statusCompact, 360)) || '无'),
          '这一幕已经写好的正文：\n' + replyText
        ]).join('\n\n'), Math.min(getOfflineReplyTimeoutMs(), 90000));
        var statusObj = parseOfflineJsonObject(statusRaw);
        if(hasValidOfflineStatusPayload(statusObj)){
          parsed.status_card = statusObj.status_card;
          break;
        }
      }catch(statusErr){
        lastError = statusErr;
      }
    }
    if(openingTextLength(replyText) < minChars || !hasValidOfflineAssistantPayload({
      text: replyText,
      title: parsed.title,
      quote: parsed.quote,
      thought_chain: parsed.thought_chain,
      status_card: parsed.status_card
    })){
      throw new Error('回复字数不足（' + openingTextLength(replyText) + '/' + minChars + '）');
    }
    var nextLabels = nowLabels();
    var replyEntry = {
      role:'assistant',
      text:replyText,
      title:String(parsed.title || '').trim(),
      quote:String(parsed.quote || '').trim(),
      asides: normalizeOfflineAsides(parsed.asides),
      heart:String(parsed.heart || '♥').trim() || '♥',
      thoughtChain: normalizeOfflineThoughtChain(parsed.thought_chain || null, parsed.text),
      statusCard: normalizeOfflineStatusCard(parsed.status_card, parsed.text),
      bubbles:Array.isArray(parsed.bubbles) ? parsed.bubbles.slice(0,3) : [],
      timeLabel:nextLabels.timeLabel,
      meta:nextLabels.meta,
      fullLabel: nextLabels.fullLabel,
      createdAt: nextLabels.createdAt
    };
    Object.assign(replyEntry, buildOfflineEntryMeta(replyEntry, 'assistant', nextLabels, {
      generationMs: Date.now() - replyStartedAt
    }));
    session.entries.push(replyEntry);
    saveSession();
    queueOfflineStatusCardGeneration(replyEntry);
    renderStory();
    keepOfflineComposerVisible();
  }catch(e){
    toast('线下回复生成失败：' + summarizeOfflineError(e));
  }finally{
    setOfflineComposerBusy(false);
  }
}
async function rerollOfflineTurn(){
  if(sending || !session || !Array.isArray(session.entries) || !session.entries.length) return;
  var lastAssistantIndex = -1;
  for(var i = session.entries.length - 1; i >= 0; i -= 1){
    if(session.entries[i] && session.entries[i].role === 'assistant'){
      lastAssistantIndex = i;
      break;
    }
  }
  if(lastAssistantIndex === -1){
    toast('还没有可以重生成的回复');
    return;
  }
  session.entries = session.entries.slice(0, lastAssistantIndex);
  saveSession();
  renderStory();
  await requestOfflineReply();
}
async function summarizeOfflineMemory(){
  var list = Array.isArray(session && session.entries) ? session.entries : [];
  var lines = list.map(function(entry){
    return (entry.role === 'user' ? '用户' : '角色') + '：' + String(entry.text || '').replace(/\s+/g, ' ').trim();
  }).join('\n');
  if(!lines) return '';
  var systemPrompt = promptManager && typeof promptManager.memorySummarySystemPrompt === 'function'
    ? promptManager.memorySummarySystemPrompt()
    : '你是聊天记忆压缩器，只返回一段纯文本总结。';
  var userPrompt = promptManager && typeof promptManager.memorySummaryUserPrompt === 'function'
    ? promptManager.memorySummaryUserPrompt(lines)
    : ('请总结以下线下见面记录：\n\n' + lines);
  try{
    var raw = await callAIWithTimeout(systemPrompt, userPrompt, 6000);
    return String(raw || '').replace(/^```[a-zA-Z]*\s*/,'').replace(/```$/,'').trim();
  }catch(e){
    return '线下见面中，两人的互动进一步推进了关系，并围绕当下氛围展开了更贴近现实的交流。';
  }
}
function summarizeOfflineMemoryLocally(snapshot){
  var list = Array.isArray(snapshot && snapshot.entries) ? snapshot.entries : [];
  if(!list.length) return '';
  var lastUser = '';
  var lastAssistant = '';
  for(var i = list.length - 1; i >= 0; i -= 1){
    var entry = list[i];
    if(!entry) continue;
    var text = String(entry.text || '').replace(/\s+/g, ' ').trim();
    if(!text) continue;
    if(!lastAssistant && entry.role === 'assistant') lastAssistant = text;
    if(!lastUser && entry.role === 'user') lastUser = text;
    if(lastUser && lastAssistant) break;
  }
  var parts = ['这次线下见面已经结束，两人的关系在这次见面里继续推进。'];
  if(lastUser) parts.push('用户最后表达了：' + lastUser.slice(0, 60) + '。');
  if(lastAssistant) parts.push('角色最后回应了：' + lastAssistant.slice(0, 60) + '。');
  return parts.join('');
}
function setExitMenuBusy(busy){
  var btn = document.getElementById('exitMenuConfirmBtn');
  if(!btn) return;
  btn.disabled = !!busy;
  btn.textContent = busy ? '正在退出...' : '先说再见';
}
async function exitOfflineMeet(){
  if(exitingOfflineMeet) return;
  exitingOfflineMeet = true;
  offlineCloseIntent = 'ended';
  setExitMenuBusy(true);
  if(!session || !character || !character.id){
    try{ window.parent.postMessage({ type:'OFFLINE_EXITED' }, '*'); }catch(e){}
    window.parent.postMessage({ type:'OPEN_APP_REPLACE', payload:'chat' }, '*');
    setTimeout(function(){
      exitingOfflineMeet = false;
      offlineCloseIntent = '';
      setExitMenuBusy(false);
    }, 120);
    return;
  }
  archiveCurrentOfflineMeet('ended', 'goodbye');
  try{ window.parent.postMessage({ type:'OFFLINE_EXITED' }, '*'); }catch(e){}
  window.parent.postMessage({ type:'OPEN_APP_REPLACE', payload:'chat' }, '*');
  setTimeout(function(){
    exitingOfflineMeet = false;
    offlineCloseIntent = '';
    setExitMenuBusy(false);
  }, 120);
}
function openExitMenu(){
  document.getElementById('exitMenu')?.classList.add('open');
}
function closeExitMenu(){
  document.getElementById('exitMenu')?.classList.remove('open');
}
function minimizeOfflineMeet(){
  closeExitMenu();
  offlineCloseIntent = 'minimize';
  if(session){
    session.minimized = true;
    saveSession();
  }
  try{
    window.parent.postMessage({ type:'OFFLINE_MINIMIZED', payload:{ charId: character && character.id } }, '*');
  }catch(e){}
  window.parent.postMessage({ type:'OPEN_APP', payload:'chat' }, '*');
}
function restoreOfflineMeet(){
  offlineCloseIntent = '';
  if(session){
    session.minimized = false;
    saveSession();
  }
  document.querySelector('.shell')?.classList.remove('minimized');
  document.getElementById('offlineMiniLauncher')?.classList.remove('show');
}
async function confirmExitOfflineMeet(){
  if(exitingOfflineMeet) return;
  closeExitMenu();
  await exitOfflineMeet();
}
function showFlightIfNeeded(){
  var overlay = document.getElementById('flightOverlay');
  if(!overlay || !session) return;
  if(!session.pendingAnimation && !shouldBootOpeningFlow()) return;
  overlay.classList.add('show');
  bindFlightGameControls();
  startFlightGame();
}
function hideFlightOverlay(){
  var overlay = document.getElementById('flightOverlay');
  if(!overlay) return;
  overlay.classList.remove('show');
  stopFlightGame();
  if(session){
    session.pendingAnimation = false;
    saveSession();
  }
}
async function init(){
  try{
    var initUrl = new URL(window.location.href);
    desiredOfflineCharId = String(initUrl.searchParams.get('char') || localStorage.getItem(scopedKey('activeOfflineCharacterId')) || localStorage.getItem('activeOfflineCharacterId') || '').trim();
  }catch(err){
    desiredOfflineCharId = String(localStorage.getItem(scopedKey('activeOfflineCharacterId')) || localStorage.getItem('activeOfflineCharacterId') || '').trim();
  }
  character = loadCharacter(desiredOfflineCharId);
  session = loadSession();
  await hydrateOfflineMemorySnippet();
  refreshOfflineAvatarAssets();
  if((!character || !character.id) && session && session.invite){
    var fallbackRecord = findLatestOfflineSessionRecord();
    if(fallbackRecord && fallbackRecord.charId){
      var fallbackChar = findCharacterById(fallbackRecord.charId);
      if(fallbackChar) character = fallbackChar;
    }
  }
  if(!session){
    session = { active:false, entries:[] };
  }
  if(shouldBootOpeningFlow()){
    session.active = true;
    if(!session.pendingOpening) session.pendingOpening = true;
    if(!session.pendingAnimation) session.pendingAnimation = true;
    saveSession();
  }
  if(session && session.minimized){
    document.querySelector('.shell')?.classList.add('minimized');
    document.getElementById('offlineMiniLauncher')?.classList.add('show');
  }
  renderStory();
  var latestAssistant = (Array.isArray(session && session.entries) ? session.entries.slice() : []).reverse().find(function(entry){
    return entry && entry.role === 'assistant' && !entry.statusCard;
  });
  if(latestAssistant) queueOfflineStatusCardGeneration(latestAssistant);
  showFlightIfNeeded();
  await generateOpeningIfNeeded();
  renderStory();
  syncOfflineViewport();
  var input = document.getElementById('offlineInput');
  if(input && !input.dataset.boundEnter){
    input.dataset.boundEnter = '1';
    input.addEventListener('keydown', function(evt){
      if(evt.key === 'Enter' && !evt.shiftKey){
        evt.preventDefault();
        sendOfflineTurn();
      }
    });
    input.addEventListener('input', keepOfflineComposerVisible);
  }
}
document.addEventListener('click', function(e){
  var avatar = e.target && e.target.closest ? e.target.closest('.avatar,.char-polaroid-frame,.offline-story-avatar') : null;
  var exitCard = e.target && e.target.closest ? e.target.closest('.exit-menu-card') : null;
  var editCard = e.target && e.target.closest ? e.target.closest('.offline-edit-card') : null;
  var statusCard = e.target && e.target.closest ? e.target.closest('.offline-status-card') : null;
  if(e.target === document.getElementById('exitMenu') && !exitCard){
    closeExitMenu();
  }
  if(e.target === document.getElementById('offlineEditOverlay') && !editCard){
    closeOfflineEditModal();
  }
  if(e.target === document.getElementById('offlineStatusOverlay') && !statusCard){
    closeOfflineStatusModal();
  }
  if(!avatar) closeThoughtBubbles();
});
window.addEventListener('message', function(e){
  var data = e.data || {};
  if(data.type === 'APP_CLOSING'){
    autoArchiveOfflineMeetIfNeeded('app_closing');
  }
});
window.addEventListener('pagehide', function(){
  autoArchiveOfflineMeetIfNeeded('pagehide');
});
window.addEventListener('beforeunload', function(){
  autoArchiveOfflineMeetIfNeeded('beforeunload');
});
window.addEventListener('resize', syncOfflineViewport);
window.addEventListener('orientationchange', syncOfflineViewport);
window.addEventListener('focusin', function(e){
  if(e.target && (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT')){
    keepOfflineComposerVisible();
  }
});
window.addEventListener('load', syncOfflineViewport);
if(window.visualViewport){
  window.visualViewport.addEventListener('resize', function(){
    syncOfflineViewport();
    keepOfflineComposerVisible();
  });
  window.visualViewport.addEventListener('scroll', syncOfflineViewport);
}
init();
</script>
