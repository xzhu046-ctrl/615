<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,viewport-fit=cover,interactive-widget=overlays-content">
<title>线下模式</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Nunito:wght@700;900&family=Caveat:wght@600;700&family=Ma+Shan+Zheng&family=Zhi+Mang+Xing&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
<script src="../assetStore.js"></script>
<script src="../promptManager.js"></script>
<script src="../accountManager.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --b:#0a0a0a;--w:#fff;--off:#f4f4f1;--g:#6f6f6f;--bd:2px solid #0a0a0a;--sh:2px 2px 0 #0a0a0a;
  --font:'Quicksand',sans-serif;--fontd:'Nunito',sans-serif;--fontc:'Caveat',cursive;
  --offline-safe-bottom:max(env(safe-area-inset-bottom),0px);
  --offline-app-height:100dvh;
  --offline-keyboard-inset:0px;
  --offline-composer-height:64px;
  --offline-header-height:52px;
}
html,body{width:100%;height:100%;overflow:hidden}
body{font-family:var(--font);background:#f5f1e8;color:var(--b);position:relative;height:var(--offline-app-height);min-height:var(--offline-app-height)}
.paper-bg,.paper-bg::before,.paper-bg::after{position:absolute;inset:0;pointer-events:none}
.paper-bg{background:#f5f1e8}
.paper-bg::before{display:none}
.paper-bg::after{display:none}
.shell{position:relative;z-index:1;height:100%;display:flex;flex-direction:column}
.topbar{display:none}
.top-pill{display:none}
.top-heart{display:none}
.offline-stage-header{position:fixed;left:0;right:0;top:calc(env(safe-area-inset-top) + 6px);z-index:45;pointer-events:none}
.offline-stage-actions{position:relative;height:40px;pointer-events:none}
.offline-stage-action{width:46px;height:46px;border-radius:999px;border:2px solid rgba(17,17,17,.88);background:linear-gradient(180deg,rgba(255,255,255,.98),rgba(239,237,232,.94));color:#111;display:flex;align-items:center;justify-content:center;box-shadow:0 12px 24px rgba(0,0,0,.12),3px 3px 0 rgba(0,0,0,.2),0 0 0 1px rgba(255,255,255,.88) inset;backdrop-filter:blur(10px) saturate(108%);-webkit-backdrop-filter:blur(10px) saturate(108%);cursor:pointer;transition:transform .14s ease,box-shadow .14s ease,background .14s ease}
.offline-stage-action svg{width:19px;height:19px;fill:none;stroke:currentColor;stroke-width:2.3;stroke-linecap:round;stroke-linejoin:round}
.offline-stage-action:active{transform:translateY(1px) scale(.98);box-shadow:0 6px 14px rgba(0,0,0,.08),1px 1px 0 rgba(0,0,0,.2)}
.offline-stage-actions .offline-stage-action{position:absolute;top:0;pointer-events:auto}
.offline-stage-actions .offline-stage-action:first-child{display:none}
.offline-stage-actions .offline-stage-action:last-child{right:12px}
.offline-stage-drawer-overlay{position:fixed;inset:0;z-index:125;background:rgba(17,17,17,.18);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);opacity:0;pointer-events:none;transition:opacity .24s ease}
.offline-stage-drawer-overlay.open{opacity:1;pointer-events:auto}
.offline-stage-drawer{position:absolute;top:0;right:0;width:min(352px,calc(100vw - 24px));height:100%;padding:calc(env(safe-area-inset-top) + 18px) 14px calc(env(safe-area-inset-bottom) + 16px);transform:translateX(104%);transition:transform .28s ease}
.offline-stage-drawer-overlay.open .offline-stage-drawer{transform:translateX(0)}
.offline-stage-drawer-card{height:100%;border:2px solid #111;border-radius:32px;background:linear-gradient(180deg,rgba(255,255,255,.985),rgba(241,241,241,.97));box-shadow:0 20px 48px rgba(0,0,0,.16),0 0 0 1px rgba(255,255,255,.82) inset;overflow:hidden;display:flex;flex-direction:column}
.offline-stage-drawer-head{position:relative;padding:22px 18px 14px;min-height:220px;border-bottom:1.5px solid rgba(16,16,16,.12);background:
linear-gradient(180deg,rgba(18,18,18,0) 0%,rgba(18,18,18,0) 58%,rgba(242,242,242,.06) 70%,rgba(242,242,242,.96) 100%),
url('assets/樱花在水里.jpg') center/cover no-repeat}
.offline-stage-drawer-close,.offline-stage-drawer-save{position:absolute;right:14px;width:34px;height:34px;border-radius:999px;border:2px solid #111;background:#fff;color:#111;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:3px 3px 0 rgba(0,0,0,.82);z-index:5;pointer-events:auto}
.offline-stage-drawer-close{top:14px;font:900 18px/1 var(--fontd)}
.offline-stage-drawer-save{top:56px;padding:0}
.offline-stage-drawer-save img{width:18px;height:18px;object-fit:contain;display:block}
.offline-stage-drawer-close:active,.offline-stage-drawer-save:active{transform:translate(1px,1px);box-shadow:1px 1px 0 rgba(0,0,0,.82)}
.offline-stage-drawer-film{position:relative;height:100%;border:none;border-radius:26px;padding:18px 16px 6px;display:flex;flex-direction:column;justify-content:flex-end;background:transparent;overflow:hidden}
.offline-stage-drawer-film::after{display:none}
.offline-stage-drawer-film > *{position:relative;z-index:1}
.offline-stage-drawer-photos{display:flex;align-items:flex-end;gap:14px;padding-right:14px}
.offline-stage-drawer-polaroid{position:relative;width:112px;height:132px;padding:8px 8px 24px;background:#fff;border:2px solid #111;box-shadow:7px 7px 0 rgba(0,0,0,.82);overflow:hidden}
.offline-stage-drawer-polaroid.char{transform:rotate(-6deg)}
.offline-stage-drawer-polaroid.user{transform:rotate(7deg);margin-bottom:-8px}
.offline-stage-drawer-polaroid img{width:100%;height:100%;object-fit:cover;display:block}
.offline-stage-drawer-polaroid-fallback{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#efefec;font-family:'ZCOOL KuaiLe','Nunito',sans-serif;font-size:18px;font-weight:900;color:#111}
.offline-stage-drawer-polaroid-label{position:absolute;left:8px;right:8px;bottom:6px;display:flex;align-items:center;justify-content:space-between;font-family:var(--fontd);font-size:10px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;color:#111}
.offline-stage-drawer-ticket{margin-top:34px;align-self:center;display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:34px;padding:0 18px;border-radius:999px;border:2px solid #111;box-shadow:0 0 0 2px rgba(255,255,255,.96) inset,0 8px 18px rgba(0,0,0,.16);background:#111;color:#fff;font-family:'ZCOOL KuaiLe','Nunito',sans-serif;font-size:15px;font-weight:900;white-space:nowrap}
.offline-stage-drawer-ticket::before,.offline-stage-drawer-ticket::after{content:'✦';font-size:11px;opacity:.92}
.offline-stage-drawer-body{flex:1;overflow-y:auto;padding:14px 14px calc(env(safe-area-inset-bottom) + 16px);display:flex;flex-direction:column;gap:12px}
.offline-stage-drawer-footer{display:flex;flex-direction:column;gap:10px}
.offline-stage-drawer-footer-card{border:2px solid rgba(17,17,17,.82);border-radius:24px;background:linear-gradient(180deg,rgba(255,255,255,.97),rgba(242,242,242,.94));box-shadow:3px 3px 0 rgba(0,0,0,.18),0 0 0 1px rgba(255,255,255,.74) inset;padding:12px;display:flex;flex-direction:column;gap:8px}
.offline-stage-drawer-footer-head{display:flex;align-items:center;justify-content:space-between;gap:10px}
.offline-stage-drawer-footer-title{font-family:'ZCOOL KuaiLe','Nunito',sans-serif;font-size:15px;font-weight:900;color:#111}
.offline-stage-drawer-footer-note{font-size:10px;font-weight:800;color:#6a6a6a}
.offline-stage-drawer-exitbtn{min-height:42px;padding:0 14px;border-radius:14px;border:2px solid #111;background:linear-gradient(180deg,rgba(255,255,255,.985),rgba(243,243,243,.96));color:#111;font:900 12px/1 var(--fontd);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:3px 3px 0 rgba(0,0,0,.18)}
.offline-stage-drawer-exitbtn.primary{background:#111;color:#fff}
.offline-stage-drawer-exitbtn:active{transform:translate(1px,1px);box-shadow:1px 1px 0 rgba(0,0,0,.18)}
.offline-setting-card{border:2px solid rgba(17,17,17,.82);border-radius:26px;background:rgba(255,255,255,.9);box-shadow:0 0 0 1px rgba(255,255,255,.74) inset;padding:14px 14px 12px}
.offline-setting-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
.offline-setting-title{font-family:'ZCOOL KuaiLe','Nunito',sans-serif;font-size:18px;font-weight:900;color:#111}
.offline-setting-note{font-size:11px;font-weight:700;color:#6a6a6a}
.offline-setting-grid{display:flex;flex-direction:column;gap:10px}
.offline-setting-row{display:flex;align-items:center;justify-content:space-between;gap:10px}
.offline-setting-label{font-size:12px;font-weight:800;color:#2a2a2a}
.offline-setting-select,.offline-setting-textarea{width:100%;border:2px solid rgba(17,17,17,.88);border-radius:18px;background:#fff;color:#111;font:800 13px/1.45 var(--font);outline:none;box-shadow:0 0 0 1px rgba(255,255,255,.74) inset}
.offline-setting-select{min-height:44px;padding:0 12px}
.offline-setting-input{width:100%;min-height:44px;padding:0 12px;border:2px solid rgba(17,17,17,.88);border-radius:18px;background:#fff;color:#111;font:800 13px/1 var(--font);outline:none;box-shadow:0 0 0 1px rgba(255,255,255,.74) inset}
.offline-setting-input::-webkit-outer-spin-button,.offline-setting-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.offline-setting-textarea{min-height:84px;padding:12px 12px;resize:none}
.offline-setting-toggle{position:relative;width:52px;height:30px;border-radius:999px;border:2px solid #111;background:#d9d7d2;cursor:pointer;flex:0 0 auto}
.offline-setting-toggle::after{content:'';position:absolute;top:2px;left:2px;width:22px;height:22px;border-radius:999px;background:#fff;border:2px solid #111;transition:transform .18s ease}
.offline-setting-toggle.is-on{background:#111}
.offline-setting-toggle.is-on::after{transform:translateX(20px)}
.offline-setting-actions{display:flex;gap:8px;flex-wrap:wrap}
.offline-setting-btn{min-height:42px;padding:0 14px;border-radius:14px;border:2px solid #111;background:linear-gradient(180deg,rgba(255,255,255,.985),rgba(243,243,243,.96));color:#111;font:900 12px/1 var(--fontd);display:inline-flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:3px 3px 0 rgba(0,0,0,.18)}
.offline-setting-btn.primary{background:#111;color:#fff}
.offline-setting-btn:disabled{opacity:.45;cursor:not-allowed;box-shadow:none}
.offline-setting-actions.stack{flex-direction:column;align-items:stretch}
.offline-setting-dropdown{position:relative}
.offline-setting-dropdown-trigger{width:100%;min-height:46px;padding:0 14px;border-radius:18px;border:2px solid #111;background:linear-gradient(180deg,rgba(255,255,255,.985),rgba(243,243,243,.96));color:#111;font:900 13px/1.2 var(--fontd);display:flex;align-items:center;justify-content:space-between;gap:10px;cursor:pointer;box-shadow:3px 3px 0 rgba(0,0,0,.18)}
.offline-setting-dropdown-trigger::after{content:'▾';font-size:14px}
.offline-setting-dropdown-panel{display:none;position:relative;margin-top:10px;padding:10px;border:2px solid #111;border-radius:22px;background:linear-gradient(180deg,rgba(255,255,255,.985),rgba(243,243,243,.96));box-shadow:4px 4px 0 rgba(0,0,0,.18);flex-direction:column;gap:8px}
.offline-setting-dropdown.open .offline-setting-dropdown-panel{display:flex}
.offline-setting-option{width:100%;padding:11px 12px;border-radius:16px;border:2px solid rgba(17,17,17,.86);background:#fff;color:#111;font:900 12px/1.4 var(--fontd);text-align:left;display:flex;align-items:center;justify-content:space-between;gap:10px;cursor:pointer;box-shadow:2px 2px 0 rgba(0,0,0,.12)}
.offline-setting-option.is-active{background:#111;color:#fff}
.offline-setting-option-note{font-size:10px;font-weight:800;opacity:.72}
.offline-stage-summary-list{display:flex;flex-direction:column;gap:8px;max-height:182px;overflow:auto;padding-right:2px}
.offline-stage-summary-list[hidden]{display:none}
.offline-stage-summary-item{padding:12px 12px 11px;border-radius:18px;border:1.5px solid rgba(17,17,17,.18);background:rgba(255,255,255,.88)}
.offline-stage-summary-kicker{font-size:10px;font-weight:900;letter-spacing:.08em;color:#6a6a6a;text-transform:uppercase}
.offline-stage-summary-copy{margin-top:6px;font-size:12px;font-weight:700;line-height:1.72;color:#1d1d1d;white-space:pre-wrap;word-break:break-word}
.offline-stage-summary-empty{font-size:12px;font-weight:700;line-height:1.7;color:#666}
.offline-memory-overlay{position:fixed;inset:0;display:none;align-items:center;justify-content:center;padding:20px;background:rgba(20,20,20,.18);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);z-index:140}
.offline-memory-overlay.open{display:flex}
.offline-memory-card{width:min(388px,calc(100vw - 28px));max-height:min(82vh,760px);border:2px solid #111;border-radius:28px;background:linear-gradient(180deg,rgba(255,255,255,.98),rgba(244,242,237,.96));box-shadow:0 20px 48px rgba(0,0,0,.16),0 0 0 1px rgba(255,255,255,.78) inset;display:flex;flex-direction:column;overflow:hidden}
.offline-memory-head{padding:14px 14px 12px;border-bottom:1.5px solid rgba(17,17,17,.12);display:flex;align-items:center;justify-content:space-between;gap:10px}
.offline-memory-title{font-family:'ZCOOL KuaiLe','Nunito',sans-serif;font-size:18px;font-weight:900;color:#111}
.offline-memory-head-actions{display:flex;align-items:center;gap:8px}
.offline-memory-close{width:34px;height:34px;border-radius:999px;border:2px solid #111;background:#fff;color:#111;font:900 16px/1 var(--fontd);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:2px 2px 0 rgba(0,0,0,.18)}
.offline-memory-body{padding:14px;overflow:auto;display:flex;flex-direction:column;gap:10px}
.offline-memory-item{padding:12px 12px 11px;border-radius:18px;border:1.5px solid rgba(17,17,17,.18);background:rgba(255,255,255,.9)}
.offline-memory-item-head{display:flex;align-items:center;justify-content:space-between;gap:10px}
.offline-memory-item-title{font-size:11px;font-weight:900;letter-spacing:.08em;color:#6a6a6a;text-transform:uppercase}
.offline-memory-item-actions{display:flex;align-items:center;gap:6px}
.offline-memory-mini-btn{min-height:28px;padding:0 10px;border-radius:12px;border:2px solid #111;background:linear-gradient(180deg,rgba(255,255,255,.98),rgba(243,241,236,.96));color:#111;font:900 11px/1 var(--fontd);display:inline-flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:2px 2px 0 rgba(0,0,0,.18)}
.offline-memory-mini-btn.icon{width:28px;padding:0}
.offline-memory-item-body{margin-top:8px;font-size:12px;font-weight:700;line-height:1.74;color:#1d1d1d;white-space:pre-wrap;word-break:break-word}
.offline-memory-empty{font-size:12px;font-weight:700;line-height:1.7;color:#666}
.offline-memory-editor-overlay{position:fixed;inset:0;display:none;align-items:center;justify-content:center;padding:20px;background:rgba(20,20,20,.18);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);z-index:145}
.offline-memory-editor-overlay.open{display:flex}
.offline-memory-editor-card{width:min(368px,calc(100vw - 30px));border:2px solid #111;border-radius:28px;background:#fff;box-shadow:3px 3px 0 rgba(0,0,0,.18);padding:16px;display:flex;flex-direction:column;gap:12px}
.offline-memory-editor-title{font-family:'ZCOOL KuaiLe','Nunito',sans-serif;font-size:17px;font-weight:900;color:#111}
.offline-memory-editor-input{min-height:180px;border:2px solid #111;border-radius:18px;background:#fff;padding:12px 12px;font:700 13px/1.7 var(--font);color:#111;resize:none;outline:none}
.offline-memory-editor-actions{display:flex;justify-content:flex-end;gap:8px}
.offline-artifact-card{margin-top:14px;padding:0;border:none;border-radius:0;background:transparent}
.offline-artifact-label{font-size:10px;font-weight:900;letter-spacing:.08em;color:#6a6a6a;text-transform:uppercase;margin-bottom:8px}
.offline-artifact-preview{border:none;border-radius:0;background:transparent;padding:0;overflow:visible}
.offline-artifact-preview *{box-sizing:border-box;max-width:100%}
.offline-artifact-preview img,.offline-artifact-preview svg,.offline-artifact-preview canvas{max-width:100%;height:auto;display:block}
.offline-artifact-preview [style*="position:absolute"]{max-width:100%}
.offline-artifact-preview > *{width:100%;max-width:100%;margin:0 auto}
.story-wrap{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;padding:calc(var(--offline-header-height) + env(safe-area-inset-top) - 6px) 14px calc(var(--offline-composer-height) + 2px) 14px;display:flex;flex-direction:column;gap:6px;scrollbar-width:none;overscroll-behavior-y:contain;-webkit-overflow-scrolling:touch}
.story-wrap::-webkit-scrollbar{display:none}
.story-card{position:relative;min-height:320px;border:var(--bd);border-radius:34px;background:rgba(255,255,255,.82);box-shadow:3px 4px 0 #0a0a0a;padding:22px 18px 20px;overflow:hidden}
.story-card::before{content:'';position:absolute;inset:18px;border:1.5px solid rgba(10,10,10,.48);border-radius:26px;pointer-events:none}
.story-card.char .card-flower{right:-10px;bottom:22px}
.story-card.user .card-flower{left:-12px;bottom:16px;transform:scaleX(-1)}
.story-card.char{padding:0 0 150px;background:transparent;border:none;box-shadow:none;overflow:visible;min-height:380px;width:100%}
.story-card.char::before{display:none}
.char-layout{position:relative;min-height:0;padding:6px 0 10px}
.char-paper-layer{position:absolute;width:326px;height:340px;border:1px solid rgba(10,10,10,.24);background-position:center;background-repeat:no-repeat;background-size:cover;box-shadow:none}
.char-paper-layer::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,.16)}
.char-paper-layer.back-one{left:48px;top:-10px;background-image:url('assets/报纸1.jpg');transform:rotate(3.1deg);z-index:1;opacity:1}
.char-paper-layer.back-two{left:-6px;top:38px;background-image:url('assets/报纸2.jpg');transform:rotate(-3.8deg);z-index:1;opacity:1}
.char-main-sheet{position:absolute;left:14px;top:28px;width:326px;height:340px;background:#fdfdf8;border:1.8px solid rgba(10,10,10,.56);box-shadow:none;z-index:2}
.char-main-sheet::before{content:'';position:absolute;inset:0;border:1px solid rgba(255,255,255,.78);pointer-events:none}
.char-flower{position:absolute;right:-24px;top:158px;width:98px;height:166px;z-index:4;pointer-events:none;transform:rotate(14deg);opacity:1}
.char-flower img{display:block;width:100%;height:100%;object-fit:contain;filter:grayscale(1) brightness(0) contrast(1.2)}
.char-heart-pin{display:none}
.char-polaroid-stack{position:absolute;left:-14px;top:-4px;width:116px;height:138px;z-index:6}
.char-polaroid-main{position:absolute;left:18px;top:0;width:86px;height:86px;border:none;border-radius:0;background:transparent;box-shadow:none;padding:0;transform:rotate(7deg)}
.char-polaroid-main::before{display:none}
.char-polaroid-frame{width:100%;height:100%;border:2px solid #111;border-radius:18px;background:#fff;box-shadow:4px 4px 0 rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;overflow:hidden;font-family:'Zhi Mang Xing',cursive;font-size:23px;font-weight:400;text-align:center;color:#111;line-height:1.04}
.char-polaroid-frame img{width:100%;height:100%;object-fit:cover}
.char-camera{position:absolute;left:-6px;top:52px;width:96px;height:68px;background:url('assets/相机.png') center/contain no-repeat;filter:drop-shadow(1px 2px 0 rgba(0,0,0,.24));z-index:7;transform:rotate(-11deg)}
.char-sheet-content{position:absolute;left:34px;top:38px;width:282px;z-index:3;padding:4px 12px 16px 8px;background:transparent;border:none;box-shadow:none}
.char-sheet-actline{font-family:'Ma Shan Zheng',cursive;font-size:44px;line-height:1;color:#111;text-align:center;margin-bottom:12px}
.char-sheet-rule,.char-sheet-heart,.char-sheet-note{display:none}
.char-sheet-text{width:100%;font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;font-size:14px;font-weight:600;line-height:1.86;letter-spacing:0;white-space:pre-wrap;word-break:break-word;color:#111}
.char-sheet-text p{margin:0 0 12px}
.char-sheet-text p:last-child{margin-bottom:0}
.char-sheet-text .sheet-quote-inline,.offline-story-body .sheet-quote-inline{display:inline-block;padding:1px 9px 3px;margin:0 4px 2px;border:2px solid #0a0a0a;background:#fff !important;color:#111 !important;box-shadow:3px 3px 0 #0a0a0a;line-height:1.62;vertical-align:baseline;font-weight:900;border-radius:2px}
.char-sheet-aside,.offline-story-body .char-sheet-aside{margin:4px 0 14px;color:#6f8fd8;font-style:italic;font-weight:600;text-align:left}
.char-sheet-aside::before,.offline-story-body .char-sheet-aside::before{display:none}
.char-sheet-sign{display:block;margin-top:10px;margin-left:0;max-width:198px;font-family:'Zhi Mang Xing',cursive;font-size:30px;font-weight:400;color:#575757;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-decoration:none}

.offline-status-card{position:relative;width:min(348px,calc(100vw - 24px));height:min(calc(72vh - 156px),464px);border:1.5px solid rgba(22,22,22,.78);border-radius:34px;background:linear-gradient(180deg,rgba(255,255,255,.985),rgba(243,243,243,.96));box-shadow:0 0 0 1px rgba(255,255,255,.95) inset,0 18px 38px rgba(0,0,0,.12);padding:18px 18px 16px;overflow:hidden;display:flex;flex-direction:column}

.offline-status-head{min-width:0}

<body>
<div class="paper-bg" aria-hidden="true"></div>
<div class="shell">
  <div class="offline-stage-header" id="offlineStageHeader">
    <div class="offline-stage-actions">
      <button class="offline-stage-action" type="button" onclick="openExitMenu()" aria-label="离开选项">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 6l-6 6 6 6"></path></svg>
      </button>
      <button class="offline-stage-action" type="button" onclick="openOfflineDrawer()" aria-label="线下设置">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h16"></path><path d="M7 12h13"></path><path d="M10 17h10"></path></svg>
      </button>
    </div>
  </div>
  <div class="story-wrap" id="storyList"></div>
  <div class="composer">
    <button class="composer-btn reply" id="offlineRerollBtn" type="button" onclick="rerollOfflineTurn()">↻</button>
    <div class="composer-box">
      <textarea id="offlineInput" placeholder="写下你此刻线下想说的话..."></textarea>
    </div>
    <div class="composer-actions">
      <button class="composer-btn reply" id="offlineReplyBtn" type="button" onclick="requestOfflineReply()">✦</button>
      <button class="composer-btn primary" id="offlineSendBtn" type="button" onclick="sendOfflineTurn()">➤</button>
    </div>
  </div>
</div>
<button class="exit-btn" id="offlineExitBtn" type="button" onclick="openExitMenu()" style="display:none">×</button>
<div class="offline-invite-debug" id="offlineInviteDebugCard">
  <div class="offline-invite-debug-title">invite debug</div>
  <div class="offline-invite-debug-line" id="offlineInviteDebugLine1"></div>
  <div class="offline-invite-debug-line" id="offlineInviteDebugLine2"></div>
  <div class="offline-invite-debug-line" id="offlineInviteDebugLine3"></div>
</div>

<div class="offline-stage-drawer-overlay" id="offlineDrawerOverlay" aria-hidden="true">
  <div class="offline-stage-drawer" role="dialog" aria-modal="true" aria-label="线下设置">
    <div class="offline-stage-drawer-card">
      <div class="offline-stage-drawer-head">
        <button class="offline-stage-drawer-close" type="button" onclick="closeOfflineDrawer()">×</button>
        <button class="offline-stage-drawer-save" type="button" onclick="saveOfflineDrawerSettings()" aria-label="保存线下设置"><img src="assets/保存.png" alt="保存"></button>
        <div class="offline-stage-drawer-film">
          <div class="offline-stage-drawer-photos">
            <div class="offline-stage-drawer-polaroid char" id="offlineDrawerCharPhoto"></div>
            <div class="offline-stage-drawer-polaroid user" id="offlineDrawerUserPhoto"></div>
          </div>
          <div class="offline-stage-drawer-ticket" id="offlineDrawerBondText">user ♡ char</div>
        </div>
      </div>
      <div class="offline-stage-drawer-body">
        <section class="offline-setting-card">
          <div class="offline-setting-head">
            <div class="offline-setting-title">写作设置</div>
            <div class="offline-setting-note" id="offlineDrawerCurrentRange">300 - 360 字</div>
          </div>
          <div class="offline-setting-grid">
            <div class="offline-setting-row">
              <span class="offline-setting-label">字数设置</span>
              <div style="display:flex;align-items:center;gap:8px;flex:0 0 auto;">
                <input class="offline-setting-input" id="offlineDrawerMinChars" type="number" min="120" max="1200" step="10" style="width:96px">
                <span class="offline-setting-note" style="font-size:12px">~</span>
                <input class="offline-setting-input" id="offlineDrawerMaxChars" type="number" min="160" max="1600" step="10" style="width:96px">
              </div>
            </div>
            <label class="offline-setting-label" for="offlineDrawerPerspective">人称视角</label>
            <select class="offline-setting-select" id="offlineDrawerPerspective">
              <option value="first">第一人称</option>
              <option value="second">第二人称</option>
              <option value="third">第三人称</option>
            </select>
            <label class="offline-setting-label" for="offlineDrawerStyle">文风补充</label>
            <textarea class="offline-setting-textarea" id="offlineDrawerStyle" placeholder="比如：克制一点、动作感重一点、像旧电影里的慢镜头。"></textarea>
          </div>
        </section>
        <section class="offline-setting-card">
          <div class="offline-setting-head">
            <div class="offline-setting-title">阶段总结</div>
          </div>
          <div class="offline-setting-grid">
            <div class="offline-setting-row">
              <span class="offline-setting-label">每多少幕总结一次</span>
              <input class="offline-setting-input" id="offlineDrawerSummaryEvery" type="number" min="2" max="99" step="1" style="max-width:120px">
            </div>
            <div class="offline-setting-row">
              <span class="offline-setting-label">自动生成阶段总结</span>
              <button class="offline-setting-toggle" id="offlineDrawerSummaryAuto" type="button" aria-pressed="true"></button>
            </div>
            <div class="offline-setting-actions">
              <input class="offline-setting-input" id="offlineDrawerManualSummaryCount" type="number" min="2" max="99" step="1" style="max-width:120px" placeholder="幕数">
              <button class="offline-setting-btn primary" id="offlineDrawerSummarizeBtn" type="button">手动总结</button>
            </div>
            <div class="offline-stage-summary-list" id="offlineDrawerSummaryList" hidden></div>
            <div class="offline-setting-actions stack">
              <button class="offline-setting-btn" id="offlineDrawerMemoryBtn" type="button">查看记忆</button>
            </div>
          </div>
        </section>
        <section class="offline-setting-card">
          <div class="offline-setting-head">
            <div class="offline-setting-title">番外设置</div>
          </div>
          <div class="offline-setting-grid">
            <div class="offline-setting-label">默认番外类型</div>
            <div class="offline-setting-dropdown" id="offlineDrawerSideStoryDropdown">
              <button class="offline-setting-dropdown-trigger" id="offlineDrawerSideStoryTrigger" type="button">让我们一起变老</button>
              <div class="offline-setting-dropdown-panel" id="offlineDrawerSideStoryPanel">
                <button class="offline-setting-option" type="button" data-side-story="future"><span>让我们一起变老</span></button>
                <button class="offline-setting-option" type="button" data-side-story="be"><span>眼泪到底值不值钱</span></button>
                <button class="offline-setting-option" type="button" data-side-story="fourthwall"><span>让我们打破第四面墙吧</span></button>
                <button class="offline-setting-option" type="button" data-side-story="nogrow"><span>长大是件好事吗？</span></button>
                <button class="offline-setting-option" type="button" data-side-story="parallelworld"><span>另一个世界的我们</span></button>
                <button class="offline-setting-option" type="button" data-side-story="dropped"><span>喂！你掉了这个</span></button>
                <button class="offline-setting-option" type="button" data-side-story="gossip"><span>八卦配瓜子</span></button>
                <button class="offline-setting-option" type="button" data-side-story="divination"><span>算命这东西准不准啊？</span></button>
              </div>
            </div>
            <div class="offline-setting-actions stack">
              <button class="offline-setting-btn" id="offlineDrawerStatusHistoryBtn" type="button">历史番外</button>
            </div>
          </div>
        </section>
        <div class="offline-stage-drawer-footer">
          <div class="offline-stage-drawer-footer-card">
            <div class="offline-stage-drawer-footer-head">
              <div class="offline-stage-drawer-footer-title">离开一下</div>
              <div class="offline-stage-drawer-footer-note">先收好这场见面</div>
            </div>
            <button class="offline-stage-drawer-exitbtn" type="button" onclick="minimizeOfflineMeet()">暂时离开</button>
            <button class="offline-stage-drawer-exitbtn primary" id="offlineDrawerGoodbyeBtn" type="button" onclick="confirmExitOfflineMeet()">先说再见</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="flight-overlay" id="flightOverlay">
  <div class="flight-card">
    <div class="flight-copy">正在赶往这场见面</div>
    <div class="flight-subcopy">第一幕在认真写啦，点一下屏幕让小兔子跳起来</div>
    <div class="flight-map">
      <canvas class="flight-game" id="flightGame" width="300" height="176" aria-label="等待中的小兔子跳跃游戏"></canvas>
    </div>
    <div class="flight-tip" id="flightGameTip">轻点屏幕或按空格让小兔子跳跃</div>
  </div>
</div>

<div class="toast" id="toast"></div>
<button class="offline-mini-launcher" id="offlineMiniLauncher" type="button" onclick="restoreOfflineMeet()"><img src="assets/线下模式图标.png" alt="线下模式"></button>
<div class="exit-menu" id="exitMenu">
  <div class="exit-menu-card">
    <div class="exit-menu-title">要先离开一下吗</div>
    <div class="exit-menu-sub">你可以把这次约会暂时缩起来，或者认真说完再见后退出。</div>
    <div class="exit-menu-actions">
      <button class="exit-menu-btn" type="button" onclick="minimizeOfflineMeet()">暂时离开</button>
      <button class="exit-menu-btn" id="exitMenuConfirmBtn" type="button" onclick="confirmExitOfflineMeet()">先说再见</button>
      <button class="exit-menu-btn" type="button" onclick="closeExitMenu()">再待一会</button>
    </div>
  </div>
</div>
<div class="offline-edit-overlay" id="offlineEditOverlay">
  <div class="offline-edit-card">
    <div class="offline-edit-title">编辑这一幕</div>
    <textarea class="offline-edit-textarea" id="offlineEditTextarea" placeholder="在这里编辑正文..."></textarea>
    <div class="offline-edit-actions">
      <button class="offline-edit-btn" type="button" onclick="closeOfflineEditModal()">取消</button>
      <button class="offline-edit-btn primary" type="button" onclick="saveOfflineEditModal()">保存</button>
    </div>
  </div>
</div>
<div class="offline-status-overlay" id="offlineStatusOverlay">
  <div class="offline-status-card">
    <button class="offline-status-close" type="button" onclick="closeOfflineStatusModal()">×</button>
    <div class="offline-status-top" id="offlineStatusTop"></div>
    <div class="offline-status-grid" id="offlineStatusGrid"></div>
  </div>
</div>
<div class="offline-status-history-overlay" id="offlineStatusHistoryOverlay">
  <div class="offline-status-history-card">
    <div class="offline-status-history-head">
      <div class="offline-status-history-title">历史番外</div>
      <button class="offline-status-history-close" type="button" onclick="closeOfflineStatusHistory()">×</button>
    </div>
    <div class="offline-status-history-list" id="offlineStatusHistoryList"></div>
  </div>
</div>
<div class="offline-memory-overlay" id="offlineMemoryOverlay">
  <div class="offline-memory-card">
    <div class="offline-memory-head">
      <div class="offline-memory-title" id="offlineMemoryTitle">★ 线下记忆</div>
      <div class="offline-memory-head-actions">
        <button class="offline-memory-close" type="button" onclick="openOfflineMemoryEditor()">+</button>
        <button class="offline-memory-close" type="button" onclick="closeOfflineMemoryPanel()">×</button>
      </div>
    </div>
    <div class="offline-memory-body" id="offlineMemoryBody"></div>
  </div>
</div>
<div class="offline-memory-editor-overlay" id="offlineMemoryEditorOverlay">
  <div class="offline-memory-editor-card">
    <div class="offline-memory-editor-title" id="offlineMemoryEditorTitle">新建记忆总结</div>
    <textarea class="offline-memory-editor-input" id="offlineMemoryEditorInput" placeholder="输入记忆总结..."></textarea>
    <div class="offline-memory-editor-actions">
      <button class="offline-setting-btn" type="button" onclick="closeOfflineMemoryEditor()">取消</button>
      <button class="offline-setting-btn primary" type="button" onclick="confirmOfflineMemoryEditor()">保存</button>
    </div>
  </div>
</div>

<script>
var promptManager = new (window.PromptManager || function(){})();
var session = null;
var character = null;
var desiredOfflineCharId = '';
var sending = false;
var exitingOfflineMeet = false;
var archivingOfflineMeet = false;
var offlineCloseIntent = '';
var flightGameState = null;
var runtimeUserAvatar = '';
var runtimeCharAvatar = '';
var offlineMemorySnippetCache = '';
var offlineEditingIndex = -1;
var offlineSummaryQueue = {};
var offlineStageSummaryQueue = {};
var offlineDrawerBound = false;
var offlineDrawerDraft = null;
var offlineMemoryEditingId = '';
var offlineStageSummaryPreviewOpen = false;
var offlineMoodFaces = {
  soft:['(˶ᵔ ᵕ ᵔ˶)','(◍•ᴗ•◍)','(˵¯͒〰¯͒˵)','(｡•ㅅ•｡)'],
  moody:['(¬_¬ )','(◔_◔)','( －з)','(눈_눈)'],
  bright:['(๑˃̵ᴗ˂̵)و','(ﾉ´ヮ`)ﾉ*: ･ﾟ','(≧▽≦)','(๑•̀ㅂ•́)و'],
  sleepy:['(∪｡∪)｡｡｡','( ｡•́ - •̀｡)','(=-ω-)=','(つ .•́ _ʖ •̀.)つ']
};

function activeAccountId(){
  try{ return window.AccountManager && window.AccountManager.getActive ? ((window.AccountManager.getActive() || {}).id || '') : ''; }catch(e){ return ''; }
}
function scopedKey(base){
  var accountId = activeAccountId();
  return accountId ? (base + '__acct_' + accountId) : base;
}
function activeCharacterKey(){
  return scopedKey('activeCharacter');
}
function offlineSessionKey(charId){
  return scopedKey('offline_meet_session_' + String(charId || ''));
}
function offlineSessionKeyCandidates(charId){
  var safeId = String(charId || '').trim();
  if(!safeId) return [];
  var keys = [offlineSessionKey(safeId), 'offline_meet_session_' + safeId];
  try{
    var acctId = activeAccountId();
    if(acctId){
      keys.unshift('offline_meet_session_' + safeId + '__acct_' + acctId);
    }
  }catch(e){}
  return Array.from(new Set(keys.filter(Boolean)));
}
function pendingOfflineMemoryKey(charId){
  return scopedKey('offline_memory_pending_' + String(charId || ''));
}
function pendingOfflineNoticeKey(charId){
  return scopedKey('offline_notice_pending_' + String(charId || ''));
}
function pendingOfflineBootstrapKey(charId){
  return scopedKey('offline_bootstrap_' + String(charId || ''));
}
function pendingOfflineLaunchKey(charId){
  return scopedKey('offline_launch_' + String(charId || ''));
}
function latestOfflineLaunchKey(){
  return scopedKey('offline_launch_latest');

function drawFlightGame(){

  var ctx = state.ctx;
  var width = state.canvas.width / (Math.max(1, Math.min(2, window.devicePixelRatio || 1)));
  var height = state.canvas.height / (Math.max(1, Math.min(2, window.devicePixelRatio || 1)));

  ctx.strokeStyle = 'rgba(10,10,10,.24)';

    }
  });

  var d = state.bunny;
  ctx.save();
  ctx.translate(d.x, d.y);
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(4, 12, 18, 14);
  ctx.fillRect(16, 8, 8, 10);
  ctx.fillRect(18, 0, 4, 12);
  ctx.fillRect(23, 2, 4, 10);
  ctx.fillRect(8, 24, 4, 10);
  ctx.fillRect(18, 24, 4, 10);
  ctx.fillRect(0, 16, 6, 4);

function stepFlightGame(ts){
  var state = ensureFlightGameState();
  if(!state.running) return;
  if(!state.lastAt) state.lastAt = ts;
  var dt = Math.min(0.032, Math.max(0.001, (ts - state.lastAt) / 1000));
  state.lastAt = ts;

  state.score += dt * 12;
  state.speed = Math.min(360, state.speed + dt * 6);
  state.best = Math.max(state.best, state.score);

  if(!state.spawnAt) state.spawnAt = ts + 650;
  if(ts >= state.spawnAt){
    var width = state.canvas ? state.canvas.width / (Math.max(1, Math.min(2, window.devicePixelRatio || 1))) : 300;
    var h = 22 + Math.round(Math.random() * 18);
    var w = h > 30 ? 18 : 14;
    state.obstacles.push({ x: width + 20, w: w, h: h });
    state.spawnAt = ts + 850 + Math.random() * 700;
  }

  state.bunny.vy += state.gravity * dt;
  state.bunny.y += state.bunny.vy * dt;
  var floorY = state.groundY - state.bunny.h;
  if(state.bunny.y >= floorY){
    state.bunny.y = floorY;
    state.bunny.vy = 0;
    state.bunny.jumping = false;
  }

  state.obstacles.forEach(function(obs){ obs.x -= state.speed * dt; });
  state.obstacles = state.obstacles.filter(function(obs){ return obs.x + obs.w > -20; });

  var hit = state.obstacles.some(function(obs){
    var dx = state.bunny.x + 4;
    var dy = state.bunny.y + 6;
    var dw = state.bunny.w - 8;
    var dh = state.bunny.h - 6;
    var ox = obs.x;
    var oy = state.groundY - obs.h;
    return dx < ox + obs.w && dx + dw > ox && dy < oy + obs.h && dy + dh > oy;
  });
  if(hit){
    resetFlightGame();
  }

  drawFlightGame();
  state.frameId = requestAnimationFrame(stepFlightGame);

  await waitForOfflineStoryPaint();
  await new Promise(function(resolve){ setTimeout(resolve, 48); });
  await requestOfflineReply({ fromUserSend:true });
}
async function requestOfflineReply(options){
  options = options || {};
  if(sending) return;
  if(!session) return;
  setOfflineComposerBusy(true);
  closeThoughtBubbles();
  sending = true;
  try{
    var replyStartedAt = Date.now();
    await hydrateOfflineMemorySnippet();
    var prefs = getOfflineStoryPrefs();
    var minChars = getOfflineReplyMinChars();
    var sceneDepth = Array.isArray(session && session.entries) ? session.entries.length : 0;
    var compactBase = sceneDepth >= 10 ? 2 : (sceneDepth >= 4 ? 1 : 0);
    var safeInvite = session && session.invite && typeof session.invite === 'object'
      ? {
          content: String(session.invite.content || '').trim(),
          mood: String(session.invite.mood || '').trim(),
          weather: String(session.invite.weather || '').trim(),
          location: String(session.invite.location || '').trim()
        }
      : null;
    var retryCompactBase = compactBase;
    var onlineSnippet = getOfflineRecentOnlineSnippetByBudget(
      offlinePromptLimit(isMobileOfflineRuntime() ? 620 : 920, retryCompactBase, 180)
    ) || '无';
    var shortOfflineHistory = clipOfflinePromptText(
      formatOfflineHistoryForPrompt(retryCompactBase >= 1 ? 3 : 4, retryCompactBase >= 1 ? 5 : 7) || '无',
      offlinePromptLimit(isMobileOfflineRuntime() ? 760 : 1100, retryCompactBase, 220)
    ) || '无';
    var lastUserEntry = Array.isArray(session.entries) ? session.entries[session.entries.length - 1] : null;
    var thoughtContext = [
      '这是一次已经开始的线下见面，请顺着当前氛围继续。',
      safeInvite ? ('邀约背景：' + JSON.stringify(safeInvite)) : '',
      '最近线上聊天（压缩）：\n' + onlineSnippet,
      options.fromUserSend && lastUserEntry && lastUserEntry.role === 'user'
        ? ('用户刚刚线下说：' + String(lastUserEntry.text || '').trim())
        : '用户此刻没有说新话，请角色自己顺着当前氛围继续这一幕。'
    ].filter(Boolean).join('\n\n');
    var thoughtChain = null;
    var thoughtErr = null;
    for(var thoughtAttempt = 0; thoughtAttempt < 3; thoughtAttempt += 1){
      var thoughtCompact = Math.min(2, Math.max(retryCompactBase, thoughtAttempt >= 1 ? 1 : 0, thoughtAttempt >= 2 ? 2 : 0));
      try{
        var thoughtRaw = await callAIWithTimeout(buildOfflineThoughtSystemPrompt({ compactLevel: thoughtCompact }), thoughtContext, Math.min(getOfflineReplyTimeoutMs(), 90000));
        var thoughtObj = parseOfflineJsonObject(thoughtRaw);
        if(hasValidOfflineThoughtPayload(thoughtObj)){
          thoughtChain = thoughtObj.thought_chain;
          break;
        }
      }catch(err){
        thoughtErr = err;
      }
    }
    if(!thoughtChain){
      throw thoughtErr || new Error('thought_chain 生成失败');
    }
    var bodyPrompt = buildOfflineBodySystemPrompt({ compactLevel: retryCompactBase });
    var bodyContext = options.fromUserSend && lastUserEntry && lastUserEntry.role === 'user'
      ? buildOfflineUserPrompt(String(lastUserEntry.text || '').trim(), retryCompactBase)
      : [
          '这是一次已经开始的线下见面，请顺着当前氛围继续。',
          safeInvite ? ('邀约背景：' + JSON.stringify(safeInvite)) : '',
          '最近线上聊天（压缩）：\n' + onlineSnippet,
          '最近线下记录（压缩）：\n' + shortOfflineHistory,
          '用户此刻没有说新话，请角色自己顺着当前氛围继续这一幕，并且直接写够完整长度，不要偷成短回复。',
          '这一幕的 thought_chain 方向如下，请严格顺着它来写，不要跑偏：',
          'subtext_perception: ' + String(thoughtChain.subtext_perception || ''),
          'emotional_reaction: ' + String(thoughtChain.emotional_reaction || ''),
          'action_strategy: ' + String(thoughtChain.action_strategy || '')
        ].filter(Boolean).join('\n\n');
    var bodyPayload = null;
    var bestBodyPayload = null;
    var bodyError = null;
    for(var bodyAttempt = 0; bodyAttempt < 2; bodyAttempt += 1){
      try{
        var bodyCompact = Math.min(2, Math.max(retryCompactBase, bodyAttempt >= 1 ? 1 : 0, bodyAttempt >= 2 ? 2 : 0));
        var bodyRaw = await callAIWithTimeout(buildOfflineBodySystemPrompt({ compactLevel: bodyCompact }), bodyContext, getOfflineReplyTimeoutMs());
        var bodyObj = parseOfflineJsonObject(bodyRaw);
        if(!hasValidOfflineBodyPayload(bodyObj)) throw new Error('正文结构不完整');
        if(!bestBodyPayload || openingTextLength(bodyObj.text) > openingTextLength(bestBodyPayload.text || '')){
          bestBodyPayload = bodyObj;
        }
        if(!violatesOfflinePerspective(bodyObj.text, prefs.perspective) && !containsOfflineStyleViolation(bodyObj.text)){
          bodyPayload = bodyObj;
          break;
        }
      }catch(err){
        bodyError = err;
      }
    }
    if(!bodyPayload && bestBodyPayload && !violatesOfflinePerspective(bestBodyPayload.text, prefs.perspective) && !containsOfflineStyleViolation(bestBodyPayload.text)){
      bodyPayload = bestBodyPayload;
    }
    if(!bodyPayload){
      throw bodyError || new Error('正文生成失败');
    }
    var replyText = String(bodyPayload.text || '').trim();
    var replyTitle = String(bodyPayload.title || '').trim();
    var replyQuote = String(bodyPayload.quote || '').trim();
    var replyAsides = normalizeOfflineAsides(bodyPayload.asides);
    for(var extendAttempt = 0; extendAttempt < 2; extendAttempt += 1){
      if(openingTextLength(replyText) >= minChars) break;
      var missing = minChars - openingTextLength(replyText);
      var extendRaw = await callAIWithTimeout(buildOfflineBodySystemPrompt({ compactLevel: Math.min(2, retryCompactBase + 1) }), [
        '这是同一幕线下见面的续写，不要重复前文。',
        '最近线下记录（压缩）：\n' + shortOfflineHistory,
        '已经写好的正文：\n' + replyText,
        '现在还差至少 ' + missing + ' 个中文字符，请继续补足同一幕的动作、气氛、停顿、对话和身体反应。',
        '继续严格保持这幕已有的标题气质、语录气质和蓝字心声质感。',
        '只返回新增内容 JSON：{"text":"...","asides":["...","..."]}'
      ].join('\n\n'), getOfflineReplyTimeoutMs());
      var extendParsed = parseOfflineJsonObject(extendRaw) || {};
      var extraText = String(extendParsed.text || '').trim();
      if(!extraText) break;
      replyText = mergeOfflineOpeningText(replyText, extraText);
      replyAsides = mergeOfflineAsides(replyAsides, normalizeOfflineAsides(extendParsed.asides));
    }
    if(openingTextLength(replyText) < minChars || violatesOfflinePerspective(replyText, prefs.perspective) || containsOfflineStyleViolation(replyText) || !replyTitle || !replyQuote || hasOfflineBannedContentInPayload({
      text: replyText,
      title: replyTitle,
      quote: replyQuote,
      asides: replyAsides,
      thought_chain: thoughtChain
    })){
      throw new Error('回复字数不足或未通过线下正文校验（' + openingTextLength(replyText) + '/' + minChars + '）');
    }
    var nextLabels = nowLabels();
    var replyEntry = {
      role:'assistant',
      text:replyText,
      title:replyTitle,
      quote:replyQuote,
      asides:replyAsides,
      heart:'♥',
      thoughtChain: normalizeOfflineThoughtChain(thoughtChain, replyText),
      statusCard:null,
      statusPending:true,
      summaryText:'',
      bubbles:[],
      timeLabel:nextLabels.timeLabel,
      meta:nextLabels.meta,
      fullLabel: nextLabels.fullLabel,
      createdAt: nextLabels.createdAt
    };
    Object.assign(replyEntry, buildOfflineEntryMeta(replyEntry, 'assistant', nextLabels, {
      generationMs: Date.now() - replyStartedAt
    }));
    session.entries.push(replyEntry);
    saveSession();
    queueOfflineSummaryGeneration(replyEntry);
    queueOfflineStatusCardGeneration(replyEntry);
    queueOfflineStageSummaryGeneration();
    renderStory();
    keepOfflineComposerVisible();
  }catch(e){
    toast('线下回复生成失败：' + summarizeOfflineError(e), { sticky:true });
  }finally{
    sending = false;
    setOfflineComposerBusy(false);
  }
}
async function rerollOfflineTurn(){
  if(sending || !session) return;
  var canRetryOpening = !!(session && session.invite && (session.pendingOpening || shouldBootOpeningFlow()));
  if((!Array.isArray(session.entries) || !session.entries.length) && canRetryOpening){
    session.active = true;
    session.pendingOpening = true;
    session.pendingAnimation = true;
    saveSession();
    renderStory();
    showFlightIfNeeded();
    await generateOpeningIfNeeded();
    renderStory();
    return;
  }
  if(!Array.isArray(session.entries) || !session.entries.length) return;
  var lastAssistantIndex = -1;
  for(var i = session.entries.length - 1; i >= 0; i -= 1){
    if(session.entries[i] && session.entries[i].role === 'assistant'){
      lastAssistantIndex = i;
      break;
    }
  }
  if(lastAssistantIndex === -1){
    toast('还没有可以重生成的回复');
    return;
  }
  session.entries = session.entries.slice(0, lastAssistantIndex);
  var hasAnyAssistant = session.entries.some(function(entry){
    return entry && entry.role === 'assistant' && String(entry.text || '').trim();
  });
  if(!hasAnyAssistant && session.invite){
    session.active = true;
    session.pendingOpening = true;
    session.pendingAnimation = true;
  }
  saveSession();
  renderStory();
  if(!hasAnyAssistant && session.invite){
    showFlightIfNeeded();
    await generateOpeningIfNeeded();
    renderStory();
    return;
  }
  await requestOfflineReply();
}
async function summarizeOfflineMemory(){
  var list = Array.isArray(session && session.entries) ? session.entries : [];
  var lines = list.map(function(entry){
    return (entry.role === 'user' ? '用户' : '角色') + '：' + String(entry.text || '').replace(/\s+/g, ' ').trim();
  }).join('\n');
  if(!lines) return '';
  var systemPrompt = promptManager && typeof promptManager.memorySummarySystemPrompt === 'function'
    ? promptManager.memorySummarySystemPrompt()
    : '你是聊天记忆压缩器，只返回一段纯文本总结。';
  var userPrompt = promptManager && typeof promptManager.memorySummaryUserPrompt === 'function'
    ? promptManager.memorySummaryUserPrompt(lines)
    : ('请总结以下线下见面记录：\n\n' + lines);
  try{
    var raw = await callAIWithTimeout(systemPrompt, userPrompt, 6000);
    return String(raw || '').replace(/^```[a-zA-Z]*\s*/,'').replace(/```$/,'').trim();
  }catch(e){
    return '线下见面中，两人的互动进一步推进了关系，并围绕当下氛围展开了更贴近现实的交流。';
  }
}
function summarizeOfflineMemoryLocally(snapshot){
  var list = Array.isArray(snapshot && snapshot.entries) ? snapshot.entries : [];
  if(!list.length) return '';
  var lastUser = '';
  var lastAssistant = '';
  for(var i = list.length - 1; i >= 0; i -= 1){
    var entry = list[i];
    if(!entry) continue;
    var text = String(entry.text || '').replace(/\s+/g, ' ').trim();
    if(!text) continue;
    if(!lastAssistant && entry.role === 'assistant') lastAssistant = text;
    if(!lastUser && entry.role === 'user') lastUser = text;
    if(lastUser && lastAssistant) break;
  }
  var parts = ['这次线下见面已经结束，两人的关系在这次见面里继续推进。'];
  if(lastUser) parts.push('用户最后表达了：' + lastUser.slice(0, 60) + '。');
  if(lastAssistant) parts.push('角色最后回应了：' + lastAssistant.slice(0, 60) + '。');
  return parts.join('');
}
function setExitMenuBusy(busy){
  var btn = document.getElementById('exitMenuConfirmBtn');
  if(!btn) return;

async function exitOfflineMeet(){
  if(exitingOfflineMeet) return;
  exitingOfflineMeet = true;
  offlineCloseIntent = 'ended';
  setExitMenuBusy(true);
  if(!session || !character || !character.id){
    try{ window.parent.postMessage({ type:'OFFLINE_EXITED' }, '*'); }catch(e){}
    window.parent.postMessage({ type:'OPEN_APP_REPLACE', payload:'chat' }, '*');
    setTimeout(function(){
      exitingOfflineMeet = false;
      offlineCloseIntent = '';
      setExitMenuBusy(false);
    }, 120);
    return;
  }
  await archiveCurrentOfflineMeet('ended', 'goodbye');
  try{ window.parent.postMessage({ type:'OFFLINE_EXITED' }, '*'); }catch(e){}
  window.parent.postMessage({ type:'OPEN_APP_REPLACE', payload:'chat' }, '*');
  setTimeout(function(){
    exitingOfflineMeet = false;
    offlineCloseIntent = '';
    setExitMenuBusy(false);
  }, 120);
}
function openExitMenu(){
  document.getElementById('exitMenu')?.classList.add('open');
}
function closeExitMenu(){
  document.getElementById('exitMenu')?.classList.remove('open');
}
function minimizeOfflineMeet(){
  closeExitMenu();
  offlineCloseIntent = 'minimize';
  if(session){
    session.minimized = true;
    saveSession();
    try{ syncCurrentSessionToArchive('pending', 'minimized'); }catch(e){}
  }
  try{
    window.parent.postMessage({ type:'OFFLINE_MINIMIZED', payload:{ charId: character && character.id } }, '*');
  }catch(e){}
  window.parent.postMessage({ type:'OPEN_APP', payload:'chat' }, '*');
}
function restoreOfflineMeet(){
  offlineCloseIntent = '';
  if(session){
    session.minimized = false;
    saveSession();
  }
  document.querySelector('.shell')?.classList.remove('minimized');
  document.getElementById('offlineMiniLauncher')?.classList.remove('show');
}
async function confirmExitOfflineMeet(){
  if(exitingOfflineMeet) return;
  closeExitMenu();
  await exitOfflineMeet();
}
function showFlightIfNeeded(){

function renderOfflineInviteDebugCard(finalCharId){
  var card = document.getElementById('offlineInviteDebugCard');
  var line1 = document.getElementById('offlineInviteDebugLine1');
  var line2 = document.getElementById('offlineInviteDebugLine2');
  var line3 = document.getElementById('offlineInviteDebugLine3');

  try{
    raw = localStorage.getItem(scopedKey('offline_invite_debug_latest')) || '';
  }catch(e){}

      parsed = JSON.parse(raw) || {};
    }catch(e){

    }

  line2.innerHTML = '<strong>邀约 payload：</strong> ' + esc(String(parsed.invitePayloadCharId || parsed.offlineInviteSessionCharId || '(empty)'));
  line3.innerHTML = '<strong>线下最终读取：</strong> ' + esc(String(finalCharId || parsed.offlineFinalCharId || '(empty)'));

async function init(){
  var latestLaunch = null;
  var offlineLaunchSource = '';
  try{
    var initUrl = new URL(window.location.href);
    offlineLaunchSource = String(initUrl.searchParams.get('__offlineSource') || '').trim();
    if(offlineLaunchSource === 'invite'){
      latestLaunch = consumeLatestPendingOfflineLaunch();
      if(!isFreshOfflineLaunchSeed(latestLaunch)) latestLaunch = null;
    }
    desiredOfflineCharId = String((latestLaunch && latestLaunch.charId) || initUrl.searchParams.get('char') || localStorage.getItem(scopedKey('activeOfflineCharacterId')) || localStorage.getItem('activeOfflineCharacterId') || '').trim();
  }catch(err){
    desiredOfflineCharId = String(localStorage.getItem(scopedKey('activeOfflineCharacterId')) || localStorage.getItem('activeOfflineCharacterId') || '').trim();
  }
  character = loadCharacter(desiredOfflineCharId);
  var launchSeed = offlineLaunchSource === 'invite'
    ? (latestLaunch || (desiredOfflineCharId ? consumePendingOfflineLaunch(desiredOfflineCharId) : null))
    : null;
  var resumeSession = desiredOfflineCharId ? consumePendingOfflineResume(desiredOfflineCharId) : null;
  var bootSession = desiredOfflineCharId ? consumePendingOfflineBootstrap(desiredOfflineCharId) : null;
  if(launchSeed && launchSeed.payload){
    session = {
      active: true,
      invite: launchSeed.payload || null,
      entries: [],
      pendingAnimation: true,
      pendingOpening: true,
      chatHistory: String(launchSeed.chatHistory || ''),
      updatedAt: Date.now()
    };
    if(character && character.id) saveSession();
  }else if(resumeSession && hasMeaningfulOfflineSession(resumeSession)){
    session = resumeSession;
  }else if(bootSession && (hasMeaningfulOfflineSession(bootSession) || (bootSession.invite && bootSession.active !== false))){
    session = bootSession;
    if(character && character.id) saveSession();
  }else{
    session = loadSession();
  }
  await hydrateOfflineMemorySnippet();
  refreshOfflineAvatarAssets();
  if((!character || !character.id) && session && session.invite){
    var fallbackRecord = findLatestOfflineSessionRecord();
    if(fallbackRecord && fallbackRecord.charId){
      var fallbackChar = findCharacterById(fallbackRecord.charId);
      if(fallbackChar) character = fallbackChar;
    }
  }
  if(!session){
    session = { active:false, entries:[] };
  }
  if(session && session.invite && (!Array.isArray(session.entries) || !session.entries.length)){
    session.active = true;
    if(!session.pendingOpening) session.pendingOpening = true;
    if(!session.pendingAnimation) session.pendingAnimation = true;
  }
  if(shouldBootOpeningFlow()){
    session.active = true;
    if(!session.pendingOpening) session.pendingOpening = true;
    if(!session.pendingAnimation) session.pendingAnimation = true;
    saveSession();
  }
  if(session && session.minimized){
    document.querySelector('.shell')?.classList.add('minimized');
    document.getElementById('offlineMiniLauncher')?.classList.add('show');
  }
  if(normalizeOfflineStatusPendingFlags() && character && character.id){
    saveSession();
  }
  try{
    localStorage.setItem(scopedKey('offline_invite_debug_latest'), JSON.stringify(Object.assign({}, (function(){
      try{
        return JSON.parse(localStorage.getItem(scopedKey('offline_invite_debug_latest')) || '{}') || {};
      }catch(e){
        return {};
      }
    })(), {
      offlineDesiredCharId: String(desiredOfflineCharId || '').trim(),
      offlineFinalCharId: String((character && character.id) || '').trim(),
      offlineInviteSessionCharId: String(session && session.charId || (session && session.invite && session.invite.charId) || '').trim(),
      updatedAt: Date.now()
    })));
  }catch(e){}
  renderOfflineInviteDebugCard(String((character && character.id) || '').trim());
  bindOfflineDrawerControls();
  syncOfflineDrawerControls();
  renderStory();
  primeOfflineStatusCards();
  queueOfflineStageSummaryGeneration();
  showFlightIfNeeded();
  await generateOpeningIfNeeded();
  renderStory();
  syncOfflineViewport();
  var input = document.getElementById('offlineInput');
  if(input && !input.dataset.boundEnter){
    input.dataset.boundEnter = '1';
    ['keydown','keypress','keyup'].forEach(function(evtName){
      input.addEventListener(evtName, function(evt){
        if(evt.key === 'Enter' && !evt.shiftKey){
          evt.preventDefault();
          evt.stopPropagation();
          if(typeof evt.stopImmediatePropagation === 'function') evt.stopImmediatePropagation();
          if(evtName === 'keydown') sendOfflineTurn();
        }
      });
    });
    input.addEventListener('keydown', function(evt){
      if(evt.key === 'Enter' && !evt.shiftKey){
        evt.preventDefault();
        evt.stopPropagation();
        if(typeof evt.stopImmediatePropagation === 'function') evt.stopImmediatePropagation();
      }
    });
    input.addEventListener('input', keepOfflineComposerVisible);
  }
}
